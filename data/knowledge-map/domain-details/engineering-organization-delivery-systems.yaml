domain:
  slug: engineering-organization-delivery-systems
  name: エンジニアリング組織とデリバリーシステム
  summary: チーム構造、責務分担、協調、インセンティブ、開発者体験がエンジニアリング成果に与える影響を扱う領域。
  boundaryNotes: チームとフローの設計を扱う。プロダクト戦略は Product Management、本番運用は Reliability / Platform Engineering に寄せる。
  knowledgeAreas:
    - slug: team-topologies-and-ownership
      name: チームトポロジーとオーナーシップ
      summary: 価値の流れに沿ってチームをどう切り、何を誰が持つかを設計する。
      whyLearn: 組織図ではなく責務境界と依存関係からチーム設計を考えられるようになる。
      topicClusters:
        - slug: team-topologies
          name: チームトポロジー
          summary: チームの基本類型と相互作用の設計を扱う。
          concepts:
            - slug: fundamental-team-types
              name: 基本チームタイプ
              summary: 代表的なチーム類型を理解し、過不足のある組織設計を避ける。
              whyLearn: すべてのチームを同じものとして扱うと、期待役割と評価軸が曖昧になるため。
              terms:
                - slug: stream-aligned-team
                  name: ストリームアラインドチーム
                  summary: 顧客や内部利用者への価値の流れに沿って成果を届ける中心チーム。
                  whyLearn: 機能別分業ではなく価値流中心で責務を切る発想の基準になる。
                  promptHint: このチームが担当する価値流、主要依存先、成功指標、認知負荷を説明させる。
                  aliases:
                    - stream-aligned team
                    - value stream team
                  search:
                    keywords:
                      - stream-aligned team
                      - value stream team
                      - ストリームアラインドチーム
                      - 価値流チーム
                      - product team ownership
                      - end-to-end ownership
                      - cross-functional team
                      - Team Topologies
                      - fast flow
                    commonSignals:
                      - 顧客価値に沿ってチームを分ける
                      - end-to-end で機能を届ける
                      - チームが価値流を所有する
                      - 職能別チームからプロダクトチームへ移行する
                    antiSignals:
                      - 単にアジャイルチームや開発チームと呼んでいるだけ
                      - 組織図上の部署名だけで価値流が示されていない
                      - ストリーム処理やデータストリームの話
                    relatedNames:
                      - name: Team Topologies
                        kind: method
                        relevance: ストリームに沿ったチーム設計を定義する代表的な組織設計手法。
                        officialUrl: https://teamtopologies.com/
                      - name: Value Stream Mapping
                        kind: method
                        relevance: 価値の流れを可視化し、チーム境界を検討するときに一緒に使われやすい。
                      - name: Domain-Driven Design
                        kind: method
                        relevance: 業務能力や境界づけられたコンテキストに沿ってチームを切る判断に関係する。

                - slug: platform-team

                  search:

                    keywords:

                      - platform team

                      - internal platform team

                      - プラットフォームチーム

                      - platform engineering

                      - developer platform

                      - internal developer platform

                      - IDP

                      - shared services team

                      - enablement platform

                    commonSignals:

                      - 共通基盤を社内プロダクトとして提供する

                      - 開発者向けセルフサービスを整備する

                      - stream-aligned team の認知負荷を下げる

                      - paved road や golden path を提供する

                    antiSignals:

                      - 単なるインフラ運用チームの説明だけ

                      - 外部クラウドサービスの製品紹介だけ

                      - プラットフォームビジネスやマーケットプレイスの話

                    relatedNames:

                      - name: CNCF Platform Engineering Maturity Model

                        kind: standard

                        relevance: platform engineering の成熟度や組織運営を整理する参照モデル。

                        officialUrl: https://tag-app-delivery.cncf.io/whitepapers/platform-eng-maturity-model/

                      - name: Backstage

                        kind: platform

                        relevance: プラットフォームチームが提供する developer portal の代表的な実装。

                        officialUrl: https://backstage.io/

                      - name: Humanitec

                        kind: platform

                        relevance: Internal Developer Platform の具体例として実務資料でよく言及される。

                        officialUrl: https://humanitec.com/

                      - name: Kratix

                        kind: platform

                        relevance: プラットフォーム機能を Kubernetes 上で提供する platform engineering ツール。

                        officialUrl: https://kratix.io/
                  name: プラットフォームチーム
                  summary: 他チームの開発を加速する共通基盤や内部サービスを提供するチーム。
                  whyLearn: 共通化と自律性のバランスを取る組織設計を考える起点になる。
                  promptHint: どの開発者課題を解く内部プロダクトなのか、利用者と提供範囲を説明させる。
                  aliases:
                    - platform team
                    - internal platform team
                - slug: enabling-team
                  name: イネイブリングチーム
                  summary: 他チームの学習や能力移転を支援し、自律運用へ移行させる支援チーム。
                  whyLearn: 恒久的な依存ではなく、能力獲得を目的にした支援の設計に役立つ。
                  promptHint: 何を恒常運用せず、何を移譲して卒業させるのかを説明させる。
                  aliases:
                    - enabling team
                    - capability team
                  search:
                    keywords:
                      - enabling team
                      - イネイブリングチーム
                      - enablement team
                      - capability building
                      - capability transfer
                      - coaching team
                      - temporary support
                      - adoption support
                      - team enablement
                    commonSignals:
                      - 支援後にチームが自走できるようにする
                      - 一時的に伴走して能力移転する
                      - 新しい技術やプラクティスの導入を支援する
                      - 運用代行ではなく学習支援をする
                    antiSignals:
                      - 恒久的な作業代行チームの話
                      - ヘルプデスクや問い合わせ窓口だけの説明
                      - enable という英単語が機能フラグの有効化を指している
                    relatedNames:
                      - name: Team Topologies
                        kind: method
                        relevance: enabling team を基本チームタイプの一つとして定義する主要手法。
                        officialUrl: https://teamtopologies.com/
                      - name: Communities of Practice
                        kind: method
                        relevance: 能力移転や横断学習の継続的な受け皿として併用されやすい。
                      - name: Agile Coaching
                        kind: method
                        relevance: チームの自律化を支援する実践として enabling team と関連する。

                - slug: complicated-subsystem-team

                  search:

                    keywords:

                      - complicated subsystem team

                      - 複雑サブシステムチーム

                      - specialist subsystem team

                      - specialized team

                      - complex subsystem

                      - expert team

                      - algorithm team

                      - high expertise subsystem

                    commonSignals:

                      - 高度な専門知識が必要なサブシステム

                      - 他チームが日常的に理解するには重すぎる

                      - 画像処理、検索、最適化、決済基盤などの専門領域を独立チームが持つ

                      - stream-aligned team から複雑性を隔離する

                    antiSignals:

                      - 単に規模が大きいだけのコンポーネント

                      - 汎用的な共通基盤を提供する platform team の話

                      - 外注先やベンダーチームを指しているだけ

                    relatedNames:

                      - name: Team Topologies

                        kind: method

                        relevance: 複雑サブシステムチームを基本チームタイプとして扱う主要手法。

                        officialUrl: https://teamtopologies.com/

                      - name: Domain-Driven Design

                        kind: method

                        relevance: 複雑な専門領域を境界づける判断で関連しやすい。

                      - name: Bounded Context

                        kind: pattern

                        relevance: 専門性の高いサブシステムを独立した責務境界として扱う際に関係する。
                  name: 複雑サブシステムチーム
                  summary: 高度に専門的で、他チームが日常的に抱えるには重すぎる領域を担当するチーム。
                  whyLearn: 難所をどこで隔離し、どこで抽象化するかの判断に使える。
                  promptHint: なぜこの領域を共通のプラットフォームではなく専門チームで持つのかを説明させる。
                  aliases:
                    - complicated subsystem team
                    - specialist subsystem team
            - slug: team-interaction-modes
              name: チーム相互作用モード
              summary: チーム間の関わり方を固定的にせず、目的に応じて選ぶ。
              whyLearn: 依存をなくすだけでなく、必要な協働を意図的に設計できるようになるため。
              terms:
                - slug: collaboration
                  name: コラボレーション
                  summary: 新しい学習や設計探索のために一定期間だけ密に協働する相互作用。
                  whyLearn: いつ密接に組むべきかを判断できる。
                  promptHint: どの不確実性を減らすための短期協働なのかを説明させる。
                  aliases:
                    - collaboration mode
                    - intensive collaboration
                - slug: x-as-a-service
                  name: X-as-a-Service
                  summary: 片方のチームが明確な利用境界を持つサービスとして能力を提供する相互作用。
                  whyLearn: 毎回の調整を減らし、自律性を上げる設計の基礎になる。
                  promptHint: 利用者が問い合わせなしで使える契約、入口、サポートモデルを説明させる。
                  aliases:
                    - X-as-a-Service
                    - service interaction
                  search:
                    keywords:
                      - X-as-a-Service
                      - XaaS
                      - service interaction
                      - as a service
                      - サービス型相互作用
                      - self-service interface
                      - productized capability
                      - API contract
                      - service contract
                    commonSignals:
                      - 問い合わせなしで利用できるサービス境界
                      - 利用者向けの契約やドキュメントがある
                      - チームが能力をサービスとして提供する
                      - サポートモデルや利用入口が定義されている
                    antiSignals:
                      - SaaS や PaaS など外部販売サービスの市場分類だけ
                      - 単に API があるだけでチーム間契約がない
                      - クラウド料金プランの話
                    relatedNames:
                      - name: Team Topologies
                        kind: method
                        relevance: チーム間相互作用モードとして X-as-a-Service を扱う代表的手法。
                        officialUrl: https://teamtopologies.com/
                      - name: Platform as a Product
                        kind: method
                        relevance: X-as-a-Service 型の提供を利用者向けプロダクトとして設計する考え方。
                      - name: Service Level Agreement
                        kind: standard
                        relevance: サービス提供時の期待値や責任境界を定義するときに関連する。

                - slug: facilitating-interaction
                  name: ファシリテーティング相互作用
                  summary: あるチームが別チームの能力獲得を促すために伴走する相互作用。
                  whyLearn: 支援を運用代行と混同せず、学習転移として設計できる。
                  promptHint: 何を教え、いつ支援を終えるのか、終了条件を説明させる。
                  aliases:
                    - facilitating interaction
                    - facilitation
        - slug: ownership-and-boundaries
          name: オーナーシップと境界
          summary: チーム境界と責務の切り方を扱う。
          concepts:
            - slug: boundary-design
              name: 境界設計
              summary: 価値流、依存、認知負荷からチーム境界を考える。
              whyLearn: 境界が曖昧だと手戻り、調整コスト、責任の拡散が起きやすいため。
              terms:
                - slug: value-stream
                  name: バリューストリーム
                  summary: 要求から利用者価値までが流れる一連の活動の流れ。
                  whyLearn: チーム境界や改善対象を顧客価値に接続して考えられる。
                  promptHint: この組織での主要な価値流と、その途中で発生する待ちや依存を説明させる。
                  aliases:
                    - value stream
                    - flow of value
                  search:
                    keywords:
                      - value stream
                      - バリューストリーム
                      - 価値流
                      - value stream mapping
                      - VSM
                      - flow of value
                      - request to value
                      - concept to cash
                      - lead time analysis
                    commonSignals:
                      - 要求から価値提供までの流れを可視化する
                      - 待ち時間と処理時間を分ける
                      - 部門横断の流れを改善する
                      - concept to cash や idea to production を測る
                    antiSignals:
                      - 企業価値や株主価値の一般論
                      - データストリーム処理の話
                      - 単なるロードマップや機能一覧
                    relatedNames:
                      - name: Value Stream Mapping
                        kind: method
                        relevance: 価値流の工程、待ち、ボトルネックを可視化する代表的手法。
                      - name: Lean
                        kind: method
                        relevance: 価値流とムダの削減を扱う基礎的な考え方。
                      - name: Kanban
                        kind: method
                        relevance: 価値流上の WIP やフローを可視化・制御する実務手法。
                        officialUrl: https://kanban.university/

                - slug: fracture-plane

                  search:

                    keywords:

                      - fracture plane

                      - フラクチャープレーン

                      - split boundary

                      - team boundary

                      - architecture boundary

                      - domain boundary

                      - bounded context split

                      - decomposition heuristic

                      - service split

                    commonSignals:

                      - どの軸でチームやサービスを分割するか

                      - 顧客、業務能力、変更頻度、リスクで境界を検討する

                      - モノリス分割やチーム再編の切れ目を探す

                      - stream-aligned team の境界を決める

                    antiSignals:

                      - 地質学や材料工学の破断面の話

                      - 単なる組織図の階層分割

                      - フロントエンドとバックエンドの機械的分割だけ

                    relatedNames:

                      - name: Team Topologies

                        kind: method

                        relevance: チームやシステムの自然な分割軸として fracture plane を扱う。

                        officialUrl: https://teamtopologies.com/

                      - name: Domain-Driven Design

                        kind: method

                        relevance: 業務能力や bounded context に基づく境界設計で関連する。

                      - name: Bounded Context

                        kind: pattern

                        relevance: ソフトウェアとチームの境界を切る代表的な設計概念。
                  name: フラクチャープレーン
                  summary: チームやシステムを分割するときに使う自然な切れ目。
                  whyLearn: 地理や職能で雑に割るのではなく、意味のある境界で分けられる。
                  promptHint: この製品で有効な分割軸が顧客、業務能力、リスク、変更頻度のどれかを比較させる。
                  aliases:
                    - fracture plane
                    - split boundary
                - slug: cognitive-load
                  name: 認知負荷
                  summary: チームが安定して処理できる知識量、文脈量、運用負荷の総量。
                  whyLearn: 速度低下の原因を個人能力ではなく設計負荷として見られる。
                  promptHint: チームが抱えている内在負荷、外在負荷、想定外負荷を説明させる。
                  aliases:
                    - cognitive load
                    - team cognitive load
                  search:
                    keywords:
                      - cognitive load
                      - team cognitive load
                      - 認知負荷
                      - extraneous cognitive load
                      - intrinsic cognitive load
                      - context overload
                      - mental load
                      - knowledge burden
                      - operational burden
                    commonSignals:
                      - チームが抱える文脈が多すぎる
                      - 開発、運用、ドメイン知識を同時に持ちすぎている
                      - 認知負荷を下げるために platform を作る
                      - 新人が立ち上がるまで時間がかかる
                    antiSignals:
                      - 個人の集中力や勉強法だけの話
                      - CPU やメモリ使用率などシステム負荷の話
                      - 単なる業務量や残業時間だけ
                    relatedNames:
                      - name: Team Topologies
                        kind: method
                        relevance: チーム設計で認知負荷を中心概念として扱う代表的手法。
                        officialUrl: https://teamtopologies.com/
                      - name: Cognitive Load Theory
                        kind: method
                        relevance: 認知負荷を理解する心理学・教育工学上の基礎理論。
                      - name: Platform Engineering
                        kind: method
                        relevance: stream-aligned team の認知負荷を下げる実践として関連する。
            - slug: team-interface-design
              name: チームインターフェース設計
              summary: チームへの依頼のされ方、責務、接点を可視化する。
              whyLearn: 良い境界も、接点が見えなければ実務では機能しないため。
              terms:
                - slug: team-api
                  name: Team API
                  summary: 他チームがそのチームとどう関わるかを示す公開仕様。
                  whyLearn: 人依存の問い合わせを減らし、接続コストを下げられる。
                  promptHint: チームのミッション、提供物、窓口、期待応答、禁止事項を列挙させる。
                  aliases:
                    - Team API
                    - team interface
                  search:
                    keywords:
                      - Team API
                      - team interface
                      - チームAPI
                      - チームインターフェース
                      - team contract
                      - interaction contract
                      - operating agreement
                      - team boundary documentation
                      - service interface
                    commonSignals:
                      - チームのミッション、提供物、窓口を明文化する
                      - 他チームがどう依頼すればよいかを書く
                      - チーム間の期待応答やサポート範囲を定義する
                      - interaction mode を明確にする
                    antiSignals:
                      - REST API や GraphQL API など技術APIだけの説明
                      - 個人のプロフィールや連絡先一覧だけ
                      - API Gateway や API 管理製品の話だけ
                    relatedNames:
                      - name: Team API Template
                        kind: tool
                        relevance: Team Topologies の考え方に基づく Team API 記述テンプレート。
                        officialUrl: https://github.com/TeamTopologies/Team-API-template
                      - name: Team Topologies
                        kind: method
                        relevance: Team API をチーム間相互作用の明確化手段として提案する。
                        officialUrl: https://teamtopologies.com/
                      - name: Backstage
                        kind: platform
                        relevance: チームやサービスの所有権・接点情報を見える化するポータルとして関連する。
                        officialUrl: https://backstage.io/

                - slug: service-ownership

                  search:

                    keywords:

                      - service ownership

                      - サービスオーナーシップ

                      - service owner

                      - component owner

                      - code ownership

                      - ownership model

                      - ownership metadata

                      - responsible team

                      - on-call owner

                    commonSignals:

                      - このサービスの責任チームは誰か

                      - owner が不明で問い合わせ先が分からない

                      - コンポーネントごとに担当チームを設定する

                      - 障害対応や変更判断の責任を明確にする

                    antiSignals:

                      - プロダクトオーナーの一般論だけ

                      - 法的所有権や知的財産の話

                      - ファイル所有者やUNIX権限の話だけ

                    relatedNames:

                      - name: Backstage Software Catalog

                        kind: platform

                        relevance: サービスの所有者やメタデータを管理する代表的なソフトウェアカタログ。

                        officialUrl: https://backstage.io/docs/features/software-catalog/

                      - name: CODEOWNERS

                        kind: tool

                        relevance: リポジトリ内のコード所有者を明示しレビュー責任に接続する仕組み。

                        officialUrl: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners

                      - name: PagerDuty

                        kind: service

                        relevance: サービス所有者やオンコール責任と結びつくインシデント管理サービス。

                        officialUrl: https://www.pagerduty.com/
                  name: サービスオーナーシップ
                  summary: サービスやコンポーネントに対する最終責任を持つ主体の明確化。
                  whyLearn: 障害や改善の責任が曖昧なままになるのを防ぐ。
                  promptHint: このサービスの意思決定者、保守責任者、依存先管理者が誰かを説明させる。
                  aliases:
                    - service ownership
                    - ownership
                - slug: engagement-model
                  name: エンゲージメントモデル
                  summary: 他チームが支援や変更を求める際の入口、期待、優先順位の取り決め。
                  whyLearn: 依頼が割り込み化し続ける状態を減らせる。
                  promptHint: 依頼経路、優先順位ルール、SLA 風の期待値、例外対応を説明させる。
                  aliases:
                    - engagement model
                    - operating agreement
                  search:
                    keywords:
                      - engagement model
                      - エンゲージメントモデル
                      - operating agreement
                      - support model
                      - intake process
                      - request model
                      - service request
                      - team intake
                      - collaboration agreement
                    commonSignals:
                      - 依頼窓口、優先順位、期待応答を決める
                      - 割り込み依頼を制御する
                      - 他チームからの支援リクエストを管理する
                      - 例外対応やエスカレーション経路を定義する
                    antiSignals:
                      - 顧客エンゲージメントやマーケティング施策の話
                      - SNS の engagement rate
                      - 契約締結や営業プロセスだけの話
                    relatedNames:
                      - name: Service Level Agreement
                        kind: standard
                        relevance: 依頼対応の期待値や優先順位を定義する際に参照される。
                      - name: Jira Service Management
                        kind: service
                        relevance: 依頼受付やサポートモデルを実装するツールとして使われやすい。
                        officialUrl: https://www.atlassian.com/software/jira/service-management
                      - name: Backstage
                        kind: platform
