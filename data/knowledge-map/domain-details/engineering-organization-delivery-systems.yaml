edges:
  - from: value-stream
    to: stream-aligned-team
    relationType: prerequisite
    reason: 価値流を見定めないと、ストリームに沿ったチーム境界を設計しにくいため。
  - from: fracture-plane
    to: stream-aligned-team
    relationType: used_in
    reason: ストリームアラインドチームの境界を決めるときの分割軸として使うため。
  - from: cognitive-load
    to: platform-team
    relationType: used_in
    reason: プラットフォームチームは他チームの認知負荷を下げる目的で設計されるため。
  - from: team-api
    to: x-as-a-service
    relationType: used_in
    reason: サービス型相互作用を成立させるには、接点の仕様化が必要になるため。
  - from: handoff
    to: lead-time-for-changes
    relationType: related
    reason: 不要なハンドオフは変更のリードタイムを延ばしやすいため。
  - from: work-in-progress-limit
    to: throughput
    relationType: related
    reason: WIP 制御は流れの詰まりを減らし、結果としてスループット改善に寄与しやすいため。
  - from: batch-size
    to: change-failure-rate
    relationType: related
    reason: 大きい変更は失敗時の影響範囲を広げ、変更失敗率を悪化させやすいため。
  - from: continuous-integration
    to: continuous-delivery
    relationType: prerequisite
    reason: 継続的デリバリーを支える前提として、頻繁な統合と自動検証が必要になるため。
  - from: trunk-based-development
    to: continuous-integration
    relationType: related
    reason: トランクベース開発は CI を回しやすい分岐戦略としてよく組み合わせられるため。
  - from: feature-flag
    to: continuous-delivery
    relationType: used_in
    reason: デプロイと公開を分離し、小さな変更を安全に流すために使われるため。
  - from: dora-metrics
    to: space-framework
    relationType: compare_with
    reason: DORA はデリバリー成果中心、SPACE は人間中心の多面的生産性中心であり、補完関係にあるため。
  - from: toil
    to: satisfaction-and-well-being
    relationType: related
    reason: トイルの増加は開発者の満足度や疲弊に直接影響しやすいため。
  - from: self-service-success-rate
    to: internal-developer-platform
    relationType: used_in
    reason: internal platform の使いやすさを評価する利用者視点の指標として使えるため。
  - from: platform-as-a-product
    to: developer-portal
    relationType: used_in
    reason: platform を製品として届ける際、portal は主要な体験面になるため。
  - from: software-catalog
    to: ownership-metadata
    relationType: prerequisite
    reason: カタログを有効に機能させるには、機械可読な所有権メタデータが必要なため。
  - from: software-template
