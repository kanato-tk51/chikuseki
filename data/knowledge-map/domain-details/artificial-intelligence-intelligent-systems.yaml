                  whyLearn: 汎用ベンチマークだけでは見えない実務品質を測れる。
                  promptHint: ゴールデンセットを自分たちで作る意義を説明して。
                  aliases:
                    - golden set
                    - eval set
                - slug: human-evaluation
                  name: 人手評価
                  summary: 有用性、自然さ、安全性などを人間が基準に沿って評価する方法。
                  whyLearn: 自動指標だけでは拾えない品質を補完できる。
                  promptHint: 人手評価が必要になる品質属性を説明して。
                  aliases:
                    - human evaluation
                    - human review
            - slug: uncertainty-and-failure-analysis
              name: 不確実性と失敗分析
              summary: モデルがどこで自信過剰になり、どのように壊れるかを扱う。
              whyLearn: 失敗を前提に利用条件やガードレールを決めるために必要。
              terms:
                - slug: hallucination
                  name: 幻覚
                  summary: もっともらしいが事実に根拠のない内容を生成してしまう現象。
                  whyLearn: 生成AI利用の最大級の実務リスクの一つ。
                  promptHint: 幻覚がなぜ起きるのか、RAGや評価でどう向き合うか説明して。
                  aliases:
                    - hallucination
                    - confabulation
                  search:
                    keywords:
                      - 幻覚
                      - hallucination
                      - confabulation
                      - factual error
                      - ungrounded answer
                      - fabricated citation
                      - faithfulness
                      - factuality
                      - groundedness
                      - LLM failure
                    commonSignals:
                      - もっともらしいが根拠のない回答を生成している
                      - fabricated citation、存在しない論文、架空URLが出てくる
                      - RAG、grounding、fact-checkingで低減を試みている
                      - factuality、faithfulness、groundednessを評価している
                    antiSignals:
                      - 医学・精神医学の幻覚症状のみを扱っている
                      - 単なる不正解やバグで生成モデルのもっともらしさがない
                      - 創作やフィクションとして意図的に架空内容を作っている
                    relatedNames:
                      - name: Ragas
                        kind: tool
                        relevance: RAG回答のfaithfulnessやgroundedness評価で幻覚検知と関連する。
                        officialUrl: https://docs.ragas.io/
                      - name: TruLens
                        kind: tool
                        relevance: LLMアプリの回答根拠性や評価計測に使われる。
                        officialUrl: https://www.trulens.org/
                      - name: DeepEval
                        kind: framework
                        relevance: hallucination metricなどLLM出力評価で利用される。
                        officialUrl: https://docs.confident-ai.com/

                - slug: calibration

                  search:

                    keywords:

                      - キャリブレーション

                      - calibration

                      - probability calibration

                      - confidence calibration

                      - expected calibration error

                      - ECE

                      - reliability diagram

                      - Platt scaling

                      - isotonic regression

                      - uncertainty estimation

                    commonSignals:

                      - 予測確率と実際の正答率のズレを測っている

                      - reliability diagram、ECE、Brier scoreが出てくる

                      - temperature scaling、Platt scaling、isotonic regressionを使っている

                      - 自信度が過大・過小であることを評価している

                    antiSignals:

                      - センサーやモニターの物理的校正だけを扱っている

                      - モデル精度accuracyだけで確信度の妥当性がない

                      - ハイパーパラメータ調整をcalibrationと呼んでいるだけ

                    relatedNames:

                      - name: scikit-learn

                        kind: library

                        relevance: CalibratedClassifierCVやisotonic regressionで確率校正を扱える。

                        officialUrl: https://scikit-learn.org/

                      - name: netcal

                        kind: library

                        relevance: ニューラルネットや分類器の確率キャリブレーション評価・補正に使われる。

                        officialUrl: https://github.com/fabiankueppers/calibration-framework

                      - name: TensorFlow Probability

                        kind: library

                        relevance: 不確実性推定や確率モデルと合わせて校正を考える文脈で使われる。

                        officialUrl: https://www.tensorflow.org/probability
                  name: キャリブレーション
                  summary: モデルの確信度と実際の正答確率の一致度。
                  whyLearn: 自信を伴う予測を安全に使うには不可欠。
                  promptHint: キャリブレーションが良いモデルとはどういう状態か説明して。
                  aliases:
                    - calibration
                - slug: robustness
                  name: ロバストネス
                  summary: 入力ゆらぎや条件変化に対して性能や挙動が大きく崩れにくい性質。
                  whyLearn: 実環境での信頼性を見積もる中心概念になる。
                  promptHint: ロバストネスが高いことをどう評価するか説明して。
                  aliases:
                    - robustness
        - slug: adversarial-risk-and-governance-artifacts
          name: 攻撃リスクとガバナンス成果物
          summary: 悪用、攻撃、説明責任に向き合うための実務パターン。
          concepts:
            - slug: attack-and-misuse-patterns
              name: 攻撃と誤用パターン
              summary: 生成AIやエージェントが誘導攻撃や危険出力にさらされる失敗モード。
              whyLearn: 便利機能の追加がそのまま攻撃面の拡大になるから。
              terms:
                - slug: prompt-injection
                  name: プロンプトインジェクション
                  summary: 外部入力が指示系統を乗っ取り、望ましくない動作を誘発する攻撃。
                  whyLearn: tool-calling や RAG を含む実運用系で特に重要。
                  promptHint: プロンプトインジェクションがなぜ単なる悪い入力以上の問題か説明して。
                  aliases:
                    - prompt injection
                  search:
                    keywords:
                      - プロンプトインジェクション
                      - prompt injection
                      - indirect prompt injection
                      - prompt attack
                      - instruction override
                      - system prompt leak
                      - malicious prompt
                      - tool injection
                      - RAG attack
                      - LLM security
                    commonSignals:
                      - 外部文書やユーザー入力がsystem promptを上書きしようとしている
                      - ignore previous instructions のような指示乗っ取りが出てくる
                      - RAGやtool callingで外部入力を信頼しすぎるリスクを扱っている
                      - system prompt leakやdata exfiltrationが話題になっている
                    antiSignals:
                      - SQL injectionやXSSだけでLLM指示系統がない
                      - 通常の悪意ある入力だがモデルへの指示上書きではない
                      - prompt engineeringの改善テクニックだけを指している
                    relatedNames:
                      - name: OWASP Top 10 for LLM Applications
                        kind: standard
                        relevance: LLMアプリの代表的リスク分類としてprompt injectionが中心的に扱われる。
                        officialUrl: https://owasp.org/www-project-top-10-for-large-language-model-applications/
                      - name: Garak
                        kind: tool
                        relevance: LLMの脆弱性やプロンプト攻撃耐性をテストするツールとして使われる。
                        officialUrl: https://github.com/NVIDIA/garak
                      - name: Promptfoo
                        kind: tool
                        relevance: プロンプト攻撃や安全性テストを含むLLM評価に使われる。
                        officialUrl: https://www.promptfoo.dev/

                - slug: jailbreak
                  name: ジェイルブレイク
                  summary: 制約や安全方針を回避して禁止出力を引き出そうとする誘導手法。
                  whyLearn: 安全制御がどの程度脆いかを見る基本語彙になる。
                  promptHint: ジェイルブレイクが安全評価で何を試しているのか説明して。
                  aliases:
                    - jailbreak
                - slug: red-teaming
                  name: レッドチーミング
                  summary: 想定外の失敗や悪用を意図的に探す評価活動。
                  whyLearn: 本番前に脆弱性や危険挙動を洗い出す実務の基本になる。
                  promptHint: レッドチーミングが通常のテストより広く見るものを説明して。
                  aliases:
                    - red teaming
                    - red-teaming
                  search:
                    keywords:
                      - レッドチーミング
                      - red teaming
                      - AI red team
                      - adversarial testing
                      - safety evaluation
                      - jailbreak testing
                      - misuse testing
                      - threat modeling
                      - robustness testing
                      - model risk assessment
                    commonSignals:
                      - 攻撃者視点でモデルの危険挙動や抜け道を探している
                      - jailbreak、prompt injection、data leakageのテストをしている
                      - 本番前の安全性評価やリスクアセスメントとして実施している
                      - threat modelやabuse caseを作っている
                    antiSignals:
                      - セキュリティ演習一般でAIモデルやLLMが関係しない
                      - 通常のQAテストだけで敵対的観点がない
                      - 赤チームという組織名やイベント名だけで評価活動ではない
                    relatedNames:
                      - name: Garak
                        kind: tool
                        relevance: LLMへの攻撃的テストや脆弱性スキャンに使われる。
                        officialUrl: https://github.com/NVIDIA/garak
                      - name: Promptfoo
                        kind: tool
                        relevance: jailbreakやprompt injectionを含むLLMテストケース実行に使われる。
                        officialUrl: https://www.promptfoo.dev/
                      - name: PyRIT
                        kind: tool
                        relevance: 生成AIシステムのリスク発見を支援するレッドチーミングツール。
                        officialUrl: https://github.com/Azure/PyRIT
                      - name: MITRE ATLAS
                        kind: framework
                        relevance: AIシステムへの敵対的戦術・技法を整理する知識ベースとして参照される。
                        officialUrl: https://atlas.mitre.org/
            - slug: documentation-and-governance-hooks
              name: 文書化とガバナンス接続
              summary: モデルやデータの来歴、用途、制約を記録し、説明責任へ接続する。
              whyLearn: チーム外や将来の運用者に知識を引き継ぐために必要。
              terms:
                - slug: model-card
                  name: モデルカード
                  summary: モデルの用途、評価、制約、リスクを記述する文書化テンプレート。
                  whyLearn: モデル利用条件を共有しやすくなる。
                  promptHint: モデルカードに何を書くとレビューに役立つか説明して。
                  aliases:
                    - model card
                  search:
                    keywords:
                      - モデルカード
                      - model card
                      - model documentation
                      - intended use
                      - limitations
                      - ethical considerations
                      - evaluation results
                      - model governance
                      - risk disclosure
                      - responsible AI
                    commonSignals:
                      - intended use、limitations、training data、evaluation resultsを記載している
                      - モデル利用条件やリスクをチーム・利用者に共有している
                      - responsible AIやgovernanceの成果物として扱っている
                      - Hugging FaceのREADME形式でモデル説明を書いている
                    antiSignals:
                      - クレジットカードやIDカードの話である
                      - 単なるモデル概要READMEで評価・制約・用途がない
                      - データセットの文書化でモデル自体を扱っていない
                    relatedNames:
                      - name: Hugging Face Model Card
                        kind: platform
                        relevance: 公開モデルの用途、評価、制約を記述する実務上よく見る形式。
                        officialUrl: https://huggingface.co/docs/hub/model-cards
                      - name: Model Card Toolkit
                        kind: tool
                        relevance: モデルカード生成を支援するツールとして知られる。
                        officialUrl: https://github.com/tensorflow/model-card-toolkit
                      - name: NIST AI RMF
                        kind: standard
                        relevance: AIリスク管理の文脈でモデル文書化や説明責任と関連する。
                        officialUrl: https://www.nist.gov/itl/ai-risk-management-framework

                - slug: data-card
                  name: データカード
                  summary: データセットの収集方法、範囲、偏り、制約を記述する文書。
                  whyLearn: モデル品質をデータ起点で追跡しやすくなる。
                  promptHint: データカードがないと何が分からなくなるか説明して。
                  aliases:
                    - data card
                    - datasheet
                - slug: content-provenance
                  name: コンテンツ来歴
                  summary: 生成物や学習資源の由来、変更履歴、真正性を追跡する考え方。
                  whyLearn: 生成物の信頼性、説明責任、透明性に関わる。
                  promptHint: コンテンツ来歴が生成AI時代に重要になった理由を説明して。
                  aliases:
                    - content provenance
                    - provenance
                  search:
                    keywords:
                      - コンテンツ来歴
                      - content provenance
                      - provenance
                      - content authenticity
                      - C2PA
                      - Content Credentials
                      - watermarking
                      - metadata signing
                      - generated content disclosure
                      - media provenance
                    commonSignals:
                      - 画像・動画・文書の生成元や編集履歴を追跡している
                      - C2PA、Content Credentials、署名付きメタデータが出てくる
                      - 生成AIコンテンツの開示、真正性、改ざん検知を扱っている
                      - watermarkingやprovenance metadataを比較している
                    antiSignals:
                      - データリネージ一般でコンテンツ真正性の話ではない
                      - Gitのコミット履歴だけを指している
                      - 著作権表示だけで来歴や検証可能性がない
                    relatedNames:
                      - name: C2PA
                        kind: standard
                        relevance: デジタルコンテンツの来歴・真正性を記録する代表的な標準。
                        officialUrl: https://c2pa.org/
                      - name: Content Credentials
                        kind: standard
                        relevance: C2PAにもとづくコンテンツ来歴表示の実装・運用名として広く使われる。
                        officialUrl: https://contentcredentials.org/
                      - name: Coalition for Content Provenance and Authenticity
                        kind: other
                        relevance: C2PA標準を推進する団体として来歴管理の文脈で出る。
                        officialUrl: https://c2pa.org/

edges:
  - from: bayes-theorem
    to: bayesian-network
    relationType: prerequisite
    reason: ベイジアンネットワークの条件付き確率計算はベイズの定理の理解を前提にする。
  - from: markov-decision-process
    to: q-learning
    relationType: prerequisite
    reason: Q学習はMDP上で行動価値を更新する発想を前提にする。
  - from: partially-observable-markov-decision-process
    to: belief-update
    relationType: related
    reason: POMDPでは観測ごとの信念更新が中核になる。
  - from: multi-armed-bandit
    to: contextual-bandit
    relationType: prerequisite
    reason: 文脈付きバンディットは通常のバンディットを特徴量付きへ拡張した設定だから。
  - from: upper-confidence-bound
    to: multi-armed-bandit
    relationType: used_in
    reason: UCBは多腕バンディット問題を解く代表的戦略の一つ。
  - from: thompson-sampling
    to: multi-armed-bandit
    relationType: used_in
    reason: トンプソンサンプリングも多腕バンディットの代表解法として使われる。
  - from: a-star
    to: beam-search
    relationType: compare_with
    reason: どちらも探索の候補削減に関わるが、A*は最適性重視、ビームサーチは計算資源節約重視である。
  - from: minimax
    to: alpha-beta-pruning
    relationType: prerequisite
    reason: αβ枝刈りはミニマックス探索を効率化する技巧だから。
  - from: monte-carlo-tree-search
    to: self-play
    relationType: related
    reason: 自己対戦学習ではMCTSと方策学習を組み合わせる設計が代表的である。
  - from: ontology
    to: knowledge-graph
    relationType: related
    reason: オントロジーはナレッジグラフの意味制約や型定義を強化するためによく使われる。
  - from: strips
    to: planning-graph
    relationType: related
    reason: 古典計画ではSTRIPS表現と計画グラフ系の探索が結びついて使われることが多い。
  - from: backpropagation
    to: convolutional-neural-network
    relationType: prerequisite
    reason: CNNも誤差逆伝播で学習されるニューラルネットワークだから。
  - from: backpropagation
    to: self-attention
    relationType: prerequisite
    reason: Transformer系も学習自体は勾配ベース最適化を前提にする。
  - from: embedding
    to: vector-database
    relationType: prerequisite
    reason: ベクトルデータベースは埋め込み表現を索引化して近傍検索するための仕組みだから。
  - from: contrastive-learning
    to: clip
    relationType: used_in
    reason: CLIPは画像とテキストを対応づける対照学習の代表例である。
  - from: self-attention
    to: retrieval-augmented-generation
    relationType: related
    reason: RAGは検索接地の構成だが、生成器の中心にはTransformer系モデルが置かれることが多い。
  - from: supervised-fine-tuning
    to: lora
    relationType: compare_with
    reason: どちらもモデル適応だが、LoRAはパラメータ効率に主眼を置く。
  - from: rlhf
    to: direct-preference-optimization
    relationType: compare_with
    reason: どちらも選好整列の方法だが、DPOはより簡潔な最適化として比較される。
  - from: retrieval-augmented-generation
    to: vector-database
    relationType: used_in
    reason: 多くのRAG構成ではベクトルストアが検索基盤になる。
  - from: retrieval-augmented-generation
    to: reranker
    relationType: used_in
    reason: RAGの検索品質向上のためにリランキングが組み合わされることが多い。
  - from: collaborative-filtering
    to: matrix-factorization
    relationType: used_in
    reason: 行列分解は協調フィルタリングの代表的実装である。
  - from: matrix-factorization
    to: wide-and-deep-learning
    relationType: compare_with
    reason: どちらも推薦に使われるが、前者は潜在因子中心、後者は特徴交差と深層表現の併用を狙う。
  - from: tool-calling
    to: prompt-injection
    relationType: related
    reason: ツール利用が増えるほど、外部入力による指示乗っ取りのリスクが増える。
  - from: red-teaming
    to: prompt-injection
    relationType: used_in
    reason: プロンプトインジェクション耐性の検証ではレッドチーミングが有効である。
  - from: benchmark
    to: golden-set
    relationType: compare_with
    reason: ベンチマークは汎用比較向け、ゴールデンセットは自社文脈の品質保証向けである。
  - from: hallucination
    to: retrieval-augmented-generation
    relationType: related
    reason: RAGは幻覚低減の主要アプローチの一つとして使われる。
  - from: calibration
    to: human-evaluation
    relationType: related
    reason: 自信度の妥当性と人間が感じる信頼性は併せて見ないと判断を誤りやすい。
  - from: model-card
    to: data-card
    relationType: related
    reason: モデル理解とデータ理解は分離できず、文書化も対で整備されることが多い。
  - from: content-provenance
    to: model-card
    relationType: related
    reason: どちらも透明性と説明責任を支える成果物として機能する。
