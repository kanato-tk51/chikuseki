domain:
  slug: artificial-intelligence-intelligent-systems
  name: 人工知能と知的システム
  summary: 学習、予測、生成、探索、推論、自動化をソフトウェアシステムに組み込む領域。
  boundaryNotes: モデルの振る舞いや知的システムの手法を扱う。データ統治は Data、人間への影響は UX / Security、価値判断は Product Management / Business に接続する。
  knowledgeAreas:
    - slug: search-planning-symbolic-reasoning
      name: 探索、計画、記号推論
      summary: 状態空間を表現し、探索し、明示的な知識を使って問題を解くための古典AIの中核。
      whyLearn: 問題をどのように表現すれば解けるか、学習に頼らずにどこまで推論や計画で解けるかを判断できるようになる。
      topicClusters:
        - slug: state-space-and-game-search
          name: 状態空間探索とゲーム探索
          summary: 問題を状態・遷移・評価関数として表し、探索アルゴリズムで解く。
          concepts:
            - slug: heuristic-search
              name: ヒューリスティック探索
              summary: 推定コストや評価関数を使って探索空間を効率的に絞る技法群。
              whyLearn: 探索速度と最適性保証のトレードオフを理解すると、経路探索や推論時探索のレビューがしやすくなる。
              terms:
                - slug: a-star
                  name: A*探索
                  summary: 実コストと推定残コストを足し合わせて展開順を決める代表的な探索法。
                  whyLearn: 最適性保証とヒューリスティック設計の関係を学ぶ起点になる。
                  promptHint: A*探索の評価関数と、なぜ良いヒューリスティックが重要かを説明して。
                  aliases:
                    - A*
                    - A-star search
                  search:
                    keywords:
                      - A*探索
                      - A-star search
                      - A* algorithm
                      - heuristic search
                      - pathfinding
                      - shortest path
                      - admissible heuristic
                      - consistent heuristic
                      - open set
                      - closed set
                    commonSignals:
                      - f(n)=g(n)+h(n) という評価関数が出てくる
                      - 経路探索、迷路探索、地図上の最短経路を扱っている
                      - ヒューリスティックが最適性や探索効率に影響すると述べている
                      - open list / closed list / priority queue が出てくる
                    antiSignals:
                      - 星印やワイルドカードとしての * の話だけである
                      - A/BテストやA*評価のように探索アルゴリズムではない
                      - 単なるDijkstra法の説明でヒューリスティックが出てこない
                    relatedNames:
                      - name: NetworkX
                        kind: library
                        relevance: Pythonでグラフ探索や最短経路アルゴリズムを実装・検証するときによく使われる。
                        officialUrl: https://networkx.org/
                      - name: Boost Graph Library
                        kind: library
                        relevance: C++でA*やDijkstraなどのグラフ探索を扱う代表的ライブラリ。
                        officialUrl: https://www.boost.org/doc/libs/release/libs/graph/
                      - name: ROS Navigation Stack
                        kind: framework
                        relevance: ロボット経路計画でA*系の探索やコストマップと一緒に登場しやすい。
                        officialUrl: https://wiki.ros.org/navigation

                - slug: admissible-heuristic
                  name: 許容的ヒューリスティック
                  summary: 真の残コストを過大評価しないヒューリスティックの性質。
                  whyLearn: A*で最適解が保証される条件を理解する鍵になる。
                  promptHint: 許容的ヒューリスティックがA*の正しさにどう関わるかを説明して。
                  aliases:
                    - admissible heuristic
                - slug: beam-search
                  name: ビームサーチ
                  summary: 各深さで上位候補だけを残して探索幅を制限する近似探索。
                  whyLearn: 最適性を捨ててでも計算資源を抑える設計判断を理解できる。
                  promptHint: ビームサーチがA*とどう違い、どんな場面で使われるか説明して。
                  aliases:
                    - beam search
                  search:
                    keywords:
                      - ビームサーチ
                      - beam search
                      - beam width
                      - sequence decoding
                      - approximate search
                      - top-k candidates
                      - decoder search
                      - hypothesis pruning
                      - seq2seq decoding
                      - candidate generation
                    commonSignals:
                      - beam width や num beams を調整している
                      - 翻訳、要約、音声認識、テキスト生成の候補列探索を扱っている
                      - 上位N個の仮説だけを残すと説明している
                      - greedy decoding と比較している
                    antiSignals:
                      - レーザービームや物理的なビームの話である
                      - 検索エンジンの一般的なランキングだけを指している
                      - 木探索ではあるが候補幅制限が出てこない
                    relatedNames:
                      - name: Hugging Face Transformers
                        kind: library
                        relevance: テキスト生成や翻訳でbeam searchのパラメータが頻繁に使われる。
                        officialUrl: https://huggingface.co/docs/transformers/
                      - name: OpenNMT
                        kind: framework
                        relevance: 機械翻訳やseq2seqモデルのデコード設定でbeam searchがよく登場する。
                        officialUrl: https://opennmt.net/
                      - name: Fairseq
                        kind: framework
                        relevance: sequence-to-sequenceモデルの生成時探索やビーム幅設定で関連が強い。
                        officialUrl: https://fairseq.readthedocs.io/
            - slug: game-and-tree-search
              name: ゲーム木探索
              summary: 対戦や逐次意思決定を木として表し、勝率や価値を見積もって手を選ぶ。
              whyLearn: 対戦AIだけでなく、複数候補から先読みして意思決定する仕組みの基礎になる。
              terms:
                - slug: minimax
                  name: ミニマックス法
                  summary: 相手も最善手を打つと仮定して最悪ケースを最適化する探索法。
                  whyLearn: 敵対的環境での意思決定の考え方が身につく。
                  promptHint: ミニマックス法の前提と、どのようなゲームに向くか説明して。
                  aliases:
                    - minimax
                - slug: alpha-beta-pruning
                  name: αβ枝刈り
                  summary: ミニマックス探索で不要な分岐を切り落として計算量を減らす最適化。
                  whyLearn: 同じ正解でも探索順が性能に大きく効くことを理解できる。
                  promptHint: αβ枝刈りがなぜミニマックスを高速化できるのか説明して。
                  aliases:
                    - alpha-beta pruning
                    - alpha beta pruning
                - slug: monte-carlo-tree-search
                  name: モンテカルロ木探索
                  summary: シミュレーションと木探索を組み合わせて有望手を重点的に深掘りする手法。
                  whyLearn: 価値推定が不完全でも探索で性能を引き上げる発想を学べる。
                  promptHint: モンテカルロ木探索の流れと、学習モデルと組み合わせる利点を説明して。
                  aliases:
                    - MCTS
                    - Monte Carlo Tree Search
                  search:
                    keywords:
                      - モンテカルロ木探索
                      - Monte Carlo Tree Search
                      - MCTS
                      - UCT
                      - tree policy
                      - rollout
                      - playout
                      - simulation search
                      - game AI
                      - AlphaGo search
                    commonSignals:
                      - selection / expansion / simulation / backpropagation の流れが出てくる
                      - 囲碁、将棋、ボードゲーム、ゲームAIの先読みを扱っている
                      - rollout や playout による価値推定を説明している
                      - UCT や exploration constant が出てくる
                    antiSignals:
                      - 単なるモンテカルロ積分や乱数シミュレーションだけで木探索がない
                      - 決定木やランダムフォレストの木と混同している
                      - Monte Carlo dropout のような不確実性推定の話である
                    relatedNames:
                      - name: AlphaGo
                        kind: other
                        relevance: MCTSと深層ニューラルネットワークを組み合わせた代表的な事例として学習上重要。
                      - name: OpenSpiel
                        kind: framework
                        relevance: ゲーム理論・強化学習・探索アルゴリズムの実験でMCTSを扱いやすい。
                        officialUrl: https://openspiel.readthedocs.io/
                      - name: MuZero
                        kind: method
                        relevance: モデル学習とMCTSを組み合わせる現代的な強化学習系手法として関連が深い。
        - slug: symbolic-representation-and-planning
          name: 記号表現と計画
          summary: 世界知識や行動を明示的な記号として表し、推論や行動列生成に使う。
          concepts:
            - slug: symbolic-knowledge-representation
              name: 記号的知識表現
              summary: 概念、関係、規則を人間が読める形で構造化する技法。
              whyLearn: 説明可能性や制約の厳密表現が必要な場面で、学習だけに依らない設計判断ができる。
              terms:
                - slug: knowledge-graph
                  name: ナレッジグラフ
                  summary: エンティティと関係をグラフとして表現する知識表現。
                  whyLearn: 構造化知識を検索や推論に再利用する設計の基礎になる。
                  promptHint: ナレッジグラフが表形式データや文書検索とどう違うか説明して。
                  aliases:
                    - knowledge graph
                    - KG
                  search:
                    keywords:
                      - ナレッジグラフ
                      - knowledge graph
                      - KG
                      - entity relationship graph
                      - semantic graph
                      - RDF
                      - triples
                      - SPARQL
                      - graph database
                      - entity linking
                    commonSignals:
                      - entity、relationship、triple、node、edge を知識表現として扱っている
                      - 文書検索ではなく構造化された事実や関係を検索している
                      - SPARQL、RDF、OWL、schema.org が出てくる
                      - LLMやRAGに構造化知識を接続する話が出てくる
                    antiSignals:
                      - 一般的なグラフ理論やネットワーク分析だけで意味論がない
                      - KubernetesのKnowledge Graphなど固有プロダクト名だけの話である
                      - 単なるマインドマップや概念図を指している
                    relatedNames:
                      - name: RDF
                        kind: standard
                        relevance: ナレッジグラフのトリプル表現で広く使われる標準。
                        officialUrl: https://www.w3.org/RDF/
                      - name: SPARQL
                        kind: standard
                        relevance: RDFグラフに対するクエリ言語としてナレッジグラフと一緒に出る。
                        officialUrl: https://www.w3.org/TR/sparql11-query/
                      - name: Neo4j
                        kind: platform
                        relevance: グラフデータベースとして知識グラフ実装や探索でよく使われる。
                        officialUrl: https://neo4j.com/
                      - name: Wikidata
                        kind: platform
                        relevance: 公開ナレッジグラフの代表例として実務・学習の両方で参照される。
                        officialUrl: https://www.wikidata.org/
                      - name: Apache Jena
                        kind: framework
                        relevance: RDF、SPARQL、推論を扱うJava系の代表的フレームワーク。
                        officialUrl: https://jena.apache.org/

                - slug: ontology

                  search:

                    keywords:

                      - オントロジー

                      - ontology

                      - OWL

                      - RDF schema

                      - semantic web

                      - taxonomy

                      - class hierarchy

                      - domain model

                      - reasoning

                      - controlled vocabulary

                    commonSignals:

                      - class、property、subClassOf、domain、range などの語が出てくる

                      - 共通語彙、意味制約、概念階層を明示化している

                      - OWL reasoner や推論可能性が話題になっている

                      - ナレッジグラフの型定義や意味論を設計している

                    antiSignals:

                      - 哲学一般の存在論だけで計算機上の知識表現ではない

                      - 単なるカテゴリ一覧やタグ一覧で意味制約がない

                      - データベーススキーマだけを指している

                    relatedNames:

                      - name: OWL

                        kind: standard

                        relevance: Web Ontology Languageとしてオントロジー定義で広く使われる。

                        officialUrl: https://www.w3.org/OWL/

                      - name: Protégé

                        kind: tool

                        relevance: オントロジー作成・編集・推論確認の代表的ツール。

                        officialUrl: https://protege.stanford.edu/

                      - name: RDF Schema

                        kind: standard

                        relevance: RDF上でクラスやプロパティの基本語彙を定義する標準。

                        officialUrl: https://www.w3.org/TR/rdf-schema/

                      - name: SHACL

                        kind: standard

                        relevance: RDFグラフの制約検証でオントロジーやナレッジグラフと併用される。

                        officialUrl: https://www.w3.org/TR/shacl/
                  name: オントロジー
                  summary: 概念間の型や意味関係を明示して共有可能にする意味論的な定義体系。
                  whyLearn: ドメイン知識の曖昧さを減らし、推論可能な共通語彙を作れる。
                  promptHint: オントロジーが単なる用語集より強い理由を説明して。
                  aliases:
                    - ontology
                - slug: production-rule
                  name: 生成規則
                  summary: 条件が満たされたら行動や結論を導く if-then 形式のルール。
                  whyLearn: ルールベース推論や業務自動化の基礎になる。
                  promptHint: 生成規則を使う利点と、機械学習との使い分けを説明して。
                  aliases:
                    - production rule
                    - rule-based system
            - slug: automated-planning-and-constraints
              name: 自動計画と制約充足
              summary: 目標達成のための行動列や割当てを探索で構成する技法群。
              whyLearn: ワークフロー設計、スケジューリング、タスク分解を形式的に考えられるようになる。
              terms:
                - slug: strips
                  name: STRIPS
                  summary: 行動の前提条件と効果で計画問題を表現する古典的フレームワーク。
                  whyLearn: 計画を状態遷移として記述する基本形を学べる。
                  promptHint: STRIPS表現で行動をどう記述するか、簡単な例で説明して。
                  aliases:
                    - STRIPS
                - slug: planning-graph
                  name: 計画グラフ
                  summary: 並行可能な行動と到達可能な命題を層状に整理する計画用データ構造。
                  whyLearn: 計画可能性の見積もりや Graphplan 系の考え方を理解できる。
                  promptHint: 計画グラフが探索をどう助けるか説明して。
                  aliases:
                    - planning graph
                    - Graphplan
                - slug: constraint-satisfaction-problem
                  name: 制約充足問題
                  summary: 変数・値域・制約からなる問題を満たす割り当てを探す定式化。
                  whyLearn: スケジューリングやパズルから構成判断まで広く応用できる。
                  promptHint: 制約充足問題として表現すると何が見通しやすくなるか説明して。
                  aliases:
                    - CSP
                    - constraint satisfaction problem
                  search:
                    keywords:
                      - 制約充足問題
                      - constraint satisfaction problem
                      - CSP
                      - constraint programming
                      - constraint solver
                      - backtracking search
                      - arc consistency
                      - SAT
                      - scheduling
                      - combinatorial optimization
                    commonSignals:
                      - 変数、値域、制約、割り当てという定式化が出てくる
                      - スケジューリング、割当、時間割、ナースロスタリングを扱っている
                      - backtracking、forward checking、arc consistency が出てくる
                      - SAT solver や CP-SAT と比較している
                    antiSignals:
                      - 単なる入力バリデーションやDB制約だけの話である
                      - 最適化問題だが制約充足としての変数・値域・制約が明示されない
                      - CSSやCSPヘッダーなどWebセキュリティ用語のCSPである
                    relatedNames:
                      - name: Google OR-Tools
                        kind: library
                        relevance: 制約プログラミング、スケジューリング、最適化問題で実務利用が多い。
                        officialUrl: https://developers.google.com/optimization
                      - name: MiniZinc
                        kind: language
                        relevance: 制約充足・制約最適化問題を宣言的に記述する代表的言語。
                        officialUrl: https://www.minizinc.org/
                      - name: Z3
                        kind: tool
                        relevance: SMTソルバーとして制約解決や形式検証の文脈で関連が強い。
                        officialUrl: https://github.com/Z3Prover/z3
                      - name: Choco Solver
                        kind: library
                        relevance: Javaで制約プログラミングを実装するための代表的ライブラリ。
                        officialUrl: https://choco-solver.org/

    - slug: probabilistic-reasoning-and-decision-making
      name: 確率的推論と意思決定
      summary: 不確実性の下で信念を更新し、期待価値にもとづいて選択するための理論と手法。
      whyLearn: AI を現実の曖昧なデータや不完全観測の環境に持ち込むときの基礎判断になる。
      topicClusters:
        - slug: uncertainty-modeling
          name: 不確実性の表現
          summary: 確率モデルや依存関係の表現で、曖昧さを計算可能な形にする。
          concepts:
            - slug: probabilistic-structures
              name: 確率モデルの構造
              summary: 事象や依存関係を確率で表現する基本構造。
              whyLearn: データから何を推定したいのか、どの依存を明示するべきかを整理できる。
              terms:
                - slug: bayes-theorem
                  name: ベイズの定理
                  summary: 事前知識と観測を組み合わせて事後確率を更新する基本公式。
                  whyLearn: 推論の更新というAIの基礎動作を最も簡潔に表す。
                  promptHint: ベイズの定理が観測による信念更新をどう表すか説明して。
                  aliases:
                    - Bayes theorem
                    - Bayes rule
                - slug: bayesian-network
                  name: ベイジアンネットワーク
                  summary: 条件付き依存関係を有向グラフで表す確率モデル。
                  whyLearn: 因果的な直感に近い形で複雑な依存を分解して考えられる。
                  promptHint: ベイジアンネットワークが条件付き独立をどう表すか説明して。
                  aliases:
                    - Bayesian network
                    - belief network
                  search:
                    keywords:
                      - ベイジアンネットワーク
                      - Bayesian network
                      - belief network
                      - probabilistic graphical model
                      - directed acyclic graph
                      - DAG
                      - conditional independence
                      - CPT
                      - causal inference
                      - probabilistic inference
                    commonSignals:
                      - 有向非巡回グラフで確率依存を表している
                      - conditional probability table や CPT が出てくる
                      - 条件付き独立やd-separationを説明している
                      - 診断、リスク推定、原因推定の不確実性モデルを扱っている
                    antiSignals:
                      - 一般的なニューラルネットワークのベイズ化だけを指している
                      - SNSや通信ネットワークの話で確率モデルではない
                      - 因果グラフではあるが確率推論が出てこない
                    relatedNames:
                      - name: pgmpy
                        kind: library
                        relevance: Pythonでベイジアンネットワークや確率グラフィカルモデルを扱うライブラリ。
                        officialUrl: https://pgmpy.org/
                      - name: Pyro
                        kind: library
                        relevance: 確率プログラミングでベイズ推論やグラフィカルモデルを実装できる。
                        officialUrl: https://pyro.ai/
                      - name: Stan
                        kind: language
                        relevance: ベイズ統計モデルの記述・推論で広く使われる確率プログラミング言語。
                        officialUrl: https://mc-stan.org/
                      - name: bnlearn
                        kind: library
                        relevance: Rでベイジアンネットワーク構造学習や推論を行う代表的パッケージ。
                        officialUrl: https://www.bnlearn.com/

                - slug: hidden-markov-model

                  search:

                    keywords:

                      - 隠れマルコフモデル

                      - hidden Markov model

                      - HMM

                      - Viterbi algorithm

                      - Baum-Welch

                      - forward backward algorithm

                      - sequence labeling

                      - state estimation

                      - emission probability

                      - transition probability

                    commonSignals:

                      - 観測系列と隠れ状態列を区別している

                      - Viterbi、forward-backward、Baum-Welch が出てくる

                      - 音声認識、品詞タグ付け、状態推定、時系列ラベリングを扱っている

                      - 遷移確率と出力確率を推定している

                    antiSignals:

                      - マルコフ連鎖だけで隠れ状態や観測確率がない

                      - TransformerやRNNの系列モデル一般を指しているだけ

                      - HMMという略称が別分野の用語として使われている

                    relatedNames:

                      - name: hmmlearn

                        kind: library

                        relevance: PythonでHMMを学習・推論するための軽量ライブラリ。

                        officialUrl: https://hmmlearn.readthedocs.io/

                      - name: Kaldi

                        kind: framework

                        relevance: 古典的な音声認識でHMMと音響モデルが頻繁に関連する。

                        officialUrl: https://kaldi-asr.org/

                      - name: pomegranate

                        kind: library

                        relevance: HMMを含む確率モデルをPythonで扱うライブラリとして知られる。

                        officialUrl: https://pomegranate.readthedocs.io/
                  name: 隠れマルコフモデル
                  summary: 観測の背後に見えない状態遷移を仮定する時系列モデル。
                  whyLearn: 音声、系列ラベリング、状態推定の基礎として重要。
                  promptHint: 隠れマルコフモデルで状態と観測をどう区別するか説明して。
                  aliases:
                    - HMM
                    - hidden Markov model
            - slug: probabilistic-inference
              name: 確率推論
              summary: 観測された証拠から未知の変数やもっともらしい仮説を求める。
