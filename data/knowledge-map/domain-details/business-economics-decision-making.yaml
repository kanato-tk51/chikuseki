domain:
  slug: business-economics-decision-making
  name: ビジネス、経済性、意思決定
  summary: プロダクト、エンジニアリング、運用上の選択を、価値創出、収益、資源配分の観点で考える領域。
  boundaryNotes: 価値獲得と資源配分のトレードオフを扱う。プロダクト範囲は Product Management、組織配置は Engineering Organization に寄せる。
  knowledgeAreas:
    - slug: value-creation-market-structure
      name: 価値創出と市場構造
      summary: 顧客価値がどこで生まれ、どのような市場力学の中で価値を獲得できるかを捉える。
      whyLearn: 価格、投資、成長施策の前提になる市場の読み方と競争優位の源泉を理解するため。
      topicClusters:
        - slug: business-model-and-value-logic
          name: ビジネスモデルと価値の論理
          summary: 何を価値として提供し、どのように価値を獲得するかを整理する。
          concepts:
            - slug: value-creation-and-capture
              name: 価値創出と価値獲得
              summary: 顧客便益と企業側の収益化の関係を捉える考え方。
              whyLearn: 良い機能でも、顧客価値と価値獲得の筋が通っていなければ事業として成立しないため。
              terms:
                - slug: value-proposition
                  name: 価値提案
                  summary: 顧客にとっての便益、差別化、選ばれる理由を短く定義したもの。
                  whyLearn: 価格、販売、機能優先順位の判断がぼやけないようにするため。
                  promptHint: この価値提案は誰のどの仕事・不満・期待に効いているかを具体的に説明して。
                  aliases:
                    - Value Proposition
                    - UVP
                - slug: willingness-to-pay
                  name: 支払意思額
                  summary: 顧客がその価値に対して支払ってよいと感じる上限金額。
                  whyLearn: 値付けやディスカウントの妥当性を考える基準になるため。
                  promptHint: この顧客セグメントの支払意思額は何で変わるか、代替案との比較で説明して。
                  aliases:
                    - WTP
                    - Willingness to Pay
                - slug: value-capture
                  name: 価値獲得
                  summary: 生み出した価値のうち、企業が収益や利益として取り込める部分。
                  whyLearn: 利用者が増えても利益が残らない構造を見抜くため。
                  promptHint: この事業は価値を作れていても、なぜ価値獲得が弱いのかを分解して。
                  aliases:
                    - Value Capture
            - slug: business-model-representation
              name: ビジネスモデル表現
              summary: 事業の構成要素と関係を見取り図として表す方法。
              whyLearn: 収益源、コスト、チャネル、顧客、パートナーを一枚で対話可能にするため。
              terms:
                - slug: business-model-canvas
                  name: ビジネスモデルキャンバス
                  summary: 顧客、提供価値、チャネル、収益源、コスト構造などを整理するテンプレート。
                  whyLearn: 新規事業や既存事業の構造を比較しやすくするため。
                  promptHint: この事業のキャンバスを埋めたとき、一番弱いブロックはどこかを指摘して。
                  aliases:
                    - BMC
                    - Business Model Canvas
                - slug: revenue-model
                  name: 収益モデル
                  summary: 売上がどの単位で、いつ、どの条件で発生するかを定める仕組み。
                  whyLearn: 成長しても売上の質が悪い構造を避けるため。
                  promptHint: この事業の収益モデルは単発売上か継続売上か、回収の癖も含めて説明して。
                  aliases:
                    - Revenue Model
                - slug: cost-structure
                  name: コスト構造
                  summary: 固定費と変動費の比重、主要な費目、スケール時の変化の仕方。
                  whyLearn: 利益改善が価格で起きるのか、原価で起きるのかを見極めるため。
                  promptHint: この事業のコスト構造はスケールでどこが効率化し、どこが比例費になるかを整理して。
                  aliases:
                    - Cost Structure

        - slug: competition-and-defensibility
          name: 競争と防御可能性
          summary: 市場の利益配分や参入障壁、勝ちやすさを左右する構造を扱う。
          concepts:
            - slug: industry-structure-analysis
              name: 産業構造分析
              summary: 競争相手だけでなく、代替、買い手、売り手、参入脅威まで含めて市場を読む方法。
              whyLearn: 競合比較だけでは見えない利益圧力を捉えるため。
              terms:
                - slug: porter-five-forces
                  name: ファイブフォース
                  summary: 業界の魅力度と利益構造を五つの競争圧力で見るフレームワーク。
                  whyLearn: 価格競争、参入障壁、交渉力の強さを体系的に点検できるため。
                  promptHint: この市場を五つの力で見たとき、どの圧力が最も粗利を削っているか説明して。
                  aliases:
                    - Five Forces
                    - Porter's Five Forces
                - slug: market-definition
                  name: 市場定義
                  summary: 代替可能性や地理範囲を踏まえて競争の単位を定めること。
                  whyLearn: 競争相手やシェアの見方を誤らないため。
                  promptHint: このサービスの市場定義を狭く取りすぎると何を見誤るか説明して。
                  aliases:
                    - Market Definition
                - slug: substitute
                  name: 代替財
                  summary: 同じ目的を別の方法で満たし、需要を奪いうる選択肢。
                  whyLearn: 直接競合だけ見て需要流出を見落とさないため。
                  promptHint: このプロダクトの本当の代替財は何か、非ソフトウェア手段も含めて考えて。
                  aliases:
                    - Substitute
                - slug: complement
                  name: 補完財
                  summary: 一緒に使われることで価値を高める製品やサービス。
                  whyLearn: 自社単体ではなくエコシステム全体で価値を設計する視点が持てるため。
                  promptHint: この事業で補完財が強くなると需要や価格決定力がどう変わるか説明して。
                  aliases:
                    - Complement
            - slug: platform-and-moat-dynamics
              name: プラットフォームと参入障壁
              summary: プラットフォーム市場や規模優位がどのように防御力を生むかを扱う。
              whyLearn: デジタル市場では競争力が機能差ではなく構造差から生まれることが多いため。
              terms:
                - slug: multi-sided-platform
                  name: マルチサイド・プラットフォーム
                  summary: 複数の利用者グループを仲介し、相互作用から価値を生む事業構造。
                  whyLearn: 片側だけを最適化しても全体が伸びない市場を理解するため。
                  promptHint: この事業はどの面を持つプラットフォームで、面間の依存は何か整理して。
                  aliases:
                    - Two-Sided Market
                    - Multi-Sided Platform
                - slug: network-effects
                  name: ネットワーク効果
                  summary: 利用者数の増加が既存利用者の価値を高める現象。
                  whyLearn: 成長がそのまま参入障壁や価格決定力につながる条件を理解するため。
                  promptHint: このプロダクトのネットワーク効果は直接型か間接型か、何が強化要因か説明して。
                  aliases:
                    - Network Effects
                - slug: switching-costs
                  name: スイッチングコスト
                  summary: 顧客が他社へ乗り換える際の金銭的・運用的・心理的な負担。
                  whyLearn: 維持率や価格耐性に効く本当の理由を見抜くため。
                  promptHint: このサービスのスイッチングコストはデータ、学習、契約、連携のどこにあるか説明して。
                  aliases:
                    - Switching Costs
                    - Lock-in
                - slug: economies-of-scale
                  name: 規模の経済
                  summary: 事業規模の拡大に伴って単位当たりコストが下がる性質。
                  whyLearn: シェア拡大が利益率改善にどう結びつくかを判断するため。
                  promptHint: この事業は規模の経済が働くのか、固定費と変動費から説明して。
                  aliases:
                    - Economies of Scale

    - slug: monetization-pricing-packaging
      name: 収益化、価格、パッケージング
      summary: 価値をどの課金単位で、どの価格体系で、どの契約条件で販売するかを設計する。
      whyLearn: 良いプロダクトでも monetization design を誤ると、成長と利益が両立しないため。
      topicClusters:
        - slug: pricing-architecture
          name: 価格アーキテクチャ
          summary: 価格モデル、価値指標、値付け思想を扱う。
          concepts:
            - slug: pricing-model-selection
              name: 価格モデル選択
              summary: 課金の単位やタイミングをどう設計するか。
              whyLearn: 顧客価値と自社コストのズレを減らすため。
              terms:
                - slug: subscription-pricing
                  name: サブスクリプション課金
                  summary: 一定期間の利用権に対して定期的に課金するモデル。
                  whyLearn: 予見可能な収益を作りやすい一方、価値変動とのズレも生みやすいため。
                  promptHint: このプロダクトでサブスク課金が機能する条件と欠点を説明して。
                  aliases:
                    - Subscription Pricing
                    - Recurring Pricing
                - slug: usage-based-pricing
                  name: 使用量ベース課金
                  summary: API 回数、データ量、処理量など実際の消費量に応じて課金するモデル。
                  whyLearn: コストと価値の連動を作りやすく、AI や開発者向け商材で重要だから。
                  promptHint: このサービスで使用量ベース課金を採るとき、価値指標と原価指標は一致しているか検討して。
                  aliases:
                    - Usage-Based Pricing
                    - Consumption Pricing
                - slug: hybrid-pricing
                  name: ハイブリッド課金
                  summary: 固定料金と使用量料金を組み合わせた価格モデル。
                  whyLearn: 予見可能性と価値連動の両立を図る実務的な選択肢になるため。
                  promptHint: 固定費部分と従量部分をどう分けると顧客にも自社にも無理がないか説明して。
                  aliases:
                    - Hybrid Pricing
                - slug: outcome-based-pricing
                  name: 成果連動課金
                  summary: 利用量ではなく、達成成果や節約額などの結果に紐づける課金方式。
                  whyLearn: 高い価値獲得余地がある一方、計測と責任分界が難しいため。
                  promptHint: 成果連動課金にしたいとき、成果測定と因果帰属の難しさをどう扱うべきか説明して。
                  aliases:
                    - Outcome-Based Pricing
            - slug: pricing-philosophy-and-value-metric
              name: 値付け思想と価値指標
              summary: 何を根拠に価格を決め、何を請求単位にするかを扱う。
              whyLearn: 値付けがコスト都合なのか顧客価値起点なのかで事業の伸び方が変わるため。
              terms:
                - slug: value-based-pricing
                  name: 価値ベース価格設定
                  summary: 原価ではなく顧客が得る価値を基準に価格を決める考え方。
                  whyLearn: 強い価値提案を価格へ反映し、不要な値引きを防ぐため。
                  promptHint: この商材を価値ベースで値付けするなら、顧客便益をどう金額換算するか説明して。
                  aliases:
                    - Value-Based Pricing
                - slug: cost-plus-pricing
                  name: 原価積み上げ価格設定
                  summary: 原価に一定のマージンを上乗せして価格を決める方法。
                  whyLearn: 単純で説明しやすいが、支払意思額から乖離しやすいことを理解するため。
                  promptHint: 原価積み上げ価格設定はどんな場面で有効で、どこで取りこぼしが起きやすいか説明して。
                  aliases:
                    - Cost-Plus Pricing
                - slug: value-metric
                  name: 価値指標
                  summary: 何を 1 単位として顧客に請求するかを表す測定軸。
                  whyLearn: 良い pricing は、請求単位が顧客価値の感じ方に近いことが多いため。
                  promptHint: このプロダクトの価値指標はユーザー数、利用量、成果のどれが最も自然か説明して。
                  aliases:
                    - Value Metric

        - slug: packaging-and-commercial-terms
          name: パッケージングと商流条件
          summary: ティア構造、制限、契約条件、予算ガードレールを扱う。
          concepts:
            - slug: packaging-design
              name: パッケージ設計
              summary: 機能差と価格差をどのように結びつけて tier を作るか。
              whyLearn: 価格表がアップセル導線にも離脱要因にもなるため。
              terms:
                - slug: tiering
                  name: ティアリング
                  summary: 顧客規模や用途に応じて複数プランを設計すること。
                  whyLearn: 同じ商材でも支払意思額の異なる層を取り込むため。
                  promptHint: この価格表のティア設計はどのセグメント差を表しているか説明して。
                  aliases:
                    - Tiering
                    - Plan Tiers
                - slug: feature-gating
                  name: 機能ゲーティング
                  summary: 価格帯ごとに使える機能や上限制約を分ける設計。
                  whyLearn: 価値の高い機能を上位プランへ結び直しやすくするため。
                  promptHint: この機能制限は顧客体験を壊さずにアップセルを促せているか評価して。
                  aliases:
                    - Feature Gating
                - slug: price-fence
                  name: プライスフェンス
                  summary: 異なる顧客に異なる価格を適用するための条件や制約。
                  whyLearn: 値引きの乱発ではなく、合理的な価格差別を作るため。
                  promptHint: この価格差は不公平感を生まずに説明できる price fence になっているか説明して。
                  aliases:
                    - Price Fence
                    - Pricing Fence
            - slug: commercial-terms-and-guards
              name: 契約条件とガードレール
              summary: 予見可能性と収益保全のための契約条件を扱う。
              whyLearn: usage 型やエンタープライズ販売では契約条件が経済性を大きく左右するため。
              terms:
                - slug: minimum-commitment
                  name: 最低コミット
                  summary: 一定額または一定利用量を最低購入条件として定める契約条項。
                  whyLearn: 初期導入の採算性と将来需要の最低保証を確保するため。
                  promptHint: この商材で最低コミットを置くべきか、導入障壁とのトレードオフで説明して。
                  aliases:
                    - Minimum Commitment
                    - Commit
                - slug: overage
                  name: オーバーエイジ
                  summary: 契約上限を超えた利用に対して追加料金を課す仕組み。
                  whyLearn: 従量課金の単価と顧客体験の摩擦を設計する論点になるため。
                  promptHint: この overage 設計は成長を促すか、それとも利用抑制を招くか説明して。
                  aliases:
                    - Overage
                - slug: spend-cap
                  name: 予算上限
                  summary: 顧客の請求額が一定額を超えないようにする上限制御。
                  whyLearn: usage 課金への心理的不安を下げ、導入を促進するため。
                  promptHint: usage 課金に spend cap を付けると、導入率と平均単価にどう影響するか考えて。
                  aliases:
                    - Spend Cap
                    - Billing Cap

    - slug: financial-observability-unit-economics
      name: 財務把握とユニットエコノミクス
      summary: 会計の見え方、原価構造、継続収益の質、成長効率を把握する。
      whyLearn: 売上の見かけの成長ではなく、利益・現金・回収効率で事業を見るため。
      topicClusters:
        - slug: financial-statements-and-revenue-quality
          name: 財務諸表と売上の質
          summary: 事業の健全性を会計と収益認識の観点から捉える。
          concepts:
            - slug: accounting-views-of-the-business
              name: 財務三表の見方
              summary: 事業を損益、資産負債、現金の三方向から捉える。
              whyLearn: 売上成長と資金繰りのズレを見落とさないため。
              terms:
                - slug: income-statement
                  name: 損益計算書
                  summary: 一定期間の収益、費用、利益を表す計算書。
                  whyLearn: 収益性の向上が本当に起きているかを見る基本になるため。
                  promptHint: 損益計算書だけでは見えない事業リスクは何か説明して。
                  aliases:
                    - P&L
                    - Income Statement
                - slug: balance-sheet
                  name: 貸借対照表
                  summary: ある時点の資産、負債、資本の状態を表す計算書。
                  whyLearn: 先行投資、負債依存、繰延の蓄積などの構造を把握するため。
                  promptHint: この事業のバランスシートで将来の制約になりそうな項目を説明して。
                  aliases:
                    - B/S
                    - Balance Sheet
                - slug: cash-flow-statement
                  name: キャッシュフロー計算書
                  summary: 営業・投資・財務活動ごとの現金増減を示す計算書。
                  whyLearn: 黒字でも資金が尽きる状態を避けるため。
                  promptHint: この事業は利益が出ていてもなぜキャッシュが厳しくなりうるか説明して。
                  aliases:
                    - C/F
                    - Cash Flow Statement
            - slug: revenue-recognition-and-revenue-quality
              name: 収益認識と売上の質
              summary: いつ売上とみなすか、継続収益をどう読むかを扱う。
              whyLearn: 契約獲得と売上計上、現金受領は同じではないため。
              terms:
                - slug: revenue-recognition
                  name: 収益認識
                  summary: 契約上の義務の履行に応じて売上を計上する考え方。
                  whyLearn: 商談の成立と会計上の売上がずれる理由を理解するため。
                  promptHint: この契約では売上はいつ認識されるのか、提供義務の観点で説明して。
                  aliases:
                    - Revenue Recognition
                    - IFRS 15
                - slug: deferred-revenue
                  name: 繰延収益
                  summary: 先に受け取ったが、まだ売上として認識していない金額。
                  whyLearn: SaaS の前受け収益やキャッシュ先行の見方に直結するため。
                  promptHint: 繰延収益が増えることは事業にとって何を意味するか説明して。
                  aliases:
                    - Deferred Revenue
                    - Unearned Revenue
                - slug: annual-recurring-revenue
                  name: 年間経常収益
                  summary: 継続契約から 1 年換算で見込まれる反復売上の指標。
                  whyLearn: 継続売上型ビジネスの規模を単発売上と分けて見るため。
                  promptHint: ARR を使うとき、どの売上を含めるかで何がぶれるか説明して。
                  aliases:
                    - ARR
                    - Annual Recurring Revenue
                - slug: bookings
                  name: ブッキング
                  summary: 契約締結ベースで捉える受注額で、売上認識より早いことが多い指標。
                  whyLearn: 成長の先行指標として useful だが、会計売上とは違うことを理解するため。
                  promptHint: bookings と revenue が乖離するとき、何が起きているか説明して。
                  aliases:
                    - Bookings

        - slug: costs-margins-and-growth-efficiency
          name: 原価、利益率、成長効率
          summary: 単位当たり採算と継続収益事業の成長効率を扱う。
          concepts:
            - slug: cost-and-margin-analysis
              name: 原価とマージン分析
              summary: 売上が利益にどう変わるかを原価構造から捉える。
              whyLearn: 安売りで伸びているだけの状態と、本当に優れた経済性を区別するため。
              terms:
                - slug: fixed-cost
                  name: 固定費
                  summary: 売上や生産量の変化に対して短期では大きく変わらない費用。
                  whyLearn: 規模の経済と営業レバレッジを理解する基礎になるため。
                  promptHint: この事業で固定費比率が高いことは、成長時と悪化時に何を意味するか説明して。
                  aliases:
                    - Fixed Cost
                - slug: contribution-margin
                  name: 限界利益
                  summary: 売上から変動費を引いた、固定費回収と利益の原資になる金額。
                  whyLearn: 損益分岐や販促投資の妥当性を判断できるため。
                  promptHint: この商品・機能の限界利益はプラスか、その根拠を説明して。
                  aliases:
                    - Contribution Margin
                - slug: gross-margin
                  name: 粗利率
                  summary: 売上総利益を売上で割った、商品・サービス提供段階の収益性指標。
                  whyLearn: 原価改善余地と価格耐性を比較しやすくするため。
                  promptHint: 粗利率が高いのに事業が苦しいのはなぜか、他の費用と合わせて説明して。
                  aliases:
                    - Gross Margin
                    - Gross Profit Margin
                - slug: break-even-point
                  name: 損益分岐点
                  summary: 売上と費用が等しくなり損益がゼロになる水準。
                  whyLearn: どれだけ売れば固定費を回収できるかを明確にするため。
                  promptHint: この事業の損益分岐点はどこにあり、何を動かすと下がるか説明して。
                  aliases:
                    - Break-Even Point
            - slug: recurring-revenue-and-growth-efficiency
              name: 継続収益と成長効率
              summary: 顧客獲得・維持・拡張を経済指標で捉える。
              whyLearn: SaaS や継続課金事業では、売上成長だけでなく回収速度と維持率がそのまま企業価値に効くため。
              terms:
                - slug: customer-acquisition-cost
                  name: 顧客獲得コスト
                  summary: 新規顧客を獲得するために要した販売・マーケ費用の平均。
                  whyLearn: 成長が効率的か、ただお金を燃やしているだけかを見分けるため。
                  promptHint: CAC を計算するとき、どの費用を含めるかで意思決定がどう変わるか説明して。
                  aliases:
                    - CAC
                    - Customer Acquisition Cost
                - slug: cac-payback-period
                  name: CAC 回収期間
                  summary: 顧客獲得にかかった費用を粗利ベースで回収するまでの期間。
                  whyLearn: 成長のための投資がどれだけ早く回収されるかを見るため。
                  promptHint: CAC 回収期間が長いとき、それは価格、粗利、獲得効率のどこに問題があるか分解して。
                  aliases:
                    - CAC Payback
                    - CAC Payback Period
                - slug: net-revenue-retention
                  name: 純収益維持率
                  summary: 既存顧客群からの売上を、解約・縮小・拡張込みでどれだけ維持できたかを示す指標。
                  whyLearn: 真に強い継続収益事業は既存顧客から成長できるため。
                  promptHint: NRR が 100% を超えることは何を意味し、何が支えているか説明して。
                  aliases:
                    - NRR
                    - Net Revenue Retention
                - slug: gross-revenue-retention
                  name: 粗収益維持率
                  summary: 拡張売上を除き、既存売上の維持率だけを見る指標。
                  whyLearn: 拡張に隠れた解約・縮小の深刻さを確認するため。
                  promptHint: NRR ではなく GRR を見るべき場面はどんなときか説明して。
                  aliases:
                    - GRR
                    - Gross Revenue Retention
                - slug: rule-of-40
                  name: ルール・オブ・フォーティ
                  summary: 成長率と収益性の合計で SaaS 事業のバランスを見る経験則。
                  whyLearn: 成長偏重か利益偏重かを単一指標で荒く点検できるため。
                  promptHint: Rule of 40 が高くても危険な会社はありうるか、どの条件でそうなるか説明して。
                  aliases:
                    - Rule of 40

    - slug: investment-appraisal-resource-allocation
      name: 投資判断と資源配分
      summary: 代替案比較、現在価値、予算制約、見積り精度を使って投資を判断する。
      whyLearn: 有望に見える案でも、資本コストや代替案と比べてよいとは限らないため。
      topicClusters:
        - slug: business-case-and-economic-appraisal
          name: 事業ケースと経済評価
          summary: 便益、費用、時間価値を含めて投資案を評価する。
          concepts:
            - slug: economic-evaluation-methods
              name: 経済評価手法
              summary: 複数案を費用・便益・効果で比較する方法。
              whyLearn: 「よさそう」ではなく説明可能な根拠で投資判断するため。
              terms:
                - slug: cost-benefit-analysis
                  name: 費用便益分析
                  summary: 便益と費用を可能な限り貨幣価値へ変換して比較する評価法。
                  whyLearn: 施策の総合価値を横断比較しやすくするため。
                  promptHint: この施策で費用便益分析をするなら、主要便益と見落としやすい費用を洗い出して。
                  aliases:
                    - CBA
                    - Cost-Benefit Analysis
                - slug: cost-effectiveness-analysis
                  name: 費用効果分析
                  summary: 効果を金額換算しにくい場合に、一定効果あたり費用で比較する方法。
                  whyLearn: 品質や時間短縮のような効果を比較可能にするため。
                  promptHint: この投資は費用便益分析より費用効果分析が向くか、その理由を説明して。
                  aliases:
                    - CEA
                    - Cost-Effectiveness Analysis
                - slug: net-present-value
                  name: 正味現在価値
                  summary: 将来キャッシュフローを割引いて現在価値に直し、初期投資を差し引いた値。
                  whyLearn: 時間価値と資本コストを織り込んだ投資判断の中心指標だから。
                  promptHint: この案件の NPV はどの前提に最も敏感か、割引率とキャッシュフローを分けて説明して。
                  aliases:
                    - NPV
                    - Net Present Value
            - slug: capital-budgeting-core-terms
              name: 資本予算の基本語彙
              summary: 投資を採択・棄却する際の基本的な数理を扱う。
              whyLearn: CFO 視点とプロダクト投資視点をつなぐ共通言語になるため。
              terms:
                - slug: internal-rate-of-return
                  name: 内部収益率
                  summary: 投資の NPV がゼロになる割引率。
                  whyLearn: 異なる案件を収益率感覚で比較する補助線になるため。
                  promptHint: IRR が高くても採るべきでない案件はどんなときか説明して。
                  aliases:
                    - IRR
                    - Internal Rate of Return
                - slug: discount-rate
                  name: 割引率
                  summary: 将来価値を現在価値へ変換する際に使う率。
                  whyLearn: 不確実性、資本コスト、機会費用の見積もりが判断に直結するため。
                  promptHint: この投資で割引率をどう置くべきか、リスクと資本制約から説明して。
                  aliases:
                    - Discount Rate
                - slug: hurdle-rate
                  name: ハードルレート
                  summary: 投資採択の最低基準として定める必要収益率。
                  whyLearn: 案件ごとの甘い評価を防ぎ、資本配分ルールを明確にするため。
                  promptHint: ハードルレートを一律に置くことの利点と問題点を説明して。
                  aliases:
                    - Hurdle Rate

        - slug: estimation-affordability-and-allocation
          name: 見積り、アフォーダビリティ、配分
          summary: 実行可能な予算か、代替案に対して優先すべきかを扱う。
          concepts:
            - slug: cost-estimation-and-affordability
              name: コスト見積りと実行可能性
              summary: いくらかかるか、払えるか、見積りの信頼性はあるかを判断する。
              whyLearn: 良いアイデアでも、コスト見積りが粗いと失敗しやすいため。
              terms:
                - slug: life-cycle-cost
                  name: ライフサイクルコスト
                  summary: 導入だけでなく、運用・保守・更新・廃止まで含めた総費用。
                  whyLearn: 初期費用の安さだけで誤った選択をしないため。
                  promptHint: この投資のライフサイクルコストで見落としやすい項目を挙げて。
                  aliases:
                    - LCC
                    - Life-Cycle Cost
                - slug: bottom-up-estimate
                  name: ボトムアップ見積り
                  summary: 作業項目や部品を積み上げて作る詳細見積り。
                  whyLearn: 実装フェーズに入った案件の現実的な予算感を作りやすいため。
                  promptHint: ボトムアップ見積りが過小見積りになりやすい要因を説明して。
                  aliases:
                    - Bottom-Up Estimate
                - slug: parametric-estimate
                  name: パラメトリック見積り
                  summary: 過去実績や係数モデルを用いて概算する見積り手法。
                  whyLearn: 初期段階でも比較可能な rough estimate を作れるため。
                  promptHint: まだ詳細設計がない段階で、どんなパラメータを使えば概算の質が上がるか説明して。
                  aliases:
                    - Parametric Estimate
                - slug: affordability-analysis
                  name: アフォーダビリティ分析
                  summary: 組織の予算制約や資金繰りの中で、その投資を本当に維持できるかを見る分析。
                  whyLearn: 良い案件でも、資金制約を無視すると継続不能になるため。
                  promptHint: この投資は採算があってもアフォーダブルではない可能性があるか説明して。
                  aliases:
                    - Affordability Analysis
            - slug: portfolio-allocation-and-optionality
              name: ポートフォリオ配分とオプショナリティ
              summary: 限られた資源を複数案件へどう割り振るかを扱う。
              whyLearn: 個別最適な案件を並べても、全体最適になるとは限らないため。
              terms:
                - slug: opportunity-cost
                  name: 機会費用
                  summary: ある選択をしたことで諦める他の選択肢の価値。
                  whyLearn: 何かを選ぶことは、常に他案を捨てることだと意識するため。
                  promptHint: この投資を選ぶ機会費用は何か、代替案ベースで説明して。
                  aliases:
                    - Opportunity Cost
                - slug: capital-rationing
                  name: 資本配分制約
                  summary: 望ましい案件が複数あっても、予算制約で全ては採れない状態。
                  whyLearn: 理論上の最適解と実際の優先順位がずれる理由を理解するため。
                  promptHint: 資本配分制約が厳しいとき、どの案件から落とすべきか説明して。
                  aliases:
                    - Capital Rationing
                - slug: real-options
                  name: 実物オプション
                  summary: 段階投資や延期、拡張、中止の柔軟性を価値としてみる考え方。
                  whyLearn: 不確実性が高い案件では、いきなり全額投資しない方が合理的なことが多いため。
                  promptHint: この案件は一括投資より段階投資にすべきか、実物オプションの観点で説明して。
                  aliases:
                    - Real Options

    - slug: decision-making-under-uncertainty
      name: 意思決定と不確実性管理
      summary: 確実でない情報の下で、前提・バイアス・リスクを明示しながら選ぶ方法を扱う。
      whyLearn: 技術と事業の意思決定は、完全情報よりも不確実性下で行うことの方が多いため。
      topicClusters:
        - slug: decision-quality-and-bias
          name: 意思決定品質とバイアス
          summary: 良い意思決定手順を作り、認知バイアスを抑える。
          concepts:
            - slug: decision-framing-techniques
              name: 意思決定の枠組み化
              summary: 判断前に前提、基準、確率を整える方法。
              whyLearn: 直感だけで意思決定すると、後から反省しても学習が残りにくいため。
              terms:
                - slug: expected-value
                  name: 期待値
                  summary: 各結果の価値に発生確率を掛け合わせて平均価値を出す考え方。
                  whyLearn: 大きな当たり外れを感情ではなく構造で評価するため。
                  promptHint: この意思決定の期待値はどう計算でき、何が最大の不確実性か説明して。
                  aliases:
                    - Expected Value
                    - EV
                - slug: base-rate
                  name: ベースレート
                  summary: 類似案件全体で見たときの事前確率や平均的な発生率。
                  whyLearn: 自分の案件だけ特別だと思い込む誤りを減らすため。
                  promptHint: この見積りや予測に対して、参照すべきベースレートは何か説明して。
                  aliases:
                    - Base Rate
                    - Reference Class
                - slug: decision-journal
                  name: デシジョンジャーナル
                  summary: 判断時点の前提、予測、選択理由を記録して後で検証する仕組み。
                  whyLearn: 結果論ではなく判断品質を改善するため。
                  promptHint: この重要判断を decision journal に残すなら、何を最低限記録すべきか挙げて。
                  aliases:
                    - Decision Journal
            - slug: bias-mitigation
              name: バイアス低減
              summary: よくある認知の歪みを前もって抑える方法。
              whyLearn: 事業判断では、認知バイアスがコスト超過や撤退遅れの原因になりやすいため。
              terms:
                - slug: planning-fallacy
                  name: 計画錯誤
                  summary: 自分たちの計画を楽観的に見積もり、時間や費用を過小評価する傾向。
                  whyLearn: スケジュール・予算の慢性的な甘さを説明できるため。
                  promptHint: この計画に計画錯誤が入りやすい根拠を、過去実績と比較して説明して。
                  aliases:
                    - Planning Fallacy
                - slug: sunk-cost-fallacy
                  name: 埋没費用の誤謬
                  summary: すでに回収不能な投下コストに引きずられて撤退できなくなる誤り。
                  whyLearn: 悪い案件を惰性で続ける経営判断を防ぐため。
                  promptHint: いま中止すべき案件を続けてしまうのはなぜか、埋没費用の誤謬で説明して。
                  aliases:
                    - Sunk Cost Fallacy
                - slug: premortem
                  name: プレモーテム
                  summary: 失敗した未来を仮定し、その原因を先に洗い出すレビュー手法。
                  whyLearn: 楽観バイアスを抑え、隠れた失敗要因を早く見つけるため。
                  promptHint: この施策に premortem を適用するとしたら、どんな失敗ストーリーがありうるか書いて。
                  aliases:
                    - Premortem

        - slug: uncertainty-analysis-and-risk
          name: 不確実性分析とリスク
          summary: 前提の揺れや確率分布を扱い、リスクを管理可能な形にする。
          concepts:
            - slug: analytical-techniques-for-uncertainty
              name: 不確実性の分析技法
              summary: 結果がどの前提にどれだけ依存するかを評価する方法。
              whyLearn: 一つの point estimate だけで判断すると、壊れやすい意思決定になるため。
              terms:
                - slug: sensitivity-analysis
                  name: 感度分析
                  summary: ある入力変数を動かしたとき結果がどれだけ変わるかを調べる方法。
                  whyLearn: 重要変数を見つけ、議論を主要論点へ集中させるため。
                  promptHint: この事業ケースで最も感度が高い変数は何か、その理由を説明して。
                  aliases:
                    - Sensitivity Analysis
                - slug: scenario-analysis
                  name: シナリオ分析
                  summary: 複数の前提をまとめて変え、異なる将来像ごとの結果を比較する方法。
                  whyLearn: 単変数の揺れだけでは捉えられない構造的変化を扱えるため。
                  promptHint: 強気・中立・弱気の 3 シナリオで、この案件の結果がどう変わるか整理して。
                  aliases:
                    - Scenario Analysis
                - slug: monte-carlo-simulation
                  name: モンテカルロ・シミュレーション
                  summary: 入力の確率分布から多数回シミュレーションして結果分布を求める方法。
                  whyLearn: 単一予測ではなく、結果のばらつきと尾部リスクを見られるため。
                  promptHint: この案件でモンテカルロを回すなら、どの変数を分布で置くべきか説明して。
                  aliases:
                    - Monte Carlo Simulation
            - slug: risk-governance
              name: リスク統治
              summary: リスクを洗い出し、優先順位を付け、受容範囲を明確にする。
              whyLearn: 不確実性をゼロにするのではなく、扱える単位にするため。
              terms:
                - slug: risk-register
                  name: リスク登録簿
                  summary: リスク事象、影響、確率、対応策、管理責任者を一覧化したもの。
                  whyLearn: 重大リスクを個人の頭の中ではなく共有資産にするため。
                  promptHint: この案件の risk register に最低限入れるべきリスクを挙げて。
                  aliases:
                    - Risk Register
                - slug: optimism-bias
                  name: 楽観バイアス補正
                  summary: 初期見積りが楽観的になる前提で、費用や期間に補正を入れる考え方。
                  whyLearn: 計画錯誤を手続きとして抑える実務的な方法だから。
                  promptHint: この見積りに optimism bias 補正を入れるなら、どの費目に入れるべきか説明して。
                  aliases:
                    - Optimism Bias
                - slug: risk-appetite
                  name: リスク許容度
                  summary: 組織が許容できる損失や変動の水準を示す基準。
                  whyLearn: 攻めるか守るかの判断を案件ごとにぶらさないため。
                  promptHint: この組織の risk appetite は高いか低いか、最近の意思決定から推測して説明して。
                  aliases:
                    - Risk Appetite

    - slug: growth-strategy-commercial-operations
      name: 成長戦略と事業運営
      summary: 顧客をどう獲得し、どう維持し、どこへ拡張するかを経済性から考える。
      whyLearn: 単にユーザーを増やすだけでなく、収益性のある成長を設計するため。
      topicClusters:
        - slug: go-to-market-design
          name: Go-to-Market 設計
          summary: どの顧客へ、どのチャネルで、どの販売動線で届けるかを扱う。
          concepts:
            - slug: acquisition-motions
              name: 獲得モーション
              summary: どの成長エンジンで顧客獲得を進めるか。
              whyLearn: 同じ商材でも、PLG 向きか営業主導向きかで組織と価格が変わるため。
              terms:
                - slug: go-to-market
                  name: Go-to-Market
                  summary: 顧客セグメント、チャネル、メッセージ、販売動線を組み合わせた市場投入設計。
                  whyLearn: 良い製品でも市場への届け方が不適切だと伸びないため。
                  promptHint: この事業の GTM は誰に、何を、どのチャネルで届ける設計か説明して。
                  aliases:
                    - GTM
                    - Go-to-Market
                - slug: product-led-growth
                  name: プロダクト主導成長
                  summary: 製品体験そのものを獲得、転換、拡張の主要エンジンにする成長様式。
                  whyLearn: 低 CAC と高いプロダクト起点の拡張が可能かを判断するため。
                  promptHint: この商材は PLG に向くか、導入の自己完結性と価値体験の速さから説明して。
                  aliases:
                    - PLG
                    - Product-Led Growth
                - slug: sales-led-growth
                  name: 営業主導成長
                  summary: 営業組織や商談プロセスを中心に大口契約を獲得する成長様式。
                  whyLearn: 高単価・高関与商材では営業主導の方が合理的なことが多いため。
                  promptHint: なぜこの事業は PLG より sales-led の方が合うのか説明して。
                  aliases:
                    - SLG
                    - Sales-Led Growth
            - slug: channels-and-segmentation
              name: チャネルとセグメンテーション
              summary: どの顧客層へ、どの販売経路で勝つかを扱う。
              whyLearn: 同じ製品でも、顧客層とチャネル選択でユニットエコノミクスが大きく変わるため。
              terms:
                - slug: market-segmentation
                  name: 市場セグメンテーション
                  summary: 顧客を属性、用途、課題、購買行動などで分けること。
                  whyLearn: 一律のメッセージや価格で全員に売ろうとする失敗を避けるため。
                  promptHint: この事業で意味のあるセグメント軸は何か、業種や規模以外も含めて説明して。
                  aliases:
                    - Market Segmentation
                - slug: channel-partner
                  name: チャネルパートナー
                  summary: 再販、導入支援、流通を担う外部パートナー。
                  whyLearn: 直接販売より速く市場へ届くが、粗利や顧客接点は薄くなるため。
                  promptHint: この市場でチャネルパートナーを使うと粗利と成長速度にどう効くか説明して。
                  aliases:
                    - Channel Partner
                    - Reseller
                - slug: tam-sam-som
                  name: TAM・SAM・SOM
                  summary: 総市場、狙える市場、実際に取りうる市場を段階的に見る整理法。
                  whyLearn: 夢の大きい市場サイズと、直近で攻めるべき現実市場を分けて考えるため。
                  promptHint: この事業の TAM と SOM が大きく違う理由を説明して。
                  aliases:
                    - TAM
                    - SAM
                    - SOM

        - slug: expansion-retention-and-loops
          name: 拡張、維持、成長ループ
          summary: 既存顧客からの成長と、継続的な獲得エンジンを扱う。
          concepts:
            - slug: expansion-plays
              name: 拡張プレイ
              summary: 既存顧客への拡張で収益を伸ばす方法。
              whyLearn: 継続収益事業では、新規獲得より既存拡張の方が効率的なことが多いため。
              terms:
                - slug: land-and-expand
                  name: ランド・アンド・エクスパンド
                  summary: 小さく導入して成功実績を作り、その後に部署・用途・席数を広げる戦略。
                  whyLearn: 導入障壁を下げつつ、長期的な拡張余地を確保するため。
                  promptHint: この商材で land-and-expand が成立するための初期導入条件を説明して。
                  aliases:
                    - Land and Expand
                - slug: upsell
                  name: アップセル
                  summary: より高価格・高機能のプランや追加機能へ移行してもらうこと。
                  whyLearn: NRR 改善と ARPU 向上の主要手段になるため。
                  promptHint: この事業のアップセル余地は機能、容量、ガバナンスのどこにあるか説明して。
                  aliases:
                    - Upsell
                - slug: cross-sell
                  name: クロスセル
                  summary: 関連する別製品・別機能を追加購入してもらうこと。
                  whyLearn: 同一顧客基盤からの価値獲得を広げられるため。
                  promptHint: この製品で cross-sell が自然に成立する隣接商材を考えて。
                  aliases:
                    - Cross-sell
            - slug: operational-growth-loops
              name: 運用可能な成長ループ
              summary: 獲得、転換、紹介、利用増加が循環する仕組みを扱う。
              whyLearn: 単発キャンペーンではなく再現性のある成長構造を設計するため。
              terms:
                - slug: conversion-funnel
                  name: コンバージョンファネル
                  summary: 認知から契約までの各段階と転換率を追う見方。
                  whyLearn: どこで顧客が落ちているかを段階別に把握するため。
                  promptHint: このファネルの最大のボトルネックはどこか、転換率で説明して。
                  aliases:
                    - Funnel
                    - Conversion Funnel
                - slug: growth-loop
                  name: グロースループ
                  summary: 利用や成果が次の獲得や価値増加を生む循環型の成長構造。
                  whyLearn: 線形ファネルでは説明できない持続的成長を捉えるため。
                  promptHint: この事業でユーザー利用が次の獲得につながる growth loop は存在するか説明して。
                  aliases:
                    - Growth Loop
                - slug: viral-coefficient
                  name: バイラル係数
                  summary: 1 人の利用者が次に何人の利用者を呼び込むかを表す指標。
                  whyLearn: 紹介や共有による自然増の強さを概算できるため。
                  promptHint: このプロダクトの viral coefficient を上げる要因はどこにあるか説明して。
                  aliases:
                    - Viral Coefficient
                    - K-factor

edges:
  - from: willingness-to-pay
    to: value-based-pricing
    relationType: prerequisite
    reason: 価値ベース価格設定は、顧客がどこまで払えるかの理解が前提になるため。
  - from: value-proposition
    to: value-based-pricing
    relationType: prerequisite
    reason: 顧客価値が曖昧だと、価値ベース価格設定の根拠を作れないため。
  - from: value-metric
    to: usage-based-pricing
    relationType: prerequisite
    reason: usage 型 pricing は何を 1 単位として請求するかを先に定める必要があるため。
  - from: multi-sided-platform
    to: network-effects
    relationType: related
    reason: マルチサイド市場では面間の間接ネットワーク効果が価値の中心になることが多いため。
  - from: porter-five-forces
    to: market-definition
    relationType: used_in
    reason: 競争圧力を読む前提として、どの市場を競争単位として見るかを定める必要があるため。
  - from: switching-costs
    to: net-revenue-retention
    relationType: related
    reason: 乗り換え負担の大きさは解約率や縮小率に影響し、NRR の背景要因になるため。
  - from: contribution-margin
    to: break-even-point
    relationType: prerequisite
    reason: 損益分岐点の計算は限界利益の理解なしに行えないため。
  - from: gross-margin
    to: cac-payback-period
    relationType: prerequisite
    reason: CAC 回収期間は粗利ベースでの回収速度を見ることが多いため。
  - from: customer-acquisition-cost
    to: cac-payback-period
    relationType: prerequisite
    reason: CAC 回収期間は獲得コストと回収粗利の両方を前提に計算されるため。
  - from: gross-revenue-retention
    to: net-revenue-retention
    relationType: compare_with
    reason: GRR は維持のみ、NRR は拡張も含めるため、比較することで解約隠れを見抜きやすくなるため。
  - from: revenue-recognition
    to: deferred-revenue
    relationType: related
    reason: 先受けの対価が売上にならず繰延されるのは収益認識のルールによるため。
  - from: annual-recurring-revenue
    to: rule-of-40
    relationType: related
    reason: Rule of 40 を継続収益事業で読む際、ARR ベースの成長率が実務上よく使われるため。
  - from: discount-rate
    to: net-present-value
    relationType: prerequisite
    reason: NPV は将来キャッシュフローを割引率で現在価値へ変換して計算するため。
  - from: net-present-value
    to: internal-rate-of-return
    relationType: compare_with
    reason: どちらも投資評価指標だが、価値額で判断するか利回りで判断するかが異なるため。
  - from: life-cycle-cost
    to: cost-benefit-analysis
    relationType: used_in
    reason: 費用便益分析で比較すべき費用は導入費だけでなくライフサイクル全体に及ぶため。
  - from: opportunity-cost
    to: capital-rationing
    relationType: related
    reason: 資本配分制約下では、案件を採ることの機会費用がより明示的になるため。
  - from: real-options
    to: net-present-value
    relationType: compare_with
    reason: 静的な NPV だけでは、延期・段階投資・中止の柔軟性価値を十分に表せないため。
  - from: base-rate
    to: planning-fallacy
    relationType: related
    reason: ベースレートを見ることは計画錯誤を補正する代表的な方法だから。
  - from: premortem
    to: planning-fallacy
    relationType: related
    reason: premortem は失敗要因を先に想像することで楽観見積りを抑えるため。
  - from: expected-value
    to: scenario-analysis
    relationType: used_in
    reason: シナリオごとの結果を意思決定へ反映する際、期待値の考え方が補助線になるため。
  - from: sensitivity-analysis
    to: monte-carlo-simulation
    relationType: compare_with
    reason: 感度分析は単変数中心、モンテカルロは確率分布と同時変動を扱えるため。
  - from: scenario-analysis
    to: monte-carlo-simulation
    relationType: related
    reason: どちらも不確実性を複数前提で扱うが、離散ケースか分布計算かが異なるため。
  - from: go-to-market
    to: product-led-growth
    relationType: used_in
    reason: PLG は GTM の一形態として位置づけられるため。
  - from: product-led-growth
    to: sales-led-growth
    relationType: compare_with
    reason: どちらも獲得モーションだが、価値体験の担い手とコスト構造が異なるため。
  - from: market-segmentation
    to: tam-sam-som
    relationType: related
    reason: 市場規模を現実的に切るには、どのセグメントを対象にするかの定義が必要なため。
  - from: land-and-expand
    to: net-revenue-retention
    relationType: used_in
    reason: land-and-expand が機能すると既存顧客からの拡張売上が増え、NRR 改善につながるため。
  - from: upsell
    to: net-revenue-retention
    relationType: used_in
    reason: アップセルは既存顧客売上を押し上げ、NRR を改善する主要手段だから。
  - from: conversion-funnel
    to: customer-acquisition-cost
    relationType: related
    reason: ファネル転換率の改善は、同じ集客費でも CAC を下げることにつながるため。
  - from: growth-loop
    to: viral-coefficient
    relationType: related
    reason: 口コミや共有で回る growth loop の強さを、viral coefficient が一部定量化するため。
