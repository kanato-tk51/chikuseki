domain:
  slug: business-economics-decision-making
  name: ビジネス、経済性、意思決定
  summary: プロダクト、エンジニアリング、運用上の選択を、価値創出、収益、資源配分の観点で考える領域。
  boundaryNotes: 価値獲得と資源配分のトレードオフを扱う。プロダクト範囲は Product Management、組織配置は Engineering Organization に寄せる。
  knowledgeAreas:
    - slug: value-creation-market-structure
      name: 価値創出と市場構造
      summary: 顧客価値がどこで生まれ、どのような市場力学の中で価値を獲得できるかを捉える。
      whyLearn: 価格、投資、成長施策の前提になる市場の読み方と競争優位の源泉を理解するため。
      topicClusters:
        - slug: business-model-and-value-logic
          name: ビジネスモデルと価値の論理
          summary: 何を価値として提供し、どのように価値を獲得するかを整理する。
          concepts:
            - slug: value-creation-and-capture
              name: 価値創出と価値獲得
              summary: 顧客便益と企業側の収益化の関係を捉える考え方。
              whyLearn: 良い機能でも、顧客価値と価値獲得の筋が通っていなければ事業として成立しないため。
              terms:
                - slug: value-proposition
                  name: 価値提案
                  summary: 顧客にとっての便益、差別化、選ばれる理由を短く定義したもの。
                  whyLearn: 価格、販売、機能優先順位の判断がぼやけないようにするため。
                  promptHint: この価値提案は誰のどの仕事・不満・期待に効いているかを具体的に説明して。
                  aliases:
                    - Value Proposition
                    - UVP
                  search:
                    keywords:
                      - 価値提案
                      - Value Proposition
                      - UVP
                      - unique value proposition
                      - customer value
                      - jobs to be done
                      - pains and gains
                      - differentiation
                      - 顧客便益
                      - 選ばれる理由
                    commonSignals:
                      - 誰に何の価値を届けるかを説明している
                      - 顧客の痛み、利得、ジョブを整理している
                      - 選ばれる理由や差別化を短く表現している
                      - LP、ピッチ資料、営業資料の冒頭メッセージとして出る
                    antiSignals:
                      - 企業理念や価値観だけを述べている
                      - 提案書や見積書のproposalという一般語
                      - 機能一覧だけで顧客便益が書かれていない
                    relatedNames:
                      - name: Value Proposition Canvas
                        kind: framework
                        relevance: 顧客のJobs、Pain、Gainと提供価値を照合する代表的な実務フレームワーク。
                        officialUrl: https://www.strategyzer.com/library/the-value-proposition-canvas
                      - name: Jobs To Be Done
                        kind: framework
                        relevance: 顧客が片付けたい仕事から価値提案を定義する際によく使われる。
                      - name: Business Model Canvas
                        kind: framework
                        relevance: 価値提案を顧客セグメントや収益モデルと接続して整理する。
                        officialUrl: https://www.strategyzer.com/library/the-business-model-canvas
                      - name: Lean Canvas
                        kind: framework
                        relevance: スタートアップ文脈で問題、解決策、独自価値提案を一枚で整理する。

                - slug: willingness-to-pay

                  search:

                    keywords:

                      - 支払意思額

                      - Willingness to Pay

                      - WTP

                      - price sensitivity

                      - reservation price

                      - 価格感度

                      - 許容価格

                      - 支払許容額

                      - price research

                      - willingness to pay survey

                    commonSignals:

                      - この価格なら買うか、いくらなら高いかを尋ねている

                      - 価格感度、許容価格、支払上限を調査している

                      - 値上げ余地やディスカウント耐性を議論している

                      - 代替手段と比較して払える金額を推定している

                    antiSignals:

                      - 決済手段や支払方法の話だけ

                      - 請求書の支払期限や入金確認の話

                      - 単なる予算額で、価値に対する支払意向ではない

                    relatedNames:

                      - name: Van Westendorp Price Sensitivity Meter

                        kind: method

                        relevance: 高すぎる、安すぎるなどの質問から許容価格帯を推定する価格調査手法。

                      - name: Gabor-Granger Method

                        kind: method

                        relevance: 複数価格に対する購入意向から需要と価格の関係を推定する。

                      - name: Conjoint Analysis

                        kind: method

                        relevance: 機能や価格の組み合わせに対する選好から支払意思額を推定する。

                      - name: MaxDiff

                        kind: method

                        relevance: 選好順位を通じて価値ドライバーを把握し、価格調査の補助に使われる。
                  name: 支払意思額
                  summary: 顧客がその価値に対して支払ってよいと感じる上限金額。
                  whyLearn: 値付けやディスカウントの妥当性を考える基準になるため。
                  promptHint: この顧客セグメントの支払意思額は何で変わるか、代替案との比較で説明して。
                  aliases:
                    - WTP
                    - Willingness to Pay
                - slug: value-capture
                  name: 価値獲得
                  summary: 生み出した価値のうち、企業が収益や利益として取り込める部分。
                  whyLearn: 利用者が増えても利益が残らない構造を見抜くため。
                  promptHint: この事業は価値を作れていても、なぜ価値獲得が弱いのかを分解して。
                  aliases:
                    - Value Capture
            - slug: business-model-representation
              name: ビジネスモデル表現
              summary: 事業の構成要素と関係を見取り図として表す方法。
              whyLearn: 収益源、コスト、チャネル、顧客、パートナーを一枚で対話可能にするため。
              terms:
                - slug: business-model-canvas
                  name: ビジネスモデルキャンバス
                  summary: 顧客、提供価値、チャネル、収益源、コスト構造などを整理するテンプレート。
                  whyLearn: 新規事業や既存事業の構造を比較しやすくするため。
                  promptHint: この事業のキャンバスを埋めたとき、一番弱いブロックはどこかを指摘して。
                  aliases:
                    - BMC
                    - Business Model Canvas
                  search:
                    keywords:
                      - ビジネスモデルキャンバス
                      - Business Model Canvas
                      - BMC
                      - key partners
                      - key activities
                      - customer segments
                      - channels
                      - revenue streams
                      - cost structure
                      - 事業モデル図
                      - ビジネスモデル設計
                    commonSignals:
                      - 九つのブロックで事業を整理している
                      - 顧客セグメント、価値提案、チャネル、収益源、コスト構造が並んでいる
                      - 新規事業や既存事業の構造を一枚で比較している
                      - Canvas、BMC、Lean Canvasという語が出ている
                    antiSignals:
                      - HTML canvasやCanvas APIの話
                      - Canvas LMSなど教育プラットフォームの話
                      - 単なる図解テンプレートで事業構造を扱っていない
                    relatedNames:
                      - name: Business Model Canvas
                        kind: framework
                        relevance: 事業構造を九つのブロックで整理する中心的なフレームワーク。
                        officialUrl: https://www.strategyzer.com/library/the-business-model-canvas
                      - name: Value Proposition Canvas
                        kind: framework
                        relevance: BMCの価値提案と顧客セグメントを詳細化する補助フレーム。
                        officialUrl: https://www.strategyzer.com/library/the-value-proposition-canvas
                      - name: Lean Canvas
                        kind: framework
                        relevance: スタートアップ向けに課題、解決策、指標、優位性を強調した派生キャンバス。
                      - name: Strategyzer
                        kind: tool
                        relevance: Business Model CanvasやValue Proposition Canvasの実務テンプレート提供元としてよく参照される。
                        officialUrl: https://www.strategyzer.com/

                - slug: revenue-model

                  search:

                    keywords:

                      - 収益モデル

                      - Revenue Model

                      - monetization model

                      - revenue stream

                      - recurring revenue

                      - transaction fee

                      - take rate

                      - licensing revenue

                      - ads model

                      - 売上発生条件

                    commonSignals:

                      - 売上がどのタイミングで発生するかを議論している

                      - サブスク、従量、手数料、広告、ライセンスの比較がある

                      - 単発売上か継続売上かを分けている

                      - take rate、revenue stream、monetizationという語が出る

                    antiSignals:

                      - 会計上の収益認識だけを扱っている

                      - 売上実績の報告だけで発生メカニズムがない

                      - 価格表の金額だけで課金構造を扱っていない

                    relatedNames:

                      - name: Stripe Billing

                        kind: service

                        relevance: サブスクリプションや従量課金の収益モデル実装でよく使われる。

                        officialUrl: https://stripe.com/billing

                      - name: Zuora

                        kind: platform

                        relevance: サブスクリプション管理や継続課金モデルの実務で知られる。

                        officialUrl: https://www.zuora.com/

                      - name: Chargebee

                        kind: service

                        relevance: SaaSの課金、請求、収益モデル管理で使われる。

                        officialUrl: https://www.chargebee.com/

                      - name: Marketplace Take Rate

                        kind: pattern

                        relevance: マーケットプレイス型収益モデルで取引額に対する手数料率として使われる。
                  name: 収益モデル
                  summary: 売上がどの単位で、いつ、どの条件で発生するかを定める仕組み。
                  whyLearn: 成長しても売上の質が悪い構造を避けるため。
                  promptHint: この事業の収益モデルは単発売上か継続売上か、回収の癖も含めて説明して。
                  aliases:
                    - Revenue Model
                - slug: cost-structure
                  name: コスト構造
                  summary: 固定費と変動費の比重、主要な費目、スケール時の変化の仕方。
                  whyLearn: 利益改善が価格で起きるのか、原価で起きるのかを見極めるため。
                  promptHint: この事業のコスト構造はスケールでどこが効率化し、どこが比例費になるかを整理して。
                  aliases:
                    - Cost Structure
                  search:
                    keywords:
                      - コスト構造
                      - Cost Structure
                      - fixed cost
                      - variable cost
                      - unit cost
                      - cost driver
                      - operating leverage
                      - cloud cost
                      - COGS
                      - 原価構造
                    commonSignals:
                      - 固定費と変動費を分解している
                      - ユーザー数や処理量が増えたときの単位コストを見ている
                      - 粗利、COGS、クラウド原価、サポート原価の話がある
                      - スケール時に効率化する費用と比例する費用を分けている
                    antiSignals:
                      - 単なる経費一覧で事業モデルとの関係がない
                      - 技術的なデータ構造のcostだけ
                      - コスト削減施策だけで固定費・変動費の構造を扱っていない
                    relatedNames:
                      - name: FinOps
                        kind: framework
                        relevance: クラウド利用費を事業価値と結びつけて管理する実務フレームワーク。
                        officialUrl: https://www.finops.org/
                      - name: AWS Cost Explorer
                        kind: tool
                        relevance: クラウド費用の費目や利用量を把握しコスト構造を分析する。
                        officialUrl: https://aws.amazon.com/aws-cost-management/aws-cost-explorer/
                      - name: CloudZero
                        kind: platform
                        relevance: SaaSやクラウドサービスのユニットコスト分析で使われる。
                        officialUrl: https://www.cloudzero.com/
                      - name: Activity-Based Costing
                        kind: method
                        relevance: 活動ごとのコストドライバーを見て原価を配賦する方法。

        - slug: competition-and-defensibility
          name: 競争と防御可能性
          summary: 市場の利益配分や参入障壁、勝ちやすさを左右する構造を扱う。
          concepts:
            - slug: industry-structure-analysis
              name: 産業構造分析
              summary: 競争相手だけでなく、代替、買い手、売り手、参入脅威まで含めて市場を読む方法。
              whyLearn: 競合比較だけでは見えない利益圧力を捉えるため。
              terms:
                - slug: porter-five-forces
                  name: ファイブフォース
                  summary: 業界の魅力度と利益構造を五つの競争圧力で見るフレームワーク。
                  whyLearn: 価格競争、参入障壁、交渉力の強さを体系的に点検できるため。
                  promptHint: この市場を五つの力で見たとき、どの圧力が最も粗利を削っているか説明して。
                  aliases:
                    - Five Forces
                    - Porter's Five Forces
                  search:
                    keywords:
                      - ファイブフォース
                      - Five Forces
                      - Porter's Five Forces
                      - 競争要因
                      - industry structure
                      - buyer power
                      - supplier power
                      - threat of substitutes
                      - threat of new entrants
                      - rivalry
                    commonSignals:
                      - 買い手、売り手、代替、参入、既存競争を分けている
                      - 業界の魅力度や利益率の構造を分析している
                      - 競合比較だけでなく交渉力や参入障壁も扱っている
                      - Porter、five forces、競争圧力という語がある
                    antiSignals:
                      - 物理のforceや力学の話
                      - force-directed graphなど可視化アルゴリズムの話
                      - 営業の押し込み力やforceという一般語
                    relatedNames:
                      - name: Porter's Five Forces
                        kind: framework
                        relevance: 業界の利益構造を五つの競争圧力で分析する中心フレーム。
                      - name: Value Chain Analysis
                        kind: framework
                        relevance: 業界構造と自社活動の競争優位を接続して見る際に併用される。
                      - name: PESTEL Analysis
                        kind: framework
                        relevance: 外部環境分析としてFive Forcesの前後で使われることが多い。
                      - name: SWOT Analysis
                        kind: framework
                        relevance: 業界圧力の分析結果を自社の強み・弱みと整理する際に併用される。

                - slug: market-definition

                  search:

                    keywords:

                      - 市場定義

                      - Market Definition

                      - relevant market

                      - product market

                      - geographic market

                      - SSNIP

                      - hypothetical monopolist test

                      - substitutability

                      - market boundary

                      - 代替可能性

                    commonSignals:

                      - どこまでを同じ市場とみなすかを議論している

                      - 代替可能性、地理的範囲、顧客セグメントを切っている

                      - 競合が誰か、シェアをどう測るかを定義している

                      - SSNIP、relevant market、market boundaryが出る

                    antiSignals:

                      - 市場規模の数字だけで競争範囲を定義していない

                      - マーケティング施策の市場という一般語

                      - 株式市場や金融市場の価格変動だけ

                    relatedNames:

                      - name: SSNIP Test

                        kind: method

                        relevance: 価格上昇に対する代替行動から市場範囲を定義する手法。

                      - name: Hypothetical Monopolist Test

                        kind: method

                        relevance: 競争法や市場分析で関連市場を検討する代表的な考え方。

                      - name: DOJ/FTC Merger Guidelines

                        kind: standard

                        relevance: 米国競争当局による市場定義や競争分析の参照枠組み。

                        officialUrl: https://www.justice.gov/atr/merger-guidelines

                      - name: EU Market Definition Notice

                        kind: standard

                        relevance: EU競争法における関連市場定義の実務的な参照資料。
                  name: 市場定義
                  summary: 代替可能性や地理範囲を踏まえて競争の単位を定めること。
                  whyLearn: 競争相手やシェアの見方を誤らないため。
                  promptHint: このサービスの市場定義を狭く取りすぎると何を見誤るか説明して。
                  aliases:
                    - Market Definition
                - slug: substitute
                  name: 代替財
                  summary: 同じ目的を別の方法で満たし、需要を奪いうる選択肢。
                  whyLearn: 直接競合だけ見て需要流出を見落とさないため。
                  promptHint: このプロダクトの本当の代替財は何か、非ソフトウェア手段も含めて考えて。
                  aliases:
                    - Substitute
                - slug: complement
                  name: 補完財
                  summary: 一緒に使われることで価値を高める製品やサービス。
                  whyLearn: 自社単体ではなくエコシステム全体で価値を設計する視点が持てるため。
                  promptHint: この事業で補完財が強くなると需要や価格決定力がどう変わるか説明して。
                  aliases:
                    - Complement
            - slug: platform-and-moat-dynamics
              name: プラットフォームと参入障壁
              summary: プラットフォーム市場や規模優位がどのように防御力を生むかを扱う。
              whyLearn: デジタル市場では競争力が機能差ではなく構造差から生まれることが多いため。
              terms:
                - slug: multi-sided-platform
                  name: マルチサイド・プラットフォーム
                  summary: 複数の利用者グループを仲介し、相互作用から価値を生む事業構造。
                  whyLearn: 片側だけを最適化しても全体が伸びない市場を理解するため。
                  promptHint: この事業はどの面を持つプラットフォームで、面間の依存は何か整理して。
                  aliases:
                    - Two-Sided Market
                    - Multi-Sided Platform
                  search:
                    keywords:
                      - マルチサイドプラットフォーム
                      - Multi-Sided Platform
                      - two-sided market
                      - platform business
                      - indirect network effects
                      - marketplace
                      - platform economics
                      - cross-side network effects
                      - chicken and egg problem
                      - プラットフォーム市場
                    commonSignals:
                      - 売り手と買い手、開発者と利用者など複数面が出る
                      - 片側の利用者増加がもう片側の価値を上げる
                      - マーケットプレイス、プラットフォーム手数料、流動性を議論している
                      - chicken and egg problemやcross-side network effectsが出る
                    antiSignals:
                      - 単なるSaaS基盤や技術プラットフォームの話
                      - multi-tenant architectureだけを扱っている
                      - 複数機能を持つ製品という意味のplatform
                    relatedNames:
                      - name: Two-Sided Market
                        kind: pattern
                        relevance: 売り手と買い手など複数の利用者面を結ぶ市場構造として使われる。
                      - name: Marketplace
                        kind: pattern
                        relevance: 供給側と需要側を仲介する代表的なマルチサイド事業形態。
                      - name: Platform Canvas
                        kind: framework
                        relevance: プラットフォームの参加者、価値交換、ネットワーク効果を整理する。
                      - name: Rochet-Tirole Platform Economics
                        kind: method
                        relevance: 両面市場の価格構造や外部性を理解する学術的な基礎として参照される。

                - slug: network-effects

                  search:

                    keywords:

                      - ネットワーク効果

                      - Network Effects

                      - direct network effect

                      - indirect network effect

                      - viral loop

                      - marketplace liquidity

                      - Metcalfe's law

                      - critical mass

                      - winner-takes-most

                      - cold start problem

                    commonSignals:

                      - ユーザーが増えるほど既存ユーザーの価値が上がる

                      - 直接型、間接型、ローカルネットワーク効果を区別している

                      - critical mass、liquidity、cold startが出る

                      - 利用者増が参入障壁や価格決定力につながる

                    antiSignals:

                      - TCP/IPやネットワーク障害の話

                      - SNSの単なるフォロワー数報告だけ

                      - 通信速度やレイテンシだけを扱っている

                    relatedNames:

                      - name: Metcalfe's Law

                        kind: method

                        relevance: ネットワークの価値が接続数に応じて増えるという説明でよく参照される。

                      - name: Cold Start Problem

                        kind: pattern

                        relevance: ネットワーク効果が立ち上がる前に価値が不足する問題として出る。

                      - name: Marketplace Liquidity

                        kind: pattern

                        relevance: 需要と供給の密度が高まるほど価値が増す市場で重要な概念。

                      - name: Viral Coefficient

                        kind: method

                        relevance: 利用者が利用者を呼ぶ効果を定量化する際に関連する。
                  name: ネットワーク効果
                  summary: 利用者数の増加が既存利用者の価値を高める現象。
                  whyLearn: 成長がそのまま参入障壁や価格決定力につながる条件を理解するため。
                  promptHint: このプロダクトのネットワーク効果は直接型か間接型か、何が強化要因か説明して。
                  aliases:
                    - Network Effects
                - slug: switching-costs
                  name: スイッチングコスト
                  summary: 顧客が他社へ乗り換える際の金銭的・運用的・心理的な負担。
                  whyLearn: 維持率や価格耐性に効く本当の理由を見抜くため。
                  promptHint: このサービスのスイッチングコストはデータ、学習、契約、連携のどこにあるか説明して。
                  aliases:
                    - Switching Costs
                    - Lock-in
                  search:
                    keywords:
                      - スイッチングコスト
                      - Switching Costs
                      - lock-in
                      - vendor lock-in
                      - migration cost
                      - data portability
                      - exit cost
                      - retraining cost
                      - integration lock-in
                      - 乗り換え障壁
                    commonSignals:
                      - 乗り換えが難しい理由をデータ、運用、学習、契約で分けている
