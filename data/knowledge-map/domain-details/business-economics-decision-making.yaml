                    - EV
                  search:
                    keywords:
                      - 期待値
                      - Expected Value
                      - EV
                      - expected monetary value
                      - EMV
                      - probability weighted value
                      - payoff
                      - decision tree
                      - risk neutral
                      - 確率加重平均
                    commonSignals:
                      - 各シナリオの結果に確率を掛けて合計している
