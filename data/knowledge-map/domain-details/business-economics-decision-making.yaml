    - slug: growth-strategy-commercial-operations
      name: 成長戦略と事業運営
      summary: 顧客をどう獲得し、どう維持し、どこへ拡張するかを経済性から考える。
      whyLearn: 単にユーザーを増やすだけでなく、収益性のある成長を設計するため。
      topicClusters:
        - slug: go-to-market-design
          name: Go-to-Market 設計
          summary: どの顧客へ、どのチャネルで、どの販売動線で届けるかを扱う。
          concepts:
            - slug: acquisition-motions
              name: 獲得モーション
              summary: どの成長エンジンで顧客獲得を進めるか。
              whyLearn: 同じ商材でも、PLG 向きか営業主導向きかで組織と価格が変わるため。
              terms:
                - slug: go-to-market
                  name: Go-to-Market
                  summary: 顧客セグメント、チャネル、メッセージ、販売動線を組み合わせた市場投入設計。
                  whyLearn: 良い製品でも市場への届け方が不適切だと伸びないため。
                  promptHint: この事業の GTM は誰に、何を、どのチャネルで届ける設計か説明して。
                  aliases:
                    - GTM
                    - Go-to-Market
                  search:
                    keywords:
                      - Go-to-Market
                      - GTM
                      - go-to-market strategy
                      - market launch
                      - sales motion
                      - distribution channel
                      - target segment
                      - positioning
                      - launch plan
                      - 市場投入戦略
                    commonSignals:
                      - 誰に、何を、どのチャネルで届けるかを設計している
                      - GTM、sales motion、launch plan、positioningが出る
                      - セグメント、チャネル、メッセージ、販売動線を接続している
                      - 新製品ローンチや市場投入の計画
                    antiSignals:
                      - Google Tag ManagerのGTM
                      - 市場投入後の個別広告運用だけ
                      - プロダクト仕様だけで販売・流通がない
                    relatedNames:
                      - name: AARRR
                        kind: framework
                        relevance: 獲得、活性化、維持、紹介、収益化をGTM後の成長導線として見る。
                      - name: HubSpot
                        kind: platform
                        relevance: マーケティング、営業、CRMをつなぐGTM実行基盤として使われる。
                        officialUrl: https://www.hubspot.com/
                      - name: Salesforce
                        kind: platform
                        relevance: 営業主導GTMの商談管理やパイプライン管理で広く使われる。
                        officialUrl: https://www.salesforce.com/
                      - name: Product Marketing Alliance
                        kind: other
                        relevance: ポジショニング、メッセージング、ローンチなどGTM実務の学習資源として知られる。
                        officialUrl: https://www.productmarketingalliance.com/

                - slug: product-led-growth

                  search:

                    keywords:

                      - プロダクト主導成長

                      - Product-Led Growth

                      - PLG

                      - self-serve onboarding

                      - free trial

                      - freemium

                      - product-qualified lead

                      - PQL

                      - activation

                      - product-led sales

                    commonSignals:

                      - 無料トライアルやフリーミアムから製品体験で転換させる

                      - PLG、PQL、self-serve onboarding、activationが出る

                      - 営業前にユーザーが価値体験を完了している

                      - プロダクト利用データを獲得や拡張に使っている

                    antiSignals:

                      - プロダクトマネジメント一般の話

                      - 単なる無料トライアルで利用データや自己完結性を見ていない

                      - 営業主導で製品体験が補助に留まる

                    relatedNames:

                      - name: Product-Led Growth

                        kind: framework

                        relevance: 製品体験を獲得、活性化、拡張の中心に置く成長モデル。

                      - name: Product-Qualified Lead

                        kind: method

                        relevance: 利用行動から営業対象を判断するPLG特有のリード概念。

                      - name: Amplitude

                        kind: platform

                        relevance: プロダクト利用データからactivationやPQLを分析する。

                        officialUrl: https://amplitude.com/

                      - name: Mixpanel

                        kind: platform

                        relevance: PLGに必要な利用行動、ファネル、リテンション分析で使われる。

                        officialUrl: https://mixpanel.com/
                  name: プロダクト主導成長
                  summary: 製品体験そのものを獲得、転換、拡張の主要エンジンにする成長様式。
                  whyLearn: 低 CAC と高いプロダクト起点の拡張が可能かを判断するため。
                  promptHint: この商材は PLG に向くか、導入の自己完結性と価値体験の速さから説明して。
                  aliases:
                    - PLG
                    - Product-Led Growth
                - slug: sales-led-growth
                  name: 営業主導成長
                  summary: 営業組織や商談プロセスを中心に大口契約を獲得する成長様式。
                  whyLearn: 高単価・高関与商材では営業主導の方が合理的なことが多いため。
                  promptHint: なぜこの事業は PLG より sales-led の方が合うのか説明して。
                  aliases:
                    - SLG
                    - Sales-Led Growth
            - slug: channels-and-segmentation
              name: チャネルとセグメンテーション
              summary: どの顧客層へ、どの販売経路で勝つかを扱う。
              whyLearn: 同じ製品でも、顧客層とチャネル選択でユニットエコノミクスが大きく変わるため。
              terms:
                - slug: market-segmentation
                  name: 市場セグメンテーション
                  summary: 顧客を属性、用途、課題、購買行動などで分けること。
                  whyLearn: 一律のメッセージや価格で全員に売ろうとする失敗を避けるため。
                  promptHint: この事業で意味のあるセグメント軸は何か、業種や規模以外も含めて説明して。
                  aliases:
                    - Market Segmentation
                - slug: channel-partner
                  name: チャネルパートナー
                  summary: 再販、導入支援、流通を担う外部パートナー。
                  whyLearn: 直接販売より速く市場へ届くが、粗利や顧客接点は薄くなるため。
                  promptHint: この市場でチャネルパートナーを使うと粗利と成長速度にどう効くか説明して。
                  aliases:
                    - Channel Partner
                    - Reseller
                - slug: tam-sam-som
                  name: TAM・SAM・SOM
                  summary: 総市場、狙える市場、実際に取りうる市場を段階的に見る整理法。
                  whyLearn: 夢の大きい市場サイズと、直近で攻めるべき現実市場を分けて考えるため。
                  promptHint: この事業の TAM と SOM が大きく違う理由を説明して。
                  aliases:
                    - TAM
                    - SAM
                    - SOM

        - slug: expansion-retention-and-loops
          name: 拡張、維持、成長ループ
          summary: 既存顧客からの成長と、継続的な獲得エンジンを扱う。
          concepts:
            - slug: expansion-plays
              name: 拡張プレイ
              summary: 既存顧客への拡張で収益を伸ばす方法。
              whyLearn: 継続収益事業では、新規獲得より既存拡張の方が効率的なことが多いため。
              terms:
                - slug: land-and-expand
                  name: ランド・アンド・エクスパンド
                  summary: 小さく導入して成功実績を作り、その後に部署・用途・席数を広げる戦略。
                  whyLearn: 導入障壁を下げつつ、長期的な拡張余地を確保するため。
                  promptHint: この商材で land-and-expand が成立するための初期導入条件を説明して。
                  aliases:
                    - Land and Expand
                - slug: upsell
                  name: アップセル
                  summary: より高価格・高機能のプランや追加機能へ移行してもらうこと。
                  whyLearn: NRR 改善と ARPU 向上の主要手段になるため。
                  promptHint: この事業のアップセル余地は機能、容量、ガバナンスのどこにあるか説明して。
                  aliases:
                    - Upsell
                - slug: cross-sell
                  name: クロスセル
                  summary: 関連する別製品・別機能を追加購入してもらうこと。
                  whyLearn: 同一顧客基盤からの価値獲得を広げられるため。
                  promptHint: この製品で cross-sell が自然に成立する隣接商材を考えて。
                  aliases:
                    - Cross-sell
            - slug: operational-growth-loops
              name: 運用可能な成長ループ
              summary: 獲得、転換、紹介、利用増加が循環する仕組みを扱う。
              whyLearn: 単発キャンペーンではなく再現性のある成長構造を設計するため。
              terms:
                - slug: conversion-funnel
                  name: コンバージョンファネル
                  summary: 認知から契約までの各段階と転換率を追う見方。
                  whyLearn: どこで顧客が落ちているかを段階別に把握するため。
                  promptHint: このファネルの最大のボトルネックはどこか、転換率で説明して。
                  aliases:
                    - Funnel
                    - Conversion Funnel
                - slug: growth-loop
                  name: グロースループ
                  summary: 利用や成果が次の獲得や価値増加を生む循環型の成長構造。
                  whyLearn: 線形ファネルでは説明できない持続的成長を捉えるため。
                  promptHint: この事業でユーザー利用が次の獲得につながる growth loop は存在するか説明して。
                  aliases:
                    - Growth Loop
                - slug: viral-coefficient
                  name: バイラル係数
                  summary: 1 人の利用者が次に何人の利用者を呼び込むかを表す指標。
                  whyLearn: 紹介や共有による自然増の強さを概算できるため。
                  promptHint: このプロダクトの viral coefficient を上げる要因はどこにあるか説明して。
                  aliases:
                    - Viral Coefficient
                    - K-factor

edges:
  - from: willingness-to-pay
    to: value-based-pricing
    relationType: prerequisite
    reason: 価値ベース価格設定は、顧客がどこまで払えるかの理解が前提になるため。
  - from: value-proposition
    to: value-based-pricing
    relationType: prerequisite
    reason: 顧客価値が曖昧だと、価値ベース価格設定の根拠を作れないため。
  - from: value-metric
    to: usage-based-pricing
    relationType: prerequisite
    reason: usage 型 pricing は何を 1 単位として請求するかを先に定める必要があるため。
  - from: multi-sided-platform
    to: network-effects
    relationType: related
    reason: マルチサイド市場では面間の間接ネットワーク効果が価値の中心になることが多いため。
  - from: porter-five-forces
    to: market-definition
    relationType: used_in
    reason: 競争圧力を読む前提として、どの市場を競争単位として見るかを定める必要があるため。
  - from: switching-costs
    to: net-revenue-retention
    relationType: related
    reason: 乗り換え負担の大きさは解約率や縮小率に影響し、NRR の背景要因になるため。
  - from: contribution-margin
    to: break-even-point
    relationType: prerequisite
    reason: 損益分岐点の計算は限界利益の理解なしに行えないため。
  - from: gross-margin
    to: cac-payback-period
    relationType: prerequisite
    reason: CAC 回収期間は粗利ベースでの回収速度を見ることが多いため。
  - from: customer-acquisition-cost
    to: cac-payback-period
    relationType: prerequisite
    reason: CAC 回収期間は獲得コストと回収粗利の両方を前提に計算されるため。
  - from: gross-revenue-retention
    to: net-revenue-retention
    relationType: compare_with
    reason: GRR は維持のみ、NRR は拡張も含めるため、比較することで解約隠れを見抜きやすくなるため。
  - from: revenue-recognition
    to: deferred-revenue
    relationType: related
    reason: 先受けの対価が売上にならず繰延されるのは収益認識のルールによるため。
  - from: annual-recurring-revenue
    to: rule-of-40
    relationType: related
    reason: Rule of 40 を継続収益事業で読む際、ARR ベースの成長率が実務上よく使われるため。
  - from: discount-rate
    to: net-present-value
    relationType: prerequisite
    reason: NPV は将来キャッシュフローを割引率で現在価値へ変換して計算するため。
  - from: net-present-value
    to: internal-rate-of-return
    relationType: compare_with
    reason: どちらも投資評価指標だが、価値額で判断するか利回りで判断するかが異なるため。
  - from: life-cycle-cost
    to: cost-benefit-analysis
    relationType: used_in
    reason: 費用便益分析で比較すべき費用は導入費だけでなくライフサイクル全体に及ぶため。
  - from: opportunity-cost
    to: capital-rationing
    relationType: related
    reason: 資本配分制約下では、案件を採ることの機会費用がより明示的になるため。
  - from: real-options
    to: net-present-value
    relationType: compare_with
    reason: 静的な NPV だけでは、延期・段階投資・中止の柔軟性価値を十分に表せないため。
  - from: base-rate
    to: planning-fallacy
    relationType: related
    reason: ベースレートを見ることは計画錯誤を補正する代表的な方法だから。
  - from: premortem
    to: planning-fallacy
    relationType: related
    reason: premortem は失敗要因を先に想像することで楽観見積りを抑えるため。
  - from: expected-value
    to: scenario-analysis
    relationType: used_in
    reason: シナリオごとの結果を意思決定へ反映する際、期待値の考え方が補助線になるため。
  - from: sensitivity-analysis
    to: monte-carlo-simulation
    relationType: compare_with
    reason: 感度分析は単変数中心、モンテカルロは確率分布と同時変動を扱えるため。
  - from: scenario-analysis
    to: monte-carlo-simulation
    relationType: related
    reason: どちらも不確実性を複数前提で扱うが、離散ケースか分布計算かが異なるため。
  - from: go-to-market
    to: product-led-growth
    relationType: used_in
    reason: PLG は GTM の一形態として位置づけられるため。
  - from: product-led-growth
    to: sales-led-growth
    relationType: compare_with
    reason: どちらも獲得モーションだが、価値体験の担い手とコスト構造が異なるため。
  - from: market-segmentation
    to: tam-sam-som
    relationType: related
    reason: 市場規模を現実的に切るには、どのセグメントを対象にするかの定義が必要なため。
  - from: land-and-expand
    to: net-revenue-retention
    relationType: used_in
    reason: land-and-expand が機能すると既存顧客からの拡張売上が増え、NRR 改善につながるため。
  - from: upsell
    to: net-revenue-retention
    relationType: used_in
    reason: アップセルは既存顧客売上を押し上げ、NRR を改善する主要手段だから。
  - from: conversion-funnel
    to: customer-acquisition-cost
    relationType: related
    reason: ファネル転換率の改善は、同じ集客費でも CAC を下げることにつながるため。
  - from: growth-loop
    to: viral-coefficient
    relationType: related
    reason: 口コミや共有で回る growth loop の強さを、viral coefficient が一部定量化するため。
