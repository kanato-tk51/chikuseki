  - from: deterministic-finite-automaton
    to: nondeterministic-finite-automaton
    relationType: compare_with
    reason: 表現は異なるが認識できる言語クラスは同じで、計算モデルの見方を比較できるから。
  - from: regular-expression
    to: programming-languages-software-construction
    relationType: used_in
    reason: 字句解析や文字列処理 API の理解と接続しやすいから。
  - from: context-free-grammar
    to: programming-languages-software-construction
    relationType: used_in
    reason: 言語構文やパーサ設計の理論的基礎になるから。
  - from: turing-machine
    to: halting-problem
    relationType: prerequisite
    reason: 停止性問題はチューリング機械上で定式化される代表例だから。
  - from: mapping-reduction
    to: np-complete
