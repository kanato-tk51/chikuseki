domain:
  slug: mathematical-theoretical-foundations
  name: 数学的・理論的基礎
  summary: 計算、正しさ、不確実性、限界を厳密に考えるための数学、論理、理論の基礎。
  boundaryNotes: 形式的な基礎を扱う。実行可能な問題解法や性能上のトレードオフは Algorithms and Data Structures に寄せる。統計運用、ML 実装、暗号プロトコル設計、形式検証ワークフローは関連 edge で接続する。
  knowledgeAreas:
    - slug: discrete-structures-and-proof
      name: 離散構造と証明
      summary: 集合、関係、写像、数え上げ、合同算術、帰納法などで有限・可算な対象を厳密に扱う領域。
      whyLearn: 仕様、制約、状態、データ関係を曖昧なく表現し、議論を反例や証明で点検できるようになる。
      topicClusters:
        - slug: set-relation-function
          name: 集合、関係、写像
          summary: 離散対象を記号的に表現する最も基本的な道具をまとめる。
          concepts:
            - slug: sets-and-cardinality
              name: 集合と基数
              summary: 対象の集まりとその大きさを扱う。
              whyLearn: 問題の対象範囲や状態空間を正しく切り出す前提になる。
              terms:
                - slug: set
                  name: 集合
                  summary: 対象を条件や列挙でまとめた基本単位。
                  whyLearn: データ集合、許可集合、状態集合などを曖昧なく定義できる。
                  promptHint: 何を一つの集まりとして扱うと問題設定が明確になるかを問うときに使う。
                  aliases:
                    - set
                  search:
                    keywords:
                      - 集合
                      - set
                      - element
                      - membership
                      - collection
                      - distinct values
                      - データ集合
                      - 許可集合
                      - 状態集合
                    commonSignals:
                      - 要素が属するかどうかを議論している
                      - 重複を無視した対象の集まりを扱っている
                      - 和集合や共通部分のような集合演算が出てくる
                      - 対象範囲や母集団を定義している
                    antiSignals:
                      - データベースの設定値や config set のような動詞としての set
                      - setTimeout や setter などプログラミング用語の一部
                      - 集合住宅や集合写真など数学的集合でない日本語表現
                    relatedNames:
                      - name: Python set
                        kind: language
                        relevance: 集合演算をプログラミング上で直接扱う代表的な組み込み型として出てくる。
                        officialUrl: https://docs.python.org/3/library/stdtypes.html#set-types-set-frozenset
                      - name: Java Set
                        kind: language
                        relevance: 重複しない要素集合を表す標準コレクションとして出てくる。
                        officialUrl: https://docs.oracle.com/javase/8/docs/api/java/util/Set.html
                      - name: SQL DISTINCT
                        kind: language
                        relevance: 重複排除された値集合を得る文脈で集合概念と一緒に出てくる。
                        officialUrl: https://www.postgresql.org/docs/current/sql-select.html
                      - name: Redis Set
                        kind: tool
                        relevance: 重複しないメンバー集合を扱うデータ構造として出てくる。
                        officialUrl: https://redis.io/docs/latest/develop/data-types/sets/

                - slug: subset
                  name: 部分集合
                  summary: ある集合の要素だけで構成される集合。
                  whyLearn: 権限範囲、検索結果、制約下の候補集合などの包含関係を整理できる。
                  promptHint: どの条件を満たす対象だけを切り出しているのかを説明するときに使う。
                  aliases:
                    - subset
                - slug: power-set
                  name: 冪集合
                  summary: ある集合のすべての部分集合を集めた集合。
                  whyLearn: 設定可能な組み合わせ全体や探索空間の大きさを見積もる感覚につながる。
                  promptHint: 可能な選択肢の全体数がなぜ急増するかを説明するときに使う。
                  aliases:
                    - power set
                - slug: cardinality
                  name: 基数
                  summary: 集合の大きさを表す概念。
                  whyLearn: 離散的な状態数や候補数の比較に必要になる。
                  promptHint: 要素数の違いが設計や探索可能性にどう効くかを問うときに使う。
                  aliases:
                    - cardinality
            - slug: relations-functions-order
              name: 関係と写像と順序
              summary: 要素どうしのつながりや対応付けを表す。
              whyLearn: データモデル、依存関係、状態遷移、ID 対応を厳密に考えられる。
              terms:
                - slug: relation
                  name: 関係
                  summary: 二つ以上の対象間の成立条件を表す表現。
                  whyLearn: 依存、接続、包含、等価といった構造を統一的に記述できる。
                  promptHint: どの対象どうしがどう結び付くのかを形式化するときに使う。
                  aliases:
                    - relation
                  search:
                    keywords:
                      - 関係
                      - relation
                      - binary relation
                      - n-ary relation
                      - ordered pair
                      - predicate relation
                      - 関連
                      - 直積
                      - relational model
                    commonSignals:
                      - 二つ以上の対象の対応やつながりを定義している
                      - ordered pair や tuple が出てくる
                      - 依存関係や包含関係を抽象化している
                      - relation R on A のような表現がある
                    antiSignals:
                      - 人間関係や顧客関係など一般語としての関係だけが出ている
                      - relation がリレーショナルデータベース製品名の一部としてだけ出る
                      - correlation など統計的関連だけを指している
                    relatedNames:
                      - name: Relational Algebra
                        kind: method
                        relevance: 関係を表や演算として扱うデータベース理論の基礎として出てくる。
                      - name: SQL
                        kind: language
                        relevance: リレーショナルデータを操作する言語として関係概念と一緒に出てくる。
                        officialUrl: https://www.iso.org/standard/76583.html
                      - name: RDF
                        kind: standard
                        relevance: 主語・述語・目的語の関係を表す知識表現として出てくる。
                        officialUrl: https://www.w3.org/RDF/
                      - name: GraphQL
                        kind: language
                        relevance: エンティティ間の関係を問い合わせる API 文脈で出てくる。
                        officialUrl: https://graphql.org/

                - slug: function

                  search:

                    keywords:

                      - 関数

                      - function

                      - mapping

                      - map

                      - domain

                      - codomain

                      - deterministic mapping

                      - total function

                      - partial function

                      - input output

                    commonSignals:

                      - 各入力に出力が一意に対応するかを確認している

                      - domain と codomain を区別している

                      - 写像 f colon A to B のような記述がある

                      - 変換規則や集計規則を定義している

                    antiSignals:

                      - JavaScript 関数の文法だけを説明している

                      - 職務 function や機能 function という一般語

                      - 関数型組織など組織設計の用語

                    relatedNames:

                      - name: Haskell

                        kind: language

                        relevance: 関数を第一級の抽象として扱う文脈で頻出する。

                        officialUrl: https://www.haskell.org/

                      - name: TypeScript function type

                        kind: language

                        relevance: 入力と出力の対応を型として表す場面で出てくる。

                        officialUrl: https://www.typescriptlang.org/docs/

                      - name: OpenAPI

                        kind: standard

                        relevance: API 操作を入力と出力の対応として記述する文脈で出てくる。

                        officialUrl: https://www.openapis.org/

                      - name: MapReduce

                        kind: framework

                        relevance: map 関数と reduce 関数を使う分散処理モデルとして出てくる。
                  name: 関数
                  summary: 各入力に対して出力を一つ対応させる写像。
                  whyLearn: API、変換処理、集計規則、識別子対応を定義する基礎になる。
                  promptHint: 入力から出力への対応が一意かどうかを説明するときに使う。
                  aliases:
                    - function
                    - mapping
                - slug: equivalence-relation
                  name: 同値関係
                  summary: 同じとみなせる条件を表す関係。
                  whyLearn: 正規化、重複排除、状態同値、クラス分けの前提になる。
                  promptHint: 何を同じものとして扱うべきかを定義するときに使う。
                  aliases:
                    - equivalence relation
                - slug: partial-order
                  name: 半順序
                  summary: すべての要素が比較可能とは限らない順序関係。
                  whyLearn: 依存関係、優先関係、バージョン順序などを無理なく表せる。
                  promptHint: 全順序でなくても順序づけが必要な場面を考えるときに使う。
                  aliases:
                    - partial order
                  search:
                    keywords:
                      - 半順序
                      - partial order
                      - poset
                      - reflexive
                      - antisymmetric
                      - transitive
                      - comparable
                      - incomparable
                      - topological order
                      - DAG order
                    commonSignals:
                      - 比較できない要素が存在する順序を扱っている
                      - 依存関係をグラフや DAG で表している
                      - 全順序ではない優先順位を議論している
                      - reflexive antisymmetric transitive が並んでいる
                    antiSignals:
                      - 単なる昇順や降順ソートだけの話
                      - UI の表示順だけを決めている話
                      - partial が部分的や未完了という一般語で出ている
                    relatedNames:
                      - name: Topological Sort
                        kind: method
                        relevance: 半順序で表される依存関係を一列に並べる手法として出てくる。
                      - name: SemVer
                        kind: standard
                        relevance: バージョン互換性や制約順序の議論で半順序的に扱われることがある。
                        officialUrl: https://semver.org/
                      - name: Vector Clock
                        kind: method
                        relevance: 分散システムの因果順序を半順序として表す文脈で出てくる。
                      - name: DAG
                        kind: pattern
                        relevance: 依存関係やワークフローの半順序構造として出てくる。

        - slug: proof-induction-and-counting
          name: 証明、帰納、数え上げ
          summary: 命題を厳密に確かめ、再帰的構造や組合せを扱うための基礎をまとめる。
          concepts:
            - slug: proof-strategies
              name: 証明戦略
              summary: 命題の真偽を系統立てて確かめる基本手法。
              whyLearn: レビューや設計判断を、雰囲気ではなく論証で支えられる。
              terms:
                - slug: direct-proof
                  name: 直接証明
                  summary: 前提から結論へそのまま論理を進める証明。
                  whyLearn: 最も基本的な論証形として仕様の正しさを説明しやすい。
                  promptHint: 前提を一つずつ使えば結論に到達できるかを考えるときに使う。
                  aliases:
                    - direct proof
                - slug: contrapositive
                  name: 対偶
                  summary: 命題の裏返しで証明しやすくする考え方。
                  whyLearn: 直接示しにくい条件を見通しよく扱える。
                  promptHint: 結論が偽なら前提も偽になると示せないかを考えるときに使う。
                  aliases:
                    - contrapositive
                - slug: proof-by-contradiction
                  name: 背理法
                  summary: 反対を仮定して矛盾を導く証明方法。
                  whyLearn: 存在しないことや不可能性を示すときに強い。
                  promptHint: もし成り立つと仮定したら何が破綻するかを見るときに使う。
                  aliases:
                    - contradiction proof
                    - proof by contradiction
                - slug: counterexample
                  name: 反例
                  summary: 一般命題が成り立たないことを示す具体例。
                  whyLearn: レビューで誤った一般化を素早く崩せる。
                  promptHint: その主張が本当に常に成り立つのかを疑うときに使う。
                  aliases:
                    - counterexample
            - slug: induction-and-invariants
              name: 帰納法と不変条件
              summary: 再帰的対象や反復処理の正しさを示す手法。
              whyLearn: 再帰、ループ、段階的構築の説明と検証に直結する。
              terms:
                - slug: mathematical-induction
                  name: 数学的帰納法
                  summary: 基底部と帰納段階で自然数全体の命題を示す方法。
                  whyLearn: 再帰的な定義や反復回数に関する正しさの基本になる。
                  promptHint: 最初に成り立ち、一段進めても保たれるかを問うときに使う。
                  aliases:
                    - induction
                    - mathematical induction
                - slug: structural-induction
                  name: 構造的帰納法
                  summary: 木や式などの再帰構造について成り立つことを示す方法。
                  whyLearn: 構文木、再帰データ型、文法構造の性質を証明できる。
                  promptHint: 対象の構造が小さい部分から組み上がるときに使う。
                  aliases:
                    - structural induction
                - slug: well-ordering
                  name: 整列性
                  summary: 自然数の非空部分集合には最小要素があるという性質。
                  whyLearn: 帰納法や最小反例法を支える見方になる。
                  promptHint: 最小の反例を取る議論がなぜ許されるかを考えるときに使う。
                  aliases:
                    - well ordering
                - slug: loop-invariant
                  name: ループ不変条件
                  summary: 反復の前後で保たれる性質。
                  whyLearn: 実装レビューでループの正しさを説明する最重要道具の一つ。
                  promptHint: 各反復の前後で何が必ず保たれているかを書くときに使う。
                  aliases:
                    - invariant
                    - loop invariant
                  search:
                    keywords:
                      - ループ不変条件
                      - loop invariant
                      - invariant
                      - Hoare logic
                      - while loop proof
                      - correctness proof
                      - precondition
                      - postcondition
                      - verification condition
                    commonSignals:
                      - ループの各反復前後で保たれる性質を述べている
                      - 初期化、維持、終了の三段階で正しさを説明している
                      - assert invariant や decreases 句が出てくる
                      - while ループの正当性証明をしている
                    antiSignals:
                      - ビジネス KPI が変わらないという一般的な不変
                      - 物理量の保存則だけを扱う話
                      - invariant が画像特徴量や統計量の意味で出ているだけの話
                    relatedNames:
                      - name: Hoare Logic
                        kind: method
                        relevance: 事前条件・事後条件・不変条件でプログラム正当性を示す体系として出てくる。
                      - name: Dafny
                        kind: tool
                        relevance: ループ不変条件を明示してプログラム検証するツールとして出てくる。
                        officialUrl: https://dafny.org/
                      - name: Frama-C
                        kind: tool
                        relevance: C プログラムの契約や不変条件を検証する文脈で出てくる。
                        officialUrl: https://frama-c.com/
                      - name: SPARK Ada
                        kind: language
                        relevance: 形式検証向けに不変条件を記述するプログラミング言語として出てくる。
                        officialUrl: https://www.adacore.com/sparkpro
            - slug: counting-and-modular-reasoning
              name: 数え上げと合同算術
              summary: 組合せの総数や整数の周期性を扱う。
              whyLearn: 状態数見積り、確率計算、ハッシュや暗号の理解に接続する。
              terms:
                - slug: combinations
                  name: 組合せ
                  summary: 順序を無視して要素を選ぶ数え上げ。
                  whyLearn: サンプリング、候補集合、部分集合選択の理解に必要。
                  promptHint: 並び順ではなく選び方の数だけを知りたいときに使う。
                  aliases:
                    - combination
                    - nCk
                - slug: inclusion-exclusion-principle
                  name: 包除原理
                  summary: 重複を調整しながら集合の大きさを数える原理。
                  whyLearn: 条件が重なる場合の数え上げや確率計算で頻出する。
                  promptHint: 単純に足すと二重に数えてしまう場面で使う。
                  aliases:
                    - inclusion exclusion
                - slug: pigeonhole-principle
                  name: 鳩の巣原理
                  summary: 容器より多くの要素を入れれば重なりが必ず起こる原理。
                  whyLearn: 存在証明や下限の直感を与える短いが強い道具になる。
                  promptHint: 必ず衝突や重複が起きることを示したいときに使う。
                  aliases:
                    - pigeonhole principle
                - slug: modular-arithmetic
                  name: 合同算術
                  summary: ある法で割った余りにもとづく整数の計算体系。
                  whyLearn: 周期性、ハッシュ、暗号、整合性検査の理解に重要。
                  promptHint: 値そのものより余りの振る舞いを見たいときに使う。
                  aliases:
                    - modular arithmetic
                    - congruence arithmetic
                  search:
                    keywords:
                      - 合同算術
                      - modular arithmetic
                      - congruence
                      - modulo
                      - mod
                      - residue
                      - finite field
                      - mod inverse
                      - cyclic group
                      - 剰余
                    commonSignals:
                      - a congruent b mod n のような記述がある
                      - 余りだけを使って計算している
                      - mod inverse や modular exponentiation が出てくる
                      - 暗号、ハッシュ、チェックサムの数理を説明している
                    antiSignals:
                      - CSS module や JavaScript module の話
                      - modular architecture など設計分割の話
                      - modulo が単なるプログラミング演算子の文法説明だけで出る
                    relatedNames:
                      - name: RSA
                        kind: protocol
                        relevance: 大きな整数の合同算術を使う公開鍵暗号として出てくる。
                      - name: Diffie-Hellman
                        kind: protocol
                        relevance: 有限群上の演算を使う鍵交換として出てくる。
                      - name: Elliptic Curve Cryptography
                        kind: method
                        relevance: 有限体上の演算を使う暗号方式として出てくる。
                      - name: Ed25519
                        kind: method
                        relevance: 有限体上の楕円曲線演算を使う署名方式として出てくる。
                        officialUrl: https://ed25519.cr.yp.to/

    - slug: logic-and-formal-reasoning
      name: 論理と形式的推論
      summary: 命題や述語で対象世界を表し、含意、充足可能性、メタ性質を扱う領域。
      whyLearn: 仕様の曖昧さを潰し、前提・結論・制約を機械的に点検しやすくする。
      topicClusters:
        - slug: propositional-logic
          name: 命題論理
          summary: 真偽が定まる文を論理式として扱う。
          concepts:
            - slug: proposition-and-connectives
              name: 命題と論理結合
              summary: 真偽値をもつ文を論理式として表す。
              whyLearn: 条件分岐や仕様文を形式的に読み替える土台になる。
              terms:
                - slug: proposition
                  name: 命題
                  summary: 真か偽かが定まる文。
                  whyLearn: 論理的に扱える対象と扱えない対象を区別できる。
                  promptHint: その文は真偽を判定できる形になっているかを問うときに使う。
                  aliases:
                    - proposition
                - slug: logical-connective
                  name: 論理結合子
                  summary: 命題どうしを結び付ける and や or などの演算子。
                  whyLearn: 条件の合成や否定を正しく読み解ける。
                  promptHint: 条件が同時成立なのか代替なのかを明確にしたいときに使う。
                  aliases:
                    - connective
                    - logical connective
                - slug: truth-table
                  name: 真理値表
                  summary: 論理式の真偽を入力の全組合せで示した表。
                  whyLearn: 論理式の意味を機械的に確認できる。
                  promptHint: 場合分けを全部書き出して論理式を点検したいときに使う。
                  aliases:
                    - truth table
                - slug: satisfiability
                  name: 充足可能性
                  summary: ある論理式を真にする割当てが存在するかという性質。
                  whyLearn: 制約が矛盾していないかを調べる中心概念になる。
                  promptHint: 条件群を同時に満たす設定が少なくとも一つあるかを問うときに使う。
                  aliases:
                    - satisfiability
                    - satisfiable
                  search:
                    keywords:
                      - 充足可能性
                      - satisfiability
                      - satisfiable
                      - unsatisfiable
                      - model exists
                      - assignment
                      - constraint satisfaction
                      - SAT
                      - feasible assignment
                    commonSignals:
                      - 条件群を同時に満たす割当てがあるかを問う
                      - SAT や UNSAT の判定結果が出てくる
                      - model や witness として具体的な割当てを返している
                      - 制約の矛盾検出をしている
                    antiSignals:
                      - 顧客満足 satisfaction の話
                      - 満足度アンケートや NPS の話
                      - feasible が業務上実現可能という一般語で出ているだけ
                    relatedNames:
                      - name: SAT Solver
                        kind: tool
                        relevance: 充足可能な真偽割当てを探索するツール一般として出てくる。
                      - name: CSP
                        kind: method
                        relevance: 制約を満たす割当てを探す問題として充足可能性と近い文脈で出てくる。
                      - name: DIMACS CNF
                        kind: standard
                        relevance: SAT 問題を交換する代表的な入力形式として出てくる。
                      - name: Z3
                        kind: tool
                        relevance: SAT や SMT の充足可能性判定で広く使われるソルバとして出てくる。
                        officialUrl: https://github.com/Z3Prover/z3
            - slug: inference-and-equivalence
              name: 推論と同値
              summary: ある式から別の式が従うかを扱う。
              whyLearn: レビューで前提から結論が本当に出るかを確認できる。
              terms:
                - slug: inference-rule
                  name: 推論規則
                  summary: ある形の前提からある形の結論を導く規則。
