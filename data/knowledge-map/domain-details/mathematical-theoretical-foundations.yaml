                  name: 無矛盾性
                  summary: 体系から命題とその否定の両方を導けない性質。
                  whyLearn: 仕様やルール集合が破綻していないかを見る基礎になる。
                  promptHint: そのルール群が自己矛盾していないかを点検するときに使う。
                  aliases:
