            - slug: turing-models-and-undecidability
              name: チューリング機械と決定不能性
              summary: 汎用計算モデルとその限界を扱う。
              whyLearn: 自動化の限界線を理解し、無理な要求を見抜ける。
              terms:
                - slug: turing-machine
                  name: チューリング機械
                  summary: 汎用的な計算可能性を定義する標準モデル。
                  whyLearn: 計算可能性議論の基準点になる。
                  promptHint: 計算そのものを最小限の機械で定義したいときに使う。
                  aliases:
                    - Turing machine
                  search:
                    keywords:
                      - チューリング機械
                      - Turing machine
                      - tape
                      - head
                      - state transition
                      - computability
                      - universal Turing machine
                      - Church-Turing thesis
                      - computation model
                    commonSignals:
                      - テープ、ヘッド、状態、遷移関数が出てくる
                      - 計算可能性の標準モデルとして説明している
                      - universal machine や simulation を扱っている
                      - 停止性問題と一緒に出てくる
                    antiSignals:
                      - Turing Award や Alan Turing の人物紹介だけ
                      - チューリングテストの話
                      - 実際の CPU アーキテクチャだけを扱う話
                    relatedNames:
                      - name: Universal Turing Machine
                        kind: method
                        relevance: 任意のチューリング機械を模倣できるモデルとして出てくる。
                      - name: Lambda Calculus
                        kind: method
                        relevance: 計算可能性を定義する別モデルとしてチューリング機械と比較される。
                      - name: Register Machine
                        kind: method
                        relevance: チューリング機械と等価な抽象計算モデルとして出てくる。
                      - name: Brainfuck
                        kind: language
                        relevance: チューリング完全性を説明する極小言語の例として出てくる。
                        officialUrl: https://esolangs.org/wiki/Brainfuck

                - slug: decidable-language
                  name: 決定可能言語
                  summary: 受理か否かを必ず停止して判定できる言語。
                  whyLearn: 判定問題が自動化可能かを整理できる。
                  promptHint: yes か no を必ず返せる問題かを考えるときに使う。
                  aliases:
                    - decidable language
                - slug: halting-problem
                  name: 停止性問題
                  summary: 任意プログラムが停止するかを一般には判定できない問題。
                  whyLearn: 非決定可能性の代表例として限界理解に必須。
                  promptHint: 実行前に停止性を完全判定できるかを問うときに使う。
                  aliases:
                    - halting problem
                  search:
                    keywords:
                      - 停止性問題
                      - halting problem
                      - program termination
                      - undecidable
                      - nontermination
                      - infinite loop
                      - Turing machine
                      - Rice theorem
                      - termination analysis
                    commonSignals:
                      - 任意のプログラムが停止するかを判定できないと述べている
                      - infinite loop と undecidable を結びつけている
                      - 自己参照や対角線論法で証明している
                      - 静的解析の限界として語っている
                    antiSignals:
                      - 単にプログラムがハングした障害報告
                      - timeout や kill signal の運用対応だけ
                      - 終了条件のバグ修正だけで原理的限界の話がない
                    relatedNames:
                      - name: Rice Theorem
                        kind: method
                        relevance: プログラム性質の決定不能性を示す一般化として出てくる。
                      - name: Abstract Interpretation
                        kind: method
                        relevance: 停止性など完全判定できない性質を近似解析する文脈で出てくる。
                      - name: Termination Analysis
                        kind: method
                        relevance: 特定条件下で停止を証明する解析分野として出てくる。
                      - name: Dafny
                        kind: tool
                        relevance: decreases 句などで停止性を証明する形式検証ツールとして出てくる。
                        officialUrl: https://dafny.org/

                - slug: mapping-reduction
                  name: 写像還元
                  summary: ある問題を別の問題へ計算可能に移し替える手法。
                  whyLearn: 難しさや非決定可能性を問題間で運べる。
                  promptHint: 既知に難しい問題へ変換して難しさを示したいときに使う。
                  aliases:
                    - many one reduction
                    - mapping reduction
            - slug: reductions-and-impossibility
              name: 還元と不可能性証明
              summary: 難しさや不可能性を伝播させる議論を扱う。
              whyLearn: 限界の所在を別問題へ移して説明できる。
              terms:
                - slug: rice-theorem
                  name: ライスの定理
                  summary: プログラムの非自明な意味的性質は一般には決定不能という定理。
                  whyLearn: 静的解析の限界を理解するうえで重要。
                  promptHint: プログラム意味に関する万能判定器が作れない理由を考えるときに使う。
                  aliases:
                    - Rice theorem
                - slug: diagonalization
                  name: 対角線論法
                  summary: 自己参照的なずれを作って限界や非包含を示す手法。
                  whyLearn: 計算理論の多くの不可能性証明の芯になる。
                  promptHint: 一覧化された候補から必ず外れる対象を作りたいときに使う。
                  aliases:
                    - diagonalization
                - slug: self-reference
                  name: 自己参照
                  summary: 対象が自分自身を参照する構造。
                  whyLearn: 停止性や不完全性などの難しさの源を理解できる。
                  promptHint: システムが自分自身について語ると何が起きるかを見るときに使う。
                  aliases:
                    - self reference
                - slug: recognizable-language
                  name: 半決定可能言語
                  summary: 属する場合には停止して受理できるが、属さない場合に停止保証がない言語。
                  whyLearn: 決定可能性との違いを通じて停止保証の難しさを学べる。
                  promptHint: yes 側だけはいつか分かる問題を区別したいときに使う。
                  aliases:
                    - recognizable language
                    - recursively enumerable language

        - slug: complexity-and-limits
          name: 複雑性と計算の限界
          summary: 解けるだけでなく、どれくらい難しいかを理論的に位置づける。
          concepts:
            - slug: classical-complexity-and-randomness
              name: 古典複雑性と拡張的視点
              summary: 主要な複雑性クラスと検証可能性を扱う。
              whyLearn: 問題の難しさを直感ではなく理論語彙で語れるようになる。
              terms:
                - slug: p
                  name: P
                  summary: 多項式時間で解ける決定問題のクラス。
                  whyLearn: 効率的に解ける問題の代表的な基準になる。
                  promptHint: 現実的に計算可能と言える目安を考えるときに使う。
                  aliases:
                    - P
                - slug: np
                  name: NP
                  summary: 解の正しさを多項式時間で検証できる決定問題のクラス。
                  whyLearn: 探索の難しさと検証のしやすさの差を捉えられる。
                  promptHint: 解くのは難しくても答え合わせは速い問題を考えるときに使う。
                  aliases:
                    - NP
                  search:
                    keywords:
                      - NP
                      - nondeterministic polynomial time
                      - polynomial-time verification
                      - certificate
                      - witness
                      - decision problem
                      - verifier
                      - complexity class
                      - P vs NP
                    commonSignals:
                      - 解の候補を多項式時間で検証できると説明している
                      - certificate や witness が出てくる
                      - P, NP, NP-complete を比較している
                      - 決定問題の複雑性クラスとして使っている
                    antiSignals:
                      - NP が NumPy の略として出ている
                      - nurse practitioner など別分野の略語
                      - 非決定性を並列実行やランダム性と混同している説明
                    relatedNames:
                      - name: Cook-Levin Theorem
                        kind: method
                        relevance: SAT が NP 完全であることを示す中心定理として出てくる。
                      - name: SAT
                        kind: method
                        relevance: NP の代表的問題として頻出する。
                      - name: Verifier
                        kind: method
                        relevance: NP を証明書の多項式時間検証として説明する際に出てくる。
                      - name: Complexity Zoo
                        kind: other
                        relevance: 複雑性クラスを調べる参照先として出てくる。
                        officialUrl: https://complexityzoo.net/Complexity_Zoo

                - slug: np-hard
                  name: NP 困難
                  summary: NP のどの問題よりも少なくとも難しい問題の分類。
                  whyLearn: 最適化問題や探索問題の硬さを位置づけられる。
                  promptHint: その問題が既知の難問族以上に難しいかを示したいときに使う。
                  aliases:
                    - NP-hard
                - slug: np-complete
                  name: NP 完全
                  summary: NP に属し、かつ NP の中で最も難しい問題群。
                  whyLearn: ある問題が計算困難の中心にあるかを判断できる。
                  promptHint: 難しさの中心例として位置づけたいときに使う。
                  aliases:
                    - NP-complete
                  search:
                    keywords:
                      - NP 完全
                      - NP-complete
                      - NP completeness
                      - polynomial reduction
                      - Karp reduction
                      - SAT
                      - 3-SAT
                      - Cook-Levin theorem
                      - hardest in NP
                    commonSignals:
                      - NP に属し、NP-hard でもあると説明している
                      - 多項式時間還元で難しさを示している
                      - 3-SAT からの reduction が出てくる
                      - 効率的な厳密解が期待しにくい根拠として使っている
                    antiSignals:
                      - NP-hard と NP-complete を同一視している
                      - 最適化問題そのものを証明なしに NP-complete と呼んでいる
                      - complete が完了状態という一般語
                    relatedNames:
                      - name: 3-SAT
                        kind: method
                        relevance: NP 完全性証明の出発点としてよく使われる代表問題として出てくる。
                      - name: Clique
                        kind: method
                        relevance: グラフ問題の NP 完全性例として頻出する。
                      - name: Vertex Cover
                        kind: method
                        relevance: 還元でよく使われる NP 完全問題として出てくる。
                      - name: Hamiltonian Cycle
                        kind: method
                        relevance: 経路探索系の NP 完全問題として出てくる。
                      - name: Traveling Salesman Problem
                        kind: method
                        relevance: 決定版が NP 完全な代表的最適化関連問題として出てくる。

                - slug: p-versus-np
                  name: P 対 NP
                  summary: 検証しやすい問題がすべて効率よく解けるかを問う未解決問題。
                  whyLearn: 効率計算の限界についての最重要テーマを押さえられる。
                  promptHint: 探索と検証の差が本質かどうかを考えるときに使う。
                  aliases:
                    - P vs NP
                    - P versus NP
                - slug: interactive-proof
                  name: 対話型証明
                  summary: 証明者と検証者のやり取りで正しさを確認する枠組み。
                  whyLearn: 複雑性、暗号、ゼロ知識の接点を理解できる。
                  promptHint: 一回の静的証明ではなく対話で確信を高めたいときに使う。
                  aliases:
                    - interactive proof
                - slug: zero-knowledge-proof
                  name: ゼロ知識証明
                  summary: 正しさ以外の情報を漏らさずに主張を証明する方式。
                  whyLearn: 理論計算機科学とセキュリティ実装の重要な接点になる。
                  promptHint: 秘密を明かさずに知っていることだけ示したいときに使う。
                  aliases:
                    - ZKP
                    - zero knowledge proof
                  search:
                    keywords:
                      - ゼロ知識証明
                      - zero knowledge proof
                      - ZKP
                      - zk-SNARK
                      - zk-STARK
                      - proof system
                      - prover
                      - verifier
                      - succinct proof
                      - privacy preserving proof
                    commonSignals:
                      - 秘密を明かさずに主張の正しさを示している
                      - prover と verifier の関係を説明している
                      - completeness, soundness, zero-knowledge が一緒に出る
                      - 回路、constraint system、trusted setup が出てくる
                    antiSignals:
                      - 知識ゼロや未経験という一般表現
                      - 単なる暗号化 encryption の話
                      - 認証プロトコルだがゼロ知識性を扱っていない
                    relatedNames:
                      - name: zk-SNARK
                        kind: method
                        relevance: 短い証明サイズを特徴とする代表的なゼロ知識証明方式として出てくる。
                      - name: zk-STARK
                        kind: method
                        relevance: 透明性や耐量子性を特徴として語られるゼロ知識証明方式として出てくる。
                      - name: Groth16
                        kind: protocol
                        relevance: 実装例が多い zk-SNARK の具体的プロトコルとして出てくる。
                      - name: PLONK
                        kind: protocol
                        relevance: 汎用的な zk-SNARK 系プロトコルとして出てくる。
                      - name: Circom
                        kind: language
                        relevance: ゼロ知識回路を記述する DSL として出てくる。
                        officialUrl: https://docs.circom.io/
                      - name: Halo2
                        kind: framework
                        relevance: PLONK 系の証明システム実装として出てくる。
                        officialUrl: https://zcash.github.io/halo2/
                      - name: arkworks
                        kind: library
                        relevance: Rust でゼロ知識証明や楕円曲線演算を実装するライブラリ群として出てくる。
                        officialUrl: https://arkworks.rs/

                - slug: bpp
                  name: BPP
                  summary: 乱択を使って高い確率で正解できる多項式時間問題クラス。
                  whyLearn: ランダム化が計算能力に与える影響を考えられる。
                  promptHint: 確率的に速く解けることを理論的に位置づけたいときに使う。
                  aliases:
                    - BPP

edges:
  - from: set
    to: relation
    relationType: prerequisite
    reason: 関係は集合の直積上の部分集合として定義するのが基本だから。
  - from: function
    to: linear-regression
