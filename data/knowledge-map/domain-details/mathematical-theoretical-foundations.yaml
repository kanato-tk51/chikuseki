          concepts:
            - slug: grammars-and-context-free-languages
              name: 文法と文脈自由言語
              summary: 規則から文字列や木構造を生成する方法を扱う。
              whyLearn: プログラミング言語やデータ形式の構文理解に直結する。
              terms:
                - slug: grammar
                  name: 文法
                  summary: 記号列を生成する規則の集合。
                  whyLearn: 構文仕様を宣言的に表せる。
                  promptHint: どの文字列が構文的に正しいかを規則で表したいときに使う。
                  aliases:
                    - grammar
                - slug: context-free-grammar
                  name: 文脈自由文法
                  summary: 単一非終端記号を置き換える生成規則からなる文法。
                  whyLearn: 多くのプログラミング言語構文の基本モデルだから。
                  promptHint: ネストした構文を規則的に表したいときに使う。
                  aliases:
                    - CFG
                    - context free grammar
                - slug: parse-tree
                  name: 構文木
                  summary: 生成規則の適用過程を木として表したもの。
                  whyLearn: 構文解析と意味解析の橋渡しになる。
                  promptHint: 文字列がどの規則からどう生成されたかを可視化したいときに使う。
                  aliases:
                    - parse tree
                    - syntax tree
                - slug: pushdown-automaton
                  name: プッシュダウン・オートマトン
                  summary: スタックをもつ計算モデルで文脈自由言語を認識する。
                  whyLearn: 有限状態だけでは表せないネスト構造を理解できる。
                  promptHint: 括弧対応のような入れ子を機械で扱いたいときに使う。
                  aliases:
                    - PDA
                    - pushdown automaton

        - slug: computability-and-undecidability
          name: 計算可能性と非決定可能性
          summary: 何が原理的に判定できるか、できないかを扱う。
          concepts:
            - slug: turing-models-and-undecidability
              name: チューリング機械と決定不能性
              summary: 汎用計算モデルとその限界を扱う。
              whyLearn: 自動化の限界線を理解し、無理な要求を見抜ける。
              terms:
                - slug: turing-machine
                  name: チューリング機械
                  summary: 汎用的な計算可能性を定義する標準モデル。
                  whyLearn: 計算可能性議論の基準点になる。
                  promptHint: 計算そのものを最小限の機械で定義したいときに使う。
                  aliases:
                    - Turing machine
                - slug: decidable-language
                  name: 決定可能言語
                  summary: 受理か否かを必ず停止して判定できる言語。
                  whyLearn: 判定問題が自動化可能かを整理できる。
                  promptHint: yes か no を必ず返せる問題かを考えるときに使う。
                  aliases:
                    - decidable language
                - slug: halting-problem
                  name: 停止性問題
                  summary: 任意プログラムが停止するかを一般には判定できない問題。
                  whyLearn: 非決定可能性の代表例として限界理解に必須。
                  promptHint: 実行前に停止性を完全判定できるかを問うときに使う。
                  aliases:
                    - halting problem
                - slug: mapping-reduction
                  name: 写像還元
                  summary: ある問題を別の問題へ計算可能に移し替える手法。
                  whyLearn: 難しさや非決定可能性を問題間で運べる。
                  promptHint: 既知に難しい問題へ変換して難しさを示したいときに使う。
                  aliases:
                    - many one reduction
                    - mapping reduction
            - slug: reductions-and-impossibility
              name: 還元と不可能性証明
              summary: 難しさや不可能性を伝播させる議論を扱う。
              whyLearn: 限界の所在を別問題へ移して説明できる。
              terms:
                - slug: rice-theorem
                  name: ライスの定理
                  summary: プログラムの非自明な意味的性質は一般には決定不能という定理。
                  whyLearn: 静的解析の限界を理解するうえで重要。
                  promptHint: プログラム意味に関する万能判定器が作れない理由を考えるときに使う。
                  aliases:
                    - Rice theorem
                - slug: diagonalization
                  name: 対角線論法
                  summary: 自己参照的なずれを作って限界や非包含を示す手法。
                  whyLearn: 計算理論の多くの不可能性証明の芯になる。
                  promptHint: 一覧化された候補から必ず外れる対象を作りたいときに使う。
                  aliases:
                    - diagonalization
                - slug: self-reference
                  name: 自己参照
                  summary: 対象が自分自身を参照する構造。
                  whyLearn: 停止性や不完全性などの難しさの源を理解できる。
                  promptHint: システムが自分自身について語ると何が起きるかを見るときに使う。
                  aliases:
                    - self reference
                - slug: recognizable-language
                  name: 半決定可能言語
                  summary: 属する場合には停止して受理できるが、属さない場合に停止保証がない言語。
                  whyLearn: 決定可能性との違いを通じて停止保証の難しさを学べる。
                  promptHint: yes 側だけはいつか分かる問題を区別したいときに使う。
                  aliases:
                    - recognizable language
                    - recursively enumerable language

        - slug: complexity-and-limits
          name: 複雑性と計算の限界
          summary: 解けるだけでなく、どれくらい難しいかを理論的に位置づける。
          concepts:
            - slug: classical-complexity-and-randomness
              name: 古典複雑性と拡張的視点
              summary: 主要な複雑性クラスと検証可能性を扱う。
              whyLearn: 問題の難しさを直感ではなく理論語彙で語れるようになる。
              terms:
                - slug: p
                  name: P
                  summary: 多項式時間で解ける決定問題のクラス。
                  whyLearn: 効率的に解ける問題の代表的な基準になる。
                  promptHint: 現実的に計算可能と言える目安を考えるときに使う。
                  aliases:
                    - P
                - slug: np
                  name: NP
                  summary: 解の正しさを多項式時間で検証できる決定問題のクラス。
                  whyLearn: 探索の難しさと検証のしやすさの差を捉えられる。
                  promptHint: 解くのは難しくても答え合わせは速い問題を考えるときに使う。
                  aliases:
                    - NP
                - slug: np-hard
                  name: NP 困難
                  summary: NP のどの問題よりも少なくとも難しい問題の分類。
                  whyLearn: 最適化問題や探索問題の硬さを位置づけられる。
                  promptHint: その問題が既知の難問族以上に難しいかを示したいときに使う。
                  aliases:
                    - NP-hard
                - slug: np-complete
                  name: NP 完全
                  summary: NP に属し、かつ NP の中で最も難しい問題群。
                  whyLearn: ある問題が計算困難の中心にあるかを判断できる。
                  promptHint: 難しさの中心例として位置づけたいときに使う。
                  aliases:
                    - NP-complete
                - slug: p-versus-np
                  name: P 対 NP
                  summary: 検証しやすい問題がすべて効率よく解けるかを問う未解決問題。
                  whyLearn: 効率計算の限界についての最重要テーマを押さえられる。
                  promptHint: 探索と検証の差が本質かどうかを考えるときに使う。
                  aliases:
                    - P vs NP
                    - P versus NP
                - slug: interactive-proof
                  name: 対話型証明
                  summary: 証明者と検証者のやり取りで正しさを確認する枠組み。
                  whyLearn: 複雑性、暗号、ゼロ知識の接点を理解できる。
                  promptHint: 一回の静的証明ではなく対話で確信を高めたいときに使う。
                  aliases:
                    - interactive proof
                - slug: zero-knowledge-proof
                  name: ゼロ知識証明
                  summary: 正しさ以外の情報を漏らさずに主張を証明する方式。
                  whyLearn: 理論計算機科学とセキュリティ実装の重要な接点になる。
                  promptHint: 秘密を明かさずに知っていることだけ示したいときに使う。
                  aliases:
                    - ZKP
                    - zero knowledge proof
                - slug: bpp
                  name: BPP
                  summary: 乱択を使って高い確率で正解できる多項式時間問題クラス。
                  whyLearn: ランダム化が計算能力に与える影響を考えられる。
                  promptHint: 確率的に速く解けることを理論的に位置づけたいときに使う。
                  aliases:
                    - BPP

edges:
  - from: set
    to: relation
    relationType: prerequisite
    reason: 関係は集合の直積上の部分集合として定義するのが基本だから。
  - from: function
    to: linear-regression
    relationType: prerequisite
    reason: 回帰は入力から出力への写像として理解すると整理しやすいから。
  - from: mathematical-induction
    to: structural-induction
    relationType: related
    reason: どちらも再帰的対象の正しさを示す枠組みであり、対象の種類だけが主に違うから。
  - from: structural-induction
    to: parse-tree
    relationType: used_in
    reason: 構文木に対する性質証明は構造的帰納法で書くのが自然だから。
  - from: loop-invariant
    to: software-engineering-quality
    relationType: used_in
    reason: ループ正当性のレビュー観点や形式検証の入口として使えるから。
  - from: modular-arithmetic
    to: security-privacy-governance
    relationType: used_in
    reason: 公開鍵暗号やハッシュまわりの基礎数理として再登場するから。
  - from: conditional-probability
    to: bayes-theorem
    relationType: prerequisite
    reason: ベイズの定理は条件付き確率の定義から導かれるから。
  - from: expectation
    to: law-of-large-numbers
    relationType: prerequisite
    reason: 大数の法則は標本平均が期待値へ近づくという主張だから。
  - from: central-limit-theorem
    to: confidence-interval
    relationType: used_in
    reason: 信頼区間の近似的な根拠として使われることが多いから。
  - from: maximum-likelihood-estimation
    to: linear-regression
    relationType: related
    reason: 線形回帰は特定の仮定の下で最尤推定として解釈できるから。
  - from: overfitting
    to: cross-validation
    relationType: related
    reason: 過学習の検出と抑制のために交差検証がよく使われるから。
  - from: entropy
    to: kl-divergence
    relationType: related
    reason: どちらも情報量の尺度であり、損失関数や分布比較で一緒に現れるから。
  - from: entropy
    to: artificial-intelligence-intelligent-systems
    relationType: used_in
    reason: 木分割、表現学習、生成モデル、探索などで情報量の概念が使われるから。
  - from: matrix
    to: singular-value-decomposition
    relationType: prerequisite
    reason: SVD は行列の構造分解として定義されるから。
  - from: projection
    to: least-squares
    relationType: prerequisite
    reason: 最小二乗解は部分空間への射影として理解すると本質が見えるから。
  - from: eigenvector
    to: principal-component-analysis
    relationType: prerequisite
    reason: PCA は共分散行列の主要固有ベクトルを使って方向を選ぶから。
  - from: gradient
    to: gradient-descent
    relationType: prerequisite
    reason: 勾配降下法は勾配の逆方向へ更新する手法だから。
  - from: convex-function
    to: gradient-descent
    relationType: related
    reason: 凸性があると勾配法の振る舞いを理論的に理解しやすいから。
  - from: regular-language
    to: regular-expression
    relationType: compare_with
    reason: 正規言語は言語クラスであり、正規表現はその記述手段だから。
  - from: deterministic-finite-automaton
    to: nondeterministic-finite-automaton
    relationType: compare_with
    reason: 表現は異なるが認識できる言語クラスは同じで、計算モデルの見方を比較できるから。
  - from: regular-expression
    to: programming-languages-software-construction
    relationType: used_in
    reason: 字句解析や文字列処理 API の理解と接続しやすいから。
  - from: context-free-grammar
    to: programming-languages-software-construction
    relationType: used_in
    reason: 言語構文やパーサ設計の理論的基礎になるから。
  - from: turing-machine
    to: halting-problem
    relationType: prerequisite
    reason: 停止性問題はチューリング機械上で定式化される代表例だから。
  - from: mapping-reduction
    to: np-complete
    relationType: prerequisite
    reason: NP 完全性証明は多くの場合多項式時間還元で行うから。
  - from: np-hard
    to: np-complete
    relationType: compare_with
    reason: NP 完全は NP 困難に属しつつ NP にも属する、という関係にあるから。
  - from: satisfiability
    to: sat
    relationType: prerequisite
    reason: SAT は充足可能性という性質を判定対象として定式化した問題だから。
  - from: first-order-logic
    to: smt
    relationType: related
    reason: SMT は論理式に理論を加えた自動推論として、一階論理的発想と強く接続するから。
  - from: interactive-proof
    to: zero-knowledge-proof
    relationType: prerequisite
    reason: ゼロ知識証明は対話型証明の一種として理解するのが自然だから。
  - from: zero-knowledge-proof
    to: security-privacy-governance
    relationType: used_in
    reason: 秘密を漏らさない検証という要件に直接つながるから。
