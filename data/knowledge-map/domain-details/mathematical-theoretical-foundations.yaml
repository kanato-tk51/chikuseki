                  whyLearn: 状態の本質数を意識できるようになる。
                  promptHint: 余分な状態を削って本質構造だけにしたいときに使う。
                  aliases:
                    - DFA minimization

        - slug: context-free-languages-and-parsing
          name: 文脈自由言語と構文
