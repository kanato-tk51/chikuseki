                  aliases:
                    - "ASVS"
                - slug: static-application-security-testing
                  name: "SAST"
                  summary: "ソースコードやバイトコードを解析して問題を検出する手法。"
                  whyLearn: "早い段階での自動検出に向く。"
                  promptHint: "どのルールを CI で機械的に止めるべきかで考える。"
                  aliases:
                    - "SAST"
                    - "Static Application Security Testing"
                - slug: penetration-test
                  name: "ペネトレーションテスト"
                  summary: "攻撃者視点で実運用に近い侵入・悪用を検証する活動。"
                  whyLearn: "設計や設定の組合せ不備を見つけやすい。"
                  promptHint: "現実的な攻撃経路をどこまで再現したいかで計画する。"
                  aliases:
                    - "Pentest"
                    - "Penetration Test"

    - slug: supply-chain-vulnerability-incident-management
      name: "サプライチェーン、脆弱性、インシデント管理"
      summary: "供給網の信頼、脆弱性の優先順位付け、対応計画と学習を扱う。"
      whyLearn: "公開後に起きる現実の security 業務を一連の流れで理解するため。"
      topicClusters:
        - slug: software-supply-chain-integrity
          name: "ソフトウェアサプライチェーン整合性"
          summary: "何を含み、誰が作り、どこで改ざんされうるかを扱う。"
          concepts:
            - slug: transparency-and-attestation
              name: "透明性と証跡"
              summary: "構成要素と由来を可視化し、利用者が検証できる状態を作る。"
              whyLearn: "依存の不透明さと改ざん不安に対処しやすい。"
              terms:
                - slug: software-bill-of-materials
                  name: "SBOM"
                  summary: "ソフトウェアを構成する部品一覧。"
                  whyLearn: "脆弱性影響調査と供給網可視化の基盤になる。"
                  promptHint: "何が入っているかを説明できるかで考える。"
                  aliases:
                    - "SBOM"
                    - "Software Bill of Materials"
                - slug: provenance-attestation
                  name: "来歴アテステーション"
                  summary: "どのソースがどのビルドで成果物になったかを示す証跡。"
                  whyLearn: "生成物の真正性と追跡可能性を高められる。"
                  promptHint: "誰が、何から、どの環境で作ったかを証明できるかを見る。"
                  aliases:
                    - "Provenance"
                    - "Attestation"
                - slug: sigstore
                  name: "Sigstore"
                  summary: "署名と検証を簡素化するソフトウェア供給網保護の OSS 群。"
                  whyLearn: "アーティファクト署名を導入しやすい。"
                  promptHint: "署名、証明書、透明性ログをどう連携させるかで考える。"
                  aliases:
                    - "Sigstore"
            - slug: build-pipeline-hardening
              name: "ビルドパイプライン強化"
              summary: "依存解決、ビルド再現性、改ざん耐性を高める。"
              whyLearn: "公開物の信頼性を CI/CD レベルで扱える。"
              terms:
                - slug: slsa
                  name: "SLSA"
                  summary: "サプライチェーン防御を段階的に高めるための枠組み。"
                  whyLearn: "成熟度の目標設定に使える。"
                  promptHint: "署名、来歴、ビルド隔離をどのレベルまで満たすかで考える。"
                  aliases:
                    - "SLSA"
                - slug: reproducible-builds
                  name: "再現可能ビルド"
                  summary: "同じ入力から同じ成果物を得られるビルド特性。"
                  whyLearn: "不正混入検知と検証可能性を高められる。"
                  promptHint: "環境差や時刻依存で成果物が変わらないかを見る。"
                  aliases:
                    - "Reproducible Builds"
                - slug: dependency-pinning
                  name: "依存固定化"
                  summary: "依存バージョンやソースを明示的に固定する運用。"
                  whyLearn: "意図しない更新や供給網揺らぎを抑えられる。"
                  promptHint: "いつ誰の判断で上がる依存なのかを明確にする。"
                  aliases:
                    - "Dependency Pinning"
        - slug: vulnerability-management-and-disclosure
          name: "脆弱性管理と開示"
          summary: "脆弱性の把握、分類、優先順位付け、開示対応を扱う。"
          concepts:
            - slug: vulnerability-taxonomy
              name: "脆弱性分類と言語"
              summary: "脆弱性情報を整理し比較するための共通語彙。"
              whyLearn: "脆弱性対応の会話が曖昧になりにくい。"
              terms:
                - slug: common-vulnerabilities-and-exposures
                  name: "CVE"
                  summary: "公開脆弱性に付与される共通識別子。"
                  whyLearn: "脆弱性情報の参照と共有の基礎になる。"
                  promptHint: "同じ問題を別名で追いかけないための識別子として使う。"
                  aliases:
                    - "CVE"
                    - "Common Vulnerabilities and Exposures"
                - slug: common-weakness-enumeration
                  name: "CWE"
                  summary: "脆弱性の背景にある弱点種別を表す分類。"
                  whyLearn: "個別 CVE を根本原因レベルで学習できる。"
                  promptHint: "この問題はどの弱点クラスに属するかで見る。"
                  aliases:
                    - "CWE"
                    - "Common Weakness Enumeration"
                - slug: common-vulnerability-scoring-system
                  name: "CVSS"
                  summary: "脆弱性深刻度を共通尺度で表す方法。"
                  whyLearn: "優先順位付けの会話を揃えやすい。"
                  promptHint: "ベース値だけでなく脅威・環境要因も考慮する。"
                  aliases:
                    - "CVSS"
                    - "Common Vulnerability Scoring System"
            - slug: prioritization-and-disclosure
              name: "優先順位付けと開示運用"
              summary: "現実の悪用状況と開示窓口を踏まえて対応を進める。"
              whyLearn: "全部同じ優先度で扱う非現実的な運用を避けられる。"
              terms:
                - slug: national-vulnerability-database
                  name: "NVD"
                  summary: "脆弱性管理データを提供する米国政府リポジトリ。"
                  whyLearn: "CVE の追加属性や検索基盤としてよく使われる。"
                  promptHint: "製品影響や深刻度検索にどう使うかで考える。"
                  aliases:
                    - "NVD"
                    - "National Vulnerability Database"
                - slug: known-exploited-vulnerabilities-catalog
                  name: "KEV カタログ"
                  summary: "実際に悪用が確認された脆弱性一覧。"
                  whyLearn: "現実の攻撃圧を優先度に反映しやすい。"
                  promptHint: "理論上の深刻度だけでなく実悪用も加味して優先する。"
                  aliases:
                    - "KEV"
                    - "KEV Catalog"
                - slug: vulnerability-disclosure-policy
                  name: "VDP"
                  summary: "外部からの脆弱性報告を受け付ける方針と窓口。"
                  whyLearn: "報告者との安全な協調を実装できる。"
                  promptHint: "どの範囲を受け付け、いつどう返答するかを決める。"
                  aliases:
                    - "VDP"
                    - "Vulnerability Disclosure Policy"
        - slug: incident-response-and-learning
          name: "インシデント対応と学習"
          summary: "準備、検知、封じ込め、復旧、振り返りを扱う。"
          concepts:
            - slug: response-lifecycle
              name: "対応ライフサイクル"
              summary: "平時準備から有事実行までの一連の流れ。"
              whyLearn: "混乱時にも役割と手順を崩しにくい。"
              terms:
                - slug: incident-response-playbook
                  name: "対応プレイブック"
                  summary: "典型シナリオごとの手順と役割をまとめた運用文書。"
                  whyLearn: "初動のばらつきを減らせる。"
                  promptHint: "誰が判断し、どこまで止め、何を記録するかを明文化する。"
                  aliases:
                    - "IR Playbook"
                    - "Incident Response Playbook"
                - slug: detection-and-analysis
                  name: "検知と分析"
                  summary: "異常を見つけ、真偽と影響を判断する工程。"
                  whyLearn: "誤検知と見逃しのバランスを理解できる。"
                  promptHint: "何が起きたか、どこまで広がったか、確度はどれくらいかで整理する。"
                  aliases:
                    - "Detection and Analysis"
                - slug: containment-eradication-recovery
                  name: "封じ込め・排除・復旧"
                  summary: "被害拡大を止め、原因を除去し、業務状態を戻す工程。"
                  whyLearn: "対応順序を誤って被害を増やすのを防ぎやすい。"
                  promptHint: "止血、根治、サービス復旧を分けて考える。"
                  aliases:
                    - "Containment"
                    - "Eradication"
                    - "Recovery"
            - slug: exercises-and-learning
              name: "演習と学習"
              summary: "有事に備える訓練と、事後学習の仕組みを扱う。"
              whyLearn: "インシデントを単発対応で終わらせず能力向上につなげられる。"
              terms:
                - slug: tabletop-exercise
                  name: "テーブルトップ演習"
                  summary: "関係者が想定シナリオを辿って判断を確認する訓練。"
                  whyLearn: "本番前に意思決定の詰まりを見つけられる。"
                  promptHint: "技術手順だけでなく広報、法務、経営判断も含めて演習する。"
                  aliases:
                    - "TTX"
                    - "Tabletop Exercise"
                - slug: forensic-readiness
                  name: "フォレンジック準備"
                  summary: "後から調査可能な証跡と保全手順を平時から整えること。"
                  whyLearn: "原因特定や再発防止の質を上げやすい。"
                  promptHint: "必要ログ、時刻同期、証跡保全、権限分離を確認する。"
                  aliases:
                    - "Forensic Readiness"
                - slug: post-incident-review
                  name: "事後レビュー"
                  summary: "発生要因、対応、学び、改善策を整理する振り返り。"
                  whyLearn: "同じ失敗を繰り返しにくくなる。"
                  promptHint: "誰の失敗かより、なぜその判断になったかを追う。"
                  aliases:
                    - "Post-Incident Review"
                    - "Postmortem"

edges:
  - from: threat-modeling
    to: stride
    relationType: used_in
    reason: "STRIDE は脅威モデリングで脅威列挙を体系化する代表的な補助法。"
  - from: attack-surface
    to: threat-modeling
    relationType: prerequisite
    reason: "露出面を把握しないと、どこをモデル化すべきか定めにくい。"
  - from: trust-boundary
    to: zero-trust-architecture
    relationType: prerequisite
    reason: "ゼロトラストは境界を消すのではなく、境界ごとの再検証を前提にする。"
  - from: least-privilege
    to: role-based-access-control
    relationType: related
    reason: "RBAC は最小権限を組織的に実装する代表的手段の一つ。"
  - from: role-based-access-control
    to: attribute-based-access-control
    relationType: compare_with
    reason: "RBAC は役割中心、ABAC は属性中心で、表現力と運用難度が異なる。"
  - from: oauth-2-0
    to: openid-connect
    relationType: prerequisite
    reason: "OIDC は OAuth 2.0 の上に認証レイヤーを追加する構成。"
  - from: oauth-2-0
    to: pkce
    relationType: used_in
    reason: "PKCE は OAuth 2.0 の認可コードフローを強化するために用いられる。"
  - from: webauthn
    to: passkey
    relationType: used_in
    reason: "passkey の Web 実装は WebAuthn を基盤として構成される。"
  - from: argon2id
    to: multi-factor-authentication
    relationType: compare_with
    reason: "Argon2id は保存済み秘密の保護、MFA は認証時の強化で役割が異なる。"
  - from: advanced-encryption-standard
    to: authenticated-encryption-with-associated-data
    relationType: used_in
    reason: "AEAD は AES-GCM などの形で実装されることが多い。"
  - from: public-key-infrastructure
    to: transport-layer-security
    relationType: used_in
    reason: "TLS の証明書検証や相互認証は PKI に依存する。"
  - from: cryptographic-agility
    to: post-quantum-cryptography
    relationType: prerequisite
    reason: "PQC への移行にはアルゴリズム差し替え耐性が不可欠。"
  - from: personally-identifiable-information
    to: data-classification
    relationType: used_in
    reason: "PII 判定は分類と保護要件設定の基礎情報になる。"
  - from: records-of-processing-activities
    to: data-subject-access-request
    relationType: used_in
    reason: "どこに何の個人データがあるかの把握は DSAR 対応の前提。"
  - from: data-minimization
    to: privacy-by-design
    relationType: used_in
    reason: "Privacy by Design を具体化する重要原則の一つが最小化。"
  - from: pseudonymization
    to: data-protection-impact-assessment
    relationType: related
    reason: "DPIA では仮名化を代表的な緩和策として検討しやすい。"
  - from: differential-privacy
    to: anonymization
    relationType: compare_with
    reason: "どちらも個人保護に関わるが、差分プライバシーは数学的保証を重視する。"
  - from: nist-cybersecurity-framework
    to: nist-sp-800-53
    relationType: compare_with
    reason: "CSF は高位アウトカム、SP 800-53 は詳細 control catalog という違いがある。"
  - from: secure-software-development-framework
    to: samm
    relationType: compare_with
    reason: "SSDF は高位実践、SAMM は成熟度改善に強みがある。"
  - from: application-security-verification-standard
    to: penetration-test
    relationType: related
    reason: "ASVS は何を検証すべきかの基準となり、ペネトレーションテストの観点整理にも使える。"
  - from: software-bill-of-materials
    to: known-exploited-vulnerabilities-catalog
    relationType: used_in
    reason: "SBOM があると、KEV に載った脆弱コンポーネントの影響確認を進めやすい。"
  - from: software-bill-of-materials
    to: slsa
    relationType: related
    reason: "SBOM は構成透明性、SLSA は生成過程の保証に強く、補完関係にある。"
  - from: sigstore
    to: provenance-attestation
    relationType: used_in
    reason: "Sigstore は署名や透明性ログを通じて来歴証明を支える。"
  - from: common-vulnerabilities-and-exposures
    to: common-vulnerability-scoring-system
    relationType: related
    reason: "CVE は識別子、CVSS は深刻度表現で、脆弱性対応で併用される。"
  - from: common-weakness-enumeration
    to: common-vulnerabilities-and-exposures
    relationType: related
    reason: "CWE は根本弱点分類、CVE は公開脆弱性識別子で粒度が異なる。"
  - from: national-vulnerability-database
    to: known-exploited-vulnerabilities-catalog
    relationType: compare_with
    reason: "NVD は広い公開脆弱性データ、KEV は実悪用確認済み脆弱性に絞る。"
  - from: vulnerability-disclosure-policy
    to: post-incident-review
    relationType: related
    reason: "外部報告の学びは、事後レビューや改善ループに取り込むと効きやすい。"
  - from: incident-response-playbook
    to: tabletop-exercise
    relationType: used_in
    reason: "テーブルトップ演習はプレイブックの妥当性確認に使える。"
  - from: forensic-readiness
    to: post-incident-review
    relationType: used_in
    reason: "十分な証跡があるほど、事後レビューの原因分析精度が上がる。"
