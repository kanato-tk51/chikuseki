edges:
  - from: threat-modeling
    to: stride
    relationType: used_in
    reason: "STRIDE は脅威モデリングで脅威列挙を体系化する代表的な補助法。"
  - from: attack-surface
    to: threat-modeling
    relationType: prerequisite
    reason: "露出面を把握しないと、どこをモデル化すべきか定めにくい。"
  - from: trust-boundary
    to: zero-trust-architecture
    relationType: prerequisite
    reason: "ゼロトラストは境界を消すのではなく、境界ごとの再検証を前提にする。"
  - from: least-privilege
    to: role-based-access-control
    relationType: related
    reason: "RBAC は最小権限を組織的に実装する代表的手段の一つ。"
  - from: role-based-access-control
    to: attribute-based-access-control
    relationType: compare_with
    reason: "RBAC は役割中心、ABAC は属性中心で、表現力と運用難度が異なる。"
  - from: oauth-2-0
    to: openid-connect
    relationType: prerequisite
    reason: "OIDC は OAuth 2.0 の上に認証レイヤーを追加する構成。"
  - from: oauth-2-0
    to: pkce
    relationType: used_in
    reason: "PKCE は OAuth 2.0 の認可コードフローを強化するために用いられる。"
  - from: webauthn
    to: passkey
    relationType: used_in
    reason: "passkey の Web 実装は WebAuthn を基盤として構成される。"
  - from: argon2id
    to: multi-factor-authentication
    relationType: compare_with
    reason: "Argon2id は保存済み秘密の保護、MFA は認証時の強化で役割が異なる。"
  - from: advanced-encryption-standard
    to: authenticated-encryption-with-associated-data
    relationType: used_in
    reason: "AEAD は AES-GCM などの形で実装されることが多い。"
  - from: public-key-infrastructure
    to: transport-layer-security
    relationType: used_in
