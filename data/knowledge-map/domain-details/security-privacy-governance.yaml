domain:
  slug: security-privacy-governance
  name: "セキュリティ、プライバシー、ガバナンス"
  summary: "システム、人、データ、信頼を守るための技術的・組織的実践を扱う領域。"
  boundaryNotes: "セキュア開発、プライバシーエンジニアリング、リスク統治を扱う。可用性やサービス健全性は Reliability、法務や事業包装は Business に接続する。"
  knowledgeAreas:
    - slug: secure-design-threat-management
      name: "セキュア設計と脅威分析"
      summary: "境界、資産、攻撃面、脅威、設計原則を前倒しで整理する。"
      whyLearn: "実装前に危険な仮定を発見し、設計レビューの精度を上げるため。"
      topicClusters:
        - slug: threat-modeling-and-risk-discovery
          name: "脅威モデリングとリスク発見"
          summary: "システムに対する脅威と悪用経路を構造化して洗い出す。"
          concepts:
            - slug: security-threat-modeling
              name: "セキュリティ脅威モデリング"
              summary: "システム図、資産、境界、攻撃者視点から脅威を列挙する。"
              whyLearn: "仕様レビューの段階で重大な欠陥を見つけやすくなる。"
              terms:
                - slug: threat-modeling
                  name: "脅威モデリング"
                  summary: "守る対象、境界、脅威、対策を系統立てて表現する実践。"
                  whyLearn: "セキュリティを実装後チェックではなく設計活動にできる。"
                  promptHint: "何を守り、誰がどう壊し、どこで防ぐかで考える。"
                  aliases:
                    - "Threat Modeling"
                - slug: stride
                  name: "STRIDE"
                  summary: "脅威を六つの観点で整理する代表的な分類法。"
                  whyLearn: "脅威列挙の抜け漏れを減らしやすい。"
                  promptHint: "なりすまし、改ざん、否認、情報漏えい、DoS、権限昇格で点検する。"
                  aliases:
                    - "ストライド"
                - slug: attack-tree
                  name: "攻撃木"
                  summary: "攻撃目標から手段を木構造で分解して表す方法。"
                  whyLearn: "悪用経路や対策優先度を説明しやすくなる。"
                  promptHint: "攻撃者の最終目標から必要条件を分解して考える。"
                  aliases:
                    - "Attack Tree"
            - slug: attack-knowledge-and-exposure
              name: "攻撃知識と攻撃面の把握"
              summary: "攻撃者の行動パターンと露出面を具体的に把握する。"
              whyLearn: "抽象的な不安ではなく観測可能な攻撃パターンで議論できる。"
              terms:
                - slug: attack-surface
                  name: "攻撃面"
                  summary: "攻撃者が触れられる入口、資産、操作面の総称。"
                  whyLearn: "露出の縮小を設計の第一歩として扱える。"
                  promptHint: "外部公開面、管理面、依存先、内部横移動面を列挙する。"
                  aliases:
                    - "Attack Surface"
                - slug: mitre-attck
                  name: "MITRE ATT&CK"
                  summary: "現実の攻撃者行動を戦術・技術で整理した知識ベース。"
                  whyLearn: "検知、演習、優先順位付けに共通言語を持てる。"
                  promptHint: "どの戦術と技術に対して観測・防御・回復が弱いかで問う。"
                  aliases:
                    - "ATT&CK"
                - slug: tactics-techniques-procedures
                  name: "TTP"
                  summary: "攻撃者の戦術、技術、手順をまとめて捉える表現。"
                  whyLearn: "インシデントや脅威情報を行動単位で理解しやすい。"
                  promptHint: "何を狙ったか、どう実行したか、どの手口が繰り返されるかで整理する。"
                  aliases:
                    - "TTP"
        - slug: secure-architecture-principles
          name: "セキュアアーキテクチャ原則"
          summary: "境界設計、信頼仮定、分離、既定値に関する原則を扱う。"
          concepts:
            - slug: secure-design-principles
              name: "セキュア設計原則"
              summary: "安全な既定値と権限最小化を軸にアーキテクチャを設計する。"
              whyLearn: "個別パッチではなく壊れにくい構造に近づける。"
              terms:
                - slug: least-privilege
                  name: "最小権限"
                  summary: "必要最小限の権限だけを付与する原則。"
                  whyLearn: "侵害時の被害拡大を抑えやすい。"
                  promptHint: "この主体に本当に必要な権限だけかを確認する。"
                  aliases:
                    - "Least Privilege"
                - slug: defense-in-depth
                  name: "多層防御"
                  summary: "複数の防御層を重ねて単一点突破を防ぐ考え方。"
                  whyLearn: "一つの制御が破られても全体崩壊しにくくなる。"
                  promptHint: "予防、検知、制限、回復を別レイヤーで持てているかを見る。"
                  aliases:
                    - "Defense in Depth"
                - slug: secure-by-default
                  name: "セキュア・バイ・デフォルト"
                  summary: "初期設定のままで危険になりにくい状態を目指す原則。"
                  whyLearn: "利用者や運用者の設定ミス依存を減らせる。"
                  promptHint: "何もしないと危険になる設定が残っていないかを問う。"
                  aliases:
                    - "Secure by Default"
            - slug: boundary-and-trust-design
              name: "境界設計と信頼設計"
              summary: "信頼境界と通信境界を明示し、横移動や暗黙信頼を減らす。"
              whyLearn: "システム分割とアクセス制御の設計根拠を説明できる。"
              terms:
                - slug: trust-boundary
                  name: "信頼境界"
                  summary: "信頼できる前提が切り替わる境目。"
                  whyLearn: "認証、検証、監査をどこで必須にするか決めやすい。"
                  promptHint: "この境界をまたぐときに何を再確認すべきかで考える。"
                  aliases:
                    - "Trust Boundary"
                - slug: segmentation
                  name: "セグメンテーション"
                  summary: "ネットワークやサービスの分離で影響範囲を限定する設計。"
                  whyLearn: "横移動や過剰な到達性を抑制できる。"
                  promptHint: "到達できなくてよい経路が開いていないかを見る。"
                  aliases:
                    - "Network Segmentation"
                - slug: zero-trust-architecture
                  name: "ゼロトラストアーキテクチャ"
                  summary: "場所やネットワーク内外に依存せず、継続的に信頼を検証する考え方。"
                  whyLearn: "社内だから安全という前提を捨てた設計ができる。"
                  promptHint: "主体、端末、状況、資産ごとに信頼を動的に判断する。"
                  aliases:
                    - "ZTA"
                    - "Zero Trust"

    - slug: application-api-client-security
      name: "アプリケーション、API、クライアントの保護"
      summary: "Web、API、モバイルの実装境界で起きる代表的な失敗と防御を扱う。"
      whyLearn: "実装レビューと仕様レビューの両方で典型的な事故を減らすため。"
      topicClusters:
        - slug: server-side-and-browser-defenses
          name: "サーバー側とブラウザ側の防御"
          summary: "入力、出力、状態管理、ブラウザ制御の基本防御を扱う。"
          concepts:
            - slug: input-and-output-safety
              name: "入力と出力の安全化"
              summary: "不正入力や文脈不一致の出力から生じる脆弱性を防ぐ。"
              whyLearn: "注入系や表示系の脆弱性を基本動作として防ぎやすい。"
              terms:
                - slug: input-validation
                  name: "入力検証"
                  summary: "型、長さ、形式、範囲などを境界で検証する実践。"
                  whyLearn: "不正データの早期遮断に役立つ。"
                  promptHint: "許可すべき入力を定義し、境界で検証する。"
                  aliases:
                    - "Input Validation"
                - slug: output-encoding
                  name: "出力エンコーディング"
                  summary: "出力先の文脈に合わせて危険文字を安全化する方法。"
                  whyLearn: "XSS などの表示文脈依存の事故を防ぎやすい。"
                  promptHint: "HTML、属性、URL、JS など文脈ごとに分けて考える。"
                  aliases:
                    - "Output Encoding"
                - slug: parameterized-query
                  name: "パラメータ化クエリ"
                  summary: "値と命令を分離して安全に問い合わせを行う方法。"
                  whyLearn: "SQL インジェクション系の基本防御になる。"
                  promptHint: "文字列連結ではなくバインド変数で扱う前提で考える。"
                  aliases:
                    - "Prepared Statement"
                    - "Parameterized Query"
            - slug: request-and-browser-controls
              name: "リクエストとブラウザ制御"
              summary: "ブラウザの自動送信やスクリプト実行に起因するリスクを抑える。"
              whyLearn: "セッション依存アプリの基本防御を理解できる。"
              terms:
                - slug: cross-site-request-forgery
                  name: "CSRF"
                  summary: "利用者のブラウザを悪用して意図しない操作を実行させる攻撃。"
                  whyLearn: "状態変更系の操作を安全に設計する基礎になる。"
                  promptHint: "誰の意思で送信されたかをどう確認するかで考える。"
                  aliases:
                    - "CSRF"
                    - "Cross-Site Request Forgery"
                - slug: content-security-policy
                  name: "CSP"
                  summary: "読み込み元や実行元を制限してブラウザ実行を絞る仕組み。"
                  whyLearn: "XSS の被害縮小と外部資源制御に役立つ。"
                  promptHint: "どのスクリプトやリソースを許可するかを方針化する。"
                  aliases:
                    - "CSP"
                    - "Content Security Policy"
                - slug: same-site-cookie
                  name: "SameSite Cookie"
                  summary: "Cookie の送信条件をクロスサイト文脈で制御する属性。"
                  whyLearn: "CSRF とセッション保護の土台になる。"
                  promptHint: "この Cookie は同一サイト外から送られてよいかで考える。"
                  aliases:
                    - "SameSite"
        - slug: api-and-client-hardening
          name: "API とクライアントの堅牢化"
          summary: "API 認可の欠陥とクライアント側の保護を扱う。"
          concepts:
            - slug: api-authorization-and-exposure
              name: "API 認可と公開面の保護"
              summary: "ID ベース参照や関数権限、公開 API の棚卸しを重視する。"
              whyLearn: "API が増えるプロダクトで特有の事故を減らせる。"
              terms:
                - slug: broken-object-level-authorization
                  name: "BOLA"
                  summary: "オブジェクト単位の認可不足で他人データに到達できる問題。"
                  whyLearn: "API 事故で非常に多い欠陥を具体的に見抜ける。"
                  promptHint: "この ID を変えたら別人の資産に触れないかを問う。"
                  aliases:
                    - "BOLA"
                    - "Broken Object Level Authorization"
                - slug: broken-function-level-authorization
                  name: "BFLA"
                  summary: "機能単位の認可不足で本来できない操作が実行できる問題。"
                  whyLearn: "管理 API や内部操作の露出を見つけやすい。"
                  promptHint: "権限の弱い主体でも管理操作を呼べないかを見る。"
                  aliases:
                    - "BFLA"
                    - "Broken Function Level Authorization"
                - slug: api-inventory
                  name: "API インベントリ"
                  summary: "存在する API、バージョン、利用主体、公開状態を把握すること。"
                  whyLearn: "守る対象が分からない状態を避けられる。"
                  promptHint: "未使用、旧版、外部公開、内部限定を整理する。"
                  aliases:
                    - "API Inventory"
            - slug: client-and-mobile-protection
              name: "クライアントとモバイル保護"
              summary: "端末側保存、配布物の真正性、実行環境の健全性を扱う。"
              whyLearn: "Web だけでは見落とす端末側のリスクを扱える。"
              terms:
                - slug: masvs
                  name: "OWASP MASVS"
                  summary: "モバイルアプリのセキュリティ要件と検証の標準。"
                  whyLearn: "モバイル固有の要件整理とレビューの基準になる。"
                  promptHint: "モバイルで守るべき保存、通信、認証、逆解析耐性を点検する。"
                  aliases:
                    - "MASVS"
                - slug: secure-local-storage
                  name: "安全なローカル保存"
                  summary: "端末内に保存する資格情報やデータを保護する設計。"
                  whyLearn: "トークンや個人データの端末漏えいを防ぎやすい。"
                  promptHint: "保存しなくてよいものを除き、保存するなら OS 保護機構を使う。"
                  aliases:
                    - "Secure Local Storage"
                - slug: app-attestation
                  name: "アプリ・アテステーション"
                  summary: "正規アプリや正規端末に近い実行環境かを検証する仕組み。"
                  whyLearn: "改変クライアントや不正自動化への対抗策を設計できる。"
                  promptHint: "誰が呼んでいるかだけでなく、どの実行環境からかも確認する。"
                  aliases:
                    - "App Attestation"

    - slug: identity-access-secrets
      name: "アイデンティティ、アクセス、秘密管理"
      summary: "認証、認可、権限委譲、機械 ID、シークレットを扱う。"
      whyLearn: "誰が何にどの条件でアクセスできるかを安全に設計するため。"
      topicClusters:
        - slug: authentication-and-federation
          name: "認証とフェデレーション"
          summary: "本人確認と外部連携認証の中核技術を扱う。"
          concepts:
            - slug: modern-authentication
              name: "現代的なユーザー認証"
              summary: "多要素化とフィッシング耐性を重視した認証設計。"
              whyLearn: "パスワード中心設計からの移行判断がしやすくなる。"
              terms:
                - slug: multi-factor-authentication
                  name: "多要素認証"
                  summary: "異なる要素を組み合わせて認証強度を上げる方式。"
                  whyLearn: "資格情報漏えい時の突破難度を上げられる。"
                  promptHint: "知識・所持・生体のどれをどう組み合わせるかを見る。"
                  aliases:
                    - "MFA"
                    - "Multi-Factor Authentication"
                - slug: passkey
                  name: "パスキー"
                  summary: "端末の生体認証や PIN と連動する FIDO ベース認証情報。"
                  whyLearn: "フィッシング耐性と UX を両立しやすい。"
                  promptHint: "パスワードを減らしつつ復旧導線をどう設計するかで考える。"
                  aliases:
                    - "Passkey"
                - slug: webauthn
                  name: "WebAuthn"
                  summary: "公開鍵資格情報を用いて Web 上で強力な認証を実現する標準。"
                  whyLearn: "passkey やハードウェア認証の基盤理解になる。"
                  promptHint: "登録、認証、RP ID、資格情報スコープで理解する。"
                  aliases:
                    - "Web Authentication"
                    - "WebAuthn"
            - slug: federated-protocols-and-tokens
              name: "連携プロトコルとトークン"
              summary: "外部 ID 連携や認可委譲で使う標準を扱う。"
              whyLearn: "SSO や外部連携を安全に実装するため。"
              terms:
                - slug: oauth-2-0
                  name: "OAuth 2.0"
                  summary: "第三者に限定的なアクセス権を委譲するための枠組み。"
                  whyLearn: "API 認可の土台を理解できる。"
                  promptHint: "主体、認可サーバー、トークン、スコープ、リダイレクトを整理する。"
                  aliases:
                    - "OAuth2"
                    - "OAuth 2.0"
                - slug: openid-connect
                  name: "OpenID Connect"
                  summary: "OAuth 2.0 の上に認証レイヤーを載せた標準。"
                  whyLearn: "認可と認証の違いを混同しにくくなる。"
                  promptHint: "ID トークンは何を保証し、アクセストークンと何が違うかで考える。"
                  aliases:
                    - "OIDC"
                    - "OpenID Connect"
                - slug: pkce
                  name: "PKCE"
                  summary: "認可コード奪取に対抗するための追加検証機構。"
                  whyLearn: "モバイルや SPA を含む現代的 OAuth 実装の必須知識。"
                  promptHint: "公開クライアントでコードをどう保護するかで理解する。"
                  aliases:
                    - "PKCE"
                    - "Proof Key for Code Exchange"
        - slug: authorization-and-secret-lifecycle
          name: "認可と秘密のライフサイクル"
          summary: "権限モデルとシークレット運用を扱う。"
          concepts:
            - slug: access-control-models
              name: "アクセス制御モデル"
              summary: "権限をロール、属性、関係で表現する方法を比較する。"
              whyLearn: "ビジネス権限を実装に落とし込む設計力がつく。"
              terms:
                - slug: role-based-access-control
                  name: "RBAC"
                  summary: "ロール単位で権限を束ねて付与するモデル。"
                  whyLearn: "分かりやすい権限管理の基本になる。"
                  promptHint: "職務ごとの共通権限として表現できるかを見る。"
                  aliases:
                    - "RBAC"
                    - "Role-Based Access Control"
                - slug: attribute-based-access-control
                  name: "ABAC"
                  summary: "主体、資源、環境属性に基づいて権限判定するモデル。"
                  whyLearn: "状況依存の細かい制御に向く。"
                  promptHint: "だれが、何に、どんな条件で、という形で表現する。"
                  aliases:
                    - "ABAC"
                    - "Attribute-Based Access Control"
                - slug: relationship-based-access-control
                  name: "ReBAC"
                  summary: "主体と資源の関係性で権限を表すモデル。"
                  whyLearn: "共同編集や共有モデルに強い。"
                  promptHint: "所有者、メンバー、上司部下のような関係で考える。"
                  aliases:
                    - "ReBAC"
                    - "Relationship-Based Access Control"
            - slug: secret-and-privilege-management
              name: "シークレットと特権管理"
              summary: "人と機械の資格情報を安全に扱い、特権を管理する。"
              whyLearn: "漏えいしやすく、被害も大きい資格情報の扱いを改善できる。"
              terms:
                - slug: service-account
                  name: "サービスアカウント"
                  summary: "機械やサービス同士の認証に使う主体。"
                  whyLearn: "人間用 ID と分けない設計の危険を避けられる。"
                  promptHint: "この権限は人ではなくワークロードに紐づくべきかで考える。"
                  aliases:
                    - "Service Account"
                - slug: privileged-access-management
                  name: "PAM"
                  summary: "高権限アカウントの発行、利用、監査を統制する仕組み。"
                  whyLearn: "管理者権限の乱用や漏えいの被害を抑えられる。"
                  promptHint: "高権限を誰がいつ何のために使うかを追跡できるかを見る。"
                  aliases:
                    - "PAM"
                    - "Privileged Access Management"
                - slug: secret-rotation
                  name: "シークレットローテーション"
                  summary: "鍵やトークンやパスワードを定期的・事象的に切り替える運用。"
                  whyLearn: "長寿命秘密に依存した事故を減らせる。"
                  promptHint: "漏えい時に素早く切り替えられる設計かを確認する。"
                  aliases:
                    - "Secret Rotation"

    - slug: cryptography-key-management
      name: "暗号と鍵管理"
      summary: "データと通信を保護する暗号技術と、その運用条件を扱う。"
      whyLearn: "暗号を雰囲気で選ばず、用途と制約で使い分けるため。"
      topicClusters:
        - slug: cryptographic-primitives-and-protection
          name: "暗号プリミティブと基本保護"
          summary: "暗号の基本部品と利用場面を区別して学ぶ。"
          concepts:
            - slug: core-primitives
              name: "中核プリミティブ"
              summary: "機密性、完全性、認証性を支える基本技術。"
              whyLearn: "暗号用語を正しく使い分けられるようになる。"
              terms:
                - slug: advanced-encryption-standard
                  name: "AES"
                  summary: "広く使われる共通鍵暗号標準。"
                  whyLearn: "保存データや通信保護の基礎となる。"
                  promptHint: "何をどこで暗号化し、鍵をどう配るかとセットで考える。"
                  aliases:
                    - "AES"
                    - "Advanced Encryption Standard"
                - slug: secure-hash-algorithm-256
                  name: "SHA-256"
                  summary: "メッセージダイジェストを生成する代表的なハッシュ関数。"
                  whyLearn: "改ざん検知や識別子計算の基本理解になる。"
