domain:
  slug: security-privacy-governance
  name: "セキュリティ、プライバシー、ガバナンス"
  summary: "システム、人、データ、信頼を守るための技術的・組織的実践を扱う領域。"
  boundaryNotes: "セキュア開発、プライバシーエンジニアリング、リスク統治を扱う。可用性やサービス健全性は Reliability、法務や事業包装は Business に接続する。"
  knowledgeAreas:
    - slug: secure-design-threat-management
      name: "セキュア設計と脅威分析"
      summary: "境界、資産、攻撃面、脅威、設計原則を前倒しで整理する。"
      whyLearn: "実装前に危険な仮定を発見し、設計レビューの精度を上げるため。"
      topicClusters:
        - slug: threat-modeling-and-risk-discovery
          name: "脅威モデリングとリスク発見"
          summary: "システムに対する脅威と悪用経路を構造化して洗い出す。"
          concepts:
            - slug: security-threat-modeling
              name: "セキュリティ脅威モデリング"
              summary: "システム図、資産、境界、攻撃者視点から脅威を列挙する。"
              whyLearn: "仕様レビューの段階で重大な欠陥を見つけやすくなる。"
              terms:
                - slug: threat-modeling
                  name: "脅威モデリング"
                  summary: "守る対象、境界、脅威、対策を系統立てて表現する実践。"
                  whyLearn: "セキュリティを実装後チェックではなく設計活動にできる。"
                  promptHint: "何を守り、誰がどう壊し、どこで防ぐかで考える。"
                  aliases:
                    - "Threat Modeling"
                  search:
                    keywords:
                      - 脅威モデリング
                      - Threat Modeling
                      - threat model
                      - セキュリティ設計レビュー
                      - abuse case
                      - misuse case
                      - data flow diagram
                      - DFD
                      - trust boundary
                    commonSignals:
                      - 設計図やDFDを見ながら脅威を洗い出す
                      - 攻撃者視点で仕様レビューする
                      - trust boundaryやassetを列挙している
                      - abuse caseやmisuse caseを検討している
                    antiSignals:
                      - 単なるバグ修正や脆弱性スキャン結果だけの話
                      - 障害影響分析やSLO設計だけを扱う話
                      - 事業リスク分析のみで攻撃者やシステム境界が出ない話
                    relatedNames:
                      - name: OWASP Threat Modeling Project
                        kind: framework
                        relevance: アプリケーション設計時の脅威モデリング手法や教材を整理する代表的なOWASPプロジェクト。
                        officialUrl: https://owasp.org/www-project-threat-modeling/
                      - name: Microsoft Threat Modeling Tool
                        kind: tool
                        relevance: DFDとSTRIDEを使った脅威列挙でよく使われる設計支援ツール。
                      - name: PASTA
                        kind: method
                        relevance: リスク中心で脅威を分析する脅威モデリング手法としてSTRIDEと比較される。
                      - name: LINDDUN
                        kind: method
                        relevance: プライバシー観点の脅威モデリングでよく参照される手法。

                - slug: stride

                  search:

                    keywords:

                      - STRIDE

                      - ストライド

                      - Spoofing

                      - Tampering

                      - Repudiation

                      - Information Disclosure

                      - Denial of Service

                      - Elevation of Privilege

                      - 脅威分類

                    commonSignals:

                      - Spoofing Tampering Repudiation の頭文字

                      - 6カテゴリで脅威を洗い出す

                      - DFDの各要素に脅威カテゴリを当てる

                    antiSignals:

                      - strideという英単語が歩幅の意味で使われている

                      - 脅威分類ではなく単なるセキュリティ一般論

                      - DoSだけなど単一カテゴリの説明に閉じている

                    relatedNames:

                      - name: Microsoft Threat Modeling Tool

                        kind: tool

                        relevance: STRIDEを前提に脅威を生成・整理する代表的なツール。

                      - name: Data Flow Diagram

                        kind: method

                        relevance: STRIDEではDFD上のプロセス、データストア、データフローに脅威を対応づけることが多い。

                      - name: Elevation of Privilege

                        kind: tool

                        relevance: Microsoftが公開したSTRIDE学習用カードゲームとして知られる。
                  name: "STRIDE"
                  summary: "脅威を六つの観点で整理する代表的な分類法。"
                  whyLearn: "脅威列挙の抜け漏れを減らしやすい。"
                  promptHint: "なりすまし、改ざん、否認、情報漏えい、DoS、権限昇格で点検する。"
                  aliases:
                    - "ストライド"
                - slug: attack-tree
                  name: "攻撃木"
                  summary: "攻撃目標から手段を木構造で分解して表す方法。"
                  whyLearn: "悪用経路や対策優先度を説明しやすくなる。"
                  promptHint: "攻撃者の最終目標から必要条件を分解して考える。"
                  aliases:
                    - "Attack Tree"
            - slug: attack-knowledge-and-exposure
              name: "攻撃知識と攻撃面の把握"
              summary: "攻撃者の行動パターンと露出面を具体的に把握する。"
              whyLearn: "抽象的な不安ではなく観測可能な攻撃パターンで議論できる。"
              terms:
                - slug: attack-surface
                  name: "攻撃面"
                  summary: "攻撃者が触れられる入口、資産、操作面の総称。"
                  whyLearn: "露出の縮小を設計の第一歩として扱える。"
                  promptHint: "外部公開面、管理面、依存先、内部横移動面を列挙する。"
                  aliases:
                    - "Attack Surface"
                  search:
                    keywords:
                      - 攻撃面
                      - Attack Surface
                      - external exposure
                      - exposed service
                      - asset discovery
                      - attack surface management
                      - ASM
                      - EASM
                      - public endpoint
                    commonSignals:
                      - 外部公開APIや管理画面を棚卸しする
                      - 不要なポートやサブドメインを閉じる
                      - インターネット露出資産を発見する
                      - 攻撃者が触れられる入口を減らす
                    antiSignals:
                      - UIの表面や画面面積の話
                      - 単なるコード複雑度の話
                      - 内部の抽象設計だけで到達可能性に触れない話
                    relatedNames:
                      - name: Nmap
                        kind: tool
                        relevance: 公開ポートや到達可能なサービスの把握に使われる代表的なスキャンツール。
                      - name: Shodan
                        kind: service
                        relevance: インターネット露出資産の発見や攻撃面把握でよく使われる検索サービス。
                      - name: Censys
                        kind: service
                        relevance: 証明書や公開サービスの可視化を通じて外部攻撃面を調べるサービス。
                      - name: OWASP Amass
                        kind: tool
                        relevance: ドメインやサブドメインの列挙で攻撃面の棚卸しに使われる。

                - slug: mitre-attck

                  search:

                    keywords:

                      - MITRE ATT&CK

                      - ATT&CK

                      - attack matrix

                      - adversary tactics

                      - techniques

                      - sub-techniques

                      - TTP mapping

                      - 脅威インテリジェンス

                      - 攻撃者行動

                    commonSignals:

                      - T1059やTA0001のようなATT&CK IDが出る

                      - 攻撃者の戦術と技術にマッピングする

                      - 検知ルールのカバレッジをATT&CKで評価する

                    antiSignals:

                      - 単にattackという単語だけが出る

                      - 攻撃木やSTRIDEの分類だけを扱う

                      - 脆弱性IDのCVEだけを列挙している

                    relatedNames:

                      - name: ATT&CK Navigator

                        kind: tool

                        relevance: ATT&CKの戦術・技術をマトリクス上で可視化し、カバレッジ管理に使うツール。

                        officialUrl: https://attack.mitre.org/

                      - name: MITRE CALDERA

                        kind: tool

                        relevance: ATT&CKに基づく攻撃エミュレーションや演習で使われる。

                      - name: STIX

                        kind: standard

                        relevance: 脅威インテリジェンスを機械可読に表現する標準でATT&CKデータとも関連する。

                      - name: TAXII

                        kind: protocol

                        relevance: 脅威インテリジェンス共有のプロトコルとしてATT&CKデータ利用時に出やすい。
                  name: "MITRE ATT&CK"
                  summary: "現実の攻撃者行動を戦術・技術で整理した知識ベース。"
                  whyLearn: "検知、演習、優先順位付けに共通言語を持てる。"
                  promptHint: "どの戦術と技術に対して観測・防御・回復が弱いかで問う。"
                  aliases:
                    - "ATT&CK"
                - slug: tactics-techniques-procedures
                  name: "TTP"
                  summary: "攻撃者の戦術、技術、手順をまとめて捉える表現。"
                  whyLearn: "インシデントや脅威情報を行動単位で理解しやすい。"
                  promptHint: "何を狙ったか、どう実行したか、どの手口が繰り返されるかで整理する。"
                  aliases:
                    - "TTP"
        - slug: secure-architecture-principles
          name: "セキュアアーキテクチャ原則"
          summary: "境界設計、信頼仮定、分離、既定値に関する原則を扱う。"
          concepts:
            - slug: secure-design-principles
              name: "セキュア設計原則"
              summary: "安全な既定値と権限最小化を軸にアーキテクチャを設計する。"
              whyLearn: "個別パッチではなく壊れにくい構造に近づける。"
              terms:
                - slug: least-privilege
                  name: "最小権限"
                  summary: "必要最小限の権限だけを付与する原則。"
                  whyLearn: "侵害時の被害拡大を抑えやすい。"
                  promptHint: "この主体に本当に必要な権限だけかを確認する。"
                  aliases:
                    - "Least Privilege"
                  search:
                    keywords:
                      - 最小権限
                      - Least Privilege
                      - least-privileged access
                      - 権限最小化
                      - need-to-know
                      - permission boundary
                      - deny by default
                      - JIT access
                    commonSignals:
                      - 必要な権限だけを付与する
                      - 過剰権限や管理者権限を削る
                      - deny by defaultで許可を足す
                      - 侵害時のblast radiusを小さくする
                    antiSignals:
                      - 権限ではなく計算資源の最小化の話
                      - UX上の権限説明だけで実際のアクセス制御がない
                      - 単なる職位や人事制度の話
                    relatedNames:
                      - name: RBAC
                        kind: pattern
                        relevance: ロール単位で最小権限を実装する代表的な権限モデル。
                      - name: ABAC
                        kind: pattern
                        relevance: 属性条件を使って最小権限を細かく表現するモデル。
                      - name: AWS IAM
                        kind: service
                        relevance: ポリシーで最小権限を設計する実務例として頻出する。
                      - name: Kubernetes RBAC
                        kind: platform
                        relevance: クラスタ内権限を最小化する代表的な実装対象。

                - slug: defense-in-depth
                  name: "多層防御"
                  summary: "複数の防御層を重ねて単一点突破を防ぐ考え方。"
                  whyLearn: "一つの制御が破られても全体崩壊しにくくなる。"
                  promptHint: "予防、検知、制限、回復を別レイヤーで持てているかを見る。"
                  aliases:
                    - "Defense in Depth"
                - slug: secure-by-default
                  name: "セキュア・バイ・デフォルト"
                  summary: "初期設定のままで危険になりにくい状態を目指す原則。"
                  whyLearn: "利用者や運用者の設定ミス依存を減らせる。"
                  promptHint: "何もしないと危険になる設定が残っていないかを問う。"
                  aliases:
                    - "Secure by Default"
            - slug: boundary-and-trust-design
              name: "境界設計と信頼設計"
              summary: "信頼境界と通信境界を明示し、横移動や暗黙信頼を減らす。"
              whyLearn: "システム分割とアクセス制御の設計根拠を説明できる。"
              terms:
                - slug: trust-boundary
                  name: "信頼境界"
                  summary: "信頼できる前提が切り替わる境目。"
                  whyLearn: "認証、検証、監査をどこで必須にするか決めやすい。"
                  promptHint: "この境界をまたぐときに何を再確認すべきかで考える。"
                  aliases:
                    - "Trust Boundary"
                - slug: segmentation
                  name: "セグメンテーション"
                  summary: "ネットワークやサービスの分離で影響範囲を限定する設計。"
                  whyLearn: "横移動や過剰な到達性を抑制できる。"
                  promptHint: "到達できなくてよい経路が開いていないかを見る。"
                  aliases:
                    - "Network Segmentation"
                - slug: zero-trust-architecture
                  name: "ゼロトラストアーキテクチャ"
                  summary: "場所やネットワーク内外に依存せず、継続的に信頼を検証する考え方。"
                  whyLearn: "社内だから安全という前提を捨てた設計ができる。"
                  promptHint: "主体、端末、状況、資産ごとに信頼を動的に判断する。"
                  aliases:
                    - "ZTA"
                    - "Zero Trust"
                  search:
                    keywords:
                      - ゼロトラスト
                      - Zero Trust
                      - Zero Trust Architecture
                      - ZTA
                      - never trust always verify
                      - continuous verification
                      - context-aware access
                      - ZTNA
                      - device posture
                    commonSignals:
                      - 社内ネットワークだから信頼する前提をやめる
                      - ユーザー、端末、場所、リスクで動的に判定する
                      - VPN中心からアプリ単位アクセスへ移る
                    antiSignals:
                      - 単なるVPN製品の置き換えだけの話
                      - ネットワーク分離だけで継続的検証がない
                      - ゼロリスクという意味で使っている
                    relatedNames:
                      - name: NIST SP 800-207
                        kind: standard
                        relevance: ゼロトラストアーキテクチャを体系的に説明する代表的なNIST文書。
                        officialUrl: https://csrc.nist.gov/pubs/sp/800/207/final
                      - name: BeyondCorp
                        kind: framework
                        relevance: 企業ネットワーク境界に依存しないアクセス設計の先行事例として参照される。
                      - name: ZTNA
                        kind: pattern
                        relevance: ゼロトラストの考え方をネットワークアクセス製品・構成に落とした分類。
                      - name: mTLS
                        kind: protocol
                        relevance: サービス間で相互認証を行うゼロトラスト構成の部品として使われる。

    - slug: application-api-client-security
      name: "アプリケーション、API、クライアントの保護"
      summary: "Web、API、モバイルの実装境界で起きる代表的な失敗と防御を扱う。"
      whyLearn: "実装レビューと仕様レビューの両方で典型的な事故を減らすため。"
      topicClusters:
        - slug: server-side-and-browser-defenses
          name: "サーバー側とブラウザ側の防御"
          summary: "入力、出力、状態管理、ブラウザ制御の基本防御を扱う。"
          concepts:
            - slug: input-and-output-safety
              name: "入力と出力の安全化"
              summary: "不正入力や文脈不一致の出力から生じる脆弱性を防ぐ。"
              whyLearn: "注入系や表示系の脆弱性を基本動作として防ぎやすい。"
              terms:
                - slug: input-validation
                  name: "入力検証"
                  summary: "型、長さ、形式、範囲などを境界で検証する実践。"
                  whyLearn: "不正データの早期遮断に役立つ。"
                  promptHint: "許可すべき入力を定義し、境界で検証する。"
                  aliases:
                    - "Input Validation"
                  search:
                    keywords:
                      - 入力検証
                      - Input Validation
                      - allowlist validation
                      - schema validation
                      - 型検証
                      - 境界検証
                      - バリデーション
                      - canonicalization
                    commonSignals:
                      - API境界で型や形式を検証する
                      - allowlistで受け付ける値を定義する
                      - 不正な長さや文字種を拒否する
                    antiSignals:
                      - フォームの必須項目チェックだけでセキュリティ観点がない
                      - 出力エスケープやサニタイズだけを扱っている
                      - DB制約だけで入力境界の話がない
                    relatedNames:
                      - name: JSON Schema
                        kind: standard
                        relevance: JSON入力の構造や型を検証するために広く使われる仕様。
                      - name: Zod
                        kind: library
                        relevance: TypeScriptでスキーマ定義と入力検証を同時に扱うライブラリ。
                      - name: Joi
                        kind: library
                        relevance: Node.jsアプリで入力スキーマ検証に使われる代表的ライブラリ。
                      - name: OWASP Input Validation Cheat Sheet
                        kind: standard
                        relevance: 入力検証の設計方針を整理した実務向け参照資料。

                - slug: output-encoding

                  search:

                    keywords:

                      - 出力エンコーディング

                      - Output Encoding

                      - contextual encoding

                      - HTML escaping

                      - XSS prevention

                      - 属性エスケープ

                      - URL encoding

                      - JavaScript encoding

                    commonSignals:

                      - HTML本文、属性、URL、JavaScriptでエスケープを分ける

                      - XSSを防ぐために出力時に安全化する

                      - ユーザー入力を画面表示する前にエンコードする

                    antiSignals:

                      - 文字コード変換だけの話

                      - 入力検証だけで出力文脈が出ない

                      - 暗号化やハッシュ化をencodingと呼んでいる

                    relatedNames:

                      - name: OWASP Java Encoder

                        kind: library

                        relevance: 文脈別の安全な出力エンコーディングを提供するOWASPライブラリ。

                      - name: DOMPurify

                        kind: library

                        relevance: HTMLサニタイズでXSS対策に使われ、出力安全化の文脈で併記されやすい。

                      - name: Trusted Types

                        kind: standard

                        relevance: DOM XSSを防ぐためのブラウザ側安全化機構として関連する。

                      - name: React JSX escaping

                        kind: framework

                        relevance: Reactの自動エスケープは出力エンコーディング理解の実務例になる。
                  name: "出力エンコーディング"
                  summary: "出力先の文脈に合わせて危険文字を安全化する方法。"
                  whyLearn: "XSS などの表示文脈依存の事故を防ぎやすい。"
                  promptHint: "HTML、属性、URL、JS など文脈ごとに分けて考える。"
                  aliases:
                    - "Output Encoding"
                - slug: parameterized-query
                  name: "パラメータ化クエリ"
                  summary: "値と命令を分離して安全に問い合わせを行う方法。"
                  whyLearn: "SQL インジェクション系の基本防御になる。"
                  promptHint: "文字列連結ではなくバインド変数で扱う前提で考える。"
                  aliases:
                    - "Prepared Statement"
                    - "Parameterized Query"
                  search:
                    keywords:
                      - パラメータ化クエリ
                      - Parameterized Query
                      - Prepared Statement
                      - bind variable
                      - バインド変数
                      - SQL injection prevention
                      - ORM parameter binding
                      - プリペアドステートメント
                    commonSignals:
                      - 文字列連結ではなくプレースホルダに値を渡す
                      - SQLインジェクションを防ぐために値と命令を分離する
                      - bind parameterやprepared statementが出ている
                    antiSignals:
                      - URLクエリパラメータの一般的な話
                      - GraphQLのqueryという語だけが出る
                      - キャッシュ用のクエリキーの話
                    relatedNames:
                      - name: JDBC PreparedStatement
                        kind: library
                        relevance: JavaでSQLインジェクション対策として使われる代表的なプリペアド文API。
                      - name: psycopg
                        kind: library
                        relevance: PythonからPostgreSQLへ安全にパラメータを渡す例でよく出る。
                      - name: SQLAlchemy
                        kind: library
                        relevance: Python ORMやクエリビルダでバインドパラメータを扱う。
                      - name: Prisma
                        kind: library
                        relevance: TypeScript系アプリでORMの安全なクエリ生成の例として出やすい。
            - slug: request-and-browser-controls
              name: "リクエストとブラウザ制御"
              summary: "ブラウザの自動送信やスクリプト実行に起因するリスクを抑える。"
              whyLearn: "セッション依存アプリの基本防御を理解できる。"
              terms:
                - slug: cross-site-request-forgery
                  name: "CSRF"
                  summary: "利用者のブラウザを悪用して意図しない操作を実行させる攻撃。"
                  whyLearn: "状態変更系の操作を安全に設計する基礎になる。"
                  promptHint: "誰の意思で送信されたかをどう確認するかで考える。"
                  aliases:
                    - "CSRF"
                    - "Cross-Site Request Forgery"
                - slug: content-security-policy
                  name: "CSP"
                  summary: "読み込み元や実行元を制限してブラウザ実行を絞る仕組み。"
                  whyLearn: "XSS の被害縮小と外部資源制御に役立つ。"
                  promptHint: "どのスクリプトやリソースを許可するかを方針化する。"
                  aliases:
                    - "CSP"
                    - "Content Security Policy"
                  search:
                    keywords:
                      - CSP
                      - Content Security Policy
                      - コンテンツセキュリティポリシー
                      - script-src
                      - default-src
                      - nonce
                      - hash-source
                      - CSP report
