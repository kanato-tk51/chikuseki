        - slug: mitigation-recovery-and-communication
          name: 緩和、復旧、コミュニケーション
          summary: 早く戻すことと、状況を正しく伝えることを並行して進める。
          concepts:
            - slug: mitigation-and-recovery-actions
              name: 緩和と復旧のアクション
              summary: 原因究明を待たず、被害を減らすための操作を優先する。
              whyLearn: 完全原因分析より先に、ユーザー影響を減らす判断が必要だから。
              terms:
                - slug: triage
                  name: トリアージ
                  summary: 限られた情報で状況を切り分け、優先順位を定める行為。
