domain:
  slug: reliability-operations-platform-engineering
  name: 信頼性、運用、プラットフォームエンジニアリング
  summary: 本番システムを安全かつ効果的に運用し、観測し、改善し、開発者に再利用可能な運用能力を提供するための実践を扱う領域。
  boundaryNotes: Observability、インシデント、リリース、サービス健全性、プラットフォーム能力を中心に扱う。OSやネットワークの機構自体は Systems に、一般的な開発プロセスや品質保証は Software Engineering に、アクセス制御やプライバシー統治は Security に寄せる。
  knowledgeAreas:
    - slug: service-reliability-objectives
      name: サービス信頼性目標と運用指標
      summary: ユーザー影響を定量化し、どの程度の可用性や性能を約束し、どの程度の変化を許容するかを定める。
      whyLearn: 運用判断を感覚ではなく、ユーザー体験とビジネス制約に接続した数値でレビューできるようになる。
      topicClusters:
        - slug: service-level-modeling
          name: サービスレベルのモデル化
          summary: 信頼性をユーザーから見える体験として定義し、測定可能な指標に落とす。
          concepts:
            - slug: service-level-objectives
              name: サービスレベル目標
              summary: SLI・SLO・SLA・エラーバジェットで信頼性目標を構成する。
              whyLearn: 可用性と開発速度の衝突を、共通言語と定量指標で扱えるようにするため。
              terms:
                - slug: service-level-indicator
                  name: サービスレベル指標
                  summary: ユーザー体験やサービス品質を表す計測指標。
                  whyLearn: 何を測れば信頼性を議論できるかの起点になるため。
                  promptHint: この機能のSLIとして何を置くべきか、ユーザー視点で定義して、と聞く。
                  aliases:
                    - SLI
                    - service level indicator
                  search:
                    keywords:
                      - SLI
                      - service level indicator
                      - サービスレベル指標
                      - ユーザー体験指標
                      - reliability metric
                      - request success ratio
                      - latency SLI
                      - availability SLI
                      - SLO measurement
                    commonSignals:
                      - SLI候補や測定対象を議論している
                      - 成功率、エラー率、遅延分位点をユーザー視点で定義している
                      - SLOの前提として何を測るかを決めている
                      - PromQLで可用性や成功率を計算している
                    antiSignals:
                      - KPIや事業指標だけでサービス品質の測定ではない
                      - メトリクス一般の話でユーザー影響や目標値に結びついていない
                      - SLA条項や契約文面だけを扱っている
                    relatedNames:
                      - name: OpenSLO
                        kind: standard
                        relevance: SLIやSLOを機械可読な仕様として表現する文脈で一緒に出やすい。
                        officialUrl: https://openslo.com/
                      - name: Prometheus
                        kind: tool
                        relevance: SLIをメトリクスとして収集・集計する代表的な時系列基盤。
                        officialUrl: https://prometheus.io/
                      - name: PromQL
                        kind: language
                        relevance: Prometheus上でSLIを計算するクエリ言語として使われる。
                        officialUrl: https://prometheus.io/docs/prometheus/latest/querying/basics/
                      - name: Pyrra
                        kind: tool
                        relevance: PrometheusベースでSLOとSLIを管理するツールとして参照される。
                        officialUrl: https://pyrra.dev/
                      - name: Sloth
                        kind: tool
                        relevance: SLO定義からPrometheusルールを生成するツールとして関連する。
                        officialUrl: https://sloth.dev/

                - slug: service-level-objective

                  search:

                    keywords:

                      - SLO

                      - service level objective

                      - サービスレベル目標

                      - reliability target

                      - availability target

                      - latency objective

                      - SLO target

                      - objective window

                      - target percentage

                    commonSignals:

                      - 99.9パーセントや99.95パーセントなどの目標値を決めている

                      - SLIに対する許容範囲や評価期間を設定している

                      - 可用性と開発速度のトレードオフを議論している

                      - SLO違反やSLO達成率をレビューしている

                    antiSignals:

                      - SLAや契約上の返金条項だけを扱っている

                      - 監視閾値だけでユーザー体験の目標になっていない

                      - OKRのObjectiveでサービス品質目標ではない

                    relatedNames:

                      - name: OpenSLO

                        kind: standard

                        relevance: SLOをYAMLなどで標準的に定義する仕様として関連する。

                        officialUrl: https://openslo.com/

                      - name: Google SRE Workbook

                        kind: method

                        relevance: SLO設計の実務的な手順や考え方で広く参照される。

                        officialUrl: https://sre.google/workbook/implementing-slos/

                      - name: Grafana SLO

                        kind: tool

                        relevance: Grafana環境でSLOを可視化・運用する文脈で出やすい。

                        officialUrl: https://grafana.com/

                      - name: Nobl9

                        kind: service

                        relevance: SLO管理専用サービスとしてSLO運用の比較対象になりやすい。

                        officialUrl: https://www.nobl9.com/
                  name: サービスレベル目標
                  summary: SLIに対して設定する目標値や許容範囲。
                  whyLearn: 信頼性の期待値を曖昧な高品質ではなく数値目標に変えるため。
                  promptHint: このAPIのSLOをどの値に設定すべきか、根拠とともに整理して、と聞く。
                  aliases:
                    - SLO
                    - service level objective
                - slug: service-level-agreement
                  name: サービスレベル合意
                  summary: 顧客や利用者との契約・約束として表現されたサービス水準。
                  whyLearn: 内部目標と外部約束を混同せず、責任範囲を切り分けるため。
                  promptHint: SLOとSLAの違いを、運用設計と契約の観点で比較して、と聞く。
                  aliases:
                    - SLA
                    - service level agreement
                - slug: error-budget
                  name: エラーバジェット
                  summary: SLOから逆算される、許容可能な失敗の予算。
                  whyLearn: 機能開発と信頼性改善のバランスを定量的に運用するため。
                  promptHint: 99.9% SLOのエラーバジェットを月間リクエスト数から計算して、と聞く。
                  aliases:
                    - error budget
                    - 許容障害予算
                  search:
                    keywords:
                      - error budget
                      - エラーバジェット
                      - 許容障害予算
                      - budget remaining
                      - budget exhaustion
                      - budget consumption
                      - unreliability budget
                      - release freeze
                      - reliability budget
                    commonSignals:
                      - SLOから許容失敗量を逆算している
                      - リリース停止や信頼性改善優先の判断をしている
                      - バジェット残量や消費率を追跡している
                      - 障害後にエラーバジェットが枯渇したと表現している
                    antiSignals:
                      - 金銭的な予算やクラウド費用の話だけである
                      - 単なるエラー件数でSLOとの関係がない
                      - プロジェクト予算や人員予算の話である
                    relatedNames:
                      - name: Google SRE Workbook
                        kind: method
                        relevance: エラーバジェットポリシーの代表的な考え方として参照される。
                        officialUrl: https://sre.google/workbook/error-budget-policy/
                      - name: OpenSLO
                        kind: standard
                        relevance: SLO定義と合わせてエラーバジェット算出の対象になりやすい。
                        officialUrl: https://openslo.com/
                      - name: Prometheus Alertmanager
                        kind: tool
                        relevance: バジェット消費に基づくアラート通知で使われることが多い。
                        officialUrl: https://prometheus.io/docs/alerting/latest/alertmanager/
            - slug: user-centered-reliability-dimensions
              name: ユーザー中心の信頼性次元
              summary: 信頼性を可用性だけでなく、応答性や正確さなど複数の性質で捉える。
              whyLearn: ユーザーが困る壊れ方を正しく捉えないと、測定していても価値に結びつかないため。
              terms:
                - slug: critical-user-journey
                  name: 重要ユーザージャーニー
                  summary: SLO設計や監視の基点になる、価値の高いユーザー行動経路。
                  whyLearn: 内部指標ではなく、ユーザーが本当に達成したいことを運用対象にするため。
                  promptHint: このプロダクトの重要ユーザージャーニーを3つ選び、各々のSLI候補を出して、と聞く。
                  aliases:
                    - CUJ
                    - critical user journey
                - slug: availability
                  name: 可用性
                  summary: 必要なときにサービスを利用できる度合い。
                  whyLearn: 最も基本的な信頼性指標であり、他の品質特性ともトレードオフになるため。
                  promptHint: 可用性をエンドユーザー観点と内部観点でどう測るか整理して、と聞く。
                  aliases:
                    - availability
                    - 稼働率
                - slug: latency
                  name: レイテンシ
                  summary: 要求に対する応答完了までの時間。
                  whyLearn: 使えるが遅い状態は、実質的な障害として体験されるため。
                  promptHint: p50とp95とp99をどう使い分けるべきか説明して、と聞く。
                  aliases:
                    - latency
                    - 応答時間
                - slug: correctness
                  name: 正確性
                  summary: 返された結果や状態遷移が期待どおりに正しい性質。
                  whyLearn: サービスが落ちていなくても誤答していれば信頼性を満たさないため。
                  promptHint: 可用性ではなく正確性をSLIにすべきケースを例示して、と聞く。
                  aliases:
                    - correctness
                    - functional correctness
        - slug: reliability-policies-and-incident-metrics
          name: 信頼性ポリシーとインシデント指標
          summary: 定義した目標を、アラート閾値・凍結ルール・復旧評価へ落とし込む。
          concepts:
            - slug: budget-consumption-policies
              name: 予算消費ポリシー
              summary: エラーバジェットの使い方と超過時の判断ルールを定める。
              whyLearn: 目標があっても、超えたときに何を止め何を優先するかが決まっていないと運用できないため。
              terms:
                - slug: burn-rate
                  name: バーンレート
                  summary: 単位時間あたりにエラーバジェットをどれだけ消費しているかを表す速度。
                  whyLearn: 重大な障害と低速で続く劣化の両方を早く検知するため。
                  promptHint: このSLOに対するバーンレートアラートの考え方を説明して、と聞く。
                  aliases:
                    - burn rate
                    - 予算消費率
                  search:
                    keywords:
                      - burn rate
                      - バーンレート
                      - error budget burn
                      - budget burn rate
                      - 予算消費率
                      - fast burn
                      - slow burn
                      - SLO alerting
                      - burn rate alert
                    commonSignals:
                      - エラーバジェットの消費速度を議論している
                      - 1時間、6時間、3日など複数窓でSLO違反を検知している
                      - fast burnやslow burnという表現が出る
                      - アラート閾値として14.4倍や6倍などを使っている
                    antiSignals:
                      - スタートアップの資金燃焼率の話である
                      - CPU使用率やリソース消費率だけを指している
                      - 予算消化率だが信頼性目標と関係がない
                    relatedNames:
                      - name: Prometheus
                        kind: tool
                        relevance: バーンレート計算のPromQL例がよく使われる。
                        officialUrl: https://prometheus.io/
                      - name: Alertmanager
                        kind: tool
                        relevance: バーンレートアラートの通知・抑制先として関連する。
                        officialUrl: https://prometheus.io/docs/alerting/latest/alertmanager/
                      - name: Sloth
                        kind: tool
                        relevance: SLO定義からバーンレートアラートルールを生成する用途で使われる。
                        officialUrl: https://sloth.dev/
                      - name: Pyrra
                        kind: tool
                        relevance: エラーバジェット消費とバーンレートの可視化に使われる。
                        officialUrl: https://pyrra.dev/

                - slug: error-budget-policy
                  name: エラーバジェットポリシー
                  summary: バジェット超過時のリリース停止や改善優先を定める運用規約。
                  whyLearn: 信頼性判断を属人的な議論ではなく事前合意されたルールにするため。
                  promptHint: エラーバジェットポリシーの雛形を作って、と聞く。
                  aliases:
                    - error budget policy
                    - 予算超過ポリシー
                - slug: maintenance-window
                  name: メンテナンスウィンドウ
                  summary: 意図的な停止や制限を許容する計画済み時間帯。
                  whyLearn: 計画停止をSLOや顧客期待とどう整合させるかを明確にするため。
                  promptHint: メンテナンスウィンドウをSLO運用にどう反映すべきか整理して、と聞く。
                  aliases:
                    - maintenance window
                    - 計画停止時間
            - slug: incident-and-response-metrics
              name: インシデントと応答の指標
              summary: 検知、初動、復旧の速さと質を運用の改善対象として測る。
              whyLearn: 壊れない設計だけでなく、壊れたときにどれだけ早く被害を減らせるかが重要だから。
              terms:
                - slug: mean-time-to-detect
                  name: 平均検知時間
                  summary: 問題発生から検知までに要する平均時間。
                  whyLearn: 監視設計や検知品質の弱さを定量的に振り返るため。
                  promptHint: MTTDを短くするために監視設計で何を変えるべきか提案して、と聞く。
                  aliases:
                    - MTTD
                    - mean time to detect
                - slug: mean-time-to-acknowledge
                  name: 平均初動時間
                  summary: アラート発報から担当者が受理するまでの平均時間。
                  whyLearn: オンコール体制や通知設計のボトルネックを把握するため。
                  promptHint: MTTAが長いときの改善レバーを整理して、と聞く。
                  aliases:
                    - MTTA
                    - mean time to acknowledge
                - slug: mean-time-to-recovery
                  name: 平均復旧時間
                  summary: 障害発生からサービスを許容水準まで戻す平均時間。
                  whyLearn: 復旧手順や運用自動化の有効性を把握するため。
                  promptHint: MTTR短縮のために必要なランブックや自動化を列挙して、と聞く。
                  aliases:
                    - MTTR
                    - mean time to recovery

    - slug: observability-and-telemetry
      name: オブザーバビリティとテレメトリ
      summary: 本番の振る舞いをメトリクス、ログ、トレース、プロファイルとして収集し、診断可能な形にする。
      whyLearn: 障害対応や性能改善の前提となる観測可能性を設計できるようになる。
      topicClusters:
        - slug: telemetry-foundations
          name: テレメトリ基盤
          summary: どの種類の信号を、どの文脈で、どう共通化して送るかを定める。
          concepts:
            - slug: telemetry-signals
              name: テレメトリ信号
              summary: メトリクス、ログ、トレース、プロファイルなどの信号種別を区別して扱う。
              whyLearn: 観測したい問いに対して、適切な信号を選ばないと調査コストが跳ね上がるため。
              terms:
                - slug: metrics
                  name: メトリクス
                  summary: 時系列で集約可能な数値観測。
                  whyLearn: 傾向把握、アラート、SLO計算の中心になるため。
                  promptHint: この事象はログよりメトリクスで取るべきか判断して、と聞く。
                  aliases:
                    - metric
                    - metrics
                  search:
                    keywords:
                      - metrics
                      - metric
                      - メトリクス
                      - time series
                      - 時系列データ
                      - counters gauges histograms
                      - scrape
                      - telemetry metrics
                      - monitoring metrics
                    commonSignals:
                      - 時系列の数値を収集・集計している
                      - counter、gauge、histogramなどの型を選んでいる
                      - ダッシュボードやアラートの元データとして使っている
                      - scrape intervalやlabel設計を議論している
                    antiSignals:
                      - ビジネスKPIだけで運用テレメトリではない
                      - ログ本文やイベント詳細の検索が中心である
                      - 単発の計測値で時系列分析や集約がない
                    relatedNames:
                      - name: Prometheus
                        kind: tool
                        relevance: メトリクス収集・保存・クエリのデファクトとして広く使われる。
                        officialUrl: https://prometheus.io/
                      - name: OpenTelemetry Metrics
                        kind: standard
                        relevance: ベンダー中立のメトリクス計装仕様として関連する。
                        officialUrl: https://opentelemetry.io/docs/concepts/signals/metrics/
                      - name: Grafana
                        kind: tool
                        relevance: メトリクスのダッシュボード化で頻出する可視化ツール。
                        officialUrl: https://grafana.com/
                      - name: PromQL
                        kind: language
                        relevance: Prometheusメトリクスを検索・集計するクエリ言語。
                        officialUrl: https://prometheus.io/docs/prometheus/latest/querying/basics/
                      - name: StatsD
                        kind: protocol
                        relevance: アプリケーションメトリクス送信の古典的方式として出る。
                        officialUrl: https://github.com/statsd/statsd

                - slug: logs

                  search:

                    keywords:

                      - logs

                      - log

                      - structured log

                      - 構造化ログ

                      - application log

                      - JSON logging

                      - log aggregation

                      - log level

                      - correlation id

                    commonSignals:

                      - JSON形式や構造化フィールドでログを出している

                      - error、warn、infoなどログレベルを設計している

                      - trace_idやrequest_idでログを相関している

                      - 集約基盤へログを転送して検索している

                    antiSignals:

                      - メトリクスの数値集計だけで個別イベント記録ではない

                      - 監査ログやセキュリティログだけで運用診断と無関係

                      - 単なるコンソール出力やデバッグprintの話である

                    relatedNames:

                      - name: OpenTelemetry Logs

                        kind: standard

                        relevance: ログ信号をベンダー中立に扱う仕様として関連する。

                        officialUrl: https://opentelemetry.io/docs/concepts/signals/logs/

                      - name: Elasticsearch

                        kind: tool

                        relevance: ログ検索基盤として広く使われる。

                        officialUrl: https://www.elastic.co/elasticsearch

                      - name: Loki

                        kind: tool

                        relevance: Grafana系のログ集約・検索基盤としてよく出る。

                        officialUrl: https://grafana.com/oss/loki/

                      - name: Fluent Bit

                        kind: tool

                        relevance: ログ収集・転送エージェントとして運用基盤で使われる。

                        officialUrl: https://fluentbit.io/

                      - name: Fluentd

                        kind: tool

                        relevance: ログ収集・加工・転送の定番ツールとして関連する。

                        officialUrl: https://www.fluentd.org/
                  name: ログ
                  summary: 離散的なイベントや状態変化の記録。
                  whyLearn: 個別事象や失敗理由の追跡に不可欠だから。
                  promptHint: 構造化ログの設計原則を例付きで説明して、と聞く。
                  aliases:
                    - log
                    - structured log
                - slug: traces
                  name: トレース
                  summary: リクエストが複数コンポーネントを通る経路を表す記録。
                  whyLearn: 分散システムで遅延や失敗の発生箇所を追うため。
                  promptHint: 分散トレースが有効な障害例を挙げて、と聞く。
                  aliases:
                    - trace
                    - distributed tracing
                  search:
                    keywords:
                      - traces
                      - trace
                      - distributed tracing
                      - 分散トレース
                      - span
                      - trace id
                      - parent span
                      - request path
                      - end-to-end tracing
                    commonSignals:
                      - spanやtrace_idでリクエスト経路を追っている
                      - マイクロサービス間の遅延箇所を特定している
                      - traceparentやcontext propagationを扱っている
                      - 1リクエストの呼び出しツリーを可視化している
                    antiSignals:
                      - ログ検索だけでリクエスト経路の親子関係がない
                      - メトリクスの時系列グラフだけを見ている
                      - スタックトレースの話で分散トレースではない
                    relatedNames:
                      - name: OpenTelemetry Traces
                        kind: standard
                        relevance: 分散トレース計装の中心的なオープン仕様として関連する。
                        officialUrl: https://opentelemetry.io/docs/concepts/signals/traces/
                      - name: Jaeger
                        kind: tool
                        relevance: 分散トレースの収集・可視化ツールとして広く知られる。
                        officialUrl: https://www.jaegertracing.io/
                      - name: Zipkin
                        kind: tool
                        relevance: 分散トレーシングの代表的な実装として参照される。
                        officialUrl: https://zipkin.io/
                      - name: Grafana Tempo
                        kind: tool
                        relevance: 大規模トレース保存基盤としてGrafanaスタックで使われる。
                        officialUrl: https://grafana.com/oss/tempo/
                      - name: W3C Trace Context
                        kind: standard
                        relevance: サービス間でtraceparentを伝搬する標準として関連する。
                        officialUrl: https://www.w3.org/TR/trace-context/

                - slug: profiles
                  name: プロファイル
                  summary: コードレベルのCPUやメモリ使用の分布を継続的に捉える記録。
                  whyLearn: 遅い理由の特定を、メトリクスやトレースより細かい粒度で行えるため。
                  promptHint: 継続的プロファイリングが必要な状況を説明して、と聞く。
                  aliases:
                    - profile
                    - continuous profiling
