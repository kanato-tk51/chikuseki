domain:
  slug: "data-management-analytics-experimentation"
  name: "データ管理、分析、実験"
  summary: "データを設計、保存、移動、分析、計測し、意思決定や学習に使う領域。"
  boundaryNotes: "データ保存、パイプライン、指標、実験を扱う。予測モデルは AI、プライバシー義務は Security, Privacy, and Governance に寄せる。"
  knowledgeAreas:
    - slug: "transactional-data-systems"
      name: "トランザクションデータシステム"
      summary: "運用系データを整合性を保ちながら記録し、更新し、読むための基礎を扱う。"
      whyLearn: "プロダクトの source of truth を安全に設計し、競合、整合性、性能の観点でレビューできるようになる。"
      topicClusters:
        - slug: "logical-data-modeling-and-integrity"
          name: "論理データモデリングと整合性"
          summary: "データの意味構造を表現し、制約で正しさを守る。"
          concepts:
            - slug: "relational-modeling-and-normalization"
              name: "関係モデリングと正規化"
              summary: "関係モデルの基本表現と冗長性削減の考え方を扱う。"
              whyLearn: "テーブル分割や属性配置を説明できると、更新不整合や将来の保守コストを減らせる。"
              terms:
                - slug: "entity-relationship-model"
                  name: "ERモデル"
                  summary: "エンティティ、属性、関係で業務対象を整理するモデル。"
                  whyLearn: "実装前に対象領域の概念構造を共有できると、後のテーブル設計の手戻りが減る。"
                  promptHint: "ERモデルで表したとき、エンティティ・属性・関係はどう分かれるかを問う。"
                  aliases:
                    - "ER model"
                    - "ER図"
                - slug: "functional-dependency"
                  name: "関数従属性"
                  summary: "ある属性集合が別の属性を一意に決める関係。"
                  whyLearn: "正規化やキー設計の根拠を言語化できると、設計レビューの質が上がる。"
                  promptHint: "どの属性が他の属性を決めるか、従属性の形で説明させる。"
                  aliases:
                    - "FD"
                    - "関数的従属性"
                - slug: "normalization"
                  name: "正規化"
                  summary: "冗長性と更新不整合を減らすために表を分解する設計原則。"
                  whyLearn: "一見便利な denormalized 設計が、更新時にどのような破綻を生むかを見抜ける。"
                  promptHint: "このテーブルを正規化すると何が改善し、何がトレードオフになるかを問う。"
                  aliases:
                    - "正規形"
                    - "normal forms"

            - slug: "schema-and-integrity-constraints"
              name: "スキーマと整合性制約"
              summary: "データベースが機械的に守るべき制約を扱う。"
              whyLearn: "アプリケーションコードだけに正しさを任せず、DB 側で守る境界を設計できる。"
              terms:
                - slug: "primary-key"
                  name: "主キー"
                  summary: "行を一意に識別するためのキー。"
                  whyLearn: "識別子設計が曖昧だと、更新・参照・結合の前提が崩れる。"
                  promptHint: "この表の主キーは何が適切か、自然キーと代替案も含めて考えさせる。"
                  aliases:
                    - "PK"
                    - "主キー"
                - slug: "foreign-key"
                  name: "外部キー"
                  summary: "他表の主キーや一意キーへの参照制約。"
                  whyLearn: "参照整合性を DB で守るかどうかは、障害時のデータ破損リスクに直結する。"
                  promptHint: "どの参照を foreign key にすべきか、削除時の挙動も含めて問う。"
                  aliases:
                    - "FK"
                    - "参照制約"
                - slug: "unique-constraint"
                  name: "一意制約"
                  summary: "重複を許さない列や列組を定義する制約。"
                  whyLearn: "業務上の一意性を DB に埋め込むと、重複データの混入を防げる。"
                  promptHint: "何が業務上一意であるべきか、主キーとの違いも含めて説明させる。"
                  aliases:
                    - "UNIQUE"
                    - "一意制約"
                - slug: "nullability"
                  name: "NULL許容性"
                  summary: "列が NULL を許すかどうかを定める性質。"
                  whyLearn: "NULL を安易に許すと、意味不明な欠損と未入力が混ざり、分析や制約が壊れやすい。"
                  promptHint: "この列はなぜ NULL を許すか、許さないかを意味論から問う。"
                  aliases:
                    - "nullable"
                    - "NOT NULL"

        - slug: "transactions-concurrency-and-query-performance"
          name: "トランザクション、同時実行、クエリ性能"
          summary: "更新の安全性と読み書き性能を支える実行時の仕組みを扱う。"
          concepts:
            - slug: "transactions-and-isolation"
              name: "トランザクションと分離レベル"
              summary: "更新単位、競合、可視性、異常の抑止を扱う。"
              whyLearn: "バグがコードではなく isolation や lock 設計にあることを見抜けるようになる。"
              terms:
                - slug: "acid"
                  name: "ACID"
                  summary: "トランザクションの原子性、一貫性、独立性、永続性を表す性質群。"
                  whyLearn: "DB に何を保証してほしいかを曖昧にせずに議論できる。"
                  promptHint: "ACID の各要素が破られると何が起こるかを具体例で問う。"
                  aliases:
                    - "ACID特性"
                - slug: "mvcc"
                  name: "MVCC"
                  summary: "多版同時実行制御により、読取りと書込みの競合を減らす仕組み。"
                  whyLearn: "ロックだけでなく版管理で整合性を保つ発想を理解すると、性能と安全性の両立を考えやすい。"
                  promptHint: "MVCC がなぜ読み取り性能に効くか、ロック中心設計と比較して問う。"
                  aliases:
                    - "多版同時実行制御"
                    - "Multi-Version Concurrency Control"
                - slug: "read-committed"
                  name: "Read Committed"
                  summary: "コミット済みデータだけを読む一般的な分離レベル。"
                  whyLearn: "デフォルト設定が何を防ぎ、何を防がないかを理解しておくと、偶発バグを減らせる。"
                  promptHint: "Read Committed で起こりうる異常を例で説明させる。"
                  aliases:
                    - "read committed"
                - slug: "serializable"
                  name: "Serializable"
                  summary: "直列実行と同等の結果を目指す強い分離レベル。"
                  whyLearn: "安全側に倒したい処理で、どの程度のコストで強い保証を得るかを判断できる。"
                  promptHint: "Serializable を使うべき処理と、不要な処理を区別させる。"
                  aliases:
                    - "serializable"

            - slug: "indexing-and-query-optimization"
              name: "インデックスとクエリ最適化"
              summary: "検索・結合・集計を高速化するための物理設計と実行計画を扱う。"
              whyLearn: "遅い SQL を感覚ではなく、アクセス経路と計画で説明できるようになる。"
              terms:
                - slug: "b-tree-index"
                  name: "B木インデックス"
                  summary: "範囲検索と等価検索に広く使われる代表的なインデックス構造。"
                  whyLearn: "最も基本的な index の性質を理解すると、多くの RDB の最適化を説明できる。"
                  promptHint: "この検索条件には B-tree が効くか、効かないかを問う。"
                  aliases:
                    - "B-tree"
                    - "B木インデックス"
                - slug: "covering-index"
                  name: "カバリングインデックス"
                  summary: "必要列が index 内で完結し、表本体参照を減らせるインデックス。"
                  whyLearn: "読み取り性能の改善余地を、列集合まで踏み込んで議論できる。"
                  promptHint: "なぜこの query に covering index が効くのかを説明させる。"
                  aliases:
                    - "covering index"
                    - "インクルードインデックス"
                - slug: "query-plan"
                  name: "実行計画"
                  summary: "DB が query をどの順序・方法で実行するかを表す計画。"
                  whyLearn: "SQL チューニングを勘ではなく plan 読解で進められる。"
                  promptHint: "この query plan からどのボトルネックが読めるかを問う。"
                  aliases:
                    - "execution plan"
                    - "実行計画"
                - slug: "join-algorithm"
                  name: "結合アルゴリズム"
                  summary: "nested loop、hash join、merge join などの結合実行方式。"
                  whyLearn: "結合順序や index の効果を、join algorithm の観点で説明できる。"
                  promptHint: "なぜこの join 方式が選ばれたか、データ量と索引から考えさせる。"
                  aliases:
                    - "hash join"
                    - "merge join"
                    - "nested loop"

    - slug: "analytical-data-modeling-storage"
      name: "分析用データモデリングと保存"
      summary: "分析・計測・意思決定に向いたモデル化と保存表現を扱う。"
      whyLearn: "運用データをそのまま読むのではなく、分析しやすい形に再構成する判断ができるようになる。"
      topicClusters:
        - slug: "warehouse-and-dimensional-modeling"
          name: "データウェアハウスと次元モデリング"
          summary: "分析のための事実と文脈の分離、履歴表現、集計粒度を扱う。"
          concepts:
            - slug: "dimensional-modeling"
              name: "次元モデリング"
              summary: "fact と dimension を中心に、分析しやすさを優先してモデル化する。"
              whyLearn: "集計性能と利用者の理解容易性を両立しやすい analytical schema を設計できる。"
              terms:
                - slug: "fact-table"
                  name: "ファクトテーブル"
                  summary: "出来事や計測値を保持する中心テーブル。"
                  whyLearn: "何を event / measurement とみなすかで、分析可能性が大きく変わる。"
                  promptHint: "この業務で何を fact とみなすべきか、粒度込みで問う。"
                  aliases:
                    - "fact"
                    - "事実テーブル"
                - slug: "dimension-table"
                  name: "ディメンションテーブル"
                  summary: "fact を解釈するための属性や文脈を保持するテーブル。"
                  whyLearn: "文脈と計測値を分けると、再利用しやすい分析軸を作れる。"
                  promptHint: "この属性は fact ではなく dimension に置くべきかを問う。"
                  aliases:
                    - "dimension"
                    - "次元テーブル"
                - slug: "star-schema"
                  name: "スタースキーマ"
                  summary: "中央の fact と周辺の dimension で構成する代表的な analytical schema。"
                  whyLearn: "分析 SQL と BI 利用のしやすさを高める典型形を持てる。"
                  promptHint: "なぜこの schema は star 型にすると扱いやすいかを説明させる。"
                  aliases:
                    - "スター型スキーマ"
                    - "star model"
                - slug: "grain"
                  name: "粒度"
                  summary: "一行が何を表すかという最小観測単位。"
                  whyLearn: "grain を誤ると、二重計上や曖昧な集計が起きやすい。"
                  promptHint: "この fact table の一行は何を表すのか、明示させる。"
                  aliases:
                    - "data grain"
                    - "粒度"

            - slug: "history-management-in-analytics"
              name: "分析における履歴管理"
              summary: "属性変化や時点スナップショットを分析可能な形で保持する。"
              whyLearn: "現時点の正しさだけでなく、過去時点の再現性を設計できる。"
              terms:
                - slug: "slowly-changing-dimension"
                  name: "緩やかに変化するディメンション"
                  summary: "時間とともに変わる属性を analytical に保持する設計パターン。"
                  whyLearn: "顧客属性や組織属性の履歴を、分析目的に応じて持ち分けられる。"
                  promptHint: "この属性は SCD のどの型で持つのがよいかを問う。"
                  aliases:
                    - "SCD"
                    - "slowly changing dimension"
                - slug: "conformed-dimension"
                  name: "共通ディメンション"
                  summary: "複数 fact で共有され、横断分析の軸となる dimension。"
                  whyLearn: "部門やデータマートをまたいで同じ意味の軸を保てる。"
                  promptHint: "なぜこの dimension を横断共通化する価値があるかを説明させる。"
                  aliases:
                    - "共通ディメンション"
                    - "conformed dim"
                - slug: "snapshot-fact-table"
                  name: "スナップショットファクト"
                  summary: "ある時点の状態を定期的に記録する fact table。"
                  whyLearn: "在庫、残高、契約状態のような状態量を時系列で追える。"
                  promptHint: "トランザクション fact ではなく snapshot fact が必要な理由を問う。"
                  aliases:
                    - "snapshot fact"
                    - "periodic snapshot"

        - slug: "lakehouse-and-table-formats"
          name: "レイクハウスとテーブルフォーマット"
          summary: "オブジェクトストレージ上で analytical table を運用するための形式を扱う。"
          concepts:
            - slug: "columnar-storage-and-layout"
              name: "列指向保存とデータ配置"
              summary: "分析クエリ向けの保存レイアウトとスキャン効率を扱う。"
              whyLearn: "どの形式・配置が読むコストを下げるかを判断できる。"
              terms:
                - slug: "parquet"
                  name: "Parquet"
                  summary: "分析用途で広く使われる列指向ファイル形式。"
                  whyLearn: "ファイル形式の違いが、圧縮・スキャン効率・互換性にどう効くか理解できる。"
                  promptHint: "CSV ではなく Parquet を使う利点を問う。"
                  aliases:
                    - "Apache Parquet"
                - slug: "columnar-storage"
                  name: "列指向ストレージ"
                  summary: "列ごとにデータを並べて保持し、集計読み取りに強い保存方式。"
                  whyLearn: "分析 workload と行指向 workload の違いを保存形式から説明できる。"
                  promptHint: "列指向が集計に向く理由を I/O 観点で説明させる。"
                  aliases:
                    - "column store"
                    - "列指向保存"
                - slug: "partition-pruning"
                  name: "パーティションプルーニング"
                  summary: "条件に合わない partition を読み飛ばして scan 量を減らす最適化。"
                  whyLearn: "日付 partition などの設計が query cost に直結することを理解できる。"
                  promptHint: "この filter 条件で pruning が効くかどうかを問う。"
                  aliases:
                    - "partition pruning"
                    - "パーティション除外"

            - slug: "table-formats-and-time-travel"
              name: "テーブルフォーマットとタイムトラベル"
              summary: "ファイル集合を一つのテーブルとして管理する仕組みを扱う。"
              whyLearn: "更新、履歴参照、schema change を object storage 上で安全に扱える。"
              terms:
                - slug: "apache-iceberg"
                  name: "Apache Iceberg"
                  summary: "大規模 analytical table のための open table format。"
                  whyLearn: "modern lakehouse の語彙として、snapshot・schema evolution・engine 間互換性を理解できる。"
                  promptHint: "Iceberg が単なる Parquet 集合とどう違うかを問う。"
                  aliases:
                    - "Iceberg"
                - slug: "delta-lake"
                  name: "Delta Lake"
                  summary: "ACID と transaction log を備えた lakehouse 向け storage framework。"
                  whyLearn: "object storage 上で update / delete / merge をどう成立させるかを理解できる。"
                  promptHint: "Delta Lake が analytical 更新をどう安全にするかを説明させる。"
                  aliases:
                    - "Delta"
                    - "Delta Lake"
                - slug: "schema-evolution"
                  name: "スキーマ進化"
                  summary: "列追加や型変更などの schema 変化を安全に処理する考え方。"
                  whyLearn: "上流変更を止めずに downstream を守る設計判断ができる。"
                  promptHint: "この schema 変更は互換か破壊的かを問う。"
                  aliases:
                    - "schema evolution"
                - slug: "time-travel"
                  name: "タイムトラベル"
                  summary: "過去 snapshot を参照して再現性のある分析を行う機能。"
                  whyLearn: "再計算や障害調査で、過去時点の状態を検証できる。"
                  promptHint: "タイムトラベルが再現性にどう効くかを問う。"
                  aliases:
                    - "snapshot query"
                    - "時点参照"

    - slug: "data-integration-pipelines-processing"
      name: "データ統合、パイプライン、処理"
      summary: "データの取り込み、変換、同期、再処理、時間意味論を扱う。"
      whyLearn: "データがどの保証でいつ反映されるかを理解し、壊れにくい pipeline を設計できるようになる。"
      topicClusters:
        - slug: "ingestion-and-change-propagation"
          name: "取り込みと変更伝播"
          summary: "ソースから analytical / downstream 系へどうデータを渡すかを扱う。"
          concepts:
            - slug: "ingestion-patterns"
              name: "取り込みパターン"
              summary: "抽出、ロード、変換の順序と責務分担を扱う。"
              whyLearn: "変換をどこで行うかを決めると、再利用性と運用負荷が変わる。"
              terms:
                - slug: "etl"
                  name: "ETL"
                  summary: "抽出、変換、ロードの順に処理する伝統的な方式。"
                  whyLearn: "変換を先に行う設計が有利な場面と不利な場面を説明できる。"
                  promptHint: "ETL と ELT の違いを、責務とコストの観点で比較させる。"
                  aliases:
                    - "Extract Transform Load"
                - slug: "elt"
                  name: "ELT"
                  summary: "抽出、ロード後に保存先側で変換する方式。"
                  whyLearn: "modern warehouse / lakehouse の設計前提を理解しやすくなる。"
                  promptHint: "なぜ現在は ELT が増えたのかを問う。"
                  aliases:
                    - "Extract Load Transform"
                - slug: "bulk-load"
                  name: "バルクロード"
                  summary: "データをまとまった単位で高速に投入する手法。"
                  whyLearn: "初回ロードや backfill で通常 insert と異なる最適化が必要になる。"
                  promptHint: "bulk load を使うべき場面を問う。"
                  aliases:
                    - "bulk import"
                    - "一括投入"

            - slug: "change-propagation-and-write-semantics"
              name: "変更伝播と書き込み意味論"
              summary: "差分反映、再送、重複、冪等性を扱う。"
              whyLearn: "再実行や障害復旧で二重反映を起こさない pipeline を設計できる。"
              terms:
                - slug: "change-data-capture"
                  name: "変更データキャプチャ"
                  summary: "ソース DB の insert / update / delete を差分として捕捉する方式。"
                  whyLearn: "全件再取得ではなく差分伝播する設計を理解すると、低遅延統合がしやすい。"
                  promptHint: "CDC が polling より有利な場面を問う。"
                  aliases:
                    - "CDC"
                    - "change data capture"
                - slug: "upsert"
                  name: "upsert"
                  summary: "存在すれば更新、なければ挿入する書き込みパターン。"
                  whyLearn: "差分同期や idempotent write の基本を支える。"
                  promptHint: "upsert が必要になる同期パターンを具体例で問う。"
                  aliases:
                    - "merge"
                    - "insert-or-update"
                - slug: "idempotency"
                  name: "冪等性"
                  summary: "同じ操作を繰り返しても結果が変わらない性質。"
                  whyLearn: "retry や replay が前提の pipeline では、冪等性が信頼性の中核になる。"
                  promptHint: "この処理は再実行しても安全かを判断させる。"
                  aliases:
                    - "idempotent write"
                    - "冪等"
                - slug: "debezium"
                  name: "Debezium"
                  summary: "CDC の代表的な open-source プラットフォーム。"
                  whyLearn: "CDC を具体的にどう実装するかを連想できるデファクト語彙になる。"
                  promptHint: "Debezium を使うと何が自動化されるかを問う。"
                  aliases:
                    - "Debezium"

        - slug: "batch-stream-and-orchestration"
          name: "バッチ、ストリーム、オーケストレーション"
          summary: "定期実行と連続処理、それらを束ねる workflow 管理を扱う。"
          concepts:
            - slug: "workflow-orchestration"
              name: "ワークフローオーケストレーション"
              summary: "依存関係、スケジュール、再実行、監視を扱う。"
              whyLearn: "pipeline を単発スクリプトではなく、運用可能な workflow として設計できる。"
              terms:
                - slug: "dag"
                  name: "DAG"
                  summary: "依存関係を非循環グラフで表した workflow 構造。"
                  whyLearn: "順序制御と再実行範囲を明示化できる。"
                  promptHint: "この pipeline を DAG にするとどの依存が重要かを問う。"
                  aliases:
                    - "Directed Acyclic Graph"
                    - "有向非巡回グラフ"
                - slug: "backfill"
                  name: "バックフィル"
                  summary: "過去期間の欠損や再計算を埋め戻す処理。"
                  whyLearn: "履歴再計算が普通に起こる前提で pipeline を設計できる。"
                  promptHint: "backfill 時に何が壊れやすいかを問う。"
                  aliases:
                    - "埋め戻し"
                    - "historical reprocessing"
                - slug: "retry-policy"
                  name: "再試行ポリシー"
                  summary: "失敗時にどの条件で再実行するかを定める方針。"
                  whyLearn: "一時障害と恒久障害を区別しない retry は逆に被害を広げる。"
                  promptHint: "この task の retry policy をどう設計するかを問う。"
                  aliases:
                    - "retry"
                    - "再試行方針"
                - slug: "apache-airflow"
                  name: "Apache Airflow"
                  summary: "workflow を author、schedule、monitor する代表的な orchestration 基盤。"
                  whyLearn: "orchestration の実務像を具体化しやすい。"
                  promptHint: "Airflow が単なる cron とどう違うかを問う。"
                  aliases:
                    - "Airflow"

            - slug: "stream-processing-time-semantics"
              name: "ストリーム処理と時間意味論"
              summary: "連続到着データを、どの時刻概念でどう集計するかを扱う。"
              whyLearn: "リアルタイム処理の難しさは throughput だけでなく time semantics にあると理解できる。"
              terms:
                - slug: "apache-kafka"
                  name: "Apache Kafka"
                  summary: "イベントストリームを保持し、配信する代表的な分散ログ基盤。"
                  whyLearn: "streaming の中核語彙として、producer / consumer / topic の発想を持てる。"
                  promptHint: "Kafka を queue とだけ理解すると何を見落とすかを問う。"
                  aliases:
                    - "Kafka"
                - slug: "event-time"
                  name: "イベント時刻"
                  summary: "処理時刻ではなく、出来事が実際に発生した時刻。"
                  whyLearn: "遅延到着データがあるとき、正しい集計の軸を選べる。"
                  promptHint: "processing time ではなく event time を使うべき理由を問う。"
                  aliases:
                    - "event time"
                    - "発生時刻"
                - slug: "watermark"
                  name: "ウォーターマーク"
                  summary: "どこまでの event time をほぼ受け取り済みとみなすかの閾値。"
                  whyLearn: "late data と結果確定のトレードオフを設計できる。"
                  promptHint: "watermark を短くしすぎると何が起こるかを問う。"
                  aliases:
                    - "watermark"
                    - "遅延許容閾値"
                - slug: "windowing"
                  name: "ウィンドウ集計"
                  summary: "時間単位でイベントを区切って集計する手法。"
                  whyLearn: "リアルタイム集計の設計で基本となる。"
                  promptHint: "tumbling と sliding の使い分けを問う。"
                  aliases:
                    - "windowing"
                    - "time window"
                - slug: "exactly-once-processing"
                  name: "Exactly-once処理"
                  summary: "重複や欠損を避けつつ、一度だけ処理されたように見せる保証。"
                  whyLearn: "streaming の保証レベルを誤解せずに設計できる。"
                  promptHint: "exactly-once が end-to-end では何を意味するかを問う。"
                  aliases:
                    - "exactly once"
                    - "一回だけ処理"

    - slug: "analytics-metrics-decision-support"
      name: "分析、指標、意思決定支援"
      summary: "分析クエリ、行動分析、KPI、metric 定義の共有を扱う。"
      whyLearn: "データを『ある』ものから『意思決定に使える』ものへ変える判断力が身につく。"
      topicClusters:
        - slug: "analytic-querying-and-behavioral-analysis"
          name: "分析クエリと行動分析"
          summary: "集計・比較・ユーザー行動理解のための分析技法を扱う。"
          concepts:
            - slug: "analytical-sql-and-aggregation"
              name: "分析SQLと集計"
              summary: "比較、順位、累積、要約のための SQL 技法を扱う。"
              whyLearn: "BI ツール任せにせず、分析の本質を SQL で説明できるようになる。"
              terms:
                - slug: "group-by"
                  name: "GROUP BY"
                  summary: "行を分類して集計する SQL の基本構文。"
                  whyLearn: "どの粒度で集計しているかを明示できる。"
                  promptHint: "この分析の group by key は何かを問う。"
                  aliases:
                    - "GROUP BY"
                - slug: "window-function"
                  name: "ウィンドウ関数"
                  summary: "行集合を保ったまま順位や累積を計算する SQL 機能。"
                  whyLearn: "差分比較、rolling 集計、順位付けを柔軟に表現できる。"
                  promptHint: "group by ではなく window function を使う理由を問う。"
                  aliases:
                    - "OVER句"
                    - "window function"
                - slug: "materialized-view"
                  name: "マテリアライズドビュー"
                  summary: "計算済み結果を保存して再利用する view。"
                  whyLearn: "重い集計の高速化と freshness のトレードオフを設計できる。"
                  promptHint: "materialized view を使う利点と欠点を問う。"
                  aliases:
                    - "materialized view"
                - slug: "olap"
                  name: "OLAP"
                  summary: "多次元的に集計・切り口変更を行う分析処理の考え方。"
                  whyLearn: "記録系 query と分析系 query の違いを整理できる。"
                  promptHint: "OLTP と OLAP の workload の違いを問う。"
                  aliases:
                    - "Online Analytical Processing"

            - slug: "funnel-cohort-and-retention-analysis"
              name: "ファネル、コホート、リテンション分析"
              summary: "ユーザー行動の推移や継続を理解する分析技法を扱う。"
              whyLearn: "単発の PV や件数ではなく、行動変化の構造を読む力がつく。"
              terms:
                - slug: "funnel-analysis"
                  name: "ファネル分析"
                  summary: "連続ステップの到達率と離脱箇所をみる分析。"
                  whyLearn: "オンボーディングや購買フローの摩擦点を特定しやすくなる。"
                  promptHint: "このプロダクトの主要ファネルをどう切るかを問う。"
                  aliases:
                    - "ファネル"
                    - "conversion funnel"
                - slug: "cohort-analysis"
                  name: "コホート分析"
                  summary: "同じ起点を持つ集団を時間で追う分析。"
                  whyLearn: "全体平均では見えない改善や劣化を cohort 単位で見分けられる。"
                  promptHint: "月次 cohort で見ると何がわかるかを問う。"
                  aliases:
                    - "cohort"
                    - "コホート"
                - slug: "retention-curve"
                  name: "リテンション曲線"
                  summary: "起点からの継続率を時系列で表す曲線。"
                  whyLearn: "一度使われた後に定着しているかを視覚的に理解できる。"
                  promptHint: "この retention curve から定着構造をどう読むかを問う。"
                  aliases:
                    - "retention"
                    - "継続率曲線"
                - slug: "sessionization"
                  name: "セッション化"
                  summary: "連続イベントを一まとまりの訪問や利用単位に変換する処理。"
                  whyLearn: "event 列から行動単位を定義しないと、product analytics の解釈がぶれやすい。"
                  promptHint: "session の境界をどう定義するかを問う。"
                  aliases:
                    - "sessionization"
                    - "セッション定義"

        - slug: "metrics-and-semantic-definitions"
          name: "指標設計とセマンティック定義"
          summary: "何を成功とみなし、同じ定義をどう共有するかを扱う。"
          concepts:
            - slug: "metric-design-and-guardrails"
              name: "指標設計とガードレール"
              summary: "主指標と副作用監視指標をどう置くかを扱う。"
              whyLearn: "数字を増やすこと自体ではなく、正しい方向に学習する metric system を設計できる。"
              terms:
                - slug: "kpi"
                  name: "KPI"
                  summary: "目的達成度を追うための重要指標。"
                  whyLearn: "どの数字を継続監視すべきかを、単なるログ数と区別できる。"
                  promptHint: "KPI と参考指標をどう分けるかを問う。"
                  aliases:
                    - "Key Performance Indicator"
                - slug: "north-star-metric"
                  name: "ノーススターメトリクス"
                  summary: "顧客価値の中核を表す、全体を導く代表指標。"
                  whyLearn: "施策を個別最適ではなく価値の中心線に結びつけられる。"
                  promptHint: "このプロダクトの North Star は何が妥当かを問う。"
                  aliases:
                    - "NSM"
                    - "North Star Metric"
                - slug: "guardrail-metric"
                  name: "ガードレール指標"
                  summary: "主指標改善の裏で悪化してはいけない副作用監視指標。"
                  whyLearn: "成長や最適化が品質や信頼を壊していないかを見張れる。"
                  promptHint: "この施策の guardrail に何を置くべきかを問う。"
                  aliases:
                    - "safety metric"
                    - "ガードレール"
                - slug: "heart-framework"
                  name: "HEARTフレームワーク"
                  summary: "Happiness、Engagement、Adoption、Retention、Task Success で UX を測る枠組み。"
                  whyLearn: "UX を感想ではなく、goal-signal-metric で設計できる。"
                  promptHint: "HEART の各軸にどんな metric を置けるかを問う。"
                  aliases:
                    - "HEART"
                - slug: "aarrr"
                  name: "AARRR"
                  summary: "Acquisition、Activation、Retention、Referral、Revenue で成長をみる枠組み。"
                  whyLearn: "初期成長や事業学習で、どの段階が詰まっているかを整理しやすい。"
                  promptHint: "このプロダクトで AARRR の各段階に何を置くかを問う。"
                  aliases:
                    - "Pirate Metrics"
                    - "AARRR"

            - slug: "semantic-layer-and-metric-governance"
              name: "セマンティックレイヤーと指標ガバナンス"
              summary: "指標定義を BI ごとではなく共通層に持つ考え方を扱う。"
              whyLearn: "部署ごとに数字が違う状態を減らし、metric の再利用性を高められる。"
              terms:
                - slug: "semantic-layer"
                  name: "セマンティックレイヤー"
                  summary: "metric、dimension、entity の定義を共通化する層。"
                  whyLearn: "同じ売上や継続率がツールごとに違う問題を減らせる。"
                  promptHint: "なぜ SQL は合っているのに metric がずれるのかを問う。"
                  aliases:
                    - "semantic layer"
                    - "意味定義層"
                - slug: "metric-definition"
                  name: "指標定義"
                  summary: "指標名、計算式、粒度、フィルタ、時間基準を含む定義。"
                  whyLearn: "指標の衝突は計算以前に定義の衝突で起きると理解できる。"
                  promptHint: "この metric は定義として何が欠けているかを問う。"
                  aliases:
                    - "metric spec"
                    - "指標仕様"
                - slug: "denominator-design"
                  name: "分母設計"
                  summary: "率や割合を計算するとき、何を母集団とみなすかの設計。"
                  whyLearn: "conversion 率や継続率の解釈は分母で大きく変わる。"
                  promptHint: "この比率の分母はなぜそれでよいのかを問う。"
                  aliases:
                    - "denominator"
                    - "母集団設計"
                - slug: "dbt-semantic-layer"
                  name: "dbt Semantic Layer"
                  summary: "dbt / MetricFlow による中央集権的な metric 定義の実装。"
                  whyLearn: "semantic layer の実務実装を具体的に理解する入り口になる。"
                  promptHint: "dbt Semantic Layer が BI ごとの metric 定義とどう違うかを問う。"
                  aliases:
                    - "MetricFlow"
                    - "dbt SL"

    - slug: "experimentation-causal-learning"
      name: "実験と因果学習"
      summary: "変化の原因を見分けるための実験設計、推定、オンライン運用を扱う。"
      whyLearn: "数字が動いたという事実から一歩進み、その理由をより信頼して判断できるようになる。"
      topicClusters:
        - slug: "experiment-design-and-inference"
          name: "実験設計と推論"
          summary: "比較可能な条件を作り、差をどう解釈するかを扱う。"
          concepts:
            - slug: "randomized-experiment-design"
              name: "ランダム化実験設計"
              summary: "比較の土台を公平に作る設計原則を扱う。"
              whyLearn: "効果差が施策由来か、もともとの群差かを区別しやすくなる。"
              terms:
                - slug: "treatment-group"
                  name: "処置群"
                  summary: "新しい施策や変更を受ける実験群。"
                  whyLearn: "どの群が何を受けたかを明確にしないと、比較が曖昧になる。"
                  promptHint: "treatment と control の違いを一文で説明させる。"
                  aliases:
                    - "treatment"
                    - "実験群"
                - slug: "randomization"
                  name: "ランダム割付"
                  summary: "対象を確率的に群へ割り当てる操作。"
                  whyLearn: "系統的な偏りを減らし、因果解釈の基礎を作れる。"
                  promptHint: "なぜ randomization が必要か、観察比較と対比して問う。"
                  aliases:
                    - "ランダム化"
                    - "random assignment"
                - slug: "blocking"
                  name: "ブロッキング"
                  summary: "重要なばらつき要因ごとに層を作って比較する設計。"
                  whyLearn: "ノイズを減らし、より小さな差を検出しやすくできる。"
                  promptHint: "どの要因で block を切るとよいかを問う。"
                  aliases:
                    - "blocking"
                    - "層化"
                - slug: "minimum-detectable-effect"
                  name: "最小検出効果"
                  summary: "実験で検出したい最小の差。"
                  whyLearn: "必要サンプル数や実験期間の現実性を判断できる。"
                  promptHint: "MDE を小さくすると何が増えるかを問う。"
                  aliases:
                    - "MDE"
                    - "minimum detectable effect"

            - slug: "statistical-inference-for-experiments"
              name: "実験の統計的推論"
              summary: "観測差を不確実性込みで解釈する方法を扱う。"
              whyLearn: "結果を白黒でなく、区間と不確実性で読めるようになる。"
              terms:
                - slug: "confidence-interval"
                  name: "信頼区間"
                  summary: "推定値の不確実性を区間で表す方法。"
                  whyLearn: "効果の大きさと不確かさを同時に見られる。"
                  promptHint: "p-value だけでなく CI を見るべき理由を問う。"
                  aliases:
                    - "CI"
                    - "confidence interval"
                - slug: "p-value"
                  name: "p値"
                  summary: "観測結果が特定のモデルとどの程度両立しにくいかを示す量。"
                  whyLearn: "よく誤解される指標なので、正しく扱えないと意思決定を誤りやすい。"
                  promptHint: "p値が示していないものは何かを問う。"
                  aliases:
                    - "p-value"
                    - "p値"
                - slug: "statistical-power"
                  name: "統計的検出力"
                  summary: "実際に差があるときに検出できる確率。"
                  whyLearn: "不検出を『差がない』と誤解しないために必要。"
                  promptHint: "power が低い実験の怖さを問う。"
                  aliases:
                    - "power"
                    - "検出力"
                - slug: "multiple-testing"
                  name: "多重検定"
                  summary: "多数の指標や切り口を同時に見ることで偶然の有意が増える問題。"
                  whyLearn: "指標をたくさん見た実験で、見かけの勝ちを過信しにくくなる。"
                  promptHint: "多重検定を無視すると何が起こるかを問う。"
                  aliases:
                    - "multiple comparisons"
                    - "多重比較"

        - slug: "online-controlled-experiments"
          name: "オンライン統制実験"
          summary: "実サービス上での A/B テスト実行と信頼性確保を扱う。"
          concepts:
            - slug: "experiment-execution-and-assignment"
              name: "実験実行と割当運用"
              summary: "単位、配分、フラグ、持続運用を扱う。"
              whyLearn: "統計だけでなく、配信と計測の運用が実験の成否を左右すると理解できる。"
              terms:
                - slug: "experiment-unit"
                  name: "実験単位"
                  summary: "ユーザー、セッション、組織など、割り当ての基本単位。"
                  whyLearn: "誤った unit を選ぶと干渉や重複で実験が歪む。"
                  promptHint: "この変更は user 単位か session 単位かを問う。"
                  aliases:
                    - "randomization unit"
                    - "unit of analysis"
                - slug: "traffic-allocation"
                  name: "トラフィック配分"
                  summary: "control と treatment にどれだけ流量を割り当てるかの設計。"
                  whyLearn: "リスクと学習速度を両立する rollout 設計ができる。"
                  promptHint: "50/50 以外の配分を選ぶ理由を問う。"
                  aliases:
                    - "allocation"
                    - "traffic split"
                - slug: "holdout-group"
                  name: "ホールドアウト群"
                  summary: "長期比較や影響観測のために変更から外す群。"
                  whyLearn: "全員最適化だけでは見えない長期効果やドリフトを観測できる。"
                  promptHint: "holdout を残す価値がある場面を問う。"
                  aliases:
                    - "holdout"
                    - "残置群"
                - slug: "feature-flag"
                  name: "フィーチャーフラグ"
                  summary: "機能の有効化を実行時に制御する仕組み。"
                  whyLearn: "experiment と rollout を安全に結びつける実務基盤になる。"
                  promptHint: "feature flag が実験運用をどう支えるかを問う。"
                  aliases:
                    - "feature toggle"
                    - "flag"

            - slug: "trustworthiness-and-variance-reduction"
              name: "信頼性確保と分散削減"
              summary: "実験結果を信じられる状態にするための検査と改善を扱う。"
              whyLearn: "A/B テストは回すだけでは足りず、壊れていないかを常に疑う視点が必要になる。"
              terms:
                - slug: "sample-ratio-mismatch"
                  name: "サンプル比不一致"
                  summary: "想定した割当比と実測比が大きくずれる異常。"
                  whyLearn: "SRM は実験インフラや計測の破綻を示す重要な信号になる。"
                  promptHint: "SRM を見つけたらまず何を疑うべきかを問う。"
                  aliases:
                    - "SRM"
                    - "sample ratio mismatch"
                - slug: "cuped"
                  name: "CUPED"
                  summary: "事前データを用いて分散を減らし、感度を上げる手法。"
                  whyLearn: "同じトラフィックでも学習速度を高められる。"
                  promptHint: "CUPED が何を減らし、何を増やすのかを問う。"
                  aliases:
                    - "Controlled-experiment Using Pre-Experiment Data"
                    - "CUPED"
                - slug: "sequential-testing"
                  name: "逐次検定"
                  summary: "途中経過を見ながらも誤判定を制御する分析の考え方。"
                  whyLearn: "毎日結果を見る現場で、peek 問題を意識できる。"
                  promptHint: "途中で止める実験が危険になる理由を問う。"
                  aliases:
                    - "sequential analysis"
                    - "逐次解析"
                - slug: "rollback-criteria"
                  name: "ロールバック基準"
                  summary: "guardrail 悪化や障害時に experiment / rollout を戻す条件。"
                  whyLearn: "学習速度だけでなく安全性を実験運用に組み込める。"
                  promptHint: "どの指標悪化で rollback すべきかを問う。"
                  aliases:
                    - "rollback rule"
                    - "停止基準"

    - slug: "data-quality-metadata-observability"
      name: "データ品質、メタデータ、可観測性"
      summary: "信頼できるデータ利用のために、品質、説明可能性、影響追跡を扱う。"
      whyLearn: "正しい metric や experiment も、入力データが壊れていれば意味を失うため。"
      topicClusters:
        - slug: "data-quality-and-testing"
          name: "データ品質とテスト"
          summary: "期待されるデータ状態を明示し、自動検査する。"
          concepts:
            - slug: "quality-dimensions-and-rules"
              name: "品質次元とルール"
              summary: "何をもって data quality とみなすかの評価軸を扱う。"
              whyLearn: "品質を雰囲気ではなく、具体的な次元に分けて議論できる。"
              terms:
                - slug: "completeness"
                  name: "完全性"
                  summary: "必要なデータが欠けずに揃っている度合い。"
                  whyLearn: "欠損は downstream の集計や ML 以前に基本指標を壊す。"
                  promptHint: "完全性をどの列と粒度でチェックするかを問う。"
                  aliases:
                    - "completeness"
                    - "欠損率"
                - slug: "freshness"
                  name: "鮮度"
                  summary: "データが期待する時間内に到着・更新されている度合い。"
                  whyLearn: "古いけれど正しいデータは、意思決定では誤りになりうる。"
                  promptHint: "このデータの freshness 要件をどう定義するかを問う。"
                  aliases:
                    - "freshness"
                    - "遅延"
                - slug: "uniqueness"
                  name: "一意性"
                  summary: "重複が想定外に混入していない度合い。"
                  whyLearn: "重複は売上や利用回数の過大計上を生みやすい。"
                  promptHint: "どのキーで uniqueness を見るべきかを問う。"
                  aliases:
                    - "uniqueness"
                    - "重複なし"
                - slug: "validity"
                  name: "妥当性"
                  summary: "値が型、範囲、ルールに適合している度合い。"
                  whyLearn: "欠損していなくても、意味的におかしい値は品質問題になる。"
                  promptHint: "この列の validity rule をどう書くかを問う。"
                  aliases:
                    - "validity"
                    - "形式妥当性"

            - slug: "validation-and-anomaly-detection"
              name: "検証と異常検知"
              summary: "ルールベース検査と統計的な異常検出を扱う。"
              whyLearn: "known knowns と unknown unknowns の両方に備えられる。"
              terms:
                - slug: "expectation-test"
                  name: "Expectationテスト"
                  summary: "データに対して『こうあるべき』を宣言し検査するテスト。"
                  whyLearn: "データ品質をコード化して CI / pipeline に組み込める。"
                  promptHint: "このデータセットにどんな expectation を置くべきかを問う。"
                  aliases:
                    - "data expectation"
                    - "期待値テスト"
                - slug: "schema-test"
                  name: "スキーマテスト"
                  summary: "列存在、型、制約、互換性を検査するテスト。"
                  whyLearn: "上流変更による壊れ方の多くは schema drift に起因する。"
                  promptHint: "破壊的 schema change をどう検知するかを問う。"
                  aliases:
                    - "schema validation"
                    - "スキーマ検証"
                - slug: "anomaly-detection"
                  name: "異常検知"
                  summary: "分布や件数、遅延の通常パターンからの逸脱を見つける方法。"
                  whyLearn: "明示ルールで書けない品質事故を早期に拾える。"
                  promptHint: "ルールベースでは見逃す異常の例を問う。"
                  aliases:
                    - "anomaly detection"
                    - "逸脱検知"
                - slug: "great-expectations"
                  name: "Great Expectations"
                  summary: "Expectation ベースの data quality 管理を支援する代表的 OSS。"
                  whyLearn: "品質テストを人間可読に管理する実務像を理解しやすい。"
                  promptHint: "Great Expectations が単なる assert とどう違うかを問う。"
                  aliases:
                    - "GX"
                    - "Great Expectations"

        - slug: "metadata-lineage-and-discovery"
          name: "メタデータ、リネージ、発見性"
          summary: "データの意味、由来、依存関係を追跡し、再利用可能にする。"
          concepts:
            - slug: "catalogs-lineage-and-provenance"
              name: "カタログ、リネージ、来歴"
              summary: "データ資産の説明と影響追跡の基盤を扱う。"
              whyLearn: "『この数はどこから来たか』を素早く答えられるようになる。"
              terms:
                - slug: "data-catalog"
                  name: "データカタログ"
                  summary: "データ資産を検索・記述・共有するための台帳。"
                  whyLearn: "存在を知られないデータは再利用されず、重複作成が増える。"
                  promptHint: "良い data catalog に最低限必要な情報を問う。"
                  aliases:
                    - "catalog"
                    - "データ台帳"
                - slug: "business-glossary"
                  name: "ビジネス用語集"
                  summary: "売上、顧客、契約などの意味を業務語彙として定義する仕組み。"
                  whyLearn: "SQL が合っていても用語の意味が違えば、数字は揃わない。"
                  promptHint: "business glossary が metric 定義にどう効くかを問う。"
                  aliases:
                    - "glossary"
                    - "用語集"
                - slug: "data-lineage"
                  name: "データリネージ"
                  summary: "データがどこから来てどこへ流れるかを表す関係情報。"
                  whyLearn: "変更影響、障害原因、信頼性をたどる土台になる。"
                  promptHint: "lineage がないと障害解析で何が辛いかを問う。"
                  aliases:
                    - "lineage"
                    - "系譜情報"
                - slug: "provenance"
                  name: "来歴"
                  summary: "データの生成・変換・利用履歴の記録。"
                  whyLearn: "単なる流れだけでなく、どう作られたかの再現性を持てる。"
                  promptHint: "lineage と provenance の違いを問う。"
                  aliases:
                    - "data provenance"
                    - "来歴情報"

            - slug: "contracts-and-open-metadata-standards"
              name: "データ契約とオープンメタデータ標準"
              summary: "producer と consumer の期待を形式化し、相互運用性を高める。"
              whyLearn: "組織横断の data product 化を進めるとき、暗黙知では限界が来る。"
              terms:
                - slug: "data-contract"
                  name: "データコントラクト"
                  summary: "スキーマ、品質、SLA、意味を producer / consumer 間で明示する契約。"
                  whyLearn: "上流変更の破壊性を下げ、責務境界を明確にできる。"
                  promptHint: "data contract に何を書くべきかを問う。"
                  aliases:
                    - "data contract"
                    - "データ契約"
                - slug: "openlineage"
                  name: "OpenLineage"
                  summary: "lineage metadata の収集と交換のための open standard。"
                  whyLearn: "lineage をツール横断で扱う発想を持てる。"
                  promptHint: "OpenLineage が job / dataset / run をどう表すかを問う。"
                  aliases:
                    - "OpenLineage"
                - slug: "openmetadata"
                  name: "OpenMetadata"
                  summary: "メタデータ管理のための open standards / ecosystem を持つ OSS。"
                  whyLearn: "catalog、lineage、quality を統合的に考える入口になる。"
                  promptHint: "OpenMetadata が catalog 以上に何を扱うかを問う。"
                  aliases:
                    - "OpenMetadata"
                - slug: "open-data-contract-standard"
                  name: "Open Data Contract Standard"
                  summary: "data contract を記述するための open standard の一つ。"
                  whyLearn: "emerging practice を vocabulary として押さえることで、今後の組織設計議論に備えられる。"
                  promptHint: "ODCS のような standard が必要になる背景を問う。"
                  aliases:
                    - "ODCS"
                    - "Open Data Contract Standard"

edges:
  - from: "functional-dependency"
    to: "normalization"
    relationType: "prerequisite"
    reason: "関数従属性を理解すると、なぜ表を分解するのかを根拠付きで説明しやすい。"

  - from: "entity-relationship-model"
    to: "primary-key"
    relationType: "prerequisite"
    reason: "概念モデリングで識別対象を定めることが、主キー設計の前提になる。"

  - from: "primary-key"
    to: "foreign-key"
    relationType: "related"
    reason: "参照整合性は、参照先の一意識別が定まってはじめて成立する。"

  - from: "acid"
    to: "mvcc"
    relationType: "related"
    reason: "MVCC は ACID の一部、特に isolation を実装する代表的な仕組みとして理解すると整理しやすい。"

  - from: "mvcc"
    to: "read-committed"
    relationType: "used_in"
    reason: "MVCC は Read Committed の可視性制御を理解する土台になる。"

  - from: "mvcc"
    to: "serializable"
    relationType: "used_in"
    reason: "強い分離レベルでも、版管理と可視性の理解が重要になる。"

  - from: "query-plan"
    to: "b-tree-index"
    relationType: "related"
    reason: "インデックスの効果は最終的に実行計画へ現れるため、両者はセットで読むべき。"

  - from: "star-schema"
    to: "normalization"
    relationType: "compare_with"
    reason: "正規化は更新整合性を、star schema は分析利用性を優先しやすく、目的が異なる。"

  - from: "grain"
    to: "fact-table"
    relationType: "prerequisite"
    reason: "fact table は一行の意味、すなわち grain を先に決めないと設計できない。"

  - from: "slowly-changing-dimension"
    to: "snapshot-fact-table"
    relationType: "compare_with"
    reason: "属性履歴を dimension 側に持つのか、状態時点を fact 側に持つのかは分析目的で使い分ける。"

  - from: "parquet"
    to: "partition-pruning"
    relationType: "used_in"
    reason: "列指向保存と partition 設計は、scan 最適化で実務上よく組み合わされる。"

  - from: "apache-iceberg"
    to: "delta-lake"
    relationType: "compare_with"
    reason: "どちらも lakehouse 文脈の代表語であり、table format / ecosystem / 運用前提を比較する価値が高い。"

  - from: "change-data-capture"
    to: "debezium"
    relationType: "used_in"
    reason: "Debezium は CDC を具体的に実装する代表的な OSS である。"

  - from: "idempotency"
    to: "upsert"
    relationType: "related"
    reason: "差分再送や retry を安全にする実装として upsert はよく使われる。"

  - from: "dag"
    to: "backfill"
    relationType: "used_in"
    reason: "backfill では依存関係に沿って再実行範囲を制御する必要がある。"

  - from: "event-time"
    to: "watermark"
    relationType: "prerequisite"
    reason: "ウォーターマークは event time に対して定義される概念である。"

  - from: "watermark"
    to: "windowing"
    relationType: "used_in"
    reason: "late data をどこまで集計へ反映するかは window 処理と密接に結びつく。"

  - from: "group-by"
    to: "window-function"
    relationType: "compare_with"
    reason: "どちらも集計に使うが、行を潰すか保つかで用途が異なる。"

  - from: "cohort-analysis"
    to: "retention-curve"
    relationType: "used_in"
    reason: "リテンション曲線は cohort 単位の継続観測で読むと意味が明確になる。"

  - from: "metric-definition"
    to: "semantic-layer"
    relationType: "prerequisite"
    reason: "semantic layer は個々の metric definition を共通化して初めて成立する。"

  - from: "north-star-metric"
    to: "guardrail-metric"
    relationType: "related"
    reason: "主指標だけでは局所最適に陥りやすく、guardrail と対で設計する必要がある。"

  - from: "heart-framework"
    to: "north-star-metric"
    relationType: "compare_with"
    reason: "HEART は UX を多面的に評価する枠組みで、North Star は全体を導く単一指標を置く考え方である。"

  - from: "randomization"
    to: "experiment-unit"
    relationType: "prerequisite"
    reason: "何を単位にランダム割付するかを決めないと、実験設計が成立しない。"

  - from: "minimum-detectable-effect"
    to: "statistical-power"
    relationType: "related"
    reason: "MDE は必要サンプル数と検出力の設計で常に一緒に考える。"

  - from: "confidence-interval"
    to: "p-value"
    relationType: "compare_with"
    reason: "どちらも実験結果の解釈に使うが、区間推定と有意性判定では読み方が異なる。"

  - from: "sample-ratio-mismatch"
    to: "traffic-allocation"
    relationType: "related"
    reason: "SRM は割当や計測実装が意図通りに動いていない兆候として現れる。"

  - from: "cuped"
    to: "statistical-power"
    relationType: "related"
    reason: "CUPED は分散削減を通じて、同じトラフィックでより高い検出力を目指す。"

  - from: "guardrail-metric"
    to: "rollback-criteria"
    relationType: "used_in"
    reason: "guardrail の悪化は rollout や experiment を戻す判断条件になりやすい。"

  - from: "schema-test"
    to: "expectation-test"
    relationType: "compare_with"
    reason: "schema test は構造検査、expectation test は意味や分布を含む広い検査として使い分ける。"

  - from: "data-lineage"
    to: "openlineage"
    relationType: "used_in"
    reason: "OpenLineage は lineage metadata を表現・交換する具体的な標準実装語彙である。"

  - from: "data-catalog"
    to: "business-glossary"
    relationType: "related"
    reason: "catalog の発見性と glossary の意味定義は、実務では一緒に整備されることが多い。"

  - from: "data-contract"
    to: "open-data-contract-standard"
    relationType: "used_in"
    reason: "ODCS は data contract を形式化する実装可能な標準の一つである。"

  - from: "provenance"
    to: "data-lineage"
    relationType: "related"
    reason: "lineage が流れを示すのに対し、provenance は生成・変換の履歴まで含めて説明性を高める。"
