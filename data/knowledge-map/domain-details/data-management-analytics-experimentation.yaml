domain:
  slug: "data-management-analytics-experimentation"
  name: "データ管理、分析、実験"
  summary: "データを設計、保存、移動、分析、計測し、意思決定や学習に使う領域。"
  boundaryNotes: "データ保存、パイプライン、指標、実験を扱う。予測モデルは AI、プライバシー義務は Security, Privacy, and Governance に寄せる。"
  knowledgeAreas:
    - slug: "transactional-data-systems"
      name: "トランザクションデータシステム"
      summary: "運用系データを整合性を保ちながら記録し、更新し、読むための基礎を扱う。"
      whyLearn: "プロダクトの source of truth を安全に設計し、競合、整合性、性能の観点でレビューできるようになる。"
      topicClusters:
        - slug: "logical-data-modeling-and-integrity"
          name: "論理データモデリングと整合性"
          summary: "データの意味構造を表現し、制約で正しさを守る。"
          concepts:
            - slug: "relational-modeling-and-normalization"
              name: "関係モデリングと正規化"
              summary: "関係モデルの基本表現と冗長性削減の考え方を扱う。"
              whyLearn: "テーブル分割や属性配置を説明できると、更新不整合や将来の保守コストを減らせる。"
              terms:
                - slug: "entity-relationship-model"
                  name: "ERモデル"
                  summary: "エンティティ、属性、関係で業務対象を整理するモデル。"
                  whyLearn: "実装前に対象領域の概念構造を共有できると、後のテーブル設計の手戻りが減る。"
                  promptHint: "ERモデルで表したとき、エンティティ・属性・関係はどう分かれるかを問う。"
                  aliases:
                    - "ER model"
                    - "ER図"
                  search:
                    keywords:
                      - ERモデル
                      - ER図
                      - ERD
                      - entity relationship diagram
                      - conceptual data model
                      - entity
                      - relationship
                      - cardinality
                      - crow's foot notation
                      - データモデリング
                    commonSignals:
                      - エンティティ、属性、関係、多重度を整理している
                      - 「ユーザーと注文の関係」「顧客と契約の関係」のような業務概念の整理
                      - ERD、crow's foot、one-to-many、many-to-many という記述
                      - 実装前にテーブル候補や関係性を図示している
                    antiSignals:
                      - SQLのJOIN最適化や実行計画だけの話はERモデルではない
                      - UMLクラス図のみでDB設計に触れていない場合は誤爆しやすい
                      - APIリソース設計だけで永続データ構造を扱っていない場合
                    relatedNames:
                      - name: Mermaid ER diagram
                        kind: tool
                        relevance: ER図をテキストで記述してドキュメント化するときによく使われる。
                        officialUrl: https://mermaid.js.org/syntax/entityRelationshipDiagram.html
                      - name: PlantUML ER diagram
                        kind: tool
                        relevance: 設計ドキュメント上でER図をコード管理したい場面で一緒に出やすい。
                        officialUrl: https://plantuml.com/ie-diagram
                      - name: dbdiagram.io
                        kind: tool
                        relevance: ER図やテーブル定義を軽量に共有する実務ツールとして参照される。
                        officialUrl: https://dbdiagram.io/

                - slug: "functional-dependency"
                  name: "関数従属性"
                  summary: "ある属性集合が別の属性を一意に決める関係。"
                  whyLearn: "正規化やキー設計の根拠を言語化できると、設計レビューの質が上がる。"
                  promptHint: "どの属性が他の属性を決めるか、従属性の形で説明させる。"
                  aliases:
                    - "FD"
                    - "関数的従属性"
                - slug: "normalization"
                  name: "正規化"
                  summary: "冗長性と更新不整合を減らすために表を分解する設計原則。"
                  whyLearn: "一見便利な denormalized 設計が、更新時にどのような破綻を生むかを見抜ける。"
                  promptHint: "このテーブルを正規化すると何が改善し、何がトレードオフになるかを問う。"
                  aliases:
                    - "正規形"
                    - "normal forms"
                  search:
                    keywords:
                      - 正規化
                      - normalization
                      - normal form
                      - 1NF
                      - 2NF
                      - 3NF
                      - BCNF
                      - denormalization
                      - update anomaly
                      - 冗長性
                      - 更新不整合
                    commonSignals:
                      - テーブル分割、冗長列、更新不整合を議論している
                      - 1NF、2NF、3NF、BCNF のどれかが登場する
                      - 同じ情報が複数箇所に保存されるリスクを扱っている
                      - denormalized table と normalized table を比較している
                    antiSignals:
                      - 機械学習の特徴量正規化や標準化の話は対象外
                      - テキスト正規化、Unicode正規化、住所正規化は別文脈
                      - パフォーマンス目的の非正規化だけで正規形に触れない場合は弱い
                    relatedNames:
                      - name: Third Normal Form
                        kind: method
                        relevance: 実務的なRDB設計で最も頻繁に参照される正規形の一つ。
                      - name: Boyce-Codd Normal Form
                        kind: method
                        relevance: 関数従属性に基づくより厳密な正規化を議論するときに出る。
                      - name: Kimball dimensional modeling
                        kind: method
                        relevance: 分析用途では正規化と対比される非正規化寄りの設計として出やすい。
            - slug: "schema-and-integrity-constraints"
              name: "スキーマと整合性制約"
              summary: "データベースが機械的に守るべき制約を扱う。"
              whyLearn: "アプリケーションコードだけに正しさを任せず、DB 側で守る境界を設計できる。"
              terms:
                - slug: "primary-key"
                  name: "主キー"
                  summary: "行を一意に識別するためのキー。"
                  whyLearn: "識別子設計が曖昧だと、更新・参照・結合の前提が崩れる。"
                  promptHint: "この表の主キーは何が適切か、自然キーと代替案も含めて考えさせる。"
                  aliases:
                    - "PK"
                    - "主キー"
                  search:
                    keywords:
                      - 主キー
                      - PK
                      - primary key
                      - surrogate key
                      - natural key
                      - composite key
                      - identifier
                      - record identity
                      - UUID
                      - auto increment
                    commonSignals:
                      - レコードを一意に識別する列を決めている
                      - UUID、連番ID、自然キー、複合キーを比較している
                      - 「このテーブルのID設計」「識別子の安定性」を議論している
                      - primary key constraint や PK violation が登場する
                    antiSignals:
                      - APIキーや暗号鍵の話は主キーではない
                      - Redis key の命名だけでRDBの行識別に触れていない場合
                      - キーボードのprimary keyのような一般語の誤用
                    relatedNames:
                      - name: UUID
                        kind: standard
                        relevance: 分散環境やアプリ側ID生成で主キー候補として頻繁に使われる。
                      - name: ULID
                        kind: standard
                        relevance: ソート可能な一意IDとして主キー設計の比較対象に出やすい。
                        officialUrl: https://github.com/ulid/spec
                      - name: Snowflake ID
                        kind: pattern
                        relevance: 時刻情報を含む分散ID生成方式として主キー設計で参照される。

                - slug: "foreign-key"


                  search:

                    keywords:

                      - 外部キー

                      - FK

                      - foreign key

                      - referential integrity

                      - 参照整合性

                      - cascade delete

                      - ON DELETE

                      - ON UPDATE

                      - orphan record

                      - parent child table

                    commonSignals:

                      - 親子テーブル、参照先、参照元、削除時挙動を議論している

                      - orphan rows、cascade、restrict、set null が出る

                      - DB制約として関連の正しさを守るかどうかを検討している

                      - 外部キー制約を貼るかアプリ側で担保するかを比較している

                    antiSignals:

                      - 外部APIキー、外部サービスの認証キーは対象外

                      - 単なるJOIN条件だけで参照制約の話がない場合は弱い

                      - NoSQLの埋め込み設計で参照整合性を扱わない場合

                    relatedNames:

                      - name: PostgreSQL Foreign Keys

                        kind: tool

                        relevance: RDBで外部キー制約や削除時挙動を確認する実務例としてよく出る。

                        officialUrl: https://www.postgresql.org/docs/current/ddl-constraints.html

                      - name: Prisma referential actions

                        kind: framework

                        relevance: ORMで外部キーや削除時アクションを扱うときに関連して出やすい。

                        officialUrl: https://www.prisma.io/docs/orm/prisma-schema/data-model/relations/referential-actions

                      - name: SQLAlchemy relationships

                        kind: library

                        relevance: アプリ側の関連定義とDB外部キー制約の対応を考えるときに出る。

                        officialUrl: https://docs.sqlalchemy.org/
                  name: "外部キー"
                  summary: "他表の主キーや一意キーへの参照制約。"
                  whyLearn: "参照整合性を DB で守るかどうかは、障害時のデータ破損リスクに直結する。"
                  promptHint: "どの参照を foreign key にすべきか、削除時の挙動も含めて問う。"
                  aliases:
                    - "FK"
                    - "参照制約"
                - slug: "unique-constraint"
                  name: "一意制約"
                  summary: "重複を許さない列や列組を定義する制約。"
                  whyLearn: "業務上の一意性を DB に埋め込むと、重複データの混入を防げる。"
                  promptHint: "何が業務上一意であるべきか、主キーとの違いも含めて説明させる。"
                  aliases:
                    - "UNIQUE"
                    - "一意制約"
                - slug: "nullability"
                  name: "NULL許容性"
                  summary: "列が NULL を許すかどうかを定める性質。"
                  whyLearn: "NULL を安易に許すと、意味不明な欠損と未入力が混ざり、分析や制約が壊れやすい。"
                  promptHint: "この列はなぜ NULL を許すか、許さないかを意味論から問う。"
                  aliases:
                    - "nullable"
                    - "NOT NULL"

        - slug: "transactions-concurrency-and-query-performance"
          name: "トランザクション、同時実行、クエリ性能"
          summary: "更新の安全性と読み書き性能を支える実行時の仕組みを扱う。"
          concepts:
            - slug: "transactions-and-isolation"
              name: "トランザクションと分離レベル"
              summary: "更新単位、競合、可視性、異常の抑止を扱う。"
              whyLearn: "バグがコードではなく isolation や lock 設計にあることを見抜けるようになる。"
              terms:
                - slug: "acid"
                  name: "ACID"
                  summary: "トランザクションの原子性、一貫性、独立性、永続性を表す性質群。"
                  whyLearn: "DB に何を保証してほしいかを曖昧にせずに議論できる。"
                  promptHint: "ACID の各要素が破られると何が起こるかを具体例で問う。"
                  aliases:
                    - "ACID特性"
                  search:
                    keywords:
                      - ACID
                      - ACID特性
                      - atomicity
                      - consistency
                      - isolation
                      - durability
                      - transaction guarantee
                      - database transaction
                      - commit
                      - rollback
                    commonSignals:
                      - commit、rollback、transaction boundary を扱っている
                      - 原子性、一貫性、独立性、永続性を説明している
                      - 障害時に途中まで書かれたデータをどう扱うかを議論している
                      - 複数更新を一つの処理単位にまとめる話
                    antiSignals:
                      - 酸性・アルカリ性など化学のacidは対象外
                      - BASEやCAPだけでDBトランザクション保証に触れない場合
                      - 一般的な「信頼性が高い」という形容だけでは弱い
                    relatedNames:
                      - name: PostgreSQL Transactions
                        kind: tool
                        relevance: ACIDトランザクションの挙動を実務で確認する代表的なRDBとして出る。
                        officialUrl: https://www.postgresql.org/docs/current/tutorial-transactions.html
                      - name: InnoDB
                        kind: tool
                        relevance: MySQLでACIDや行ロックを扱う主要ストレージエンジンとして出やすい。
                        officialUrl: https://dev.mysql.com/doc/refman/8.4/en/innodb-storage-engine.html
                      - name: SQLite Transactions
                        kind: tool
                        relevance: ローカルDBや組み込みDBでACIDを説明するときの比較対象になる。
                        officialUrl: https://www.sqlite.org/lang_transaction.html

                - slug: "mvcc"


                  search:

                    keywords:

                      - MVCC

                      - 多版同時実行制御

                      - Multi-Version Concurrency Control

                      - snapshot isolation

                      - row version

                      - transaction visibility

                      - xmin

                      - vacuum

                      - consistent read

                      - read/write conflict

                    commonSignals:

                      - 読み取りと書き込みがブロックしない理由を説明している

                      - snapshot、row version、visibility、vacuum が登場する

                      - PostgreSQLのxmin/xmaxやtransaction id wraparoundの話

                      - ロックではなく版管理で同時実行を扱う文脈

                    antiSignals:

                      - Gitのバージョン管理だけの話は対象外

                      - API versioningやschema versioningだけの話

                      - 単なるキャッシュの古い値参照はMVCCとは限らない

                    relatedNames:

                      - name: PostgreSQL MVCC

                        kind: tool

                        relevance: MVCCの実装・VACUUM・可視性を学ぶ代表的な実務DBとして出る。

                        officialUrl: https://www.postgresql.org/docs/current/mvcc-intro.html

                      - name: InnoDB MVCC

                        kind: tool

                        relevance: MySQLでundo logやconsistent readを含むMVCCを扱うときに関連する。

                        officialUrl: https://dev.mysql.com/doc/refman/8.4/en/innodb-multi-versioning.html

                      - name: Snapshot Isolation

                        kind: method

                        relevance: MVCCが提供する読み取り一貫性や分離レベルの説明で一緒に出る。
                  name: "MVCC"
                  summary: "多版同時実行制御により、読取りと書込みの競合を減らす仕組み。"
                  whyLearn: "ロックだけでなく版管理で整合性を保つ発想を理解すると、性能と安全性の両立を考えやすい。"
                  promptHint: "MVCC がなぜ読み取り性能に効くか、ロック中心設計と比較して問う。"
                  aliases:
                    - "多版同時実行制御"
                    - "Multi-Version Concurrency Control"
                - slug: "read-committed"
                  name: "Read Committed"
                  summary: "コミット済みデータだけを読む一般的な分離レベル。"
                  whyLearn: "デフォルト設定が何を防ぎ、何を防がないかを理解しておくと、偶発バグを減らせる。"
                  promptHint: "Read Committed で起こりうる異常を例で説明させる。"
                  aliases:
                    - "read committed"
                - slug: "serializable"
                  name: "Serializable"
                  summary: "直列実行と同等の結果を目指す強い分離レベル。"
                  whyLearn: "安全側に倒したい処理で、どの程度のコストで強い保証を得るかを判断できる。"
                  promptHint: "Serializable を使うべき処理と、不要な処理を区別させる。"
                  aliases:
                    - "serializable"

            - slug: "indexing-and-query-optimization"
              name: "インデックスとクエリ最適化"
              summary: "検索・結合・集計を高速化するための物理設計と実行計画を扱う。"
              whyLearn: "遅い SQL を感覚ではなく、アクセス経路と計画で説明できるようになる。"
              terms:
                - slug: "b-tree-index"
                  name: "B木インデックス"
                  summary: "範囲検索と等価検索に広く使われる代表的なインデックス構造。"
                  whyLearn: "最も基本的な index の性質を理解すると、多くの RDB の最適化を説明できる。"
                  promptHint: "この検索条件には B-tree が効くか、効かないかを問う。"
                  aliases:
                    - "B-tree"
                    - "B木インデックス"
                  search:
                    keywords:
                      - B木インデックス
                      - B-tree
                      - B+tree
                      - database index
                      - range scan
                      - index scan
                      - composite index
                      - leftmost prefix
                      - balanced tree
                      - インデックス設計
                    commonSignals:
                      - 範囲検索、前方一致、ORDER BY、WHERE句とindexの相性を議論している
                      - composite index、leftmost prefix、index scan が出る
                      - slow query の改善でindex追加を検討している
                      - B-tree と hash index の比較がある
                    antiSignals:
                      - DOM treeや構文木など一般的なtree構造だけの話は対象外
                      - 機械学習のdecision treeは別概念
                      - 全文検索インデックスやベクトルインデックスだけの話は弱い
                    relatedNames:
                      - name: PostgreSQL B-Tree Indexes
                        kind: tool
                        relevance: RDBの標準的なB-treeインデックス挙動を確認する代表例として出る。
                        officialUrl: https://www.postgresql.org/docs/current/indexes-types.html
                      - name: MySQL InnoDB Indexes
                        kind: tool
                        relevance: clustered indexや複合インデックスを含めたB-tree設計でよく参照される。
                        officialUrl: https://dev.mysql.com/doc/refman/8.4/en/innodb-index-types.html
                      - name: SQLite Query Planner
                        kind: tool
                        relevance: 軽量DBでインデックス利用と検索計画を理解する教材として出る。
                        officialUrl: https://www.sqlite.org/queryplanner.html

                - slug: "covering-index"
                  name: "カバリングインデックス"
                  summary: "必要列が index 内で完結し、表本体参照を減らせるインデックス。"
                  whyLearn: "読み取り性能の改善余地を、列集合まで踏み込んで議論できる。"
                  promptHint: "なぜこの query に covering index が効くのかを説明させる。"
                  aliases:
                    - "covering index"
                    - "インクルードインデックス"
                - slug: "query-plan"
                  name: "実行計画"
                  summary: "DB が query をどの順序・方法で実行するかを表す計画。"
                  whyLearn: "SQL チューニングを勘ではなく plan 読解で進められる。"
                  promptHint: "この query plan からどのボトルネックが読めるかを問う。"
                  aliases:
                    - "execution plan"
                    - "実行計画"
                  search:
                    keywords:
                      - 実行計画
                      - query plan
                      - execution plan
                      - EXPLAIN
                      - EXPLAIN ANALYZE
                      - cost-based optimizer
                      - full table scan
                      - index scan
                      - cardinality estimation
                      - SQL tuning
                    commonSignals:
                      - EXPLAINやEXPLAIN ANALYZEの出力を読んでいる
                      - sequential scan、index scan、hash join、nested loop が並ぶ
                      - estimated rows と actual rows の差を分析している
                      - slow query の原因を実行計画から探している
                    antiSignals:
                      - プロジェクト計画や実行計画書の一般語は対象外
                      - SQLを書いているだけでplan確認がない場合は弱い
                      - アプリの処理フロー図だけでDB実行計画に触れていない場合
                    relatedNames:
                      - name: PostgreSQL EXPLAIN
                        kind: tool
                        relevance: 実行計画を読む代表的なコマンドとしてSQLチューニングで頻出する。
                        officialUrl: https://www.postgresql.org/docs/current/sql-explain.html
                      - name: MySQL EXPLAIN
                        kind: tool
                        relevance: MySQLのクエリ計画確認やインデックス利用確認で出やすい。
                        officialUrl: https://dev.mysql.com/doc/refman/8.4/en/explain.html
                      - name: BigQuery Query Plan
                        kind: service
                        relevance: DWH上のスキャン量やステージ別処理を確認する文脈で出る。
                        officialUrl: https://cloud.google.com/bigquery/docs/query-plan-explanation

                - slug: "join-algorithm"

                  search:

                    keywords:

                      - 結合アルゴリズム

                      - join algorithm

                      - nested loop join

                      - hash join

                      - merge join

                      - join order

                      - join strategy

                      - broadcast join

                      - shuffle join

                      - sort merge join

                    commonSignals:

                      - hash join、merge join、nested loop のどれが選ばれたかを議論している

                      - 結合順序、片側テーブルのサイズ、インデックス有無を見ている

                      - broadcast join や shuffle join のコストを扱っている

                      - 大きなテーブル同士のJOINが遅い原因分析

                    antiSignals:

                      - プログラミング言語の配列結合や文字列joinだけの話

                      - SQLのJOIN構文説明だけで実行方式に触れない場合

                      - データ統合のjoinではなく組織統合の比喩表現

                    relatedNames:

                      - name: PostgreSQL Join Strategies

                        kind: tool

                        relevance: nested loop、hash join、merge joinを実行計画で比較する代表的なRDBとして出る。

                        officialUrl: https://www.postgresql.org/docs/current/using-explain.html

                      - name: Spark SQL Join Strategies

                        kind: framework

                        relevance: 分散処理でbroadcast joinやshuffle joinを扱うときに関連する。

                        officialUrl: https://spark.apache.org/docs/latest/sql-performance-tuning.html

                      - name: Trino Join Distribution

                        kind: tool

                        relevance: 分散SQLでjoin distributionや大規模結合を考えるときに出る。

                        officialUrl: https://trino.io/docs/current/optimizer/cost-based-optimizations.html
                  name: "結合アルゴリズム"
                  summary: "nested loop、hash join、merge join などの結合実行方式。"
                  whyLearn: "結合順序や index の効果を、join algorithm の観点で説明できる。"
                  promptHint: "なぜこの join 方式が選ばれたか、データ量と索引から考えさせる。"
                  aliases:
                    - "hash join"
                    - "merge join"
                    - "nested loop"

    - slug: "analytical-data-modeling-storage"
