domain:
  slug: "algorithms-data-structures-computation"
  name: "アルゴリズムとデータ構造"
  summary: "問題を表現し、効率的に解く手順とデータ表現を設計する領域。"
  boundaryNotes: "アルゴリズム思考と複雑性を扱う。数学的証明体系は Mathematical Foundations、本番性能や障害は Systems / Reliability に寄せる。"
  knowledgeAreas:
    - slug: "data-structure-foundations"
      name: "データ構造の基礎"
      summary: "要素集合の保持、更新、探索、順序管理のための代表的なデータ表現を扱う。"
      whyLearn: "操作の種類、アクセス頻度、更新特性に応じて、どのデータ構造を選ぶべきか判断できるようになる。"
      topicClusters:
        - slug: "sequence-and-linked-structures"
          name: "配列系と連結構造"
          summary: "連続配置とポインタ連結の違いから、基本的な逐次データ構造を理解する。"
          concepts:
            - slug: "sequence-storage-models"
              name: "シーケンスの格納モデル"
              summary: "要素列を連続領域または連結によって表す基本モデル。"
              whyLearn: "ランダムアクセス、挿入削除、キャッシュ局所性の違いを比較できるようになる。"
              terms:
                - slug: "array"
                  name: "配列"
                  summary: "連続した添字で要素を保持し、インデックス参照を高速に行う基本構造。"
                  whyLearn: "ランダムアクセス前提の多くのアルゴリズムの土台になる。"
                  promptHint: "配列が連結リストより有利になる条件を、アクセスと更新の観点で説明する。"
                  aliases:
                    - "static array"
                    - "contiguous array"
                - slug: "dynamic-array"
                  name: "動的配列"
                  summary: "再確保を用いてサイズを伸縮できる配列ベースの可変長構造。"
                  whyLearn: "実務で多用される vector や ArrayList の内部原理を理解できる。"
                  promptHint: "動的配列の append が平均的に速い理由を説明する。"
                  aliases:
                    - "vector"
                    - "ArrayList"
                - slug: "linked-list"
                  name: "連結リスト"
                  summary: "各要素が次または前後の要素への参照を持つ線形構造。"
                  whyLearn: "連続領域に依存しない挿入削除の特性を学べる。"
                  promptHint: "連結リストが配列より有利なケースと不利なケースを挙げる。"
                  aliases:
                    - "singly linked list"
                    - "doubly linked list"

            - slug: "stack-queue-and-deque"
              name: "スタック、キュー、両端キュー"
              summary: "順序制約のある基本コレクションを抽象データ型として扱う。"
              whyLearn: "探索、スケジューリング、バッファ管理の基本パターンを理解できる。"
              terms:
                - slug: "stack"
                  name: "スタック"
                  summary: "後入れ先出しで要素を管理する抽象データ型。"
                  whyLearn: "再帰、式評価、バックトラックの理解と実装に直結する。"
                  promptHint: "スタックが必要になる典型アルゴリズムを二つ挙げる。"
                  aliases:
                    - "LIFO"
                - slug: "queue"
                  name: "キュー"
                  summary: "先入れ先出しで要素を管理する抽象データ型。"
                  whyLearn: "幅優先探索やイベント処理の基本構造として頻出する。"
                  promptHint: "BFS がキューを使う理由を説明する。"
                  aliases:
                    - "FIFO"
                - slug: "deque"
                  name: "両端キュー"
                  summary: "先頭と末尾の両方で挿入削除できるデータ構造。"
                  whyLearn: "スライディングウィンドウや単調キューなどの実装で役立つ。"
                  promptHint: "deque が queue より柔軟になる典型例を示す。"
                  aliases:
                    - "double-ended queue"

        - slug: "associative-and-ordered-structures"
          name: "連想・順序構造"
          summary: "キーに基づく探索と順序付き保持のための代表的構造を扱う。"
          concepts:
            - slug: "hash-based-dictionaries"
              name: "ハッシュベース辞書"
              summary: "キーからハッシュ値を計算して要素を格納・検索する方式。"
              whyLearn: "平均的な高速検索と、衝突処理のトレードオフを理解できる。"
              terms:
                - slug: "hash-table"
                  name: "ハッシュテーブル"
                  summary: "ハッシュ関数を用いてキーを表に写像し、連想検索を高速化する構造。"
                  whyLearn: "辞書、キャッシュ、集合判定などで最も実務使用頻度が高い。"
                  promptHint: "ハッシュテーブルが順序付き木より有利な場面を説明する。"
                  aliases:
                    - "hash map"
                    - "dictionary"
                - slug: "open-addressing"
                  name: "オープンアドレッシング"
                  summary: "衝突時に表の別スロットを探索して配置するハッシュ法。"
                  whyLearn: "メモリ局所性と消去処理の難しさを理解できる。"
                  promptHint: "線形探索や二次探索が抱えるクラスタリングの問題を説明する。"
                  aliases:
                    - "probing"
                - slug: "separate-chaining"
                  name: "分離連鎖法"
                  summary: "各バケットに連鎖構造を持たせて衝突を処理するハッシュ法。"
                  whyLearn: "負荷率の増加に対する挙動と実装しやすさを比較できる。"
                  promptHint: "分離連鎖法とオープンアドレッシングの違いを整理する。"
                  aliases:
                    - "closed addressing"
                    - "chaining"

            - slug: "balanced-search-trees"
              name: "平衡探索木"
              summary: "順序情報を保ちながら探索・更新を高速化する木構造。"
              whyLearn: "範囲検索、順序統計、安定した最悪時計算量を必要とする場面を理解できる。"
              terms:
                - slug: "binary-search-tree"
                  name: "二分探索木"
                  summary: "左部分木に小さいキー、右部分木に大きいキーを置く順序付き木。"
                  whyLearn: "順序付き探索木の基本不変条件を学ぶ出発点になる。"
                  promptHint: "二分探索木が退化する入力例を挙げる。"
                  aliases:
                    - "BST"
                - slug: "red-black-tree"
                  name: "赤黒木"
                  summary: "色制約によって木の高さを抑える自己平衡二分探索木。"
                  whyLearn: "標準ライブラリの ordered map や set の実装理解に役立つ。"
                  promptHint: "赤黒木が二分探索木の最悪ケースをどう防ぐかを説明する。"
                  aliases:
                    - "RB tree"
                - slug: "b-tree"
                  name: "B木"
                  summary: "多分木化によって高分岐を実現し、外部記憶を意識しやすい探索木。"
                  whyLearn: "ストレージ指向インデックスの基本発想を理解できる。"
                  promptHint: "B木が通常の二分探索木よりディスク向きな理由を説明する。"
                  aliases:
                    - "B tree"

        - slug: "priority-and-range-structures"
          name: "優先度と範囲クエリ"
          summary: "最小・最大の取り出しや区間集約に強い構造を扱う。"
          concepts:
            - slug: "heap-based-priority-management"
              name: "ヒープと優先度管理"
              summary: "親子の順序制約を使って優先度付き要素を効率よく管理する。"
              whyLearn: "スケジューリング、最短路、トップK処理での定番道具を理解できる。"
              terms:
                - slug: "binary-heap"
                  name: "二分ヒープ"
                  summary: "完全二分木を配列で表し、優先度付き要素を管理する基本ヒープ。"
                  whyLearn: "多くの priority queue 実装の標準形である。"
                  promptHint: "二分ヒープが配列で実装しやすい理由を説明する。"
                  aliases:
                    - "heap"
                - slug: "priority-queue"
                  name: "優先度付きキュー"
                  summary: "最小値や最大値の取り出しを主目的とする抽象データ型。"
                  whyLearn: "ヒープをどの問題に適用すべきかを言葉として整理できる。"
                  promptHint: "priority queue が有効なユースケースを三つ挙げる。"
                  aliases:
                    - "PQ"
                - slug: "d-ary-heap"
                  name: "d分ヒープ"
                  summary: "各ノードが d 個の子を持つよう一般化したヒープ。"
                  whyLearn: "比較回数と高さのトレードオフを考える練習になる。"
                  promptHint: "二分ヒープと d 分ヒープの違いを更新コストで比較する。"
                  aliases:
                    - "d-heap"

            - slug: "range-query-structures"
              name: "範囲クエリ構造"
              summary: "区間の和、最小値、更新付き集約を高速化する構造。"
              whyLearn: "時系列集計や部分区間計算を効率化する設計パターンを身につけられる。"
              terms:
                - slug: "segment-tree"
                  name: "セグメント木"
                  summary: "区間を木状に分割して、範囲集約と更新を高速化する構造。"
                  whyLearn: "動的な区間クエリの代表解法として非常に汎用性が高い。"
                  promptHint: "区間和と一点更新をセグメント木で処理する利点を説明する。"
                  aliases:
                    - "range tree"
                - slug: "fenwick-tree"
                  name: "Fenwick 木"
                  summary: "累積和系の区間集計を配列ベースで効率よく行う構造。"
                  whyLearn: "実装が軽く、ログ計算量で prefix sum を扱える。"
                  promptHint: "Fenwick 木とセグメント木の使い分けを説明する。"
                  aliases:
                    - "binary indexed tree"
                    - "BIT"
                - slug: "sparse-table"
                  name: "Sparse Table"
                  summary: "静的配列に対する冪長前計算で範囲クエリを高速化する表構造。"
                  whyLearn: "更新がほぼ無いとき、前計算で速度を買う発想を学べる。"
                  promptHint: "更新のない RMQ で Sparse Table が有効な理由を説明する。"
                  aliases:
                    - "RMQ table"

    - slug: "algorithm-analysis-design-principles"
      name: "アルゴリズム解析と設計原理"
      summary: "計算量を見積もり、下界を考え、典型的な設計パラダイムを使い分けるための基礎を扱う。"
      whyLearn: "実装前に性能と難しさを見積もり、設計候補を比較できるようになる。"
      topicClusters:
        - slug: "analysis-models-and-lower-bounds"
          name: "解析モデルと下界"
          summary: "アルゴリズムの評価と、これ以上速くしにくい理由を考える。"
          concepts:
            - slug: "asymptotic-complexity-analysis"
              name: "漸近計算量解析"
              summary: "入力サイズに対する時間・空間の増え方を大まかに把握する方法。"
              whyLearn: "言語や定数項を超えてアルゴリズムを比較できるようになる。"
              terms:
                - slug: "big-o-notation"
                  name: "オーダー記法"
                  summary: "入力サイズ増大時の上界を簡潔に表す記法。"
                  whyLearn: "計算量レビューの共通言語になる。"
                  promptHint: "O、Θ、Ω の違いを一段落で説明する。"
                  aliases:
                    - "Big O"
                    - "O notation"
                - slug: "amortized-analysis"
                  name: "償却解析"
                  summary: "単発ではなく操作列全体で平均コストを評価する解析法。"
                  whyLearn: "動的配列や自己調整構造の妥当な性能評価に必要になる。"
                  promptHint: "動的配列の append を償却解析で説明する。"
                  aliases:
                    - "amortized cost"
                - slug: "recurrence-relation"
                  name: "漸化式"
                  summary: "再帰的アルゴリズムのコストを再帰関係として表す方法。"
                  whyLearn: "分治法の性能を定量化する基本手段になる。"
                  promptHint: "分治アルゴリズムの計算量を漸化式で立てる手順を説明する。"
                  aliases:
                    - "recurrence"

            - slug: "reductions-and-lower-bounds"
              name: "還元と下界"
              summary: "問題間の関係と、モデル依存の限界を使って難しさを示す。"
              whyLearn: "解法を探すだけでなく、なぜ解きにくいかも説明できるようになる。"
              terms:
                - slug: "problem-reduction"
                  name: "問題還元"
                  summary: "ある問題を別の問題に変換して、難しさや解法を引き継ぐ技法。"
                  whyLearn: "NP 完全性やアルゴリズム再利用の理解に不可欠である。"
                  promptHint: "還元が『難しさの伝播』になる理由を説明する。"
                  aliases:
                    - "reduction"
                - slug: "decision-tree-model"
                  name: "決定木モデル"
                  summary: "比較ベース手法の情報獲得過程を木で表す計算モデル。"
                  whyLearn: "比較ソートの下界などを理解しやすくなる。"
                  promptHint: "比較ソートの下界と決定木の関係を説明する。"
                  aliases:
                    - "comparison tree"
                - slug: "lower-bound"
                  name: "下界"
                  summary: "任意のアルゴリズムが避けにくい最小計算量の限界。"
                  whyLearn: "改善の余地があるのか、問題自体が難しいのかを見分けられる。"
                  promptHint: "上界だけでなく下界を見る意味を説明する。"
                  aliases:
                    - "lower bound"
                    - "Omega bound"

        - slug: "design-paradigms"
          name: "設計パラダイム"
          summary: "問題構造に応じてよく使う設計の型を扱う。"
          concepts:
            - slug: "divide-conquer-and-greedy"
              name: "分治法と貪欲法"
              summary: "問題を分割して統治する方法と、局所最適を積み重ねる方法。"
              whyLearn: "実務で遭遇する多くの問題を、少数の強い設計型に写像できる。"
              terms:
                - slug: "divide-and-conquer"
                  name: "分治法"
                  summary: "問題を小問題に分割し、それぞれを解いて統合する設計法。"
                  whyLearn: "ソート、探索、幾何計算などで繰り返し現れる。"
                  promptHint: "分治法が有効な問題構造を説明する。"
                  aliases:
                    - "D&C"
                - slug: "master-theorem"
                  name: "マスター定理"
                  summary: "典型的な分治漸化式の漸近解を素早く見積もる定理。"
                  whyLearn: "設計検討時に分治法のコストを迅速に判断できる。"
                  promptHint: "マスター定理が使える漸化式と使いにくい漸化式を区別する。"
                  aliases:
                    - "Master method"
                - slug: "greedy-algorithm"
                  name: "貪欲法"
                  summary: "各段階で局所的に最良の選択をして全体解を作る方法。"
                  whyLearn: "高速で実装しやすいが、成立条件の吟味が重要な設計法である。"
                  promptHint: "貪欲法が正しくなる条件をどう見抜くか説明する。"
                  aliases:
                    - "greedy method"

            - slug: "dynamic-programming-and-state-search"
              name: "動的計画法と状態探索"
              summary: "重複部分問題や状態空間探索を整理して解く方法。"
              whyLearn: "指数爆発を避けるための代表技法を比較できるようになる。"
              terms:
                - slug: "dynamic-programming"
                  name: "動的計画法"
                  summary: "部分問題を再利用して全体最適を構築する設計法。"
                  whyLearn: "最短路、編集距離、最適化問題で極めて頻出する。"
                  promptHint: "DP の状態・遷移・初期条件をどう設計するか説明する。"
                  aliases:
                    - "DP"
                - slug: "memoization"
                  name: "メモ化"
                  summary: "再帰的計算の結果を保存し、同じ部分問題を再計算しない技法。"
                  whyLearn: "トップダウン DP として実装しやすく、問題理解にも役立つ。"
                  promptHint: "メモ化と表計算型 DP の違いを整理する。"
                  aliases:
                    - "top-down DP"
                - slug: "backtracking"
                  name: "バックトラッキング"
                  summary: "探索木を進みながら不適切な枝を戻って捨てる探索法。"
                  whyLearn: "制約探索や組合せ列挙の基礎になる。"
                  promptHint: "バックトラッキングと DP の違いを説明する。"
                  aliases:
                    - "DFS search"

    - slug: "ordering-searching-string-processing"
      name: "順序付け、探索、文字列処理"
      summary: "実務と教育の両方で頻出する整列、検索、辞書、文字列処理の中心領域。"
      whyLearn: "検索体験、インデックス、テキスト処理の判断をアルゴリズム観点で行えるようになる。"
      topicClusters:
        - slug: "sorting-and-selection"
          name: "整列と選択"
          summary: "順序付けと順位抽出の基本アルゴリズムを扱う。"
          concepts:
            - slug: "comparison-sorting"
              name: "比較ベース整列"
              summary: "要素比較を主操作として並べ替えるソート群。"
              whyLearn: "安定性、最悪時計算量、実装しやすさの比較軸を持てる。"
              terms:
                - slug: "quicksort"
                  name: "クイックソート"
                  summary: "ピボット分割を繰り返して整列する高速な分治ソート。"
                  whyLearn: "平均性能の良さと最悪ケースの注意点を同時に学べる。"
                  promptHint: "クイックソートが速い理由と遅くなる条件を説明する。"
                  aliases:
                    - "quick sort"
                - slug: "mergesort"
                  name: "マージソート"
                  summary: "分割した列を整列してからマージする安定な分治ソート。"
                  whyLearn: "安定性と外部整列との相性を理解できる。"
                  promptHint: "マージソートが安定ソートである理由を説明する。"
                  aliases:
                    - "merge sort"
                - slug: "heapsort"
                  name: "ヒープソート"
                  summary: "ヒープを使って順に最大または最小要素を取り出すソート。"
                  whyLearn: "追加メモリを抑えつつ最悪計算量を保証する選択肢として重要である。"
                  promptHint: "ヒープソートとクイックソートを比較する。"
                  aliases:
                    - "heap sort"

            - slug: "search-selection-and-probing"
              name: "探索、選択、プロービング"
              summary: "完全整列をせずに探索や順位決定を行う代表技法。"
              whyLearn: "必要な情報だけを取る設計で無駄な計算を避けられる。"
              terms:
                - slug: "binary-search"
                  name: "二分探索"
                  summary: "単調性または整列性を利用して探索範囲を半分ずつ絞る方法。"
                  whyLearn: "探索設計の最重要パターンであり、境界バグの温床でもある。"
                  promptHint: "二分探索で closed interval と half-open interval をどう使い分けるか説明する。"
                  aliases:
                    - "bisection"
                - slug: "quickselect"
                  name: "Quickselect"
                  summary: "分割を使って k 番目要素だけを効率よく見つける選択アルゴリズム。"
                  whyLearn: "トップK、中央値、順位抽出でソート不要の発想を持てる。"
                  promptHint: "中央値を得るのに全体ソートが不要な理由を説明する。"
                  aliases:
                    - "selection by partition"
                - slug: "skip-list"
                  name: "スキップリスト"
                  summary: "確率的な多段リンクで順序付き探索を高速化する構造。"
                  whyLearn: "平衡木より単純で、実務インデックスでも使われる代替案を理解できる。"
                  promptHint: "skip list が平衡木の代替になる理由を説明する。"
                  aliases:
                    - "skiplist"

        - slug: "string-indexing-and-matching"
          name: "文字列インデックスと照合"
          summary: "テキスト、ログ、識別子、検索クエリに関わる代表的手法を扱う。"
          concepts:
            - slug: "prefix-based-structures"
              name: "接頭辞ベース構造"
              summary: "文字列の共有接頭辞を利用して辞書や検索を効率化する構造。"
              whyLearn: "補完、辞書検索、ルーティングなどの実装観点を得られる。"
              terms:
                - slug: "trie"
                  name: "Trie"
                  summary: "各文字を辺として持ち、接頭辞共有を利用する木構造。"
                  whyLearn: "prefix 検索の高速化とメモリコストのトレードオフを学べる。"
                  promptHint: "Trie が hash table より有利な検索条件を説明する。"
                  aliases:
                    - "prefix tree"
                - slug: "radix-tree"
                  name: "Radix Tree"
                  summary: "単一路を圧縮して Trie の空間効率を改善した構造。"
                  whyLearn: "文字列インデックスで圧縮表現が効く理由を理解できる。"
                  promptHint: "Radix Tree が Trie のどこを改善するか説明する。"
                  aliases:
                    - "compressed trie"
                - slug: "ternary-search-tree"
                  name: "三分探索木"
                  summary: "文字比較と木探索を組み合わせて文字列集合を管理する構造。"
                  whyLearn: "Trie と BST の中間的発想を理解できる。"
                  promptHint: "三分探索木を Trie と比較して説明する。"
                  aliases:
                    - "TST"

            - slug: "pattern-matching-and-suffix-indexes"
              name: "パターン照合と接尾辞インデックス"
              summary: "部分文字列検索や多パターン照合を高速化する技法。"
              whyLearn: "検索、ログ解析、DNA、構文処理での文字列走査の選択肢を持てる。"
              terms:
                - slug: "knuth-morris-pratt"
                  name: "KMP 法"
                  summary: "失敗関数を使って照合位置の巻き戻しを減らす線形時間照合。"
                  whyLearn: "前処理と走査の分離という重要な考え方を学べる。"
                  promptHint: "KMP が再比較を避ける仕組みを説明する。"
                  aliases:
                    - "KMP"
                - slug: "rabin-karp"
                  name: "Rabin-Karp 法"
                  summary: "文字列ハッシュを使って候補位置を高速に絞る照合手法。"
                  whyLearn: "ハッシュが文字列照合にも使えることを理解できる。"
                  promptHint: "Rabin-Karp の偽陽性と検証の流れを説明する。"
                  aliases:
                    - "rolling hash matching"
                - slug: "suffix-array"
                  name: "接尾辞配列"
                  summary: "全接尾辞を辞書順に並べた配列で部分文字列検索を支える構造。"
                  whyLearn: "文字列インデックスの実務的で扱いやすい代表例として重要である。"
                  promptHint: "Suffix Array が部分文字列検索に使える理由を説明する。"
                  aliases:
                    - "SA"

    - slug: "graph-algorithms-network-optimization"
      name: "グラフアルゴリズムとネットワーク最適化"
      summary: "依存関係、経路、接続性、流れのように、関係性を辺で表す問題を扱う。"
      whyLearn: "機能依存、配送、推薦、ネットワーク、ワークフローをグラフとして整理できる。"
      topicClusters:
        - slug: "traversal-connectivity-and-order"
          name: "探索、到達性、連結"
          summary: "グラフを走査し、構造情報を得る基本群。"
          concepts:
            - slug: "graph-traversal"
              name: "グラフ探索"
              summary: "頂点と辺を系統的に訪問して構造を調べる技法。"
              whyLearn: "多くのグラフアルゴリズムの基礎手続きになる。"
              terms:
                - slug: "breadth-first-search"
                  name: "幅優先探索"
                  summary: "距離層ごとに探索を広げるグラフ走査法。"
                  whyLearn: "最短手数やレベル構造の理解に直結する。"
                  promptHint: "BFS が無重みグラフの最短路に使える理由を説明する。"
                  aliases:
                    - "BFS"
                - slug: "depth-first-search"
                  name: "深さ優先探索"
                  summary: "可能な限り深く進んでから戻るグラフ走査法。"
                  whyLearn: "連結判定、トポロジカルソート、SCC などの基礎になる。"
                  promptHint: "DFS が発見時刻と終了時刻を持つ意味を説明する。"
                  aliases:
                    - "DFS"
                - slug: "topological-sort"
                  name: "トポロジカルソート"
                  summary: "DAG の依存順序を壊さずに頂点を並べる方法。"
                  whyLearn: "ビルド順序、ジョブ依存、DAG DP を理解できる。"
                  promptHint: "トポロジカルソートが可能な条件を説明する。"
                  aliases:
                    - "topo sort"

            - slug: "connectivity-and-spanning"
              name: "連結性と全域構造"
              summary: "どこがつながっているか、どう最小限につなぐかを扱う。"
              whyLearn: "分割、クラスタ、ネットワーク敷設の基礎判断に役立つ。"
              terms:
                - slug: "strongly-connected-components"
                  name: "強連結成分"
                  summary: "有向グラフで相互到達可能な頂点集合の極大部分。"
                  whyLearn: "依存循環やグラフ圧縮の理解に有効である。"
                  promptHint: "SCC を求めると何が分かるのかを説明する。"
                  aliases:
                    - "SCC"
                - slug: "union-find"
                  name: "Union-Find"
                  summary: "互いに素な集合の併合と代表元取得を効率化する構造。"
                  whyLearn: "連結判定や Kruskal 法の核心になる。"
                  promptHint: "Union-Find がグラフ処理で有効な理由を説明する。"
                  aliases:
                    - "disjoint set union"
                    - "DSU"
                - slug: "minimum-spanning-tree"
                  name: "最小全域木"
                  summary: "全頂点を連結しつつ総重みを最小にする辺集合。"
                  whyLearn: "ネットワーク構築コスト最適化の基本問題である。"
                  promptHint: "最小全域木と最短路木の違いを説明する。"
                  aliases:
                    - "MST"

        - slug: "shortest-paths-flows-and-matchings"
          name: "最短路、流量、マッチング"
          summary: "経路コスト最小化や容量制約付き最適化を扱う。"
          concepts:
            - slug: "shortest-path-algorithms"
              name: "最短路アルゴリズム"
              summary: "始点から各頂点または終点までの最小コスト経路を求める。"
              whyLearn: "ナビゲーション、依存解決、ルーティングの定番になる。"
              terms:
                - slug: "dijkstra-algorithm"
                  name: "Dijkstra 法"
                  summary: "非負重みグラフで最短路を求める優先度付き探索。"
                  whyLearn: "最短路アルゴリズムの基準線として最重要である。"
                  promptHint: "Dijkstra 法が負辺を扱いにくい理由を説明する。"
                  aliases:
                    - "Dijkstra"
                - slug: "bellman-ford-algorithm"
                  name: "Bellman-Ford 法"
                  summary: "辺緩和を反復して負辺を含む最短路を扱えるアルゴリズム。"
                  whyLearn: "負閉路検出まで含めた重み付き最短路の理解に役立つ。"
                  promptHint: "Bellman-Ford 法が負閉路を検出できる理由を説明する。"
                  aliases:
                    - "Bellman-Ford"
                - slug: "a-star-search"
                  name: "A* 探索"
                  summary: "ヒューリスティック推定を使って探索範囲を絞る最短路系手法。"
                  whyLearn: "探索と最適化の橋渡しとしてプロダクトでも使いやすい。"
                  promptHint: "A* の評価関数とヒューリスティックの役割を説明する。"
                  aliases:
                    - "A star"
                    - "A*"

            - slug: "flow-cut-and-matching"
              name: "流量、カット、マッチング"
              summary: "容量制約下の流れと、二者割当ての最適化を扱う。"
              whyLearn: "配送、割当、ネットワーク容量、広告配信などへの応用が広い。"
              terms:
                - slug: "max-flow"
                  name: "最大流"
                  summary: "始点から終点へ流せる総流量を最大化する問題。"
                  whyLearn: "容量制約付きネットワーク最適化の中心概念である。"
                  promptHint: "最大流問題がどのような業務問題に写像できるか示す。"
                  aliases:
                    - "maximum flow"
                - slug: "min-cut"
                  name: "最小カット"
                  summary: "始点と終点を分離する辺容量和を最小化する問題。"
                  whyLearn: "ボトルネックや分断コストの理解に役立つ。"
                  promptHint: "最大流最小カット定理が何を意味するか説明する。"
                  aliases:
                    - "minimum cut"
                - slug: "bipartite-matching"
                  name: "二部マッチング"
                  summary: "二部グラフで衝突なく組を作る最適化問題。"
                  whyLearn: "担当割当、求人推薦、在庫割当などに直結する。"
                  promptHint: "二部マッチングを現実の割当問題に例える。"
                  aliases:
                    - "matching"

    - slug: "complexity-approximation-randomized-streaming"
      name: "複雑性、近似、乱択・ストリーミング"
      summary: "厳密解が難しい問題への向き合い方と、大規模データ向けの近似的処理を扱う。"
      whyLearn: "厳密性、速度、メモリ、保証のトレードオフを言語化できるようになる。"
      topicClusters:
        - slug: "hardness-and-approximation"
          name: "難しさと近似"
          summary: "問題の難しさを分類し、厳密に解けないときの代替手段を考える。"
          concepts:
            - slug: "complexity-classes-and-completeness"
              name: "複雑性クラスと完全性"
              summary: "問題の計算資源要求をクラスとして整理する。"
              whyLearn: "解法を頑張るべき問題か、近似や制約緩和へ進むべき問題かを見極められる。"
              terms:
                - slug: "class-p"
                  name: "P"
                  summary: "決定問題のうち、多項式時間で解ける問題クラス。"
                  whyLearn: "効率よく解ける問題の基準線になる。"
                  promptHint: "P が『実用上解きやすい』の近似指標になる理由を説明する。"
                  aliases:
                    - "class P"
                - slug: "np-complete"
                  name: "NP 完全"
                  summary: "NP に属し、かつ NP の全問題が還元できる代表的な難しい問題群。"
                  whyLearn: "新しい問題に出会ったときの難しさ判定の中心概念である。"
                  promptHint: "NP 完全と NP hard の違いを説明する。"
                  aliases:
                    - "NPC"
                - slug: "np-hard"
                  name: "NP 困難"
                  summary: "NP の全問題以上に難しいと考えられる問題群。"
                  whyLearn: "最適化問題や近似問題の難しさを議論する起点になる。"
                  promptHint: "なぜ NP hard だと厳密解以外の方針を考えるのか説明する。"
                  aliases:
                    - "NP-hard"

            - slug: "approximation-schemes-and-guarantees"
              name: "近似方式と保証"
              summary: "厳密解の代わりに、品質保証付きで十分よい解を出す方法。"
              whyLearn: "ビジネス上『十分よい』を数理的に説明できるようになる。"
              terms:
                - slug: "approximation-ratio"
                  name: "近似比"
                  summary: "近似解の品質を最適解との比で保証する指標。"
                  whyLearn: "ヒューリスティックと保証付き近似を区別できる。"
                  promptHint: "近似比があるとレビューで何が説明しやすくなるか述べる。"
                  aliases:
                    - "performance ratio"
                - slug: "ptas"
                  name: "PTAS"
                  summary: "任意の精度 ε に対して高精度近似を返す多項式時間近似方式。"
                  whyLearn: "精度と時間のトレードオフを理論的に整理できる。"
                  promptHint: "PTAS の『任意精度』が実務上どう読まれるか説明する。"
                  aliases:
                    - "polynomial-time approximation scheme"
                - slug: "fptas"
                  name: "FPTAS"
                  summary: "入力サイズと 1/ε の双方に対して多項式時間で動く近似方式。"
                  whyLearn: "PTAS より強い保証を持つ近似方式として重要である。"
                  promptHint: "FPTAS が PTAS より強い点を説明する。"
                  aliases:
                    - "fully polynomial-time approximation scheme"

        - slug: "randomized-online-and-streaming"
          name: "乱択、オンライン、ストリーミング"
          summary: "全入力を一度に持てない場面や、近似で十分な場面の設計技法を扱う。"
          concepts:
            - slug: "online-and-randomized-strategies"
              name: "オンラインと乱択戦略"
              summary: "不完全情報や確率を前提にしたアルゴリズム設計。"
              whyLearn: "現実の逐次到着データや予測不確実性を扱う考え方を得られる。"
              terms:
                - slug: "randomized-algorithm"
                  name: "乱択アルゴリズム"
                  summary: "乱数を内部で使い、期待性能や高確率保証で評価するアルゴリズム。"
                  whyLearn: "最悪ケース回避や簡潔な設計に役立つ。"
                  promptHint: "乱択アルゴリズムを使う利点と注意点を説明する。"
                  aliases:
                    - "probabilistic algorithm"
                - slug: "online-algorithm"
                  name: "オンラインアルゴリズム"
                  summary: "入力が逐次到着し、将来を知らずに意思決定するアルゴリズム。"
                  whyLearn: "キャッシュ、スケジューリング、配信制御の理解に役立つ。"
                  promptHint: "オンラインアルゴリズムがオフライン最適解とどう違うか説明する。"
                  aliases:
                    - "online method"
                - slug: "competitive-ratio"
                  name: "競合比"
                  summary: "オンライン解の性能を理想的オフライン解と比較する指標。"
                  whyLearn: "逐次意思決定の品質を定量的にレビューできる。"
                  promptHint: "競合比がオンラインアルゴリズムの評価で重要な理由を説明する。"
                  aliases:
                    - "competitive analysis"

            - slug: "probabilistic-summaries"
              name: "確率的要約構造"
              summary: "全件保持の代わりに、小メモリと誤差保証で集合や頻度を要約する。"
              whyLearn: "観測、分析、キャッシュ、重複判定の大規模化に直接効く。"
              terms:
                - slug: "bloom-filter"
                  name: "Bloom Filter"
                  summary: "偽陽性を許しつつ集合所属判定を省メモリで行う確率的構造。"
                  whyLearn: "重複判定や前段フィルタで非常に実務的な価値を持つ。"
                  promptHint: "Bloom Filter の偽陽性と偽陰性の性質を説明する。"
                  aliases:
                    - "Bloom filter"
                - slug: "count-min-sketch"
                  name: "Count-Min Sketch"
                  summary: "データストリーム中の頻度を小メモリで近似推定する要約構造。"
                  whyLearn: "頻出項目監視や流量集計の基礎になる。"
                  promptHint: "Count-Min Sketch が頻度をどう近似するか説明する。"
                  aliases:
                    - "CMS"
                - slug: "hyperloglog"
                  name: "HyperLogLog"
                  summary: "巨大ストリームの distinct 件数を小メモリで推定する確率的構造。"
                  whyLearn: "分析基盤やメトリクス集計の定番近似法である。"
                  promptHint: "HyperLogLog が distinct counting に向く理由を説明する。"
                  aliases:
                    - "HLL"

