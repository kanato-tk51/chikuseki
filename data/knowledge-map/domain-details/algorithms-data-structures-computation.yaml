              whyLearn: "平均的な高速検索と、衝突処理のトレードオフを理解できる。"
              terms:
                - slug: "hash-table"
                  name: "ハッシュテーブル"
                  summary: "ハッシュ関数を用いてキーを表に写像し、連想検索を高速化する構造。"
                  whyLearn: "辞書、キャッシュ、集合判定などで最も実務使用頻度が高い。"
                  promptHint: "ハッシュテーブルが順序付き木より有利な場面を説明する。"
                  aliases:
                    - "hash map"
                    - "dictionary"
                  search:
                    keywords:
                      - ハッシュテーブル
                      - hash table
                      - hash map
                      - dictionary
                      - associative array
                      - hash function
                      - key-value lookup
                      - 連想配列
                    commonSignals:
                      - キーから値を O(1) 平均で取得する
                      - ハッシュ関数と衝突処理
                      - load factor を調整する
                      - 辞書・Map・Set の内部構造
                    antiSignals:
                      - 暗号ハッシュだけが主題の場合
