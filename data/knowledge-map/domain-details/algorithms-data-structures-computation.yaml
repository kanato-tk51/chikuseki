              summary: "順序情報を保ちながら探索・更新を高速化する木構造。"
              whyLearn: "範囲検索、順序統計、安定した最悪時計算量を必要とする場面を理解できる。"
              terms:
                - slug: "binary-search-tree"
                  name: "二分探索木"
                  summary: "左部分木に小さいキー、右部分木に大きいキーを置く順序付き木。"
                  whyLearn: "順序付き探索木の基本不変条件を学ぶ出発点になる。"
                  promptHint: "二分探索木が退化する入力例を挙げる。"
