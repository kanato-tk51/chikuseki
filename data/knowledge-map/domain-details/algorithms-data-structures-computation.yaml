domain:
  slug: "algorithms-data-structures-computation"
  name: "アルゴリズムとデータ構造"
  summary: "問題を表現し、効率的に解く手順とデータ表現を設計する領域。"
  boundaryNotes: "アルゴリズム思考と複雑性を扱う。数学的証明体系は Mathematical Foundations、本番性能や障害は Systems / Reliability に寄せる。"
  knowledgeAreas:
    - slug: "data-structure-foundations"
      name: "データ構造の基礎"
      summary: "要素集合の保持、更新、探索、順序管理のための代表的なデータ表現を扱う。"
      whyLearn: "操作の種類、アクセス頻度、更新特性に応じて、どのデータ構造を選ぶべきか判断できるようになる。"
      topicClusters:
        - slug: "sequence-and-linked-structures"
          name: "配列系と連結構造"
          summary: "連続配置とポインタ連結の違いから、基本的な逐次データ構造を理解する。"
          concepts:
            - slug: "sequence-storage-models"
              name: "シーケンスの格納モデル"
              summary: "要素列を連続領域または連結によって表す基本モデル。"
              whyLearn: "ランダムアクセス、挿入削除、キャッシュ局所性の違いを比較できるようになる。"
              terms:
                - slug: "array"
                  name: "配列"
                  summary: "連続した添字で要素を保持し、インデックス参照を高速に行う基本構造。"
                  whyLearn: "ランダムアクセス前提の多くのアルゴリズムの土台になる。"
                  promptHint: "配列が連結リストより有利になる条件を、アクセスと更新の観点で説明する。"
                  aliases:
                    - "static array"
                    - "contiguous array"
                  search:
                    keywords:
                      - 配列
                      - array
                      - static array
                      - contiguous array
                      - contiguous memory
                      - random access
                      - index access
                      - 固定長配列
                      - 連続メモリ
                    commonSignals:
                      - インデックスで O(1) にアクセスする
                      - メモリ上に連続配置される
                      - 要素番号で参照する
                      - キャッシュ局所性が高い
                    antiSignals:
                      - JavaScript Array のような可変長コレクションだけを指す場合
                      - 数学の行列やベクトルだけを指している場合
                      - JSON 配列の構文説明だけの場合
                    relatedNames:
                      - name: C array
                        kind: language
                        relevance: C言語では配列とポインタ、連続メモリの関係を学ぶ代表例として出やすい。
                      - name: NumPy ndarray
                        kind: library
                        relevance: 多次元配列と連続メモリ、ベクトル化処理の文脈で配列概念と強く結びつく。
                        officialUrl: https://numpy.org/doc/stable/reference/arrays.ndarray.html
                      - name: Java array
                        kind: language
                        relevance: 固定長配列とコレクションの違いを説明する際によく使われる。

                - slug: "dynamic-array"

                  search:

                    keywords:

                      - 動的配列

                      - dynamic array

                      - resizable array

                      - growable array

                      - 可変長配列

                      - amortized append

                      - capacity doubling

                      - 再確保

                      - vector

                      - ArrayList

                    commonSignals:

                      - append が平均 O(1)

                      - capacity と size が分かれている

                      - 容量が足りないと再確保する

                      - 末尾追加は速いが途中挿入はずらしが必要

                    antiSignals:

                      - リンクで要素をつなぐ説明が中心の場合

                      - 単なる固定長 array の説明だけの場合

                      - 配列風 API を持つが内部が木やハッシュの場合

                    relatedNames:

                      - name: std::vector

                        kind: library

                        relevance: C++で動的配列の代表的な標準コンテナとして出やすい。

                        officialUrl: https://en.cppreference.com/w/cpp/container/vector

                      - name: Java ArrayList

                        kind: library

                        relevance: Javaで可変長配列の内部動作を説明する定番例である。

                        officialUrl: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/ArrayList.html

                      - name: Rust Vec

                        kind: library

                        relevance: Rustで所有権と容量管理を含む動的配列として頻出する。

                        officialUrl: https://doc.rust-lang.org/std/vec/struct.Vec.html

                      - name: Go slice

                        kind: language

                        relevance: 配列ビューと容量拡張の挙動を学ぶ実務的な例になる。

                        officialUrl: https://go.dev/blog/slices-intro

                      - name: Python list

                        kind: language

                        relevance: Pythonでは list が実質的な動的配列として使われる。

                        officialUrl: https://docs.python.org/3/tutorial/datastructures.html
                  name: "動的配列"
                  summary: "再確保を用いてサイズを伸縮できる配列ベースの可変長構造。"
                  whyLearn: "実務で多用される vector や ArrayList の内部原理を理解できる。"
                  promptHint: "動的配列の append が平均的に速い理由を説明する。"
                  aliases:
                    - "vector"
                    - "ArrayList"
                - slug: "linked-list"
                  name: "連結リスト"
                  summary: "各要素が次または前後の要素への参照を持つ線形構造。"
                  whyLearn: "連続領域に依存しない挿入削除の特性を学べる。"
                  promptHint: "連結リストが配列より有利なケースと不利なケースを挙げる。"
                  aliases:
                    - "singly linked list"
                    - "doubly linked list"
                  search:
                    keywords:
                      - 連結リスト
                      - linked list
                      - singly linked list
                      - doubly linked list
                      - node pointer
                      - next pointer
                      - prev pointer
                      - ポインタ連結
                    commonSignals:
                      - ノードが next を持つ
                      - 先頭への挿入削除が速い
                      - ランダムアクセスが遅い
                      - ポインタをたどって走査する
                    antiSignals:
                      - Webリンク一覧やハイパーリンクの話の場合
                      - 単なるリスト型・配列リストを指す場合
                      - 隣接リストとしてグラフ表現だけを話している場合
                    relatedNames:
                      - name: std::list
                        kind: library
                        relevance: C++で双方向連結リストを表す標準コンテナとして出やすい。
                        officialUrl: https://en.cppreference.com/w/cpp/container/list
                      - name: java.util.LinkedList
                        kind: library
                        relevance: Javaで連結リストとDeque実装の関係を学ぶ際に使われる。
                        officialUrl: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/LinkedList.html
                      - name: Linux list_head
                        kind: library
                        relevance: Linuxカーネル内で侵入型連結リストの代表例として知られる。

            - slug: "stack-queue-and-deque"
              name: "スタック、キュー、両端キュー"
              summary: "順序制約のある基本コレクションを抽象データ型として扱う。"
              whyLearn: "探索、スケジューリング、バッファ管理の基本パターンを理解できる。"
              terms:
                - slug: "stack"
                  name: "スタック"
                  summary: "後入れ先出しで要素を管理する抽象データ型。"
                  whyLearn: "再帰、式評価、バックトラックの理解と実装に直結する。"
                  promptHint: "スタックが必要になる典型アルゴリズムを二つ挙げる。"
                  aliases:
                    - "LIFO"
                - slug: "queue"
                  name: "キュー"
                  summary: "先入れ先出しで要素を管理する抽象データ型。"
                  whyLearn: "幅優先探索やイベント処理の基本構造として頻出する。"
                  promptHint: "BFS がキューを使う理由を説明する。"
                  aliases:
                    - "FIFO"
                  search:
                    keywords:
                      - キュー
                      - queue
                      - FIFO
                      - first in first out
                      - enqueue
                      - dequeue
                      - 待ち行列
                      - FIFO queue
                    commonSignals:
                      - 先入れ先出し
                      - enqueue / dequeue 操作
                      - BFS の frontier 管理
                      - タスクを到着順に処理する
                    antiSignals:
                      - 分散メッセージング製品の運用だけが主題の場合
                      - 優先度付きキューの話でFIFOではない場合
                      - CPUスケジューリングの詳細だけを扱う場合
                    relatedNames:
                      - name: java.util.Queue
                        kind: library
                        relevance: Javaの標準的なキュー抽象としてFIFO操作の説明に出やすい。
                        officialUrl: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Queue.html
                      - name: Python collections.deque
                        kind: library
                        relevance: Pythonで効率的なキュー実装としてよく使われる。
                        officialUrl: https://docs.python.org/3/library/collections.html#collections.deque
                      - name: RabbitMQ
                        kind: service
                        relevance: メッセージキュー文脈ではFIFOや配送順序と関連して登場しやすい。
                        officialUrl: https://www.rabbitmq.com/

                - slug: "deque"
                  name: "両端キュー"
                  summary: "先頭と末尾の両方で挿入削除できるデータ構造。"
                  whyLearn: "スライディングウィンドウや単調キューなどの実装で役立つ。"
                  promptHint: "deque が queue より柔軟になる典型例を示す。"
                  aliases:
                    - "double-ended queue"

        - slug: "associative-and-ordered-structures"
