edges:
  - from: instruction-set-architecture
    to: privilege-level
    relationType: prerequisite
    reason: 命令実行の公開境界を理解してからでないと、特権で何が守られているかを説明しにくい。
  - from: privilege-level
    to: system-call
    relationType: prerequisite
    reason: システムコールは特権境界をまたぐ入口なので、権限モードの理解が前提になる。
  - from: cache-line
    to: false-sharing
    relationType: prerequisite
    reason: false sharing はキャッシュライン単位で競合が起きる現象だから。
  - from: cache-coherence
    to: memory-consistency-model
    relationType: compare_with
    reason: 前者はキャッシュ間のデータ整合、後者は観測可能な順序保証であり、似て非なる概念だから。
  - from: process
    to: thread
    relationType: compare_with
    reason: 両者は実行主体だが、アドレス空間共有と障害分離の性質が異なる。
  - from: virtual-memory
    to: paging
    relationType: used_in
    reason: 仮想記憶は多くのOSでページングを使って実現されるため。
  - from: virtual-memory
    to: mmap
    relationType: prerequisite
    reason: mmap は仮想アドレス空間へ領域を写像する機構なので、仮想記憶の理解が必要。
  - from: system-call
    to: epoll
    relationType: prerequisite
    reason: epoll もシステムコール群として提供されるI/O通知機構だから。
  - from: epoll
    to: io-uring
    relationType: compare_with
    reason: どちらも高並行I/Oを支えるが、待ち合わせモデルとオーバーヘッド特性が異なる。
  - from: file-descriptor
    to: epoll
    relationType: prerequisite
    reason: epoll は監視対象としてファイルディスクリプタを扱うため。
  - from: journaling
    to: raid
    relationType: compare_with
    reason: どちらも耐障害性に関わるが、前者は整合性回復、後者は装置冗長化に主眼がある。
  - from: ip-address
    to: subnet-cidr
    relationType: prerequisite
    reason: サブネット分割はIPアドレス空間の理解が前提になる。
  - from: subnet-cidr
    to: routing-table
    relationType: used_in
    reason: 経路選択ではプレフィックス単位の宛先判定が使われるため。
  - from: mtu
    to: tcp
    relationType: related
    reason: MTUはセグメント化や再送効率に影響し、TCPの実効性能へ直結する。
  - from: udp
    to: quic
    relationType: used_in
    reason: QUICはUDP上に構築される輸送プロトコルだから。
  - from: tcp
    to: quic
    relationType: compare_with
    reason: どちらも輸送層相当の役割を担うが、接続確立、多重化、再送単位が異なる。
  - from: tls
    to: http-3
    relationType: used_in
    reason: HTTP/3はQUIC上で暗号化を前提に動作し、TLSの仕組みを組み込んでいる。
  - from: dns
    to: kubernetes-service
    relationType: used_in
    reason: Kubernetes Service はクラスタ内DNSと組み合わせて安定名で到達されることが多い。
  - from: lamport-clock
    to: vector-clock
    relationType: prerequisite
    reason: vector clock は論理時計の限界を拡張する発想として理解すると捉えやすい。
  - from: heartbeat
    to: failure-detector
    relationType: used_in
    reason: heartbeat は障害検出器を実装する代表的手段だから。
  - from: failure-detector
    to: split-brain
    relationType: related
    reason: 誤検知や分断時判断のまずさは split brain の主要因になる。
  - from: linearizability
    to: eventual-consistency
    relationType: compare_with
    reason: 分散データの整合性保証として対照的な強さを持つため。
  - from: cap-theorem
    to: linearizability
    relationType: related
    reason: 強整合を分断下でも維持したい場合の可用性制約を考える起点になる。
  - from: quorum
    to: raft
    relationType: prerequisite
    reason: Raftの安全性とコミット規則は過半数クォーラムの発想に依存する。
  - from: paxos
    to: raft
    relationType: compare_with
    reason: どちらも合意形成を扱うが、理解しやすさと構成の分け方が異なる。
  - from: sharding
    to: consistent-hashing
    relationType: related
    reason: 一貫ハッシュは再配置コストを抑えたシャーディング実装の代表手法だから。
  - from: replication-factor
    to: quorum
    relationType: related
    reason: 複製数が変わると必要な読書きクォーラム設計も変わる。
  - from: message-queue
    to: pub-sub
    relationType: compare_with
    reason: どちらも非同期連携だが、消費モデルとファンアウト特性が異なる。
  - from: pub-sub
    to: backpressure
    relationType: related
    reason: ファンアウト型配信では下流の消費遅延が全体の圧力制御問題になりやすい。
  - from: hypervisor
    to: container
    relationType: compare_with
    reason: どちらも隔離を提供するが、前者は仮想ハードウェア境界、後者は共有カーネル境界である。
  - from: kvm
    to: virtual-machine
    relationType: used_in
    reason: KVMはLinux上で仮想マシンを動かす実装基盤だから。
  - from: virtio
    to: kvm
    relationType: used_in
    reason: VirtioはKVM環境で広く使われる準仮想化I/O方式だから。
  - from: virtual-switch
    to: overlay-network
    relationType: related
    reason: オーバーレイネットワークの終端や転送制御で仮想スイッチが使われることが多い。
  - from: namespace
    to: container
    relationType: used_in
    reason: コンテナ隔離はLinux namespaceを土台にするため。
  - from: cgroup
