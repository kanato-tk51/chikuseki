domain:
  slug: systems-networks-distributed-infrastructure
  name: コンピュータシステム、ネットワーク、分散基盤
  summary: コンピュータがプログラムを実行し、システムが通信・協調・拡張する仕組みを扱う領域。
  boundaryNotes: システム機構と実行時の基礎を扱う。本番運用責任やサービス運用は Reliability, Operations, and Platform Engineering に寄せる。アプリケーション固有のサービス設計は Product Engineering に、広いセキュリティ統治は Security, Privacy, and Governance に寄せる。
  knowledgeAreas:
    - slug: computer-architecture-and-execution-model
      name: コンピュータアーキテクチャと実行モデル
      summary: CPU、命令実行、並列性、メモリ階層、共有メモリの意味論を理解するための領域。
      whyLearn: アプリケーションの性能、局所性、並列化、共有データ競合の説明力を得るために必要。
      topicClusters:
        - slug: instruction-execution-and-privilege
          name: 命令実行と特権制御
          summary: 命令セット、制御移譲、特権モード、CPU内部の実行最適化を扱う。
          concepts:
            - slug: isa-and-control-transfer
              name: ISAと制御移譲
              summary: CPUが何を実行でき、どの条件で制御を切り替えるかを規定する考え方。
              whyLearn: コンパイラ、OS、CPUの責務境界を理解しやすくなる。
              terms:
                - slug: instruction-set-architecture
                  name: 命令セットアーキテクチャ
                  summary: CPUが公開する命令、レジスタ、アドレッシング方式などの抽象境界。
                  whyLearn: ISAと実装を分けて考えることで移植性と性能議論を整理できる。
                  promptHint: ISAとマイクロアーキテクチャの違いを具体例で説明して。
                  aliases:
                    - ISA
                  search:
                    keywords:
                      - ISA
                      - 命令セット
                      - 命令セットアーキテクチャ
                      - instruction set architecture
                      - CPU instruction
                      - register architecture
                      - addressing mode
                      - x86-64
                      - AArch64
                      - RISC-V
                    commonSignals:
                      - アセンブリ命令やレジスタ名が出てくる
                      - x86、ARM、RISC-Vの比較がある
                      - コンパイラターゲットやバイナリ互換性の話がある
                      - 命令、レジスタ、アドレッシング方式が同時に言及される
                    antiSignals:
                      - 単にAPI仕様やアプリケーション仕様をISAと呼んでいるだけ
                      - マイクロサービスのアーキテクチャの話だけでCPU命令が出ない
                      - CPU製品名だけで命令セットの説明がない
                    relatedNames:
                      - name: x86-64
                        kind: standard
                        relevance: 実務サーバやPCで広く使われる代表的なISAファミリ。
                      - name: AArch64
                        kind: standard
                        relevance: ARM 64-bit環境の命令セットとしてクラウドやモバイルで頻出する。
                      - name: RISC-V
                        kind: standard
                        relevance: オープンISAとしてコンピュータアーキテクチャ学習で比較対象になりやすい。
                        officialUrl: https://riscv.org/
                      - name: LLVM
                        kind: tool
                        relevance: コンパイラバックエンドがISA差分を吸収・生成する代表的ツールチェーン。
                        officialUrl: https://llvm.org/

                - slug: privilege-level

                  search:

                    keywords:

                      - 特権レベル

                      - privilege level

                      - ring 0

                      - ring 3

                      - user mode

                      - kernel mode

                      - supervisor mode

                      - protection ring

                      - user space

                      - kernel space

                    commonSignals:

                      - ユーザーモードとカーネルモードの切り替えが出る

                      - 権限昇格、保護リング、特権命令が言及される

                      - システムコールや例外でカーネルへ入る話がある

                      - OSがハードウェア資源を保護する説明がある

                    antiSignals:

                      - IAMロールやRBACなどアプリ権限管理だけの話

                      - 管理者権限やsudoの運用手順だけでCPU特権に触れない

                      - セキュリティ組織上の権限分掌だけの話

                    relatedNames:

                      - name: POSIX

                        kind: standard

                        relevance: ユーザープログラムとOSインターフェースの境界理解で一緒に出やすい。

                        officialUrl: https://pubs.opengroup.org/onlinepubs/9799919799/

                      - name: Linux kernel

                        kind: platform

                        relevance: ユーザー空間とカーネル空間の代表的な実装文脈。

                        officialUrl: https://www.kernel.org/

                      - name: RISC-V Privileged Architecture

                        kind: standard

                        relevance: 特権モードを明示的に学ぶためのISA仕様。

                        officialUrl: https://docs.riscv.org/
                  name: 特権レベル
                  summary: ユーザー空間とカーネル空間のように実行権限を段階化する仕組み。
                  whyLearn: 保護境界、システムコール、例外処理の前提が分かる。
                  promptHint: ユーザーモードとカーネルモードの違いを説明して。
                  aliases:
                    - ring
                - slug: interrupt-and-exception
                  name: 割り込みと例外
                  summary: 外部イベントや異常条件で通常の命令列から制御を切り替える仕組み。
                  whyLearn: I/O、タイマ、ページフォールト、障害時の制御移譲を説明できる。
                  promptHint: 割り込みと例外の違いをOS視点で説明して。
                  aliases:
                    - interrupt
                    - exception
                  search:
                    keywords:
                      - 割り込み
                      - 例外
                      - interrupt
                      - exception
                      - trap
                      - fault
                      - IRQ
                      - page fault
                      - timer interrupt
                      - interrupt handler
                    commonSignals:
                      - page faultやsegmentation faultの説明がある
                      - I/O完了通知やタイマ割り込みが出る
                      - interrupt handler、trap handler、例外ベクタが出る
                      - 通常の命令列からカーネル処理へ制御が移る話がある
                    antiSignals:
                      - JavaやPythonの例外処理だけの話
                      - 割り込みを単に会議や作業中断の意味で使っている
                      - アプリケーションのエラー通知だけでCPUやOSの制御移譲がない
                    relatedNames:
                      - name: APIC
                        kind: other
                        relevance: x86系で割り込み配送を扱う際によく出るハードウェア機構。
                      - name: Linux signal
                        kind: method
                        relevance: 例外やイベント通知をユーザー空間へ伝えるOS機構として関連する。
                      - name: MMU
                        kind: other
                        relevance: ページフォールトなどメモリ例外の理解で一緒に出る。
            - slug: parallel-execution-techniques
              name: 並列実行技法
              summary: 命令レベルやデータレベルでCPUの実効性能を高めるための技法。
              whyLearn: 同じアルゴリズムでもCPU上で速さが変わる理由を理解できる。
              terms:
                - slug: pipelining
                  name: パイプライン
                  summary: 命令実行を段階に分けて重ね合わせる基本的な高速化手法。
                  whyLearn: ハザードや分岐ミスが性能に効く理由を理解できる。
                  promptHint: パイプライン化がなぜスループットを上げるか説明して。
                  aliases:
                    - pipeline
                - slug: branch-prediction
                  name: 分岐予測
                  summary: 条件分岐の進路を先読みして投機的に実行を進める仕組み。
                  whyLearn: 分岐の多いコードが速くも遅くもなる理由を説明できる。
                  promptHint: 分岐予測ミスが遅延を生む仕組みを説明して。
                  aliases:
                    - branch predictor
                - slug: simd
                  name: SIMD
                  summary: 一つの命令で複数データを同時に処理するデータ並列実行方式。
                  whyLearn: 数値計算、画像処理、検索処理の高速化の基礎になる。
                  promptHint: SIMDが有効な処理と不向きな処理を比較して。
                  aliases:
                    - vectorization
                  search:
                    keywords:
                      - SIMD
                      - vectorization
                      - ベクトル化
                      - single instruction multiple data
                      - AVX
                      - SSE
                      - NEON
                      - vector instruction
                      - data parallelism
                      - auto-vectorization
                    commonSignals:
                      - 複数データを一命令で処理する説明がある
                      - 画像処理、数値計算、配列処理の高速化が出る
                      - AVX、SSE、NEON、ベクトル命令が出る
                      - auto-vectorizationやcompiler optimizationが言及される
                    antiSignals:
                      - ベクトルDBやembeddingのベクトルだけの話
                      - SVGなど画像形式としてのvectorだけの話
                      - 並列処理一般でCPU命令レベルの話がない
                    relatedNames:
                      - name: AVX2
                        kind: standard
                        relevance: x86系でSIMD最適化を調べる際に頻出する命令拡張。
                      - name: AVX-512
                        kind: standard
                        relevance: 高性能計算やサーバ向け最適化で話題になるSIMD拡張。
                      - name: ARM NEON
                        kind: standard
                        relevance: ARM系で使われる代表的なSIMD命令拡張。
                      - name: NumPy
                        kind: library
                        relevance: 内部でベクトル化・ネイティブ実装による高速化が話題になりやすい。
                        officialUrl: https://numpy.org/
        - slug: memory-hierarchy-and-shared-memory
          name: メモリ階層と共有メモリ
          summary: キャッシュ、局所性、整合性、NUMAのようなメモリ性能と意味論を扱う。
          concepts:
            - slug: cache-and-locality
              name: キャッシュと局所性
              summary: データ配置とアクセスパターンが性能に与える影響を扱う。
              whyLearn: 実装上の小さな変更が大きな性能差を生む理由を見抜ける。
              terms:
                - slug: cache-line
                  name: キャッシュライン
                  summary: キャッシュが主記憶との間でやり取りする最小単位。
                  whyLearn: false sharing やメモリアラインメントの理解に直結する。
                  promptHint: キャッシュラインサイズが設計に与える影響を説明して。
                  aliases:
                    - cache block
                  search:
                    keywords:
                      - キャッシュライン
                      - cache line
                      - cache block
                      - cache alignment
                      - cache miss
                      - L1 cache
                      - L2 cache
                      - memory alignment
                      - line size
                      - prefetch
                    commonSignals:
                      - cache missやcache hit率が言及される
                      - データ構造のメモリ配置やalignmentの話がある
                      - false sharingやpaddingと一緒に出る
                      - 64-byte cache lineなど具体的サイズが出る
                    antiSignals:
                      - HTTPキャッシュやCDNキャッシュだけの話
                      - Redisなどアプリケーションキャッシュの話だけ
                      - キャッシュ削除やブラウザキャッシュの操作手順だけ
                    relatedNames:
                      - name: perf
                        kind: tool
                        relevance: キャッシュミスやCPUイベントを観測するLinux性能解析ツールとして関連する。
                      - name: Valgrind Cachegrind
                        kind: tool
                        relevance: キャッシュ挙動を分析する学習・解析ツールとして関連する。
                        officialUrl: https://valgrind.org/
                      - name: Intel VTune Profiler
                        kind: tool
                        relevance: CPUキャッシュやメモリ階層のボトルネック解析に使われる。
                        officialUrl: https://www.intel.com/content/www/us/en/developer/tools/oneapi/vtune-profiler.html

                - slug: locality
                  name: 局所性
                  summary: 近い時間や近い場所のデータを再利用しやすい性質。
                  whyLearn: キャッシュヒット率やI/O効率の改善に使える。
                  promptHint: 時間的局所性と空間的局所性をコード例で説明して。
                  aliases:
                    - temporal locality
                    - spatial locality
                - slug: false-sharing
                  name: フォールスシェアリング
                  summary: 別変数でも同一キャッシュライン共有により無駄な競合が起きる現象。
                  whyLearn: マルチスレッド性能劣化の典型原因を特定できる。
                  promptHint: false sharing が起きる例と避け方を説明して。
                  aliases:
                    - false sharing
                  search:
                    keywords:
                      - false sharing
                      - フォールスシェアリング
                      - cache line contention
                      - cache line bouncing
                      - padding
                      - cache alignment
                      - multi-thread contention
                      - shared cache line
                      - CPU cache invalidation
                      - hot counter
                    commonSignals:
                      - 複数スレッドで別変数なのに性能が落ちる説明がある
                      - paddingやcache line alignmentで改善する話がある
                      - atomic counterやhot fieldの競合が出る
                      - cache line invalidationが頻発する文脈
                    antiSignals:
                      - 単なるデータ競合やrace conditionだけでキャッシュラインに触れない
                      - 共有メモリを使っているだけで性能問題がない
                      - SNSのシェアやファイル共有の話
                    relatedNames:
                      - name: Java Contended
                        kind: language
                        relevance: JVMでfalse sharingを避けるためのアノテーション文脈で出ることがある。
                      - name: JMH
                        kind: tool
                        relevance: Javaのマイクロベンチマークでfalse sharing検証に使われる。
                        officialUrl: https://openjdk.org/projects/code-tools/jmh/
                      - name: perf c2c
                        kind: tool
                        relevance: キャッシュライン競合や共有メモリ競合の解析で使われる。
            - slug: shared-memory-semantics
              name: 共有メモリ意味論
              summary: 複数コアから見たメモリ可視性と整合性のルールを扱う。
              whyLearn: 並行処理の正しさと性能の両方を説明できるようになる。
              terms:
                - slug: cache-coherence
                  name: キャッシュコヒーレンス
                  summary: 複数キャッシュにある同一データの整合を保つ仕組み。
                  whyLearn: 共有変数更新がどのように他コアへ伝わるか理解できる。
                  promptHint: コヒーレンスと一貫性モデルの違いを説明して。
                  aliases:
                    - coherence
                  search:
                    keywords:
                      - キャッシュコヒーレンス
                      - cache coherence
                      - coherence protocol
                      - MESI
                      - MOESI
                      - cache invalidation
                      - shared memory multiprocessor
                      - snooping
                      - directory protocol
                      - write invalidate
                    commonSignals:
                      - 複数CPUキャッシュで同じメモリ値をどう揃えるかの話
                      - MESIやinvalid state、shared stateが出る
                      - 共有変数更新が他コアへ伝わる仕組みの説明
                      - cache coherenceとmemory consistencyの違いを扱う文脈
                    antiSignals:
                      - データベースの一貫性だけの話
                      - 分散システムの整合性モデルだけの話
                      - HTTPキャッシュの無効化だけの話
                    relatedNames:
                      - name: MESI protocol
                        kind: protocol
                        relevance: キャッシュコヒーレンスを説明する代表的プロトコル。
                      - name: MOESI protocol
                        kind: protocol
                        relevance: MESIの拡張としてマルチコアキャッシュの説明で出る。
                      - name: ARM ACE
                        kind: standard
                        relevance: ARM系SoCのキャッシュコヒーレント相互接続で言及される。

                - slug: numa

                  search:

                    keywords:

                      - NUMA

                      - Non-Uniform Memory Access

                      - 非均一メモリアクセス

                      - NUMA node

                      - memory locality

                      - CPU socket

                      - numa balancing

                      - node affinity

                      - remote memory access

                      - numactl

                    commonSignals:

                      - CPUソケット間でメモリアクセス遅延が違う話

                      - numactl、node affinity、CPU pinningが出る

                      - 大規模サーバやDBでメモリ配置が性能に影響する話

                      - remote NUMA accessやlocal memoryが言及される

                    antiSignals:

                      - 数値計算ライブラリNumPyの略記と混同している

                      - ノードという語だけでメモリ階層の話がない

                      - Kubernetes Nodeの配置だけでCPUソケットやメモリ局所性が出ない

                    relatedNames:

                      - name: numactl

                        kind: tool

                        relevance: NUMAノードへのCPU・メモリ配置を制御する代表的ツール。

                      - name: hwloc

                        kind: library

                        relevance: CPUトポロジやNUMA配置を検出するライブラリとして関連する。

                        officialUrl: https://www.open-mpi.org/projects/hwloc/

                      - name: Linux NUMA balancing

                        kind: platform

                        relevance: Linuxの自動NUMA最適化機構として実務調査で出やすい。
                  name: NUMA
                  summary: メモリアクセス遅延がCPUソケットやノード位置に依存する構成。
                  whyLearn: 大規模サーバで配置とスレッド親和性が重要な理由が分かる。
                  promptHint: NUMA環境で性能が悪化する典型例を説明して。
                  aliases:
                    - Non-Uniform Memory Access
                - slug: memory-consistency-model
                  name: メモリ一貫性モデル
                  summary: 並行実行時にメモリ操作がどの順序で観測されうるかを定める規則。
                  whyLearn: ロック、アトミック命令、フェンスの必要性を理解できる。
                  promptHint: 強い一貫性モデルと弱い一貫性モデルを比較して。
                  aliases:
                    - memory model
                  search:
                    keywords:
                      - メモリ一貫性モデル
                      - memory consistency model
                      - memory model
                      - sequential consistency
                      - relaxed memory
                      - acquire release
                      - memory fence
                      - memory barrier
                      - atomic ordering
                      - happens-before
                    commonSignals:
                      - acquire、release、sequential consistencyが出る
                      - atomic操作やmemory fenceの必要性が説明される
                      - 並行実行時の観測順序が問題になる
                      - happens-beforeやvolatileの意味が話題になる
                    antiSignals:
                      - データベースの整合性モデルだけの話
                      - キャッシュ容量やメモリ使用量だけの話
                      - メモリリークやGCの話だけで順序保証がない
                    relatedNames:
                      - name: C++ memory model
                        kind: standard
                        relevance: acquire/releaseやatomic orderingの代表的な言語仕様文脈。
                      - name: Java Memory Model
                        kind: language
                        relevance: happens-beforeやvolatileの理解で頻出するメモリモデル。
                      - name: Rust atomics
                        kind: language
                        relevance: Ordering型によるメモリ順序指定が実務学習で関連する。
                      - name: RISC-V RVWMO
                        kind: standard
                        relevance: ISAレベルの弱いメモリ順序モデルとして比較に使われる。

    - slug: operating-systems-and-resource-management
      name: オペレーティングシステムと資源管理
      summary: OSがプロセス、メモリ、I/O、ファイル、ストレージを抽象化し制御する領域。
      whyLearn: 実行時の待ち、隔離、ページング、FD枯渇、I/O詰まりなどを読めるようになる。
      topicClusters:
        - slug: process-scheduling-and-isolation
          name: プロセス、スケジューリング、隔離
          summary: 実行主体の表現、CPU配分、資源制御、隔離境界を扱う。
          concepts:
            - slug: process-and-thread-model
              name: プロセスとスレッドのモデル
              summary: 実行主体とアドレス空間共有の表し方を扱う。
              whyLearn: 並行性、障害分離、メモリ共有の設計判断がしやすくなる。
              terms:
                - slug: process
                  name: プロセス
                  summary: 独立したアドレス空間と資源集合を持つ実行主体。
                  whyLearn: 障害分離、権限分離、プロセス外呼び出しの理解に必要。
                  promptHint: プロセスがスレッドより重いと言われる理由を説明して。
                  aliases:
                    - process
                - slug: thread
                  name: スレッド
                  summary: 同一プロセスのアドレス空間を共有して動く軽量な実行主体。
                  whyLearn: 共有メモリ並行性と競合の議論に直結する。
                  promptHint: スレッドとプロセスの使い分けを説明して。
                  aliases:
                    - thread
                - slug: context-switch
                  name: コンテキストスイッチ
                  summary: CPUが別の実行主体に切り替わる際の保存と復元の処理。
                  whyLearn: スレッド数増加で性能が落ちる理由を説明できる。
                  promptHint: コンテキストスイッチが高コストになる要因を説明して。
                  aliases:
                    - context switch
            - slug: scheduling-and-resource-control
              name: スケジューリングと資源制御
              summary: CPU時間とメモリなどの共有資源を配分・制限する仕組み。
              whyLearn: 公平性、遅延、スロットリング、マルチテナント制御を理解できる。
              terms:
                - slug: scheduler
                  name: スケジューラ
                  summary: どの実行主体をいつCPUに載せるかを決める仕組み。
                  whyLearn: レイテンシとスループットの両立を議論できる。
                  promptHint: スケジューラ設計で公平性と応答性が衝突する場面を説明して。
                  aliases:
                    - cpu scheduler
                  search:
                    keywords:
                      - スケジューラ
                      - CPU scheduler
                      - process scheduler
                      - task scheduler
                      - CFS
                      - EEVDF
                      - run queue
                      - time slice
                      - scheduling latency
                      - preemption
                    commonSignals:
                      - CPU時間の配分や公平性の話がある
                      - run queue、preemption、time sliceが出る
                      - レイテンシとスループットのトレードオフが語られる
                      - Linux CFSやEEVDFへの言及がある
                    antiSignals:
                      - cronやジョブスケジューラだけの話
                      - Kubernetes schedulerだけでCPU時間配分の話がない
                      - カレンダー予定調整の意味のscheduler
                    relatedNames:
                      - name: Completely Fair Scheduler
                        kind: method
                        relevance: Linuxの代表的CPUスケジューラとして実務・学習で頻出する。
                      - name: EEVDF
                        kind: method
                        relevance: Linuxスケジューラの近年の設計変更を理解する関連語。
