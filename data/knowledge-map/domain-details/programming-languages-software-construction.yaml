domain:
  slug: "programming-languages-software-construction"
  name: "プログラミング言語とソフトウェア構成"
  summary: "ソフトウェアをコード、型、抽象化、モジュールとして表現し、変換し、構成する領域。"
  boundaryNotes: "コード表現と構成に集中する。ライフサイクル、プロジェクト統治、チームプロセスは Software Engineering / Engineering Organization に寄せる。"
  knowledgeAreas:
    - slug: "paradigms-and-computation-models"
      name: "プログラミングパラダイムと計算モデル"
      summary: "問題をどのような計算モデルと記述スタイルで表現するかを整理する棚。"
      whyLearn: "言語ごとの表面的な文法差ではなく、状態、関数、イベント、反応、スクリプトという設計の型を見分けられるようになる。"
      topicClusters:
        - slug: "object-and-functional-foundations"
          name: "オブジェクトと関数型の基礎"
          summary: "状態を持つ部品として組む考え方と、関数合成で組む考え方を対比して学ぶ。"
          concepts:
            - slug: "state-and-object-abstraction"
              name: "状態とオブジェクト抽象"
              summary: "データと振る舞いを同じ単位で扱い、責務をオブジェクトに分配する考え方。"
              whyLearn: "責務分割、変更影響、拡張可能性、実装の読みやすさをレビューしやすくなる。"
              terms:
                - slug: "class"
                  name: "クラス"
                  summary: "オブジェクトの構造と振る舞いの設計図を表す定義単位。"
                  whyLearn: "責務をどの単位でまとめるかを考える基本になる。"
                  promptHint: "この設計でクラスごとの責務分担は適切か、凝集度と変更影響から説明して。"
                  aliases:
                    - "class"
                    - "型定義"
                - slug: "object"
                  name: "オブジェクト"
                  summary: "状態を保持し、メッセージやメソッド呼び出しに応答する実体。"
                  whyLearn: "実行時の責務の所在と状態変化の追跡に不可欠だから。"
                  promptHint: "この機能をオブジェクト中心に見ると、どの状態と振る舞いを同居させるべきか整理して。"
                  aliases:
                    - "object"
                    - "インスタンス"
                - slug: "dynamic-dispatch"
                  name: "動的ディスパッチ"
                  summary: "実行時の受け手の型に応じて呼び出すメソッドを決める仕組み。"
                  whyLearn: "多態性の利益と、追跡しにくさやオーバーライドの危険を理解できる。"
                  promptHint: "この箇所で動的ディスパッチを使う利点と、追跡しづらさのトレードオフを説明して。"
                  aliases:
                    - "dynamic dispatch"
                    - "late binding"

            - slug: "functional-abstraction"
              name: "関数型抽象"
              summary: "副作用を抑え、関数合成と宣言的変換で問題を表現する考え方。"
              whyLearn: "状態の追跡を減らし、テストしやすく再利用しやすいコードに近づける。"
              terms:
                - slug: "pure-function"
                  name: "純粋関数"
                  summary: "同じ入力に対して同じ出力だけを返し、外部状態に副作用を持たない関数。"
                  whyLearn: "推論しやすく、テストと並列化に向く単位だから。"
                  promptHint: "この処理は純粋関数として切り出せるか。できるなら何を引数にし、何を戻り値にするべきか説明して。"
                  aliases:
                    - "pure function"
                    - "pure"
                - slug: "higher-order-function"
                  name: "高階関数"
                  summary: "関数を引数や戻り値として扱う関数。"
                  whyLearn: "処理の共通パターンを抽象化し、重複を減らせる。"
                  promptHint: "この反復処理は高階関数に置き換えると何が読みやすくなるか説明して。"
                  aliases:
                    - "higher-order function"
                    - "HOF"
                - slug: "algebraic-data-type"
                  name: "代数的データ型"
                  summary: "積と和の組み合わせで状態や場合分けを型として表現する手法。"
                  whyLearn: "曖昧なフラグ管理を減らし、網羅的な分岐設計をしやすくする。"
                  promptHint: "この状態表現は代数的データ型で表したほうが安全か。場合分けと不変条件の観点で説明して。"
                  aliases:
                    - "ADT"
                    - "algebraic data type"

        - slug: "asynchronous-reactive-and-scripted-models"
          name: "非同期、リアクティブ、スクリプティング"
          summary: "イベントや待ち合わせを中心に書くスタイルと、短い連結・自動化を重視するスタイルを扱う。"
          concepts:
            - slug: "asynchronous-control-models"
              name: "非同期制御モデル"
              summary: "待ち時間のある処理をブロックせずに構成するための言語機構。"
              whyLearn: "I/O 中心のアプリケーションで可読性と資源効率を両立するために重要。"
              terms:
                - slug: "event-loop"
                  name: "イベントループ"
                  summary: "イベントやタスクを順次取り出して処理を進める実行モデル。"
                  whyLearn: "シングルスレッド非同期の制約と利点を理解できる。"
                  promptHint: "このランタイムはイベントループ前提か。ブロッキング処理を混ぜると何が起きるか説明して。"
                  aliases:
                    - "event loop"
                    - "ループ駆動実行"
                - slug: "promise-future"
                  name: "Promise と Future"
                  summary: "まだ得られていない計算結果を値として扱う抽象。"
                  whyLearn: "非同期 API の合成とエラー伝播を読む基礎になる。"
                  promptHint: "この非同期 API は Promise と Future のどの責務を露出しているか説明して。"
                  aliases:
                    - "promise"
                    - "future"
                - slug: "async-await"
                  name: "async と await"
                  summary: "非同期処理を直列風の構文で書くための言語機構。"
                  whyLearn: "コールバック地獄を避けつつ、待機点と並行性の境界を明示できる。"
                  promptHint: "この async/await の使い方で直列化しすぎていないか、並行実行の余地があるかレビューして。"
                  aliases:
                    - "async/await"
                    - "非同期構文"

            - slug: "reactive-and-scripted-composition"
              name: "リアクティブとスクリプト的構成"
              summary: "入力ストリームや既存ツールの連結を中心にした表現方法。"
              whyLearn: "継続的に変化するデータや自動化タスクを、短い表現で扱いやすくなる。"
              terms:
                - slug: "reactive-stream"
                  name: "リアクティブストリーム"
                  summary: "時間とともに流れる値の列を購読と変換で扱うモデル。"
                  whyLearn: "UI、イベント処理、データパイプで変化を宣言的に扱える。"
                  promptHint: "このイベント列はリアクティブストリームとして扱うと、どの結合が簡潔になるか説明して。"
                  aliases:
                    - "reactive streams"
                    - "observable stream"
                - slug: "shell-scripting"
                  name: "シェルスクリプティング"
                  summary: "既存コマンドやファイル操作を連結して自動化する書き方。"
                  whyLearn: "小さな作業の再現性を上げ、開発体験と運用効率を改善できる。"
                  promptHint: "この手作業はシェルスクリプト化すると何が再現可能になり、何が壊れやすいか説明して。"
                  aliases:
                    - "shell script"
                    - "glue code"
                - slug: "domain-specific-language"
                  name: "ドメイン特化言語"
                  summary: "特定の問題領域に合わせて語彙や構文を絞った言語。"
                  whyLearn: "汎用言語では冗長な問題を、短く制約付きで記述できる。"
                  promptHint: "この設定やルールは DSL に切り出す価値があるか。頻度、誤用防止、可読性から評価して。"
                  aliases:
                    - "DSL"
                    - "domain specific language"

    - slug: "type-systems-and-program-semantics"
      name: "型システムとプログラム意味"
      summary: "プログラムをどの制約で安全にし、どう意味づけて推論するかを扱う棚。"
      whyLearn: "実装時のバグを前倒しで潰し、仕様と実装のズレを減らす判断軸を得られる。"
      topicClusters:
        - slug: "typing-and-abstraction"
          name: "型付けと抽象化"
          summary: "値や操作にどのような制約を与え、どのように一般化するかを整理する。"
          concepts:
            - slug: "typing-discipline"
              name: "型付け規律"
              summary: "型をいつどこで検査し、どこまで言語が推論するかに関する設計。"
              whyLearn: "開発速度、表現力、実行時エラー、IDE 支援のトレードオフを見分けられる。"
              terms:
                - slug: "static-typing"
                  name: "静的型付け"
                  summary: "主にコンパイル時に型整合性を検査する方式。"
                  whyLearn: "変更の影響を早く検出し、大規模開発での保守に効く。"
                  promptHint: "このモジュールを静的型付けで表現すると、どの種類の不整合を早期に検出できるか説明して。"
                  aliases:
                    - "static typing"
                    - "compile-time typing"
                - slug: "dynamic-typing"
                  name: "動的型付け"
                  summary: "主に実行時に値の種類を扱う方式。"
                  whyLearn: "柔軟な試作の利点と、運用時の失敗箇所の見えづらさを理解できる。"
                  promptHint: "このスクリプトを動的型付けのまま保つ利点と、どこに実行時チェックが要るか説明して。"
                  aliases:
                    - "dynamic typing"
                    - "runtime typing"
                - slug: "type-inference"
                  name: "型推論"
                  summary: "明示注釈なしに式や変数の型を導く仕組み。"
                  whyLearn: "冗長さを減らしつつ安全性を保つ設計を理解できる。"
                  promptHint: "この API では型注釈を増やすべきか、型推論に任せるべきかを読みやすさと診断の観点で説明して。"
                  aliases:
                    - "type inference"
                    - "推論型付け"

            - slug: "polymorphism-and-type-relations"
              name: "多相性と型の関係"
              summary: "異なる具体型を同じ抽象の下で扱う方法と、型同士の互換関係。"
              whyLearn: "再利用と安全性のバランスを取る API 設計に不可欠。"
              terms:
                - slug: "generics"
                  name: "ジェネリクス"
                  summary: "型をパラメータ化して複数の具体型に再利用できる仕組み。"
                  whyLearn: "重複実装を避けながら型安全な共通部品を作れる。"
                  promptHint: "この重複コードはジェネリクス化すべきか、具体型のまま残すべきか判断して。"
                  aliases:
                    - "generic"
                    - "parametric polymorphism"
                - slug: "structural-typing"
                  name: "構造的型付け"
                  summary: "名前ではなく、持っているメンバー構造で型互換性を判断する方式。"
                  whyLearn: "柔軟な API 接続の利点と、意図しない互換の危険を理解できる。"
                  promptHint: "この型互換は構造的型付けに向くか。拡張柔軟性と誤用リスクから説明して。"
                  aliases:
                    - "structural typing"
                    - "duck typing に近い型互換"
                - slug: "nominal-typing"
                  name: "名前的型付け"
                  summary: "宣言上の同一性や継承関係で型互換性を判断する方式。"
                  whyLearn: "意図しない互換を防ぎ、ドメイン境界を厳密に守れる。"
                  promptHint: "このドメイン型は名前的型付けで守る価値があるか、誤代入防止の観点で説明して。"
                  aliases:
                    - "nominal typing"
                    - "名義的型付け"

        - slug: "safety-and-correctness"
          name: "安全性と正しさ"
          summary: "失敗や欠損や資源管理を、意味のある型と規約で表現する。"
          concepts:
            - slug: "safety-oriented-modeling"
              name: "安全性志向のモデル化"
              summary: "null、失敗、資源所有などを明示的に表す型設計。"
              whyLearn: "曖昧な状態や実行時失敗を減らし、レビューしやすいコードにできる。"
              terms:
                - slug: "option-maybe"
                  name: "Option と Maybe"
                  summary: "値が存在しない可能性を明示する和型。"
                  whyLearn: "null の見落としを減らし、分岐処理を明文化できる。"
                  promptHint: "この API は null ではなく Option/Maybe を返すべきか。呼び出し側の安全性から説明して。"
                  aliases:
                    - "Option"
                    - "Maybe"
                - slug: "result-either"
                  name: "Result と Either"
                  summary: "成功値と失敗値を同じ型で表す手法。"
                  whyLearn: "エラーを例外だけに頼らず、制御フローとして明示できる。"
                  promptHint: "この失敗は例外で投げるべきか、Result/Either で返すべきかを判断して。"
                  aliases:
                    - "Result"
                    - "Either"
                - slug: "ownership"
                  name: "所有権"
                  summary: "値や資源の寿命と利用権限を型規則で管理する考え方。"
                  whyLearn: "メモリ安全や資源解放の規律を、実行時ではなく設計時に扱える。"
                  promptHint: "この所有権の設計では、誰が資源を保持し、どこで移動や借用が起きるか説明して。"
                  aliases:
                    - "ownership"
                    - "所有権システム"

            - slug: "semantic-reasoning-and-correctness"
              name: "意味論的推論と正しさ"
              summary: "プログラムの意味と期待される振る舞いを、規則や契約で捉える。"
              whyLearn: "レビューで『なぜ正しいのか』を口頭説明で終わらせず、明示的に確認できる。"
              terms:
                - slug: "referential-transparency"
                  name: "参照透過性"
                  summary: "式をその値に置き換えても振る舞いが変わらない性質。"
                  whyLearn: "副作用の有無を見分け、式変形による推論をしやすくする。"
                  promptHint: "この関数は参照透過か。キャッシュや再計算の安全性から説明して。"
                  aliases:
                    - "referential transparency"
                    - "置換可能性"
                - slug: "exhaustiveness-checking"
                  name: "網羅性検査"
                  summary: "分岐が取りうる全ケースを漏れなく扱っているかを検査する仕組み。"
                  whyLearn: "状態追加時の未処理バグを減らせる。"
                  promptHint: "この分岐は将来の状態追加に対して壊れやすいか。網羅性検査の有無から説明して。"
                  aliases:
                    - "exhaustiveness checking"
                    - "網羅チェック"
                - slug: "design-by-contract"
                  name: "契約による設計"
                  summary: "事前条件、事後条件、不変条件で振る舞いを定義する考え方。"
                  whyLearn: "曖昧な仕様を減らし、呼び出し側と実装側の責務を明確にできる。"
                  promptHint: "この API の事前条件と事後条件を契約として言語化すると何になるか整理して。"
                  aliases:
                    - "DbC"
                    - "design by contract"

    - slug: "modularity-api-and-metaprogramming"
      name: "モジュール性、API、メタプログラミング"
      summary: "コードをどの境界で分け、どの公開面を設計し、どこまで自動生成するかを扱う棚。"
      whyLearn: "保守性、差分レビュー容易性、公開互換性を高める構成判断ができるようになる。"
      topicClusters:
        - slug: "modules-and-interfaces"
          name: "モジュールとインターフェース"
          summary: "名前空間、可視性、契約面を通じて依存と責務を制御する。"
          concepts:
            - slug: "encapsulation-and-boundaries"
              name: "カプセル化と境界"
              summary: "内部詳細を隠し、公開すべき面だけを安定化する設計。"
              whyLearn: "変更影響を局所化し、依存の広がりを防げる。"
              terms:
                - slug: "module"
                  name: "モジュール"
                  summary: "関連する定義をまとめ、公開境界を持たせる構成単位。"
                  whyLearn: "コードベースを理解可能な大きさに分割する基本単位だから。"
                  promptHint: "この機能群はどの単位でモジュール分割すると責務が明確になるか整理して。"
                  aliases:
                    - "module"
                    - "単位モジュール"
                - slug: "package"
                  name: "パッケージ"
                  summary: "配布や依存管理の単位としてのコード集合。"
                  whyLearn: "再利用、公開、依存解決を考えるときの実務的な境界になる。"
                  promptHint: "このコードはモジュール内に留めるべきか、パッケージとして独立させるべきか判断して。"
                  aliases:
                    - "package"
                    - "ライブラリ単位"
                - slug: "visibility"
                  name: "可視性"
                  summary: "どの識別子をどの範囲から参照できるかを制御する仕組み。"
                  whyLearn: "内部実装の漏出を防ぎ、公開 API を意識した設計にできる。"
                  promptHint: "この関数や型は公開する必要があるか。可視性を絞ることで何が守れるか説明して。"
                  aliases:
                    - "visibility"
                    - "access modifier"

            - slug: "behavioral-contracts-and-reuse"
              name: "振る舞い契約と再利用"
              summary: "実装を隠しつつ期待される振る舞いを共有し、再利用方法を整理する。"
              whyLearn: "差し替え可能性と実装選択の自由度を両立できる。"
              terms:
                - slug: "interface"
                  name: "インターフェース"
                  summary: "利用者に見せる操作の契約面を定義する仕組み。"
                  whyLearn: "実装詳細から呼び出し側を切り離しやすくなる。"
                  promptHint: "この抽象は interface として切るべきか、具体型を直接公開すべきか説明して。"
                  aliases:
                    - "interface"
                    - "契約面"
                - slug: "trait-protocol"
                  name: "Trait と Protocol"
                  summary: "型に期待する振る舞いを合意するための抽象契約。"
                  whyLearn: "継承より柔らかく能力を表現し、横断的な再利用に使える。"
                  promptHint: "この共通能力は trait/protocol として切り出す価値があるか整理して。"
                  aliases:
                    - "trait"
                    - "protocol"
                - slug: "composition-over-inheritance"
                  name: "継承より合成"
                  summary: "継承で階層を増やすより、部品を組み合わせて振る舞いを作る方針。"
                  whyLearn: "実装の結合度を下げ、変更しやすい構成にしやすい。"
                  promptHint: "この拡張は継承より合成を選ぶべきか。差し替えやすさとテスト容易性から説明して。"
                  aliases:
                    - "composition over inheritance"
                    - "合成優先"

        - slug: "apis-and-code-generation"
          name: "API 進化とコード生成"
          summary: "公開面の安定性と、宣言からコードを生み出す仕組みを扱う。"
          concepts:
            - slug: "api-evolution"
              name: "API 進化"
              summary: "公開面をどう壊さずに進化させるかを考える。"
              whyLearn: "利用者に不要な移行コストを押し付けない設計ができる。"
              terms:
                - slug: "public-api"
                  name: "公開 API"
                  summary: "利用者が依存してよいと見なす外部向けの操作面。"
                  whyLearn: "何を安定対象として守るべきかを明示できる。"
                  promptHint: "この変更は公開 API の変更に当たるか。利用者影響を踏まえて説明して。"
                  aliases:
                    - "public API"
                    - "外部契約"
                - slug: "backward-compatibility"
                  name: "後方互換性"
                  summary: "既存利用者のコードやデータを壊さずに新しい版へ移行できる性質。"
                  whyLearn: "ライブラリや SDK の変更方針を適切に判断できる。"
                  promptHint: "このリファクタは後方互換性を壊すか。ソース互換、バイナリ互換、挙動互換を分けて説明して。"
                  aliases:
                    - "backward compatibility"
                    - "後方互換"
                - slug: "semantic-versioning"
                  name: "セマンティックバージョニング"
                  summary: "互換性の変化を MAJOR、MINOR、PATCH で表す版管理方針。"
                  whyLearn: "変更の意味を利用者に伝え、依存管理と移行判断を助ける。"
                  promptHint: "この変更は SemVer でどの桁を上げるべきか。公開 API 影響から説明して。"
                  aliases:
                    - "SemVer"
                    - "semver"

            - slug: "metaprogramming-and-reflection"
              name: "メタプログラミングとリフレクション"
              summary: "コードをコードで扱い、宣言から生成や検査を行う技法。"
              whyLearn: "重複削減に効く一方で、可読性やデバッグ性を損なう点も見極められる。"
              terms:
                - slug: "macro"
                  name: "マクロ"
                  summary: "構文木やコード断片を展開して新しいコードを生む仕組み。"
                  whyLearn: "定型の削減や DSL 実装に強力だが、過用のリスクも高い。"
                  promptHint: "この重複はマクロで消すべきか。それとも通常の関数や生成処理の方がよいか比較して。"
                  aliases:
                    - "macro"
                    - "コード展開"
                - slug: "reflection"
                  name: "リフレクション"
                  summary: "型やメンバーなどのプログラム情報を実行時または生成時に参照する仕組み。"
                  whyLearn: "柔軟なフレームワーク実装に有効だが、静的保証を弱めることがある。"
                  promptHint: "この仕組みは reflection に頼るべきか、明示的な登録や生成で代替すべきか説明して。"
                  aliases:
                    - "reflection"
                    - "イントロスペクション"
                - slug: "code-generation"
                  name: "コード生成"
                  summary: "宣言やモデルからソースコードや設定を自動生成する手法。"
                  whyLearn: "定型削減に有効だが、生成物の責務境界と更新戦略を誤ると負債化しやすい。"
                  promptHint: "この領域は手書きよりコード生成に向くか。変更頻度と差分レビューの観点で評価して。"
                  aliases:
                    - "codegen"
                    - "source generation"

    - slug: "language-implementation-and-runtime"
      name: "言語実装とランタイム"
      summary: "ソースコードが解析され、中間表現に落ち、実行可能な形になり、ランタイム上で動くまでを扱う棚。"
      whyLearn: "性能、診断品質、移植性、実行時挙動を表面的な文法の奥で理解できる。"
      topicClusters:
        - slug: "front-end-and-intermediate-representations"
          name: "フロントエンドと中間表現"
          summary: "構文の読み取りから、変換しやすい内部表現への落とし込みまで。"
          concepts:
            - slug: "syntax-and-semantic-processing"
              name: "構文処理と意味処理"
              summary: "文字列としてのソースを、意味のある内部構造へ変換する過程。"
              whyLearn: "パーサエラー、名前解決、型検査の役割分担を理解できる。"
              terms:
                - slug: "lexer"
                  name: "字句解析器"
                  summary: "ソースコードをトークン列へ分解する処理器。"
                  whyLearn: "構文以前の曖昧さやトークン設計を理解する入口になる。"
                  promptHint: "この文法上の曖昧さは lexer と parser のどちらで吸収すべきか説明して。"
                  aliases:
                    - "lexer"
                    - "scanner"
                - slug: "parser"
                  name: "構文解析器"
                  summary: "トークン列から文法構造を組み立てる処理器。"
                  whyLearn: "言語設計とツール実装の両方で中心的な役割を持つ。"
                  promptHint: "この DSL の parser はどの文法規則で構成されると自然か説明して。"
                  aliases:
                    - "parser"
                    - "構文パーサ"
                - slug: "abstract-syntax-tree"
                  name: "抽象構文木"
                  summary: "構文上の本質的な構造だけを残した木表現。"
                  whyLearn: "解析、最適化、生成の共通基盤になる。"
                  promptHint: "この機能を AST 上で表すと、どのノード設計が必要か整理して。"
                  aliases:
                    - "AST"
                    - "abstract syntax tree"

            - slug: "lowering-and-intermediate-forms"
              name: "lowering と中間形式"
              summary: "高水準表現を、最適化や多言語対応に向く中間形式へ落とす。"
              whyLearn: "コンパイラ共通部品と最適化の見通しがよくなる。"
              terms:
                - slug: "bytecode"
                  name: "バイトコード"
                  summary: "仮想機械やランタイム向けの中間命令列。"
                  whyLearn: "移植性と実行時最適化の中間地点として重要だから。"
                  promptHint: "この言語処理系はネイティブコードではなく bytecode を選ぶと何が得られるか説明して。"
                  aliases:
                    - "bytecode"
                    - "中間命令"
                - slug: "static-single-assignment"
                  name: "静的単一代入形式"
                  summary: "各変数が一度だけ代入されるように表現した IR 形式。"
                  whyLearn: "多くの最適化を実装しやすくする定番表現だから。"
                  promptHint: "SSA にすると、この最適化やデータ依存解析がなぜ簡単になるか説明して。"
                  aliases:
                    - "SSA"
                    - "static single assignment"
                - slug: "llvm-ir"
                  name: "LLVM IR"
                  summary: "LLVM 系ツールチェーンで使われる SSA ベースの中間表現。"
                  whyLearn: "多言語から共通最適化基盤へ接続する代表例として理解価値が高い。"
                  promptHint: "この独自言語を LLVM IR に落とすとき、どの情報を保持し、どこで lowering するべきか説明して。"
                  aliases:
                    - "LLVM IR"
                    - "LangRef"

        - slug: "execution-and-runtime-boundaries"
          name: "実行戦略とランタイム境界"
          summary: "どこでコードを評価し、どの実行環境や他言語境界で動かすかを扱う。"
          concepts:
            - slug: "execution-strategies"
              name: "実行戦略"
              summary: "ソースをどう実行可能形にして、いつ最適化するかの戦略。"
              whyLearn: "起動時間、スループット、移植性、診断性のバランスを判断できる。"
              terms:
                - slug: "interpreter"
                  name: "インタプリタ"
                  summary: "プログラムを逐次読み取り、その場で実行を進める方式。"
                  whyLearn: "実装容易性と柔軟性の利点を理解できる。"
                  promptHint: "この言語は interpreter で十分か。起動時間、最適化余地、デバッグ性から説明して。"
                  aliases:
                    - "interpreter"
                    - "逐次実行系"
                - slug: "virtual-machine"
                  name: "仮想機械"
                  summary: "中間命令を実行する抽象的な実行環境。"
                  whyLearn: "ランタイム機能、ポータビリティ、JIT の基盤理解に役立つ。"
                  promptHint: "この実行環境は VM を挟むことで何を得て、何を失うか整理して。"
                  aliases:
                    - "VM"
                    - "virtual machine"
                - slug: "just-in-time-compilation"
                  name: "JIT コンパイル"
                  summary: "実行時にコードを最適化しながらネイティブ化する方式。"
                  whyLearn: "実運用でのホットパス最適化や起動コストの議論に必要。"
                  promptHint: "このワークロードでは JIT が効くか。起動時間と定常性能の観点で説明して。"
                  aliases:
                    - "JIT"
                    - "just in time compilation"

            - slug: "runtime-and-interoperability"
              name: "ランタイムと相互運用"
              summary: "メモリ管理と外部世界との接続を支える実行時機構。"
              whyLearn: "安全性、性能、埋め込み、他言語連携の判断材料になる。"
              terms:
                - slug: "garbage-collection"
                  name: "ガベージコレクション"
                  summary: "不要になったメモリを自動回収するランタイム機構。"
                  whyLearn: "メモリ安全の利点と、レイテンシや制御性のトレードオフを理解できる。"
                  promptHint: "このシステムは GC 向きか。停止時間、所有権設計、開発速度から説明して。"
                  aliases:
                    - "GC"
                    - "garbage collection"
                - slug: "webassembly"
                  name: "WebAssembly"
                  summary: "多言語からターゲット可能な低水準で移植性の高いバイナリ形式。"
                  whyLearn: "ブラウザ内外をまたぐ新しい配布・実行形態を理解できる。"
                  promptHint: "この処理を WebAssembly 化する意味があるか。移植性、実行環境、FFI の観点で説明して。"
                  aliases:
                    - "Wasm"
                    - "WebAssembly"
                - slug: "foreign-function-interface"
                  name: "外部関数インターフェース"
                  summary: "他言語や他ランタイムの関数を呼び出すための接続機構。"
                  whyLearn: "既存資産の活用と境界コストの把握に必要。"
                  promptHint: "この連携は FFI に向くか。データ変換、所有権、障害切り分けから説明して。"
                  aliases:
                    - "FFI"
                    - "foreign function interface"

    - slug: "tooling-build-and-packaging"
      name: "ツールチェーン、ビルド、パッケージング"
      summary: "読む、直す、組み立てる、配る、再現するための周辺技術を扱う棚。"
      whyLearn: "現代の実装力は言語文法だけでなく、解析器、IDE連携、ビルド再現性、依存管理まで含めて成立するから。"
      topicClusters:
        - slug: "analysis-and-code-intelligence"
          name: "解析とコードインテリジェンス"
          summary: "コードを機械的に理解し、診断やナビゲーションに使う技術。"
          concepts:
            - slug: "static-analysis-techniques"
              name: "静的解析技法"
              summary: "プログラムを実行せずに性質や欠陥候補を見つける技法群。"
              whyLearn: "レビューやテストより前に見つけられる問題を増やせる。"
              terms:
                - slug: "linter"
                  name: "リンタ"
                  summary: "スタイル違反や単純な欠陥パターンを検出する解析器。"
                  whyLearn: "人手レビューを価値の高い論点に集中させられる。"
                  promptHint: "このルールは linter に任せるべきか、人の設計レビューに残すべきか説明して。"
                  aliases:
                    - "linter"
                    - "lint"
                - slug: "dataflow-analysis"
                  name: "データフロー解析"
                  summary: "値がどこから来てどこへ流れるかを追跡する解析。"
                  whyLearn: "未初期化、到達不能、不要代入、汚染追跡の基盤になる。"
                  promptHint: "この不具合はデータフロー解析で事前に検出できるか。流れの観点から説明して。"
                  aliases:
                    - "data-flow analysis"
                    - "flow analysis"
                - slug: "abstract-interpretation"
                  name: "抽象解釈"
                  summary: "具体実行の代わりに抽象状態でプログラムを解釈する静的解析枠組み。"
                  whyLearn: "網羅的だが現実的な解析を設計する中核概念だから。"
                  promptHint: "この性質検査は抽象解釈として設計できるか。安全側近似をどう置くか説明して。"
                  aliases:
                    - "abstract interpretation"
                    - "抽象実行"

            - slug: "editor-and-indexing-protocols"
              name: "エディタ連携と索引化"
              summary: "コード理解機能を IDE やエディタから共通利用するための仕組み。"
              whyLearn: "言語ごとにツールを作り直さず、コード理解基盤を共有できる。"
              terms:
                - slug: "language-server-protocol"
                  name: "Language Server Protocol"
                  summary: "エディタと言語サーバの間で補完や定義ジャンプなどをやり取りする共通プロトコル。"
                  whyLearn: "現代のコードインテリジェンスの中心的な接着面だから。"
                  promptHint: "この開発体験機能は LSP で提供すべきか、IDE 専用拡張に閉じるべきか説明して。"
                  aliases:
                    - "LSP"
                    - "language server protocol"
                - slug: "lsif"
                  name: "LSIF"
                  summary: "コードナビゲーション情報を事前計算して共有するための索引形式。"
                  whyLearn: "ローカル解析なしでも大規模コード検索や参照追跡を扱いやすくなる。"
                  promptHint: "この環境は LSP のオンライン解析だけで足りるか、LSIF の事前索引が必要か説明して。"
                  aliases:
                    - "Language Server Index Format"
                    - "LSIF"
                - slug: "tree-sitter"
                  name: "Tree-sitter"
                  summary: "インクリメンタルに構文木を更新できるパーサ生成・解析基盤。"
                  whyLearn: "エディタ上のリアルタイム解析や構文ハイライトを支える代表例だから。"
                  promptHint: "この軽量なコードツールはフルコンパイラより Tree-sitter 系で作る方が適切か説明して。"
                  aliases:
                    - "Tree-sitter"
                    - "incremental parser"

        - slug: "builds-and-dependencies"
          name: "ビルドと依存関係"
          summary: "コードを再現可能に組み立て、依存グラフを安定的に扱う技術。"
          concepts:
            - slug: "build-reproducibility"
              name: "ビルド再現性"
              summary: "同じ入力から同じ成果物を安定して得るための設計。"
              whyLearn: "CI、キャッシュ、差分デバッグ、リリース信頼性の前提になる。"
              terms:
                - slug: "build-graph"
                  name: "ビルドグラフ"
                  summary: "ターゲットと依存関係をノードと辺で表したビルドの実行計画。"
                  whyLearn: "並列化、差分ビルド、依存漏れの検知に効く。"
                  promptHint: "このビルド失敗は build graph の依存欠落か、実行環境差かを切り分けて説明して。"
                  aliases:
                    - "build graph"
                    - "dependency DAG"
                - slug: "hermetic-build"
                  name: "Hermetic Build"
                  summary: "ホスト環境の偶然の状態に依存せず、入力を限定して行うビルド。"
                  whyLearn: "再現性とキャッシュ可能性を高める。"
                  promptHint: "このビルドは hermetic か。外部状態への依存を洗い出して説明して。"
                  aliases:
                    - "hermetic build"
                    - "閉じたビルド"
                - slug: "reproducible-build"
                  name: "再現可能ビルド"
                  summary: "同じソースと設定から同一の成果物を生成できる性質。"
                  whyLearn: "リリース検証やサプライチェーンの信頼性に直結する。"
                  promptHint: "この成果物は reproducible か。タイムスタンプや外部依存を含めて確認観点を挙げて。"
                  aliases:
                    - "reproducible build"
                    - "決定的ビルド"

            - slug: "dependency-configuration-and-locking"
              name: "依存設定と固定"
              summary: "依存関係を宣言し、解決し、チームで同じ結果を共有するための仕組み。"
              whyLearn: "動く環境と壊れる環境の差を減らし、依存更新の判断をしやすくする。"
              terms:
                - slug: "package-manifest"
                  name: "パッケージマニフェスト"
                  summary: "パッケージ名、依存、ビルド設定、メタデータを宣言する設定ファイル。"
                  whyLearn: "配布単位の定義と依存解決の起点になる。"
                  promptHint: "このプロジェクトの manifest には、依存だけでなく何を明示しておくべきか整理して。"
                  aliases:
                    - "package.json"
                    - "pyproject.toml"
                    - "Cargo.toml"
                    - "pom.xml"
                - slug: "dependency-resolution"
                  name: "依存解決"
                  summary: "要求された版制約から、共存可能な依存バージョン集合を決める処理。"
                  whyLearn: "依存地獄や更新事故の根本原因を理解できる。"
                  promptHint: "この更新で依存解決が壊れるのはなぜか。版制約と互換性の観点で説明して。"
                  aliases:
                    - "dependency resolution"
                    - "version solving"
                - slug: "lockfile"
                  name: "ロックファイル"
                  summary: "解決済み依存の具体的な版を固定して共有するファイル。"
                  whyLearn: "チームや CI で同じ依存ツリーを復元するために重要。"
                  promptHint: "このリポジトリでは lockfile をコミットすべきか。アプリとライブラリの違いも含めて説明して。"
                  aliases:
                    - "package-lock.json"
                    - "Cargo.lock"
                    - "poetry.lock"

edges:
  - from: "static-typing"
    to: "type-inference"
    relationType: "related"
    reason: "静的型付けの実用性は、どこまで型推論で注釈負荷を下げられるかと強く結び付く。"

  - from: "dynamic-typing"
    to: "static-typing"
    relationType: "compare_with"
    reason: "両者は安全性、柔軟性、IDE 支援、リファクタ容易性のトレードオフを比較する基準になる。"

  - from: "algebraic-data-type"
    to: "exhaustiveness-checking"
    relationType: "used_in"
    reason: "代数的データ型で状態を表すと、分岐の網羅性検査が有効に働きやすい。"

  - from: "ownership"
    to: "garbage-collection"
