  - from: "lexer"
    to: "parser"
    relationType: "prerequisite"
    reason: "多くの処理系では、まず字句解析でトークン化してから構文解析へ進む。"

  - from: "parser"
    to: "abstract-syntax-tree"
    relationType: "used_in"
    reason: "構文解析の主要成果物として AST が構築され、その後の解析と変換の起点になる。"

  - from: "abstract-syntax-tree"
    to: "tree-sitter"
    relationType: "related"
    reason: "Tree-sitter はエディタ向けに構文木をインクリメンタルに維持する代表的基盤だから。"

  - from: "static-single-assignment"
    to: "llvm-ir"
    relationType: "used_in"
