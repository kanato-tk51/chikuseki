  - from: "webassembly"
    to: "virtual-machine"
    relationType: "related"
    reason: "WebAssembly は抽象的な実行環境上で扱われる低水準表現として理解すると整理しやすい。"

  - from: "linter"
    to: "dataflow-analysis"
    relationType: "related"
    reason: "高度な linter ルールは内部でデータフロー解析を利用することがある。"

  - from: "language-server-protocol"
    to: "lsif"
    relationType: "compare_with"
    reason: "LSP は主にオンライン対話、LSIF は事前計算索引という違いで比較すると理解しやすい。"

  - from: "build-graph"
    to: "hermetic-build"
    relationType: "related"
    reason: "明示的な依存グラフは hermetic build を成立させる前提になりやすい。"

  - from: "hermetic-build"
    to: "reproducible-build"
    relationType: "related"
