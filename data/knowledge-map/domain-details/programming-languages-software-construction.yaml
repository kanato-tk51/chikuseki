domain:
  slug: "programming-languages-software-construction"
  name: "プログラミング言語とソフトウェア構成"
  summary: "ソフトウェアをコード、型、抽象化、モジュールとして表現し、変換し、構成する領域。"
  boundaryNotes: "コード表現と構成に集中する。ライフサイクル、プロジェクト統治、チームプロセスは Software Engineering / Engineering Organization に寄せる。"
  knowledgeAreas:
    - slug: "paradigms-and-computation-models"
      name: "プログラミングパラダイムと計算モデル"
      summary: "問題をどのような計算モデルと記述スタイルで表現するかを整理する棚。"
      whyLearn: "言語ごとの表面的な文法差ではなく、状態、関数、イベント、反応、スクリプトという設計の型を見分けられるようになる。"
      topicClusters:
        - slug: "object-and-functional-foundations"
          name: "オブジェクトと関数型の基礎"
          summary: "状態を持つ部品として組む考え方と、関数合成で組む考え方を対比して学ぶ。"
          concepts:
            - slug: "state-and-object-abstraction"
              name: "状態とオブジェクト抽象"
              summary: "データと振る舞いを同じ単位で扱い、責務をオブジェクトに分配する考え方。"
              whyLearn: "責務分割、変更影響、拡張可能性、実装の読みやすさをレビューしやすくなる。"
              terms:
                - slug: "class"
                  name: "クラス"
                  summary: "オブジェクトの構造と振る舞いの設計図を表す定義単位。"
                  whyLearn: "責務をどの単位でまとめるかを考える基本になる。"
                  promptHint: "この設計でクラスごとの責務分担は適切か、凝集度と変更影響から説明して。"
                  aliases:
                    - "class"
                    - "型定義"
                - slug: "object"
                  name: "オブジェクト"
                  summary: "状態を保持し、メッセージやメソッド呼び出しに応答する実体。"
                  whyLearn: "実行時の責務の所在と状態変化の追跡に不可欠だから。"
                  promptHint: "この機能をオブジェクト中心に見ると、どの状態と振る舞いを同居させるべきか整理して。"
                  aliases:
                    - "object"
                    - "インスタンス"
                - slug: "dynamic-dispatch"
                  name: "動的ディスパッチ"
                  summary: "実行時の受け手の型に応じて呼び出すメソッドを決める仕組み。"
                  whyLearn: "多態性の利益と、追跡しにくさやオーバーライドの危険を理解できる。"
                  promptHint: "この箇所で動的ディスパッチを使う利点と、追跡しづらさのトレードオフを説明して。"
                  aliases:
                    - "dynamic dispatch"
                    - "late binding"
                  search:
                    keywords:
                      - dynamic dispatch
                      - late binding
                      - virtual dispatch
                      - method dispatch
                      - polymorphic dispatch
                      - vtable
                      - 仮想メソッド
                      - 動的束縛
                      - 多態性
                    commonSignals:
                      - override したメソッドが実行時に選ばれる
                      - virtual table や vtable の説明がある
                      - interface 経由で実装を差し替える
                      - late binding / dynamic binding と対比している
                    antiSignals:
                      - 単なる関数呼び出し最適化の話だけで多態性がない
                      - HTTP request dispatch やルーティングの話だけである
                      - キューへの dispatch / スレッド dispatch の意味で使っている
                    relatedNames:
                      - name: Java virtual method invocation
                        kind: language
                        relevance: Java のオーバーライドと実行時メソッド選択を学ぶときに頻出する。
                        officialUrl: https://docs.oracle.com/javase/specs/
                      - name: C++ virtual functions
                        kind: language
                        relevance: vtable や仮想関数呼び出しの代表例としてよく参照される。
                        officialUrl: https://isocpp.org/
                      - name: Objective-C message dispatch
                        kind: language
                        relevance: メッセージ送信ベースの動的ディスパッチ例として関連が強い。
                        officialUrl: https://developer.apple.com/documentation/objectivec
                      - name: Swift protocol witness table
                        kind: language
                        relevance: プロトコルに基づく動的・静的ディスパッチの比較で出やすい。
                        officialUrl: https://www.swift.org/documentation/

            - slug: "functional-abstraction"
              name: "関数型抽象"
              summary: "副作用を抑え、関数合成と宣言的変換で問題を表現する考え方。"
              whyLearn: "状態の追跡を減らし、テストしやすく再利用しやすいコードに近づける。"
              terms:
                - slug: "pure-function"
                  name: "純粋関数"
                  summary: "同じ入力に対して同じ出力だけを返し、外部状態に副作用を持たない関数。"
                  whyLearn: "推論しやすく、テストと並列化に向く単位だから。"
                  promptHint: "この処理は純粋関数として切り出せるか。できるなら何を引数にし、何を戻り値にするべきか説明して。"
                  aliases:
                    - "pure function"
                    - "pure"
                  search:
                    keywords:
                      - pure function
                      - 純粋関数
                      - side effect free
                      - 副作用なし
                      - referential transparency
                      - deterministic function
                      - immutable input
                      - functional core
                      - 関数型プログラミング
                    commonSignals:
                      - 同じ入力なら同じ出力になる
                      - 外部状態を書き換えない
                      - テストしやすい関数として切り出す
                      - キャッシュやメモ化が安全という説明がある
                    antiSignals:
                      - 単に関数が短いという話だけで副作用の有無に触れていない
                      - 数学の純関数だけでソフトウェア設計の文脈がない
                      - DB 書き込みやログ出力を内部で行っている
                    relatedNames:
                      - name: Haskell
                        kind: language
                        relevance: 純粋関数と副作用分離を学ぶ代表的な関数型言語。
                        officialUrl: https://www.haskell.org/
                      - name: Elm
                        kind: language
                        relevance: 副作用を明示的に扱う純粋関数型 UI 言語として関連する。
                        officialUrl: https://elm-lang.org/
                      - name: Functional Core, Imperative Shell
                        kind: pattern
                        relevance: 純粋関数を中核に寄せる実務的な設計パターンとしてよく出る。
                      - name: Ramda
                        kind: library
                        relevance: JavaScript で純粋関数・関数合成を使う文脈で出やすい。
                        officialUrl: https://ramdajs.com/

                - slug: "higher-order-function"

                  search:

                    keywords:

                      - higher-order function

                      - HOF

                      - 高階関数

                      - function as argument

                      - callback function

                      - map filter reduce

                      - 関数を返す関数

                      - first-class function

                      - 関数合成

                    commonSignals:

                      - 関数を引数に渡す

                      - map/filter/reduce で反復処理を置き換える

                      - コールバックを受け取る API

                      - 関数を返して処理を部分適用する

                    antiSignals:

                      - 高階という語が数学の高階論理だけを指している

                      - 単なるユーティリティ関数で関数値を扱っていない

                      - callback が非同期通知の話だけで抽象化の説明がない

                    relatedNames:

                      - name: Array.prototype.map

                        kind: method

                        relevance: 高階関数の最も一般的な実務例として JavaScript で頻出する。

                        officialUrl: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Array/map

                      - name: LINQ

                        kind: library

                        relevance: C# の Select / Where など高階関数的なコレクション処理で関連する。

                        officialUrl: https://learn.microsoft.com/dotnet/csharp/linq/

                      - name: lodash

                        kind: library

                        relevance: map、filter、partial など関数操作ユーティリティと一緒に出やすい。

                        officialUrl: https://lodash.com/

                      - name: RxJS operators

                        kind: library

                        relevance: ストリーム変換を高階関数として表す文脈で関連する。

                        officialUrl: https://rxjs.dev/
                  name: "高階関数"
                  summary: "関数を引数や戻り値として扱う関数。"
                  whyLearn: "処理の共通パターンを抽象化し、重複を減らせる。"
                  promptHint: "この反復処理は高階関数に置き換えると何が読みやすくなるか説明して。"
                  aliases:
                    - "higher-order function"
                    - "HOF"
                - slug: "algebraic-data-type"
                  name: "代数的データ型"
                  summary: "積と和の組み合わせで状態や場合分けを型として表現する手法。"
                  whyLearn: "曖昧なフラグ管理を減らし、網羅的な分岐設計をしやすくする。"
                  promptHint: "この状態表現は代数的データ型で表したほうが安全か。場合分けと不変条件の観点で説明して。"
                  aliases:
                    - "ADT"
                    - "algebraic data type"
                  search:
                    keywords:
                      - algebraic data type
                      - ADT
                      - 代数的データ型
                      - sum type
                      - product type
                      - tagged union
                      - discriminated union
                      - sealed class
                      - enum with associated values
                      - パターンマッチ
                    commonSignals:
                      - 状態を union / enum / sealed class で表す
                      - フラグではなく場合分け型にする
                      - match / pattern matching と一緒に説明される
                      - sum type と product type の対比がある
                    antiSignals:
                      - 抽象データ型 Abstract Data Type の略として ADT を使っている
                      - データベースの代数だけを扱っている
                      - 列挙型だが値を持たず単なる定数集合の話だけである
                    relatedNames:
                      - name: Haskell data
                        kind: language
                        relevance: 代数的データ型の基本例として data 宣言がよく使われる。
                        officialUrl: https://www.haskell.org/documentation/
                      - name: Rust enum
                        kind: language
                        relevance: 値を持つ enum と match による ADT の実務例として関連が強い。
                        officialUrl: https://doc.rust-lang.org/book/
                      - name: TypeScript discriminated union
                        kind: language
                        relevance: 構造的型付け言語で和型に近い設計を行う代表例。
                        officialUrl: https://www.typescriptlang.org/docs/
                      - name: Kotlin sealed class
                        kind: language
                        relevance: 閉じた階層による場合分け表現として ADT と一緒に学ばれる。
                        officialUrl: https://kotlinlang.org/docs/sealed-classes.html

        - slug: "asynchronous-reactive-and-scripted-models"
          name: "非同期、リアクティブ、スクリプティング"
          summary: "イベントや待ち合わせを中心に書くスタイルと、短い連結・自動化を重視するスタイルを扱う。"
          concepts:
            - slug: "asynchronous-control-models"
              name: "非同期制御モデル"
              summary: "待ち時間のある処理をブロックせずに構成するための言語機構。"
              whyLearn: "I/O 中心のアプリケーションで可読性と資源効率を両立するために重要。"
              terms:
                - slug: "event-loop"
                  name: "イベントループ"
                  summary: "イベントやタスクを順次取り出して処理を進める実行モデル。"
                  whyLearn: "シングルスレッド非同期の制約と利点を理解できる。"
                  promptHint: "このランタイムはイベントループ前提か。ブロッキング処理を混ぜると何が起きるか説明して。"
                  aliases:
                    - "event loop"
                    - "ループ駆動実行"
                  search:
                    keywords:
                      - event loop
                      - イベントループ
                      - task queue
                      - microtask queue
                      - callback queue
                      - non-blocking I/O
                      - single-threaded async
                      - reactor pattern
                      - libuv
                      - run loop
                    commonSignals:
                      - ブロッキング処理が全体を止める
                      - microtask と macrotask の順序を説明している
                      - non-blocking I/O と callback queue が出る
                      - single thread なのに並行に見えるという説明がある
                    antiSignals:
                      - ゲームループや描画ループだけで非同期 I/O の話がない
                      - Kubernetes event やドメインイベントの話だけで実行モデルではない
                      - 単なる for loop の説明である
                    relatedNames:
                      - name: Node.js event loop
                        kind: platform
                        relevance: イベントループと非同期 I/O の代表的な実務文脈。
                        officialUrl: https://nodejs.org/en/docs
                      - name: libuv
                        kind: library
                        relevance: Node.js などで使われるクロスプラットフォーム非同期 I/O ライブラリ。
                        officialUrl: https://libuv.org/
                      - name: WHATWG HTML event loop
                        kind: standard
                        relevance: ブラウザのタスク・マイクロタスク処理モデルの仕様として関連する。
                        officialUrl: https://html.spec.whatwg.org/
                      - name: Python asyncio
                        kind: library
                        relevance: Python のイベントループベース非同期処理で頻出する。
                        officialUrl: https://docs.python.org/3/library/asyncio.html

                - slug: "promise-future"

                  search:

                    keywords:

                      - Promise

                      - Future

                      - promise future

                      - deferred

                      - thenable

                      - 非同期結果

                      - async result

                      - completion stage

                      - Task

                      - CompletableFuture

                    commonSignals:

                      - まだ完了していない結果を値として返す

                      - then / catch / finally で非同期処理をつなぐ

                      - resolve / reject の説明がある

                      - future を await する

                    antiSignals:

                      - 将来計画の future という一般語だけである

                      - Promise が仕様や約束という一般語として使われている

                      - スレッドそのものの説明で結果抽象に触れていない

                    relatedNames:

                      - name: JavaScript Promise

                        kind: standard

                        relevance: Promise の実務上もっとも一般的な利用例として頻出する。

                        officialUrl: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Promise

                      - name: Java CompletableFuture

                        kind: library

                        relevance: Future を合成する Java 標準 API として関連する。

                        officialUrl: https://docs.oracle.com/en/java/javase/

                      - name: Scala Future

                        kind: library

                        relevance: 非同期結果とコールバック合成の代表例。

                        officialUrl: https://docs.scala-lang.org/

                      - name: .NET Task

                        kind: library

                        relevance: C# async/await と合わせて Future 的な非同期結果を表す。

                        officialUrl: https://learn.microsoft.com/dotnet/api/system.threading.tasks.task
                  name: "Promise と Future"
                  summary: "まだ得られていない計算結果を値として扱う抽象。"
                  whyLearn: "非同期 API の合成とエラー伝播を読む基礎になる。"
                  promptHint: "この非同期 API は Promise と Future のどの責務を露出しているか説明して。"
                  aliases:
                    - "promise"
                    - "future"
                - slug: "async-await"
                  name: "async と await"
                  summary: "非同期処理を直列風の構文で書くための言語機構。"
                  whyLearn: "コールバック地獄を避けつつ、待機点と並行性の境界を明示できる。"
                  promptHint: "この async/await の使い方で直列化しすぎていないか、並行実行の余地があるかレビューして。"
                  aliases:
                    - "async/await"
                    - "非同期構文"
                  search:
                    keywords:
                      - async await
                      - async/await
                      - 非同期構文
                      - awaitable
                      - suspending function
                      - coroutine
                      - async function
                      - structured concurrency
                      - 並行実行
                      - 非同期制御フロー
                    commonSignals:
                      - await をループ内で直列に呼んでいる
                      - async 関数が Promise / Future / Task を返す
                      - 非同期だが見た目は同期処理のように書く
                      - 同時実行には gather / all / join が必要という話がある
                    antiSignals:
                      - await が英語の待機という一般語だけである
                      - OS スレッドの並列処理だけで async 構文がない
                      - sleep や timer の使い方だけを説明している
                    relatedNames:
                      - name: JavaScript async function
                        kind: standard
                        relevance: async/await 構文の代表的な標準仕様利用例。
                        officialUrl: https://developer.mozilla.org/docs/Web/JavaScript/Reference/Statements/async_function
                      - name: Python async def
                        kind: language
                        relevance: async/await と coroutine の学習で頻出する。
                        officialUrl: https://docs.python.org/3/library/asyncio.html
                      - name: Kotlin coroutines
                        kind: library
                        relevance: suspend と構造化並行性の文脈で async/await と比較される。
                        officialUrl: https://kotlinlang.org/docs/coroutines-overview.html
                      - name: C# async and await
                        kind: language
                        relevance: .NET の Task ベース非同期構文として安定している。
                        officialUrl: https://learn.microsoft.com/dotnet/csharp/asynchronous-programming/

            - slug: "reactive-and-scripted-composition"
              name: "リアクティブとスクリプト的構成"
              summary: "入力ストリームや既存ツールの連結を中心にした表現方法。"
              whyLearn: "継続的に変化するデータや自動化タスクを、短い表現で扱いやすくなる。"
              terms:
                - slug: "reactive-stream"
                  name: "リアクティブストリーム"
                  summary: "時間とともに流れる値の列を購読と変換で扱うモデル。"
                  whyLearn: "UI、イベント処理、データパイプで変化を宣言的に扱える。"
                  promptHint: "このイベント列はリアクティブストリームとして扱うと、どの結合が簡潔になるか説明して。"
                  aliases:
                    - "reactive streams"
                    - "observable stream"
                  search:
                    keywords:
                      - reactive stream
                      - Reactive Streams
                      - observable
                      - stream operator
                      - backpressure
                      - リアクティブストリーム
                      - イベントストリーム
                      - publisher subscriber
                      - flow API
                      - data stream
                    commonSignals:
                      - Observable / Publisher / Subscriber が出る
                      - backpressure の説明がある
                      - イベント列を map/filter/merge で変換している
                      - 購読解除や subscription の話がある
                    antiSignals:
                      - 動画配信やライブ配信の stream だけを指している
                      - ファイル入出力 stream だけでリアクティブ処理ではない
                      - SNS のタイムラインを stream と呼んでいるだけである
                    relatedNames:
                      - name: Reactive Streams
                        kind: standard
                        relevance: 非同期ストリーム処理と backpressure の標準的な仕様名。
                        officialUrl: https://www.reactive-streams.org/
                      - name: RxJS
                        kind: library
                        relevance: Observable と operator による実務的なリアクティブ処理で頻出する。
                        officialUrl: https://rxjs.dev/
                      - name: Project Reactor
                        kind: library
                        relevance: JVM のリアクティブストリーム実装として広く使われる。
                        officialUrl: https://projectreactor.io/
                      - name: Akka Streams
                        kind: library
                        relevance: backpressure 付きストリーム処理の実装例として関連する。
                        officialUrl: https://akka.io/

                - slug: "shell-scripting"

                  search:

                    keywords:

                      - shell script

                      - シェルスクリプト

                      - Bash

                      - sh

                      - POSIX shell

                      - pipeline

                      - grep awk sed

                      - cron job

                      - automation script

                      - glue code

