    to: "dependency-resolution"
    relationType: "prerequisite"
    reason: "依存解決は manifest に書かれた依存宣言と版制約を入力として行われる。"

  - from: "dependency-resolution"
    to: "lockfile"
    relationType: "used_in"
    reason: "解決結果を固定して共有するために lockfile が使われる。"

  - from: "semantic-versioning"
    to: "software-engineering-quality"
