  - from: scenario
    to: atam
    relationType: used_in
    reason: ATAM では品質属性シナリオを使ってトレードオフを評価する。
  - from: information-hiding
    to: coupling
    relationType: related
    reason: 内部詳細を隠すことは結合度を下げる方向に働きやすい。
  - from: coupling
    to: cohesion
    relationType: compare_with
    reason: 良いモジュール分割を考えるときに外部依存の少なさと内部まとまりの強さを対で見る。
  - from: static-analysis
    to: unit-test
    relationType: compare_with
    reason: どちらも早期検出に役立つが、実行の有無と見つけやすい欠陥の種類が異なる。
  - from: coverage
    to: test-automation
    relationType: related
    reason: 自動テストを継続的に実行するほど、カバレッジ計測を改善ループに組み込みやすい。
  - from: trunk-based-development
    to: continuous-integration
    relationType: prerequisite
    reason: 小さな差分を頻繁に統合する運用は継続的インテグレーションを機能させやすい。
  - from: continuous-integration
    to: quality-gate
    relationType: used_in
    reason: CI は品質ゲートを自動的に実行し判定する主要な場になる。
  - from: dependency-lockfile
    to: build-automation
    relationType: used_in
    reason: 自動ビルドの再現性を高めるために依存解決結果の固定が役立つ。
  - from: artifact-repository
    to: rollback
    relationType: used_in
    reason: 以前の成果物を確実に取得できるとロールバックしやすい。
  - from: regression-test
