                  summary: 企画から開発、運用支援、退役までを含むソフトウェアの全期間。
                  whyLearn: 工学的活動を局所工程ではなく全体の流れで見られるようになる。
                  promptHint: この活動はライフサイクル全体のどの段階に位置し、前後とどうつながるかを整理する。
                  aliases:
                    - software lifecycle
                    - SDLC
                  search:
                    keywords:
                      - software life cycle
                      - software lifecycle
                      - SDLC
                      - ソフトウェアライフサイクル
                      - life cycle process
                      - development phase
                      - operation
                      - maintenance
                      - retirement
                      - acquisition
                    commonSignals:
                      - 企画、要求、設計、実装、テスト、運用、保守、退役が並ぶ
                      - 工程やプロセス間の入力、出力、責任を整理している
                      - SDLCやlife cycle processという語が使われている
                    antiSignals:
                      - 製品ライフサイクルや顧客ライフサイクルだけの話
                      - 単一スプリントや一回のリリース作業だけを指している
                    relatedNames:
                      - name: ISO/IEC/IEEE 12207
                        kind: standard
                        relevance: ソフトウェアライフサイクルプロセスを定義する代表的な標準。
                        officialUrl: https://www.iso.org/standard/90219.html
                      - name: SWEBOK
                        kind: standard
                        relevance: ソフトウェア工学の知識体系としてライフサイクル全体の語彙に接続する。
                        officialUrl: https://www.computer.org/education/bodies-of-knowledge/software-engineering/v4
                      - name: V-model
                        kind: method
                        relevance: ライフサイクル内で開発成果物と検証活動の対応を示す代表モデル。

                - slug: incremental-development
                  name: インクリメンタル開発
                  summary: 価値や機能を小さな増分に分けて段階的に提供する進め方。
                  whyLearn: 早いフィードバックを得ながら変更に適応しやすい。
                  promptHint: どんな最小増分に分けると学習とリスク低減が両立するかを考える。
                  aliases:
                    - incremental development
                    - incremental delivery
                - slug: v-model
                  name: V字モデル
                  summary: 開発工程と対応する検証工程の対応関係を強調するモデル。
                  whyLearn: 検証を後工程の作業ではなく、早い設計判断と結び付けて考えられる。
                  promptHint: 各開発成果物に対してどの検証活動が対応するかを対応付ける。
                  aliases:
                    - V-model
                    - V字工程
                  search:
                    keywords:
                      - V-model
                      - V字モデル
                      - V字工程
                      - verification and validation
                      - test level mapping
                      - requirements validation
                      - system test
                      - acceptance test
                      - left side right side
                    commonSignals:
                      - 左側の開発工程と右側の検証工程を対応付けている
                      - 要求に対する受け入れテスト、設計に対する統合テストが対応している
                      - verification と validation を区別している
                    antiSignals:
                      - V字回復や売上推移のグラフ
                      - ウォーターフォールと同義として雑に使われ、検証対応の議論がない
                    relatedNames:
                      - name: Automotive SPICE
                        kind: standard
                        relevance: 車載ソフトウェアなどでV字モデル的な工程とプロセス評価が一緒に現れやすい。
                        officialUrl: https://www.automotivespice.com/
                      - name: ISO/IEC/IEEE 12207
                        kind: standard
                        relevance: ライフサイクルプロセスの標準としてV字モデルと比較されやすい。
                        officialUrl: https://www.iso.org/standard/90219.html
                      - name: ISTQB
                        kind: standard
                        relevance: テストレベルや検証活動の説明でV字モデルが参照されることが多い。
                        officialUrl: https://www.istqb.org/
            - slug: quality-focused-delivery-practices
              name: 品質志向のデリバリー実践
              summary: 開発の流れの中に品質確認を埋め込むための実践群。
              whyLearn: 品質を最後にまとめて確認するのではなく、流れの中で作り込める。
              terms:
                - slug: devops
                  name: DevOps
                  summary: 開発と運用の協調を通じて、変更の流れと品質フィードバックを改善する考え方。
                  whyLearn: デリバリー速度と安定性を対立ではなく両立の論点として扱える。
                  promptHint: 開発からデリバリーまでの手戻りや待ち時間を減らすにはどの協調が必要かを見る。
                  aliases:
                    - DevOps
                    - 開発運用協調
                  search:
                    keywords:
                      - DevOps
                      - 開発運用協調
                      - development operations
                      - CI/CD
                      - deployment pipeline
                      - feedback loop
                      - automation
                      - collaboration
                      - CALMS
                      - value stream
                    commonSignals:
                      - 開発から運用までの待ち時間や手戻りを減らす話がある
                      - CI/CD、自動化、監視、フィードバックループが一緒に出る
                      - 速度と安定性を同時に改善する文脈で語られる
                    antiSignals:
                      - 単にインフラ担当者や運用担当者をDevOpsと呼んでいる
                      - ツール導入だけで、開発と運用の協調やフィードバック改善がない
                    relatedNames:
                      - name: DORA
                        kind: method
                        relevance: DevOpsの成果をデリバリー性能として測る代表的な研究・指標群。
                        officialUrl: https://dora.dev/
                      - name: The DevOps Handbook
                        kind: other
                        relevance: DevOps実践の原則やプラクティスの参照として会話に出やすい。
                      - name: Jenkins
                        kind: tool
                        relevance: DevOpsの自動化やCI/CDパイプラインの具体例として頻出する。
                        officialUrl: https://www.jenkins.io/

                - slug: shift-left-testing

                  search:

                    keywords:

                      - shift-left testing

                      - shift left

                      - シフトレフトテスト

                      - 左シフト

                      - early testing

                      - early defect detection

                      - test earlier

                      - prevent defects

                      - static checks in CI

                    commonSignals:

                      - 後工程で見つかる欠陥を要求、設計、実装直後に前倒し検出しようとしている

                      - 静的解析、単体テスト、レビューを早い段階に入れている

                      - 手戻りコスト削減や早期フィードバックが話題になる

                    antiSignals:

                      - 単にスケジュールを前倒しするだけ

                      - 左側に図を寄せる、UI配置を左にするという意味

                    relatedNames:

                      - name: DevSecOps

                        kind: method

                        relevance: セキュリティ検査の前倒しを含むシフトレフトの実践として一緒に現れやすい。

                      - name: SAST

                        kind: method

                        relevance: 実行前に欠陥や脆弱性を検出する前倒し検査として関連が強い。

                      - name: CI

                        kind: method

                        relevance: 早期検出を継続的に実行する場としてシフトレフトと結び付く。
                  name: シフトレフトテスト
                  summary: 品質確認を後工程ではなく前倒しして行う考え方。
                  whyLearn: 欠陥の早期発見と手戻りコスト低減につながる。
                  promptHint: いま後工程で見つかっている問題を、どの段階で前倒し検出できるかを考える。
                  aliases:
                    - shift left
                    - 左シフト
                - slug: definition-of-done
                  name: 完了の定義
                  summary: 作業が完了と見なされるための共通条件。
                  whyLearn: 実装完了と品質完了を混同しないための基準になる。
                  promptHint: このチームで完了と見なすには、テスト、レビュー、文書化のどこまで必要かを定める。
                  aliases:
                    - DoD
                    - Definition of Done
                  search:
                    keywords:
                      - Definition of Done
                      - DoD
                      - 完了の定義
                      - done criteria
                      - team agreement
                      - Scrum done
                      - quality checklist
                      - acceptance criteria
                      - ready for release
                    commonSignals:
                      - テスト、レビュー、ドキュメント、デプロイ準備など完了条件が列挙されている
                      - 実装完了とリリース可能状態を区別している
                      - チーム共通の品質チェックリストとして扱われている
                    antiSignals:
                      - 個別要求の受け入れ基準だけを指している
                      - 担当者の主観的な完了宣言だけで共通条件がない
                    relatedNames:
                      - name: Scrum Guide
                        kind: standard
                        relevance: Definition of Doneを明示的に扱う代表的なScrumの参照元。
                        officialUrl: https://scrumguides.org/
                      - name: Definition of Ready
                        kind: method
                        relevance: 作業開始条件と完了条件の対比として一緒に出やすい。
                      - name: Acceptance Criteria
                        kind: method
                        relevance: 個別ストーリーの受け入れ条件と、チーム共通の完了条件を比較する文脈で関連する。
        - slug: quality-management-and-continuous-improvement
          name: 品質管理と継続改善
          summary: 品質を保証し、測定し、改善ループを回すためのまとまり。
          concepts:
            - slug: quality-assurance-control-and-measurement
              name: 品質保証、品質管理、測定
              summary: 品質を作り込む活動と、結果を確かめる活動を区別して扱う技法群。
              whyLearn: 品質問題を個人の注意力ではなく仕組みの問題として改善できる。
              terms:
                - slug: quality-assurance
                  name: 品質保証
                  summary: 望ましい品質が得られるよう、工程や方法を整える活動。
                  whyLearn: 不具合を見つけるだけでなく、出にくい作り方を設計できる。
                  promptHint: この品質問題は検査不足か、工程や設計の仕組み不足かを切り分ける。
                  aliases:
                    - QA
                    - quality assurance
                  search:
                    keywords:
                      - QA
                      - quality assurance
                      - 品質保証
                      - process assurance
                      - quality planning
                      - audit
                      - review process
                      - prevent defects
                      - software quality assurance
                    commonSignals:
                      - 品質を作り込むための工程、標準、レビュー、監査が議論されている
                      - 不具合検出ではなく、不具合を出にくくする仕組みを扱っている
                      - QA plan、process audit、quality policy が出てくる
                    antiSignals:
                      - テスター個人やテスト実行だけをQAと呼んでいる
                      - 成果物の検査結果だけで、工程や仕組みの保証に触れていない
                    relatedNames:
                      - name: ISO 9001
                        kind: standard
                        relevance: 品質マネジメントシステムの一般標準として品質保証文脈で参照される。
                        officialUrl: https://www.iso.org/iso-9001-quality-management.html
                      - name: IEEE 730
                        kind: standard
                        relevance: ソフトウェア品質保証計画の規格名として専門文書に現れる。
                      - name: CMMI
                        kind: method
                        relevance: プロセス能力と品質保証活動を組織改善として扱う文脈で関連する。
                        officialUrl: https://cmmiinstitute.com/

                - slug: quality-control
                  name: 品質管理
                  summary: 成果物や結果を検査し、規準との差を把握して是正する活動。
                  whyLearn: いまの品質状態を把握し、出荷判断や是正判断につなげられる。
                  promptHint: どの成果物をどの基準で測り、逸脱時に何をするかを明確にする。
                  aliases:
                    - QC
                    - quality control
                - slug: defect-leakage
                  name: 欠陥流出
                  summary: ある工程で見つけるべき不具合が後工程や顧客環境へ流れてしまうこと。
                  whyLearn: どの工程の品質ゲートが弱いのかを把握しやすい。
                  promptHint: 本来どこで見つけるべき欠陥がどこまで流出したかを分析する。
                  aliases:
                    - defect leakage
                    - escaped defect
            - slug: continuous-improvement-frameworks
              name: 継続改善フレームワーク
              summary: 改善を単発の反省ではなく、継続的な仕組みにするための枠組み群。
              whyLearn: 品質改善を属人的な努力ではなく再現可能な学習ループにできる。
              terms:
                - slug: root-cause-analysis
                  name: 根本原因分析
                  summary: 目の前の不具合だけでなく、それを生んだ仕組みや条件を探る分析。
                  whyLearn: 表面的な修正だけで同じ問題を繰り返すのを防げる。
                  promptHint: この不具合の直接原因だけでなく、なぜその原因が生まれたのかを掘り下げる。
                  aliases:
                    - RCA
                    - root cause analysis
                - slug: cmmi
                  name: CMMI
                  summary: 組織のプロセス能力を評価し改善するための成熟度モデル。
                  whyLearn: 改善を思いつきではなく能力構築として捉えられる。
                  promptHint: この組織の改善課題は個別実践の不足か、能力領域の不足かを考える。
                  aliases:
                    - CMMI
                    - Capability Maturity Model Integration
                - slug: dora-metrics
                  name: DORAメトリクス
                  summary: ソフトウェアデリバリー性能を継続的に把握するための代表的指標群。
                  whyLearn: 速度と安定性の両面から改善を議論しやすくなる。
                  promptHint: 変更の流れと安定性を測るなら、どの指標をどう解釈するかを定める。
                  aliases:
                    - DORA
                    - delivery metrics
                  search:
                    keywords:
                      - DORA
                      - DORA metrics
                      - DORAメトリクス
                      - delivery metrics
                      - deployment frequency
                      - lead time for changes
                      - change failure rate
                      - failed deployment recovery time
                      - software delivery performance
                    commonSignals:
                      - デプロイ頻度、変更リードタイム、変更失敗率、復旧時間を測っている
                      - 速度と安定性を同時に改善する指標として使っている
                      - DevOpsや継続的デリバリーの改善状況を測定している
                    antiSignals:
                      - Doraという人名やキャラクター名
                      - 単なる生産性指標で、変更フローと安定性の両面を測っていない
                    relatedNames:
                      - name: DORA
                        kind: method
                        relevance: ソフトウェアデリバリー性能を測定する代表的な研究・実践の名称。
                        officialUrl: https://dora.dev/
                      - name: Four Keys
                        kind: tool
                        relevance: DORAメトリクス収集の実装例としてGoogleの文脈で出現しやすい。
                      - name: Accelerate
                        kind: other
                        relevance: DORAメトリクスの背景となる研究や書籍名として頻出する。

edges:
  - from: stakeholder
    to: user-story
    relationType: used_in
    reason: 利害関係者の価値や目的を短い要求表現に落とし込むときの起点になる。
  - from: use-case
    to: acceptance-criteria
    relationType: used_in
    reason: ユースケースの主成功シナリオや代替シナリオは受け入れ基準へ変換しやすい。
  - from: nonfunctional-requirement
    to: quality-attribute
    relationType: related
    reason: 非機能要求はアーキテクチャ上では品質属性として設計判断に反映されることが多い。
  - from: traceability-matrix
    to: change-request
    relationType: used_in
    reason: 変更要求の影響範囲を設計やテストまで追うときに使う。
  - from: prototyping
    to: requirements-review
    relationType: compare_with
    reason: 前者は体験を見せて確認し、後者は文書品質を点検するので妥当性確認の仕方が異なる。
  - from: viewpoint
    to: view
    relationType: used_in
    reason: ビューはビューポイントに従って具体的に作られる。
  - from: architecture-decision-record
    to: quality-attribute
    relationType: related
    reason: 重要な設計判断は通常どの品質属性を優先したかの記録を含む。
  - from: scenario
    to: atam
    relationType: used_in
    reason: ATAM では品質属性シナリオを使ってトレードオフを評価する。
  - from: information-hiding
    to: coupling
    relationType: related
    reason: 内部詳細を隠すことは結合度を下げる方向に働きやすい。
  - from: coupling
    to: cohesion
    relationType: compare_with
    reason: 良いモジュール分割を考えるときに外部依存の少なさと内部まとまりの強さを対で見る。
  - from: static-analysis
    to: unit-test
    relationType: compare_with
    reason: どちらも早期検出に役立つが、実行の有無と見つけやすい欠陥の種類が異なる。
  - from: coverage
    to: test-automation
    relationType: related
    reason: 自動テストを継続的に実行するほど、カバレッジ計測を改善ループに組み込みやすい。
  - from: trunk-based-development
    to: continuous-integration
    relationType: prerequisite
    reason: 小さな差分を頻繁に統合する運用は継続的インテグレーションを機能させやすい。
  - from: continuous-integration
    to: quality-gate
    relationType: used_in
    reason: CI は品質ゲートを自動的に実行し判定する主要な場になる。
  - from: dependency-lockfile
    to: build-automation
    relationType: used_in
    reason: 自動ビルドの再現性を高めるために依存解決結果の固定が役立つ。
  - from: artifact-repository
    to: rollback
    relationType: used_in
    reason: 以前の成果物を確実に取得できるとロールバックしやすい。
  - from: regression-test
    to: refactoring
    relationType: prerequisite
    reason: 安全なリファクタリングには既存振る舞いを守るための回帰テストが重要になる。
  - from: code-smell
    to: refactoring
    relationType: used_in
    reason: コードスメルはどこを改善対象にするかを見つける手掛かりになる。
  - from: technical-debt
    to: debt-register
    relationType: used_in
    reason: 技術的負債を管理対象にするには項目として可視化して記録する必要がある。
  - from: interest-metaphor
    to: technical-debt
    relationType: related
    reason: 利息メタファは技術的負債の時間的コストを説明するための考え方である。
  - from: anti-corruption-layer
    to: strangler-fig-pattern
    relationType: used_in
    reason: 段階移行の際に旧システムのモデル汚染を防ぐために併用されやすい。
  - from: software-life-cycle
    to: incremental-development
    relationType: compare_with
    reason: 前者は全体期間の枠組みで、後者はその中での進め方の一つである。
  - from: v-model
    to: shift-left-testing
    relationType: related
    reason: V字モデルは上流成果物と検証活動の対応を明示し、シフトレフトの発想と相性が良い。
  - from: quality-assurance
    to: quality-control
    relationType: compare_with
    reason: 品質を作り込む活動と結果を検査する活動として役割が異なる。
  - from: root-cause-analysis
    to: defect-leakage
    relationType: used_in
    reason: 欠陥流出が起きた理由を工程や仕組みの観点で掘り下げるときに使う。
  - from: devops
    to: continuous-delivery
    relationType: related
    reason: DevOps の実践は継続的デリバリーを成立させる文化的、技術的土台になりやすい。
  - from: dora-metrics
    to: continuous-delivery
    relationType: related
    reason: 継続的デリバリーの改善状況を継続測定するための代表的指標群として使われる。
