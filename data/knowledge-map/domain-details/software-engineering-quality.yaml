        - slug: modularity-and-design-principles
          name: モジュール性と設計原則
          summary: 変更しやすく理解しやすい構造を作るための分割原理と設計原則のまとまり。
          concepts:
            - slug: modularity
              name: モジュール性
              summary: 責務の分割と依存関係の制御によって、変更容易性を高める考え方。
              whyLearn: 大きなソフトウェアでも局所的に理解し変更できる状態を作れる。
              terms:
                - slug: coupling
                  name: 結合度
                  summary: モジュール間の依存の強さを表す概念。
                  whyLearn: 結合度が高いと変更波及が大きくなりやすい。
                  promptHint: この変更はどのモジュール間の依存を増やすか減らすかを見る。
                  aliases:
                    - coupling
                    - 結合
                  search:
                    keywords:
                      - coupling
                      - 結合度
                      - 密結合
                      - 疎結合
                      - tight coupling
                      - loose coupling
                      - dependency direction
                      - temporal coupling
                      - afferent coupling
                      - efferent coupling
                    commonSignals:
                      - 変更が波及する、差し替えにくい、テストしにくいという記述がある
                      - 依存グラフ、import関係、循環依存が問題視されている
                      - 外部サービスや具象実装への直接依存がレビューされている
                    antiSignals:
                      - 機械工学や電気回路の coupling を指している
                      - 単にサービス同士が連携しているだけで、設計上の依存の強さを示していない
                    relatedNames:
                      - name: Stable Dependencies Principle
                        kind: pattern
                        relevance: 依存方向とモジュール安定性を議論するときに結合度と近接して扱われる。
                      - name: Dependency Inversion Principle
                        kind: pattern
                        relevance: 具体実装への密結合を避ける設計原則として関連が強い。
                      - name: JDepend
                        kind: tool
                        relevance: Javaの依存関係や結合度を測る古典的な分析ツールとして出現しやすい。

                - slug: cohesion

                  search:

                    keywords:

                      - cohesion

                      - 凝集度

                      - high cohesion

                      - low cohesion

                      - functional cohesion

                      - single responsibility

                      - reason to change

                      - 責務分割

                      - responsibility clustering

                    commonSignals:

                      - 一つのクラスやモジュールが複数責務を抱えている

                      - reason to change が複数あるという表現がある

                      - 関連しない処理が同じファイルやパッケージに混在している

                    antiSignals:

                      - チームの一体感や social cohesion の話

                      - 画面デザインの統一感やブランド一貫性の話

                    relatedNames:

                      - name: Single Responsibility Principle

                        kind: pattern

                        relevance: 凝集度を実務的に説明するときに最も一緒に語られやすい原則。

                      - name: GRASP

                        kind: method

                        relevance: 責務割り当てや高凝集を扱うオブジェクト設計原則群として関連する。

                      - name: LCOM

                        kind: method

                        relevance: クラスの凝集度を測るメトリクス名としてコード品質分析で出現する。
                  name: 凝集度
                  summary: モジュール内部の責務がどれだけ一貫してまとまっているかを表す概念。
                  whyLearn: 凝集度が高いと責務が明確で変更理由も揃いやすい。
                  promptHint: このモジュールの要素は同じ変更理由を共有しているかを確認する。
                  aliases:
                    - cohesion
                    - 凝集
                - slug: information-hiding
                  name: 情報隠蔽
                  summary: 変更されやすい内部詳細を境界の内側に閉じ込める設計原則。
                  whyLearn: 内部変更の影響を外部へ漏らしにくくできる。
                  promptHint: どの実装詳細を公開せずに隠すと変更耐性が上がるかを考える。
                  aliases:
                    - information hiding
                    - 実装隠蔽
            - slug: design-principles-and-styles
              name: 設計原則と構造スタイル
              summary: 関心分離と依存制御を通じて構造品質を改善する原則群。
              whyLearn: 個別のコード改善を超えて、構造全体の一貫した判断基準を持てる。
              terms:
                - slug: separation-of-concerns
                  name: 関心の分離
                  summary: 性質の異なる責務や関心事を分離して扱う設計原則。
                  whyLearn: 変更理由が異なるものを分けることで保守しやすくなる。
                  promptHint: この設計はどの関心事を分離し、どこで混在しているかを見る。
                  aliases:
                    - SoC
                    - separation of concerns
                - slug: dependency-inversion-principle
                  name: 依存性逆転の原則
                  summary: 上位と下位の要素を具体実装ではなく抽象に依存させる原則。
                  whyLearn: 差し替えやテストや進化がしやすい構造を作れる。
                  promptHint: この依存は具体実装に固定されていないか、抽象に向け直せるかを考える。
                  aliases:
                    - DIP
                    - dependency inversion principle
                  search:
                    keywords:
                      - DIP
                      - dependency inversion principle
                      - 依存性逆転の原則
                      - depend on abstractions
                      - abstraction layer
                      - interface dependency
                      - inversion of control
                      - IoC
                      - dependency injection
                    commonSignals:
                      - 上位モジュールが下位の具象実装に直接依存していることを問題視している
                      - interface、port、adapter、DI container が出てくる
                      - テスト容易性や差し替え容易性のために抽象へ依存させている
                    antiSignals:
                      - 依存関係の向きを図示しているだけで、抽象への依存に関する話ではない
                      - 制御の反転やDIライブラリの使い方だけで、設計原則が議論されていない
                    relatedNames:
                      - name: SOLID
                        kind: method
                        relevance: DIPはSOLID原則の一部として説明されることが多い。
                      - name: Dependency Injection
                        kind: pattern
                        relevance: DIPを実装上支える代表的な依存注入パターンとして一緒に現れる。
                      - name: Spring Framework
                        kind: framework
                        relevance: IoCコンテナやDIの実務例として頻出する。
                        officialUrl: https://spring.io/projects/spring-framework

                - slug: layered-architecture

                  search:

                    keywords:

                      - layered architecture

                      - レイヤードアーキテクチャ

                      - n-tier architecture

                      - 3-tier architecture

                      - presentation layer

                      - application layer

                      - domain layer

                      - infrastructure layer

                      - dependency rule

                    commonSignals:

                      - presentation、application、domain、infrastructure などの層が分かれている

                      - 依存方向や層越しのアクセス禁止が議論されている

                      - controller、service、repository などの責務配置が話題になる

                    antiSignals:

                      - ネットワークのOSI参照モデルやクラウドの階層構成だけを指している

                      - 単なるフォルダ分けで、依存方向や責務の制約がない

                    relatedNames:

                      - name: Clean Architecture

                        kind: pattern

                        relevance: 依存方向と層分割を比較する文脈で一緒に現れやすい。

                      - name: Hexagonal Architecture

                        kind: pattern

                        relevance: 層構造とポート・アダプタ構造の比較対象として関連が強い。

                      - name: Domain-Driven Design

                        kind: method

                        relevance: domain layer や application layer の責務分割で併用されやすい。
                  name: レイヤードアーキテクチャ
                  summary: 責務ごとに層を分け、依存方向を制約する代表的な構造スタイル。
                  whyLearn: 関心分離と変更範囲の局所化を理解する基本例になる。
                  promptHint: このシステムで層を分けるなら、各層の責務と依存方向をどう置くかを考える。
                  aliases:
                    - layered architecture
                    - n-tier architecture

