domain:
  slug: software-engineering-quality
  name: ソフトウェア工学と品質
  summary: ソフトウェアを仕様化し、設計し、検証し、進化させ、品質を保証するための工学的手法。
  boundaryNotes: ライフサイクル、品質、保守を扱う。具体的なアプリ構成は Product Engineering、本番信頼性は Reliability / Operations に寄せる。
  knowledgeAreas:
    - slug: requirements-engineering
      name: 要求工学
      summary: 何を作るか、誰の価値を満たすか、どの品質条件で受け入れるかを定義し、変更に耐える形で管理する領域。
      whyLearn: 曖昧な要求は設計、見積もり、テスト、品質判断のすべてを不安定にするため、要求の質を上げることが工学の起点になる。
      topicClusters:
        - slug: requirements-discovery-analysis-and-specification
          name: 要求の発見、分析、仕様化
          summary: 利害関係者の意図を抽出し、整理し、仕様として表現するためのまとまり。
          concepts:
            - slug: needs-discovery-and-modeling
              name: ニーズ発見と要求モデリング
              summary: 利害関係者の目的や業務文脈を、実装可能な要求の候補に変換する技法群。
              whyLearn: 何を作るべきかを構造化して捉えられると、実装論に入る前に要求の抜けや誤解を減らせる。
              terms:
                - slug: stakeholder
                  name: ステークホルダー
                  summary: ソフトウェアの価値、制約、受け入れ条件に影響する人や組織や役割。
                  whyLearn: 誰の要求かを明確にしないと、品質基準や優先順位がぶれる。
                  promptHint: この機能の成否を判断する主要な人や組織は誰かを洗い出す。
                  aliases:
                    - stakeholder
                    - 利害関係者
                  search:
                    keywords:
                      - stakeholder
                      - 利害関係者
                      - ステークホルダー
                      - stakeholder analysis
                      - stakeholder map
                      - user role
                      - sponsor
                      - domain expert
                      - product owner
                    commonSignals:
                      - 誰が承認するか、誰が影響を受けるかを洗い出している
                      - 利用者、運用者、管理者、監査者、スポンサーなどの役割が並ぶ
                      - 要求の出所や意思決定者を特定している
                    antiSignals:
                      - 株主や投資家だけを指しており、ソフトウェア要求の関係者ではない
                      - 単なるユーザー数や市場セグメントの話で、要求や受け入れ条件に接続していない
                    relatedNames:
                      - name: RACI
                        kind: method
                        relevance: 責任分担や承認者を整理するときにステークホルダー分析と一緒に使われやすい。
                      - name: Stakeholder Map
                        kind: method
                        relevance: 影響度や関心度で関係者を整理するための代表的な可視化手法。
                      - name: BABOK
                        kind: standard
                        relevance: ビジネス分析や要求引き出しの文脈でステークホルダー分類と一緒に参照されやすい。
                        officialUrl: https://www.iiba.org/career-resources/a-business-analysis-professionals-foundation-for-success/babok/

                - slug: use-case

                  search:

                    keywords:

                      - use case

                      - ユースケース

                      - ユースケース記述

                      - actor

                      - primary actor

                      - main success scenario

                      - alternate flow

                      - exception flow

                      - precondition

                      - postcondition

                      - UML use case

                    commonSignals:

                      - アクター、基本フロー、代替フロー、例外フローが書かれている

                      - 利用者の目的とシステム応答をシナリオとして整理している

                      - 事前条件や事後条件を含む要求記述がある

                    antiSignals:

                      - 導入事例やマーケティング上の利用例を use case と呼んでいるだけ

                      - business case や投資判断の話で、利用者とシステムの相互作用ではない

                    relatedNames:

                      - name: UML

                        kind: standard

                        relevance: ユースケース図やアクター表現の標準的な記法として頻出する。

                        officialUrl: https://www.omg.org/spec/UML/

                      - name: Use Case 2.0

                        kind: method

                        relevance: ユースケースをアジャイルな要求単位として扱う文脈で参照される。
                  name: ユースケース
                  summary: 利用者とシステムの相互作用を目的単位で記述する要求表現。
                  whyLearn: システムが何を実現すべきかを利用文脈と結び付けて捉えられる。
                  promptHint: この機能で利用者はどんな目的達成のためにシステムとやり取りするかを整理する。
                  aliases:
                    - use case
                    - ユースケース記述
                - slug: user-story
                  name: ユーザーストーリー
                  summary: 利用者価値を短く記述するアジャイルな要求表現。
                  whyLearn: 実装タスクではなく利用者価値を中心に会話を進めやすくなる。
                  promptHint: 誰が何をしたいのか、なぜそれが価値なのかを一文で表す。
                  aliases:
                    - user story
                    - ストーリー
                  search:
                    keywords:
                      - user story
                      - ユーザーストーリー
                      - As a
                      - I want
                      - so that
                      - INVEST
                      - story point
                      - epic
                      - product backlog item
                      - acceptance criteria
                    commonSignals:
                      - As a role, I want goal, so that benefit の形式で書かれている
                      - エピックを小さなストーリーへ分割している
                      - ストーリーポイントや受け入れ基準と一緒に出てくる
                    antiSignals:
                      - SNSのストーリー投稿や物語の意味で使われている
                      - 実装タスクだけが書かれており、利用者価値や目的が表現されていない
                    relatedNames:
                      - name: INVEST
                        kind: method
                        relevance: ユーザーストーリーの品質を点検する代表的なチェック観点。
                      - name: Scrum
                        kind: method
                        relevance: プロダクトバックログ項目としてユーザーストーリーが扱われることが多い。
                        officialUrl: https://scrumguides.org/
                      - name: Jira
                        kind: tool
                        relevance: エピック、ストーリー、サブタスクを管理する実務ツールとして頻出する。
                        officialUrl: https://www.atlassian.com/software/jira
            - slug: requirements-specification
              name: 要求仕様化
              summary: 発見した要求を曖昧さの少ない形で仕様に落とし込む技法群。
              whyLearn: 要求が仕様として表現されて初めて、設計、見積もり、テストに接続できる。
              terms:
                - slug: software-requirements-specification
                  name: ソフトウェア要求仕様書
                  summary: ソフトウェア要求を体系的に記述した文書や情報集合。
                  whyLearn: 要求の合意点と変更点を追跡できる共通基盤になる。
                  promptHint: 要求を後から検証可能な形で残すなら、どの粒度と構造で記述するかを考える。
                  aliases:
                    - SRS
                    - software requirements specification
                  search:
                    keywords:
                      - SRS
                      - software requirements specification
                      - ソフトウェア要求仕様書
                      - 要求仕様書
                      - requirement specification
                      - functional requirement
                      - shall statement
                      - requirements document
                      - requirement ID
                      - requirements baseline
                    commonSignals:
                      - shall、must、should の書き分けが議論されている
                      - 要求ID、制約、前提、例外、優先度が文書化されている
                      - 要求から設計やテストへ接続する基準文書として扱われている
                    antiSignals:
                      - PRDや事業要件だけで、ソフトウェア要求として検証可能に書かれていない
                      - API仕様やDBスキーマだけを指しており、要求の根拠や振る舞いがない
                    relatedNames:
                      - name: ISO/IEC/IEEE 29148
                        kind: standard
                        relevance: 要求工学と要求仕様の情報項目を扱う代表的な標準。
                        officialUrl: https://www.iso.org/standard/72089.html
                      - name: IEEE 830
                        kind: standard
                        relevance: 古いSRS文脈で今も資料や会話ログに残りやすい歴史的な規格名。
                      - name: DOORS Next
                        kind: tool
                        relevance: 要求仕様、トレーサビリティ、変更履歴を管理するツールとして出現しやすい。

                - slug: nonfunctional-requirement

                  search:

                    keywords:

                      - NFR

                      - non-functional requirement

                      - 非機能要求

                      - 品質要求

                      - quality requirement

                      - performance requirement

                      - availability requirement

                      - reliability requirement

                      - maintainability requirement

                      - security requirement

                    commonSignals:

                      - 性能、可用性、保守性、信頼性、使用性などの条件が列挙されている

                      - 応答時間、稼働率、復旧時間など測定可能な基準が出てくる

                      - 機能一覧とは別に品質条件として整理されている

                    antiSignals:

                      - 単に非機能という見出しだけで、測定条件や受け入れ条件がない

                      - インフラ設定や運用ルールだけで、ソフトウェアへの要求として表現されていない

                    relatedNames:

                      - name: ISO/IEC 25010

                        kind: standard

                        relevance: 品質特性を分類する基準として非機能要求の整理に使われる。

                        officialUrl: https://www.iso.org/standard/78176.html

                      - name: SQuaRE

                        kind: standard

                        relevance: システム・ソフトウェア品質要求と評価を扱うISO/IEC 25000系列の総称。

                      - name: Quality Attribute Scenario

                        kind: method

                        relevance: 非機能要求を測定可能な状況と応答に分解するときに使われる。
                  name: 非機能要求
                  summary: 機能そのものではなく、性能、信頼性、保守性など振る舞いの質を定める要求。
                  whyLearn: 非機能要求は設計やアーキテクチャの早い段階から判断を拘束する。
                  promptHint: このソフトウェアに求められる性能や可用性や保守性の条件は何かを明確にする。
                  aliases:
                    - NFR
                    - quality requirement
                    - 品質要求
                - slug: acceptance-criteria
                  name: 受け入れ基準
                  summary: 要求が満たされたと判断するための具体的な条件。
                  whyLearn: 完了判定を明確にし、要求とテストをつなぐ橋になる。
                  promptHint: この要求が満たされたと言える観測可能な条件を列挙する。
                  aliases:
                    - acceptance criteria
                    - 受入基準
                  search:
                    keywords:
                      - acceptance criteria
                      - 受け入れ基準
                      - 受入基準
                      - completion criteria
                      - done when
                      - Given When Then
                      - pass/fail condition
                      - Definition of Done
                      - UAT criteria
                    commonSignals:
                      - Given-When-Then で条件と期待結果が書かれている
                      - チケットやストーリーに完了判定条件が付いている
                      - PO、QA、顧客による受け入れ判断に接続されている
                    antiSignals:
                      - 単なる作業完了報告で、観測可能な合格条件がない
                      - プロジェクト全体のリリース承認条件だけで、個別要求の受け入れ条件ではない
                    relatedNames:
                      - name: Gherkin
                        kind: language
                        relevance: 受け入れ基準をGiven-When-Then形式で記述する際に頻出する。
                        officialUrl: https://cucumber.io/docs/gherkin/
                      - name: Cucumber
                        kind: framework
                        relevance: 受け入れ基準を実行可能仕様として扱う文脈でよく使われる。
                        officialUrl: https://cucumber.io/docs/
                      - name: BDD
                        kind: method
                        relevance: ふるまいを例で合意し、受け入れ基準へ落とす実践として関連が強い。
        - slug: requirements-management-and-validation
          name: 要求の管理と妥当性確認
          summary: 変更や追跡を制御しながら、要求が本当に正しいかを確かめるためのまとまり。
          concepts:
            - slug: requirements-traceability-and-change
              name: 追跡可能性と変更管理
              summary: 要求の由来、影響範囲、変更履歴を扱う技法群。
              whyLearn: 変更のたびに混乱しないためには、何がどこに効いているかを追える必要がある。
              terms:
                - slug: traceability-matrix
                  name: トレーサビリティマトリクス
                  summary: 要求と設計、実装、テストなどの対応関係を整理した表や構造。
                  whyLearn: 変更影響を漏れなく追いやすくなり、テスト不足も見つけやすい。
                  promptHint: 要求ごとに設計要素やテストケースとの対応を追跡できるか確認する。
                  aliases:
                    - RTM
                    - requirements traceability matrix
                  search:
                    keywords:
                      - traceability matrix
                      - requirements traceability matrix
                      - RTM
                      - トレーサビリティマトリクス
                      - 要求トレーサビリティ
                      - bidirectional traceability
                      - requirement-to-test
                      - coverage matrix
                      - impact analysis
                    commonSignals:
                      - 要求IDとテストケースIDの対応表がある
                      - 要求から設計、実装、テストまでのリンクを追っている
                      - 変更時の影響範囲やテスト不足を確認している
                    antiSignals:
                      - データリネージや血統管理の話で、要求との対応関係ではない
                      - 単にチケット番号があるだけで、双方向追跡や対応表になっていない
                    relatedNames:
                      - name: ISO/IEC/IEEE 29148
                        kind: standard
                        relevance: 要求の追跡可能性や要求情報項目を扱う標準として関連が強い。
                        officialUrl: https://www.iso.org/standard/72089.html
                      - name: DOORS Next
                        kind: tool
                        relevance: 要求、設計、テストのリンク管理に使われる代表的な要求管理ツール。
                      - name: Jira
                        kind: tool
                        relevance: 要求、課題、テストケースをチケットで相互参照する運用で出現しやすい。

                - slug: requirements-baseline
                  name: 要求ベースライン
                  summary: 一定時点で合意された要求の基準状態。
                  whyLearn: 何が合意済みで、何が変更対象かを明確にできる。
                  promptHint: いま変更前提で固定すべき要求集合はどこまでかを決める。
                  aliases:
                    - baseline
                    - requirements baseline
                - slug: change-request
                  name: 変更要求
                  summary: 既存要求や仕様への追加、修正、削除を正式に扱うための依頼単位。
                  whyLearn: 変更を口頭で流さず、コストや影響を伴う判断として扱える。
                  promptHint: この要求変更は何を変え、何に影響し、誰が承認するべきかを明らかにする。
                  aliases:
                    - CR
                    - 変更依頼
                  search:
                    keywords:
                      - change request
                      - CR
                      - 変更要求
                      - 変更依頼
                      - change control
                      - impact assessment
                      - change approval
                      - scope change
                      - change log
                    commonSignals:
                      - 要求や仕様の追加、修正、削除を正式な依頼として扱っている
                      - 影響範囲、コスト、優先度、承認者が書かれている
                      - 変更ログや承認履歴と一緒に出てくる
                    antiSignals:
                      - Gitの差分やPull Requestそのものだけを指している
                      - 単なる改善アイデアで、影響評価や承認プロセスがない
                    relatedNames:
                      - name: Change Control Board
                        kind: method
                        relevance: 正式な変更要求の評価と承認を行う会議体として一緒に現れやすい。
                      - name: ITIL Change Enablement
                        kind: method
                        relevance: 運用やサービス管理寄りの変更統制文脈で参照されやすい。
                        officialUrl: https://www.axelos.com/certifications/itil-service-management
                      - name: Jira
                        kind: tool
                        relevance: 変更要求を課題として記録し、承認や実装差分へ接続する実務で使われる。
            - slug: requirements-validation-techniques
              name: 要求の妥当性確認技法
              summary: 要求が本当に必要で、理解可能で、受け入れ可能かを確かめる技法群。
              whyLearn: 正しく実装する前に、そもそも正しい要求かを確かめる必要がある。
              terms:
                - slug: prototyping
                  name: プロトタイピング
                  summary: 早い段階で試作品を作り、要求理解や期待値を確かめる手法。
                  whyLearn: 文書だけでは見えない誤解や期待ギャップを早く発見できる。
                  promptHint: どの要求は文章より試作品で見せた方が妥当性確認しやすいかを考える。
                  aliases:
                    - prototype
                    - プロトタイプ
                - slug: walkthrough
                  name: ウォークスルー
                  summary: 作成物を関係者で順に確認し、理解や抜け漏れを見つけるレビュー手法。
                  whyLearn: 早い段階で誤解や不整合を発見しやすい。
                  promptHint: 要求を関係者と順に読み合わせたとき、解釈が割れる箇所はどこかを見る。
                  aliases:
                    - walkthrough
                    - 読み合わせ
                - slug: requirements-review
                  name: 要求レビュー
                  summary: 要求の完全性、一貫性、検証可能性などを点検するレビュー活動。
                  whyLearn: 設計や実装に入る前に、要求そのものの品質を上げられる。
                  promptHint: この要求は曖昧さ、不整合、検証不能な表現を含んでいないかを確認する。
                  aliases:
                    - review
                    - requirements inspection

    - slug: software-architecture-and-design
      name: ソフトウェアアーキテクチャと設計
      summary: ソフトウェアの主要構造、責務分割、品質属性、設計判断を扱う領域。
      whyLearn: 良い設計はコードを書く前にトレードオフを見える化し、変更容易性や品質の土台を作るため。
      topicClusters:
        - slug: architecture-description-and-evaluation
          name: アーキテクチャ記述と評価
          summary: アーキテクチャを表現し、品質属性に照らして評価するためのまとまり。
          concepts:
            - slug: architecture-description
              name: アーキテクチャ記述
              summary: 関係者の関心に応じて、アーキテクチャを複数の見方で表現する技法群。
              whyLearn: 構造を口頭説明に頼らず、レビューや合意形成の対象として扱える。
              terms:
                - slug: viewpoint
                  name: ビューポイント
                  summary: 特定の関心事に対して、どの観点でアーキテクチャを見るかを定めた枠組み。
                  whyLearn: 何を見る図なのかを明確にしないと、図の意味がぶれる。
                  promptHint: この図は誰のどんな関心に応えるための観点なのかを明確にする。
                  aliases:
                    - viewpoint
                    - 観点
                - slug: view
                  name: ビュー
                  summary: ビューポイントに従って作られた具体的なアーキテクチャ表現。
                  whyLearn: 一枚の図で全部を表そうとせず、目的に応じた説明ができる。
                  promptHint: このビューはどの関心事に答え、何をあえて省略しているかを確認する。
                  aliases:
                    - view
                    - アーキテクチャビュー
                - slug: architecture-decision-record
                  name: アーキテクチャ決定記録
                  summary: 重要な設計判断とその背景や代替案を簡潔に記録する文書。
                  whyLearn: なぜその設計にしたのかを後から説明しやすくなる。
                  promptHint: この設計判断の背景、選択肢、採用理由、見送った案を残す。
                  aliases:
                    - ADR
                    - architecture decision record
                  search:
                    keywords:
                      - ADR
                      - architecture decision record
                      - architecture decision log
                      - アーキテクチャ決定記録
                      - 技術選定記録
                      - decision rationale
                      - context decision consequences
                      - Nygard ADR
                      - docs/adr
                    commonSignals:
                      - Context、Decision、Consequences の構成がある
                      - 'status: proposed、accepted、deprecated のような状態がある'
                      - リポジトリ内の adr ディレクトリや決定ログに言及している
                    antiSignals:
                      - 単なる議事録や会議メモで、決定と根拠が独立していない
                      - 技術比較表だけで、採択した判断と影響が記録されていない
                    relatedNames:
                      - name: Lightweight Architecture Decision Records
                        kind: method
                        relevance: 軽量ADRの実践名として記事や会話で参照されやすい。
                        officialUrl: https://www.thoughtworks.com/radar/techniques/lightweight-architecture-decision-records
                      - name: MADR
                        kind: pattern
                        relevance: Markdown ADR テンプレートとしてリポジトリ内のADR運用に出現しやすい。
                        officialUrl: https://adr.github.io/madr/
                      - name: arc42
                        kind: method
                        relevance: アーキテクチャ文書の中で設計判断や根拠を整理するテンプレートとして併用されやすい。
                        officialUrl: https://arc42.org/
            - slug: quality-attribute-driven-evaluation
              name: 品質属性駆動の評価
              summary: 性能や変更容易性などの品質属性からアーキテクチャを評価する技法群。
              whyLearn: 構造の良し悪しは、機能の有無だけでなく品質属性の達成可能性で決まる。
              terms:
                - slug: quality-attribute
                  name: 品質属性
                  summary: ソフトウェアの質を特徴づける性能、信頼性、保守性などの観点。
                  whyLearn: 設計トレードオフを議論する共通語彙になる。
                  promptHint: この設計が特に守るべき品質属性は何で、何と衝突しうるかを整理する。
                  aliases:
                    - quality attribute
                    - quality characteristic
                  search:
                    keywords:
                      - quality attribute
