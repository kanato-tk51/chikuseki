domain:
  slug: product-management-product-strategy
  name: プロダクトマネジメントとプロダクト戦略
  summary: 誰に、何を、なぜ、どの順番で作るかを決める領域。
  boundaryNotes: プロダクトの範囲、戦略、優先順位を扱う。価格や事業ポートフォリオは Business、実装パターンは Product Engineering に寄せる。
  knowledgeAreas:
    - slug: product-strategy-and-positioning
      name: プロダクト戦略とポジショニング
      summary: 顧客、市場、競争、提供価値を定め、どこでどう勝つかを決める。
      whyLearn: 何を作るかの前に、誰にどんな価値を届け、どの競争軸で勝つかを考える基準を持てる。
      topicClusters:
        - slug: vision-and-market-choice
          name: ビジョンと市場選択
          summary: 目指す未来と、狙う市場・顧客の輪郭を定めるまとまり。
          concepts:
            - slug: vision-strategy-goal
              name: ビジョン、戦略、目標の接続
              summary: プロダクトの未来像と、そこへ至る戦略、当面の目標を接続する考え方。
              whyLearn: 抽象的な理想と日々の優先順位の間を埋める基礎になる。
              terms:
                - slug: product-vision
                  name: プロダクトビジョン
                  summary: プロダクトが中長期で実現したい未来像や到達状態。
                  whyLearn: 戦略、ロードマップ、日々の判断の上位基準になる。
                  promptHint: そのプロダクトが将来どんな世界や状態を作りたいかを説明するとき。
                  aliases:
                    - vision
                    - product vision
                  search:
                    keywords:
                      - プロダクトビジョン
                      - product vision
                      - vision statement
                      - future state
                      - desired future
                      - プロダクトの未来像
                      - vision narrative
                      - mission vision strategy
                      - north star
                    commonSignals:
                      - 将来どんな世界を作りたいかを議論している
                      - ロードマップや優先順位の上位判断基準として語られている
                      - 3年後、5年後、10年後の到達状態が説明されている
                      - 機能一覧ではなく存在意義や未来像を表現している
                    antiSignals:
                      - computer vision や画像認識モデルの話
                      - 企業理念だけで個別プロダクトに接続していない話
                      - 視力、視覚、アイケアの話
                      - 単なる短期KPIや四半期目標の話
                    relatedNames:
                      - name: Product Vision Board
                        kind: method
                        relevance: プロダクトの対象、ニーズ、価値、事業目標を一枚で整理するビジョン設計手法として一緒に出やすい。
                      - name: Working Backwards
                        kind: method
                        relevance: 将来の顧客価値から逆算して製品構想を作る手法としてビジョン策定と関連する。
                      - name: PR/FAQ
                        kind: method
                        relevance: ローンチ時の顧客価値を先に文章化するため、プロダクトビジョンの具体化に使われる。
                      - name: Product Strategy Canvas
                        kind: framework
                        relevance: ビジョンを市場、顧客、価値提案、戦略へ接続する道具として併用される。

                - slug: product-strategy

                  search:

                    keywords:

                      - プロダクト戦略

                      - product strategy

                      - strategy themes

                      - strategic bets

                      - where to play

                      - how to win

                      - 問題選択

                      - 顧客問題の優先順位

                      - product strategy overview

                      - 戦略テーマ

                    commonSignals:

                      - どの顧客問題に集中するかを選んでいる

                      - ロードマップの前提として戦略テーマが定義されている

                      - 複数の市場や顧客セグメントから狙いを絞っている

                      - 競合、差別化、勝ち筋、順序付けが同時に語られている

                    antiSignals:

                      - 全社経営戦略だけでプロダクト範囲に落ちていない話

                      - 技術選定やアーキテクチャ戦略だけの話

                      - マーケティングキャンペーン単体の話

                      - 単なる機能リクエスト一覧

                    relatedNames:

                      - name: SVPG Product Strategy

                        kind: framework

                        relevance: 解くべき問題を選び、チームへ戦略的文脈を与える考え方としてよく参照される。

                        officialUrl: https://www.svpg.com/product-strategy-overview/

                      - name: Product Strategy Canvas

                        kind: framework

                        relevance: 顧客、価値、競争、目標を整理して戦略を可視化するために使われる。

                      - name: Lean Canvas

                        kind: framework

                        relevance: 顧客課題、解決策、価値提案、チャネルなどを戦略仮説として整理できる。

                      - name: Business Model Canvas

                        kind: framework

                        relevance: プロダクト戦略を事業モデルや価値提供構造へ接続する際に使われる。

                      - name: Porter Five Forces

                        kind: framework

                        relevance: 市場構造や競争圧力を踏まえた戦略判断で参照される。

                        officialUrl: https://www.isc.hbs.edu/strategy/business-strategy/Pages/the-five-forces.aspx
                  name: プロダクト戦略
                  summary: ビジョンを実現するために、どの問題をどの順番で解くかを定める方針。
                  whyLearn: 機能要望の寄せ集めではなく、解くべき問題の束として計画できる。
                  promptHint: 今期から中期にかけて、どの顧客問題に集中するかを整理するとき。
                  aliases:
                    - strategy
                    - product strategy
                - slug: product-goal
                  name: プロダクトゴール
                  summary: プロダクト改善の方向を示す長めの到達目標。
                  whyLearn: backlog や sprint の判断を、その場の都合ではなく目標に結び付けられる。
                  promptHint: いまの backlog が何に向かって束ねられているかを示すとき。
                  aliases:
                    - goal
                    - product goal
            - slug: market-segmentation-and-positioning
              name: 市場分解とポジショニング
              summary: 顧客群を分け、どの顧客にどんな違いで価値提供するかを定める手法。
              whyLearn: すべての人向けに曖昧な価値を語る失敗を減らせる。
              terms:
                - slug: target-segment
                  name: ターゲットセグメント
                  summary: 狙う市場の中で、共通した課題や文脈を持つ顧客群。
                  whyLearn: 誰のどんな状況に最適化するのかを明確にできる。
                  promptHint: このプロダクトがまず勝ちにいく顧客群を定義するとき。
                  aliases:
                    - market segment
                    - target market
                  search:
                    keywords:
                      - ターゲットセグメント
                      - target segment
                      - market segment
                      - target market
                      - segmentation
                      - STP
                      - 顧客セグメント
                      - 市場セグメント
                      - early adopter segment
                      - served available market
                    commonSignals:
                      - 誰を最初の対象顧客にするかを議論している
                      - 市場を業種、規模、利用文脈、課題で分けている
                      - 全員向けではなく特定顧客群に絞っている
                      - TAM から現実的に狙う範囲を切り出している
                    antiSignals:
                      - ネットワークセグメントやメモリセグメントの話
                      - 広告配信の短期オーディエンス設定だけの話
                      - 顧客ではなく社内組織の部署分類だけの話
                      - 単なる人口統計だけで課題や文脈がない分類
                    relatedNames:
                      - name: STP
                        kind: framework
                        relevance: Segmentation、Targeting、Positioning の流れでターゲット顧客を決める代表的枠組み。
                      - name: TAM SAM SOM
                        kind: framework
                        relevance: 市場全体から実際に狙う市場範囲を切り出す際に使われる。
                      - name: Crossing the Chasm
                        kind: framework
                        relevance: 初期市場から主流市場へ移る際の顧客セグメント選択で参照される。
                      - name: Jobs Segmentation
                        kind: method
                        relevance: 属性ではなく顧客が達成したい進歩によってセグメントを切る方法として関連する。

                - slug: ideal-customer-profile

                  search:

                    keywords:

                      - 理想顧客プロファイル

                      - ICP

                      - ideal customer profile

                      - best-fit customer

                      - firmographics

                      - technographics

                      - target account

                      - B2B ICP

                      - high-fit customer

                      - 顧客適合度

                    commonSignals:

                      - 最も刺さる顧客条件を定義している

                      - 業種、従業員規模、利用ツール、予算、課題成熟度を並べている

                      - 営業対象や初期導入企業の選別基準を作っている

                      - 高LTV、低CAC、短いセールスサイクルなどの適合条件が出ている

                    antiSignals:

                      - inductively coupled plasma など化学分析の ICP

                      - Internet Cache Protocol の ICP

                      - 暗号資産やトークン名としての ICP

                      - 人物像だけで企業・顧客適合条件がない話

                    relatedNames:

                      - name: Account-Based Marketing

                        kind: method

                        relevance: B2Bで理想顧客に近いアカウントを選び、営業・マーケティングを集中させる実践として関連する。

                      - name: Firmographics

                        kind: method

                        relevance: 企業規模、業種、地域などでICPを記述するためによく使われる。

                      - name: Technographics

                        kind: method

                        relevance: 利用技術スタックや導入済みツールをICP条件に含める際に使われる。

                      - name: Buyer Persona

                        kind: method

                        relevance: ICPが企業やアカウント単位、persona が人物単位の理解として併用される。
                  name: 理想顧客プロファイル
                  summary: 最も高い適合度と継続価値を持つ顧客像を記述したもの。
                  whyLearn: セグメントの中でも、今もっとも刺さる顧客を具体化できる。
                  promptHint: どの顧客を優先獲得すると学習と事業が進みやすいかを考えるとき。
                  aliases:
                    - ICP
                    - ideal customer profile
                - slug: strategic-positioning
                  name: 戦略的ポジショニング
                  summary: 競合と違う形で価値を作り、より高い価格や低いコストにつなげる立ち位置。
                  whyLearn: 競争軸を明確にし、差別化を単なるメッセージではなく戦略として扱える。
                  promptHint: 競合と比べて何を違いとして打ち出すかを整理するとき。
                  aliases:
                    - positioning
                    - strategic positioning
                  search:
                    keywords:
                      - 戦略的ポジショニング
                      - strategic positioning
                      - positioning
                      - competitive positioning
                      - 競争優位
                      - 競争軸
                      - differentiated position
                      - unique position
                      - positioning map
                      - category positioning
                    commonSignals:
                      - 競合と何が違うのかを説明している
                      - 高価格、低コスト、専門特化、利便性などの勝ち方を選んでいる
                      - 自社がどのカテゴリに見られるべきかを議論している
                      - 比較軸や価値軸に対して立ち位置を定めている
                    antiSignals:
                      - CSS position や UI 要素配置の話
                      - 地理的位置や座標の話
                      - 単なるブランドコピーだけで戦略的選択がない話
                      - 求人ポジションや役職の話
                    relatedNames:
                      - name: Porter Strategic Positioning
                        kind: framework
                        relevance: 競合と異なる活動体系で価値を作る戦略論としてポジショニング理解に直結する。
                        officialUrl: https://www.isc.hbs.edu/strategy/business-strategy/Pages/strategic-positioning.aspx
                      - name: Porter Five Forces
                        kind: framework
                        relevance: 業界構造と競争圧力を踏まえて有利な位置取りを考える際に使われる。
                        officialUrl: https://www.isc.hbs.edu/strategy/business-strategy/Pages/the-five-forces.aspx
                      - name: Positioning Map
                        kind: method
                        relevance: 顧客が認識する競争軸上で自社と競合の位置を可視化する方法。
                      - name: Blue Ocean Strategy
                        kind: framework
                        relevance: 既存競争軸から離れた価値曲線を作るポジショニング発想として関連する。
                      - name: Category Design
                        kind: method
                        relevance: 新しいカテゴリ上でプロダクトの意味づけを行う実務と関連する。

        - slug: value-proposition-and-fit
          name: 価値提案と適合
          summary: 提供価値の核と、市場に対する適合度を評価するまとまり。
          concepts:
            - slug: value-proposition-design
              name: 価値提案設計
              summary: 顧客がなぜそのプロダクトを選ぶのかを、便益と言葉の両面で設計する。
              whyLearn: 機能の列挙ではなく、顧客が受け取る価値で語れるようになる。
              terms:
                - slug: value-proposition
                  name: 価値提案
                  summary: 顧客の課題や欲求に対して、プロダクトが提供する中核価値の約束。
                  whyLearn: 戦略、営業、UX、実装の会話を一本化しやすくなる。
                  promptHint: 顧客がこのプロダクトを使う理由を一文で表したいとき。
                  aliases:
                    - value prop
                    - value proposition
                  search:
                    keywords:
                      - 価値提案
                      - value proposition
                      - value prop
                      - unique value proposition
                      - UVP
                      - customer value
                      - benefit statement
                      - 顧客便益
                      - 選ばれる理由
                      - pain reliever
                      - gain creator
                    commonSignals:
                      - 顧客がなぜ選ぶのかを一文で表している
                      - 機能ではなく便益、痛みの解消、成果で語っている
                      - 営業資料、LP、オンボーディングで同じ価値表現を使おうとしている
                      - 顧客課題と提供価値を対応づけている
                    antiSignals:
                      - 企業価値評価や valuation の話
                      - プログラミングの value object や値型の話
                      - 抽象的な美辞麗句だけで顧客課題がない話
                      - 価格割引やキャンペーン訴求だけの話
                    relatedNames:
                      - name: Value Proposition Canvas
                        kind: framework
                        relevance: 顧客のジョブ、痛み、利得と提供価値を対応づける代表的な価値提案設計フレーム。
                      - name: Strategyzer
                        kind: tool
                        relevance: Value Proposition Canvas や Business Model Canvas の文脈でよく参照される。
                        officialUrl: https://www.strategyzer.com/
                      - name: Lean Canvas
                        kind: framework
                        relevance: 課題、解決策、独自価値提案を早期仮説として整理する際に使われる。
                      - name: Jobs to Be Done
                        kind: framework
                        relevance: 顧客が達成したい進歩から価値提案を定義する際に関連する。

                - slug: positioning-statement
                  name: ポジショニングステートメント
                  summary: 対象顧客、カテゴリ、主要便益、差別化要因を短く定義した文章。
                  whyLearn: チーム内外で一貫した説明をしやすくなる。
                  promptHint: そのプロダクトを誰向けの何として説明するかを明文化するとき。
                  aliases:
                    - brand positioning statement
                    - positioning statement
                - slug: differentiation
                  name: 差別化
                  summary: 顧客が競合ではなく自社を選ぶ理由になる違い。
                  whyLearn: 「ただ存在するだけの機能」と「選ばれる理由」を区別できる。
                  promptHint: 競合比較でどの違いが選好に効くかを考えるとき。
                  aliases:
                    - differentiation strategy
                    - unique value

            - slug: market-fit-assessment
              name: 市場適合の見極め
              summary: 解こうとしている問題と市場需要の適合度を段階的に見る考え方。
              whyLearn: 作る前、伸ばす前、広げる前で、どの適合を確認すべきか整理できる。
              terms:
                - slug: problem-solution-fit
                  name: 問題解決適合
                  summary: 提案する解決策が、実在する強い課題に十分応えられている状態。
                  whyLearn: 市場拡大の前に、解くべき問題が本当に刺さるかを確かめられる。
                  promptHint: まだ PMF 前の段階で、課題と解決策の噛み合いを議論するとき。
                  aliases:
                    - PSF
                    - problem solution fit
                  search:
                    keywords:
                      - 問題解決適合
                      - problem-solution fit
                      - PSF
                      - problem solution fit
                      - solution validation
                      - customer problem validation
                      - 課題検証
                      - 解決策検証
                      - early validation
                      - MVP validation
                    commonSignals:
                      - PMF の前段階として課題と解決策の噛み合いを確認している
                      - MVP、プロトタイプ、手動運用で顧客反応を見ている
                      - 顧客が本当にその課題を解きたいかを検証している
                      - 解決策を作り込む前に仮説を潰している
                    antiSignals:
                      - PMF と同義で市場拡大後の強い需要を指している場合
                      - 数学や最適化の solution の話
                      - サポートチケットの個別解決だけの話
                      - 技術的に動くかだけを検証している話
                    relatedNames:
                      - name: Lean Startup
                        kind: framework
                        relevance: 仮説検証とMVPによって問題と解決策の適合を検証する文脈で使われる。
                      - name: Customer Development
                        kind: method
                        relevance: 顧客課題と解決策仮説を市場で検証するための基本プロセスとして関連する。
                      - name: MVP
                        kind: method
                        relevance: 問題に対する解決策の最小検証単位として使われる。
                      - name: Concierge MVP
                        kind: method
                        relevance: 実装前に手動運用で解決策価値を検証する方法として関連する。
                      - name: Wizard of Oz Test
                        kind: method
                        relevance: 裏側を手動にして解決策体験を先に検証する手法として使われる。

                - slug: product-market-fit

                  search:

                    keywords:

                      - プロダクトマーケットフィット

                      - product-market fit

                      - product market fit

                      - PMF

                      - strong market demand

                      - market pull

                      - retention curve

                      - Sean Ellis test

                      - PMF survey

                      - 市場適合

                    commonSignals:

                      - 市場から強い需要や pull があるかを判断している

                      - 継続率、紹介、自然流入、営業効率の改善が語られている

                      - 拡大投資に入ってよいかを議論している

                      - ユーザーが手放せない状態や代替困難性が言及されている

                    antiSignals:

                      - probability mass function の PMF

                      - private military firm の PMF

                      - 単なるリリース完了や初期利用者数だけの話

                      - 一社の受託要件に合っただけの話

                    relatedNames:

                      - name: Sean Ellis Test

                        kind: method

                        relevance: ユーザーがそのプロダクトを失ったらどれほど困るかでPMFの兆候を見る方法として有名。

                      - name: Lean Startup

                        kind: framework

                        relevance: 探索から成長へ移る判断点としてPMFが扱われる。

                      - name: Sequoia Arc PMF Framework

                        kind: framework

                        relevance: PMFの型や到達兆候を整理する実務フレームとして参照される。

                        officialUrl: https://www.sequoiacap.com/article/pmf-framework/

                      - name: AARRR

                        kind: framework

                        relevance: 獲得、活性化、継続などの指標からPMFの兆候を観測する際に関連する。

                      - name: Cohort Analysis

                        kind: method

                        relevance: 継続率の形から持続的価値があるかを見るために使われる。
                  name: プロダクトマーケットフィット
                  summary: 良い市場に対し、その市場が強く求めるプロダクトを提供できている状態。
                  whyLearn: 拡大に入る前に、需要の強さと利用の持続性を見極められる。
                  promptHint: いまは探索段階か、拡大段階かを判断したいとき。
                  aliases:
                    - PMF
                    - product market fit
                - slug: beachhead-market
                  name: ビーチヘッド市場
                  summary: 最初に深く勝ちにいく、狭く集中的な初期市場。
                  whyLearn: 早期に学習と勝ち筋を作るための集中領域を定められる。
                  promptHint: 最初の勝ち筋をどの市場に絞るかを決めるとき。
                  aliases:
                    - beachhead
                    - initial target market
                  search:
                    keywords:
                      - ビーチヘッド市場
                      - beachhead market
                      - beachhead segment
                      - initial target market
                      - niche market
                      - wedge market
                      - early market
                      - 最初に勝つ市場
                      - 初期市場
                      - 市場集中
                    commonSignals:
                      - 最初に深く勝つ市場を狭く定義している
                      - 全市場ではなく初期導入しやすいニッチを選んでいる
                      - 初期成功事例やリファレンス顧客を作る狙いがある
                      - 隣接市場への拡張順序が語られている
                    antiSignals:
                      - 軍事上の橋頭堡や上陸作戦の話
                      - 単なる小さい市場で成長戦略がない話
                      - 広告ターゲティングの一時的なテスト対象だけの話
                      - 地理的な海岸や港湾の話
                    relatedNames:
                      - name: Crossing the Chasm
                        kind: framework
                        relevance: 初期採用者から主流市場へ進む前に狭い市場で勝つ考え方と結びつく。
