                  name: リテンション
                  summary: ユーザーが時間をまたいで継続利用する度合い。
                  whyLearn: 一過性の獲得と、持続価値のあるプロダクトを区別できる。
                  promptHint: 継続して使われているかを判断したいとき。
                  aliases:
                    - retention rate
                    - repeat usage
                - slug: churn
                  name: チャーン
                  summary: ユーザーや顧客が離脱・解約すること、またはその率。
                  whyLearn: 成長の裏で失っている価値を可視化できる。
                  promptHint: なぜ顧客が離れているかを追いたいとき。
                  aliases:
                    - churn rate
                    - attrition
                  search:
                    keywords:
                      - チャーン
                      - churn
                      - churn rate
                      - customer churn
                      - user churn
                      - logo churn
                      - revenue churn
                      - 解約率
                      - 離脱率
                      - attrition
                    commonSignals:
                      - ユーザーや顧客が離脱・解約する率を見ている
                      - logo churn、revenue churn、gross churn、net churn が出ている
                      - なぜ顧客が使わなくなったかを分析している
                      - retention の逆指標として扱われている
                    antiSignals:
                      - バターを作る churn や攪拌の話
                      - MLモデルの churn prediction だけでプロダクト判断がない話
                      - 一時的な非アクティブを解約と混同している話
                      - インフラのノード churn など分散システム文脈
