            - slug: api-evolution-and-robustness
              name: API の進化と堅牢性
              summary: 既存利用者を壊さずに API を進化させ、再試行にも耐えるようにする技法。
              whyLearn: 長く使われる API を作るうえで避けられない互換性と再送信の問題を扱える。
              terms:
                - slug: api-versioning
                  name: API バージョニング
                  summary: 互換性を保ちながら API を進化させるために版を管理する考え方。
                  whyLearn: 破壊的変更を局所化し、利用者移行を計画できるようになる。
                  promptHint: API バージョニングの方式と、破壊的変更を減らす設計を説明して。
                  aliases:
                    - API versioning
                    - API version
                  search:
                    keywords:
                      - API versioning
                      - API version
                      - バージョニング
                      - backward compatibility
                      - breaking change
                      - deprecation
                      - URI versioning
                      - header versioning
                      - media type versioning
                      - Sunset header
                    commonSignals:
                      - v1 v2 を URI や header で分ける
                      - breaking change をどう出すかが議論される
                      - deprecated endpoint や migration period が出る
                      - 後方互換性を保ちながら API を進化させたい
                    antiSignals:
                      - ライブラリやアプリ自体のリリース番号だけ
                      - DB migration のバージョン管理だけ
                      - Git tag やブランチ戦略だけが主題
                    relatedNames:
                      - name: OpenAPI
                        kind: standard
                        relevance: API 契約の版管理と互換性方針を記述・共有する際に使われる。
                        officialUrl: https://www.openapis.org/
                      - name: Semantic Versioning
                        kind: standard
                        relevance: 互換性と破壊的変更を説明する比較概念としてよく使われる。
                        officialUrl: https://semver.org/
                      - name: Sunset HTTP Header
                        kind: standard
                        relevance: API 廃止予定を HTTP で伝える設計の文脈で関連する。
                        officialUrl: https://www.rfc-editor.org/rfc/rfc8594.html

                - slug: idempotency-key


                  search:

                    keywords:

                      - Idempotency Key

                      - Idempotency-Key

                      - 冪等キー

                      - safe retry

                      - duplicate request prevention

                      - request deduplication

                      - double payment prevention

                      - retry token

                    commonSignals:

                      - 二重注文や二重決済を防ぎたい

                      - POST の再試行時に同じ副作用を一度だけ発生させる

                      - 同じキーのリクエストには保存済み結果を返す

                      - タイムアウト後の retry が安全かどうかを議論している

                    antiSignals:

                      - HTTP メソッドの冪等性一般だけでキー運用がない

                      - DB の unique constraint だけを指している

                      - message queue の deduplication だけで HTTP API 文脈がない

                    relatedNames:

                      - name: UUID

                        kind: standard

                        relevance: 冪等キーの一意値生成で実務上よく使われる識別子。

