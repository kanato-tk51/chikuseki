domain:
  slug: product-engineering-application-architecture
  name: プロダクトエンジニアリングとアプリケーションアーキテクチャ
  summary: 顧客や社内ユーザーが使う実際のアプリケーションやサービスを技術的に設計し、統合し、進化させる領域。
  boundaryNotes: アプリケーションやサービスの構築を扱う。一般的な工学手法は Software Engineering、優先順位は Product Management、本番健全性は Reliability、認証・認可・暗号は Security、分析基盤や実験は Data に寄せる。
  knowledgeAreas:
    - slug: frontend-client-engineering
      name: フロントエンドとクライアントエンジニアリング
      summary: ユーザー端末で動くアプリケーションの描画、状態、実行環境、性能を設計するための知識領域。
      whyLearn: どこで描画し、どこで状態を持ち、どこで再訪体験や性能を最適化するかを判断できるようになる。
      topicClusters:
        - slug: rendering-and-runtime-experience
          name: 描画戦略とクライアント実行環境
          summary: UI をどこで生成し、ブラウザやクライアントランタイムの能力をどう使うかを扱う。
          concepts:
            - slug: rendering-strategies
              name: レンダリング戦略
              summary: 画面生成をクライアント、サーバ、ビルド時のどこで担うかを決める設計技法。
              whyLearn: 初回表示、SEO、キャッシュ戦略、サーバ負荷、クライアント負荷のトレードオフを比較できるようになる。
              terms:
                - slug: csr
                  name: CSR
                  summary: クライアント側 JavaScript で DOM を構築・更新して画面を描画する方式。
                  whyLearn: 初回表示の遅さと操作の柔軟性の交換条件を理解する基礎になる。
                  promptHint: CSR を採用する利点と欠点、SSR と比べたときの注意点を説明して。
                  aliases:
                    - client-side rendering
                    - クライアントサイドレンダリング
                  search:
                    keywords:
                      - CSR
                      - client-side rendering
                      - クライアントサイドレンダリング
                      - SPA
                      - single page application
                      - browser rendering
                      - DOM rendering
                      - JavaScript rendering
                    commonSignals:
                      - ブラウザで JavaScript が画面を組み立てる
                      - 初回 HTML が空に近く root 要素だけがある
                      - SEO や初回表示速度とのトレードオフが話題になる
                      - API から取得したデータで画面を更新する
                    antiSignals:
                      - corporate social responsibility の略として CSR が使われている
                      - 単に JavaScript を少し使う静的ページを指している
                      - SSR や SSG が主題でクライアント描画が中心ではない
                    relatedNames:
                      - name: React
                        kind: library
                        relevance: CSR 型の UI 実装で最も広く見かけるコンポーネントライブラリの一つ。
                        officialUrl: https://react.dev/
                      - name: Vue
                        kind: framework
                        relevance: クライアント側で画面状態と DOM 更新を扱う代表的なフレームワーク。
                        officialUrl: https://vuejs.org/
                      - name: Angular
                        kind: framework
                        relevance: SPA と CSR の文脈で長く使われているフルスタック寄りのフロントエンドフレームワーク。
                        officialUrl: https://angular.dev/
                      - name: Vite
                        kind: tool
                        relevance: CSR アプリの開発サーバーやビルド基盤として実務でよく使われる。
                        officialUrl: https://vite.dev/

                - slug: ssr

                  search:

                    keywords:

                      - SSR

                      - server-side rendering

                      - サーバーサイドレンダリング

                      - server-rendered HTML

                      - universal rendering

                      - isomorphic rendering

                      - hydration

                      - initial HTML

                    commonSignals:

                      - サーバで HTML を生成して返す

                      - hydration mismatch や初回表示の話が出る

                      - SEO や OGP やクローラー対応が論点になる

                      - パーソナライズされた HTML を返す

                    antiSignals:

                      - サーバ API 実装だけを指していて HTML 生成がない

                      - 画像レンダリングや PDF 生成の文脈で rendering と言っている

                      - CDN キャッシュの話だけで描画戦略に触れていない

                    relatedNames:

                      - name: Next.js

                        kind: framework

                        relevance: React 系で SSR、SSG、ハイブリッドレンダリングを扱う代表的なフレームワーク。

                        officialUrl: https://nextjs.org/

                      - name: Nuxt

                        kind: framework

                        relevance: Vue 系で SSR やサーバー主導レンダリングを扱う代表的なフレームワーク。

                        officialUrl: https://nuxt.com/

                      - name: Remix

                        kind: framework

                        relevance: サーバー中心のデータ取得と HTML 生成を重視する Web アプリフレームワーク。

                        officialUrl: https://remix.run/
                  name: SSR
                  summary: サーバで HTML を生成して返し、初回表示を早めやすくする方式。
                  whyLearn: 初回表示品質、検索性、パーソナライズ、サーバ計算負荷の関係を学べる。
                  promptHint: SSR が向く画面と向かない画面、CSR と混在させる考え方を説明して。
                  aliases:
                    - server-side rendering
                    - サーバーサイドレンダリング
            - slug: resilient-web-runtime
              name: レジリエントな Web ランタイム
              summary: ブラウザ機能を利用して再訪体験、オフライン耐性、インストール性を高める技法。
              whyLearn: 単なる表示だけでなく、接続不安定時や再訪時の体験設計まで扱えるようになる。
              terms:
                - slug: service-worker
                  name: Service Worker
                  summary: ネットワーク要求を仲介し、キャッシュやオフライン処理を実現するブラウザ側仕組み。
                  whyLearn: 再訪性能、オフライン対応、バックグラウンド連携の基礎になる。
                  promptHint: Service Worker が何を仲介し、どんな利点と落とし穴があるか説明して。
                  aliases:
                    - service worker
                    - SW
                  search:
                    keywords:
                      - service worker
                      - SW
                      - サービスワーカー
                      - fetch event
                      - offline cache
                      - background sync
                      - push notification
                      - Cache API
                    commonSignals:
                      - fetch を横取りしてキャッシュから返す
                      - install activate fetch イベントが出る
                      - offline fallback や stale-while-revalidate が出る
                      - ブラウザのバックグラウンドで動くワーカーが話題になる
                    antiSignals:
                      - Web Worker 一般の話でネットワーク仲介がない
                      - サーバ側のバックグラウンドジョブを worker と呼んでいる
                      - service account や service mesh の service と混同している
                    relatedNames:
                      - name: Workbox
                        kind: library
                        relevance: Service Worker のキャッシュ戦略や生成を支援する代表的なライブラリ。
                        officialUrl: https://developer.chrome.com/docs/workbox/
                      - name: Cache API
                        kind: standard
                        relevance: Service Worker からレスポンスを保存・再利用するためによく使われるブラウザ API。
                        officialUrl: https://developer.mozilla.org/en-US/docs/Web/API/Cache
                      - name: Push API
                        kind: standard
                        relevance: PWA のプッシュ通知実装で Service Worker と一緒に扱われる。
                        officialUrl: https://developer.mozilla.org/en-US/docs/Web/API/Push_API

                - slug: progressive-web-app

                  search:

                    keywords:

                      - PWA

                      - progressive web app

                      - プログレッシブウェブアプリ

                      - installable web app

                      - Web App Manifest

                      - offline capable

                      - app-like web

                      - home screen install

                    commonSignals:

                      - ホーム画面に追加できる Web アプリ

                      - manifest と service worker が一緒に出る

                      - オフライン対応や再訪時の高速表示が話題になる

                      - ネイティブアプリに近い体験を Web で提供する

                    antiSignals:

                      - 単なるレスポンシブ Web デザインを指している

                      - モバイル Web 全般を PWA と呼んでいるだけ

                      - アプリストア配布のネイティブアプリが主題である

                    relatedNames:

                      - name: Web App Manifest

                        kind: standard

                        relevance: PWA のインストール性、表示名、アイコン、起動表示を定義する主要要素。

                        officialUrl: https://developer.mozilla.org/en-US/docs/Web/Manifest

                      - name: Workbox

                        kind: library

                        relevance: PWA のオフライン対応やキャッシュ戦略の実装でよく使われる。

                        officialUrl: https://developer.chrome.com/docs/workbox/

                      - name: Lighthouse

                        kind: tool

                        relevance: PWA や Web 性能の検査ツールとして実務でよく使われる。

                        officialUrl: https://developer.chrome.com/docs/lighthouse/
                  name: Progressive Web App
                  summary: Web 技術で作りつつ、インストール性やオフライン性などアプリらしい体験を持たせる形態。
                  whyLearn: Web とネイティブのあいだにある選択肢を理解できるようになる。
                  promptHint: PWA を採用する判断軸と、Service Worker との関係を説明して。
                  aliases:
                    - PWA
                    - プログレッシブウェブアプリ
        - slug: client-state-and-performance
          name: クライアント状態と性能最適化
          summary: クライアント側で何を状態として保持し、どの指標で性能を見るかを扱う。
          concepts:
            - slug: client-state-and-fetching
              name: クライアント状態とデータ取得
              summary: UI 状態とサーバ由来データを分けて扱うための設計技法。
              whyLearn: どの状態をブラウザに置くべきか、どの状態は再取得・無効化が必要かを整理できる。
              terms:
                - slug: server-state
                  name: サーバーステート
                  summary: サーバを正とし、取得・再取得・同期・無効化を伴うクライアント参照データ。
                  whyLearn: ローカル状態と混同しないことで、再取得戦略や stale 管理を設計しやすくなる。
                  promptHint: サーバーステートとローカル UI ステートの違いを具体例で説明して。
                  aliases:
                    - remote state
                    - server state
                  search:
                    keywords:
                      - server state
                      - remote state
                      - サーバーステート
                      - asynchronous state
                      - stale data
                      - query cache
                      - revalidation
                      - cache invalidation
                      - optimistic update
                    commonSignals:
                      - クライアントが正本ではなくサーバから再取得する
                      - staleTime cacheTime invalidation の話が出る
                      - mutation 後に一覧を再取得する
                      - optimistic update や rollback が出る
                    antiSignals:
                      - UI の開閉状態やフォーム入力だけを指している
                      - データベースサーバの稼働状態を指している
                      - Redux の global state 一般の話で remote data がない
                    relatedNames:
                      - name: TanStack Query
                        kind: library
                        relevance: サーバーステートの取得、キャッシュ、再検証、無効化を扱う代表的なライブラリ。
                        officialUrl: https://tanstack.com/query/latest
                      - name: SWR
                        kind: library
                        relevance: stale-while-revalidate 型のデータ取得と再検証を扱う React 向けライブラリ。
                        officialUrl: https://swr.vercel.app/
                      - name: Apollo Client
                        kind: library
                        relevance: GraphQL のサーバーデータ取得とキャッシュ管理でよく使われる。
                        officialUrl: https://www.apollographql.com/docs/react/
                      - name: RTK Query
                        kind: library
                        relevance: Redux Toolkit に含まれるサーバーデータ取得・キャッシュ機能として実務で見かける。
                        officialUrl: https://redux-toolkit.js.org/rtk-query/overview

                - slug: normalized-cache

                  search:

                    keywords:

                      - normalized cache

                      - entity cache

                      - 正規化キャッシュ

                      - cache normalization

                      - normalized store

                      - entity store

                      - cache identity

                      - object cache

                    commonSignals:

                      - id ごとに entity を一度だけ保存する

                      - 一覧と詳細の同じオブジェクトを同期したい

                      - cache key や type policy が話題になる

                      - ネストしたレスポンスを参照構造に変換する

                    antiSignals:

                      - データベースの正規化だけを指している

                      - HTTP キャッシュや CDN キャッシュだけの話

                      - メモリ使用量削減の一般論で entity identity がない

                    relatedNames:

                      - name: Apollo Client

                        kind: library

                        relevance: GraphQL レスポンスをエンティティ単位で正規化して保持する代表例。

                        officialUrl: https://www.apollographql.com/docs/react/

                      - name: Relay

                        kind: framework

                        relevance: GraphQL の正規化ストアと fragment colocation の文脈でよく出る。

                        officialUrl: https://relay.dev/

                      - name: Redux Toolkit createEntityAdapter

                        kind: library

                        relevance: Redux 上でエンティティを正規化して管理する実装例として使われる。

                        officialUrl: https://redux-toolkit.js.org/api/createEntityAdapter
                  name: 正規化キャッシュ
                  summary: エンティティを重複なく保持し、参照関係で再利用できるようにしたクライアントキャッシュ。
                  whyLearn: 部分更新や一覧詳細間の一貫性を保ちやすくなる理由を理解できる。
                  promptHint: 正規化キャッシュが効く場面と、単純なキャッシュで十分な場面を比較して。
                  aliases:
                    - normalized cache
                    - entity cache
            - slug: web-performance-optimization
              name: Web 性能最適化
              summary: 体感速度とユーザー操作性を改善するための設計技法。
              whyLearn: 速い実装ではなく、速い体験を定義し改善する視点が身につく。
              terms:
                - slug: code-splitting
                  name: コード分割
                  summary: 必要な JavaScript を分割して遅延読み込みし、初回負荷を下げる技法。
                  whyLearn: 大きなバンドルが初回操作性を悪化させる理由と、その緩和策を学べる。
                  promptHint: コード分割が効く画面と、分割しすぎて逆効果になる例を説明して。
                  aliases:
                    - code splitting
                    - bundle splitting
                  search:
                    keywords:
                      - code splitting
                      - bundle splitting
                      - コード分割
                      - dynamic import
                      - lazy loading
                      - route-based splitting
                      - chunk
                      - JavaScript bundle
                    commonSignals:
                      - 初回 JavaScript バンドルを小さくしたい
                      - route ごとに chunk を分ける
                      - dynamic import で遅延読み込みする
                      - Lighthouse で unused JavaScript が指摘される
                    antiSignals:
                      - マイクロサービス分割やリポジトリ分割を指している
                      - データ分割や shard の話でコード配信がない
                      - 単にファイルを分けただけでバンドル境界がない
                    relatedNames:
                      - name: webpack
                        kind: tool
                        relevance: dynamic import や chunk 分割の文脈で長く使われている代表的なバンドラ。
                        officialUrl: https://webpack.js.org/
                      - name: Rollup
                        kind: tool
                        relevance: ライブラリやアプリのバンドル分割で使われる主要な JavaScript バンドラ。
                        officialUrl: https://rollupjs.org/
                      - name: Vite
                        kind: tool
                        relevance: Rollup ベースの本番ビルドと高速な開発体験を提供する代表的ツール。
                        officialUrl: https://vite.dev/
                      - name: React lazy
                        kind: library
                        relevance: React でコンポーネントを遅延読み込みする代表的な仕組み。
                        officialUrl: https://react.dev/reference/react/lazy

                - slug: core-web-vitals

                  search:

                    keywords:

                      - Core Web Vitals

                      - CWV

                      - Web Vitals

                      - LCP

                      - INP

                      - CLS

                      - field data

                      - user experience metrics

                      - page experience

                    commonSignals:

                      - LCP INP CLS を改善したい

                      - lab data と field data の差が話題になる

                      - 画像読み込みや JavaScript 実行が UX 指標に影響する

                      - PageSpeed Insights のスコア改善が話題になる

                    antiSignals:

                      - サーバの CPU やメモリ性能だけを指している

                      - 旧指標 FID だけを中心にしていて現在の CWV 文脈ではない

                      - SEO 一般論で具体的な Web Vitals 指標が出ない

                    relatedNames:

                      - name: Lighthouse

                        kind: tool

                        relevance: Core Web Vitals を含む Web 性能・品質診断で広く使われる。

                        officialUrl: https://developer.chrome.com/docs/lighthouse/

                      - name: PageSpeed Insights

                        kind: tool

                        relevance: 実利用データとラボデータで Web Vitals を確認する定番ツール。

                        officialUrl: https://pagespeed.web.dev/

                      - name: Chrome UX Report

                        kind: service

                        relevance: 実ユーザー環境の Web Vitals を集計するデータソースとして使われる。

                        officialUrl: https://developer.chrome.com/docs/crux/

                      - name: web-vitals

                        kind: library

                        relevance: Web Vitals 指標をアプリ内で計測するための公式寄りの JavaScript ライブラリ。

                        officialUrl: https://github.com/GoogleChrome/web-vitals
                  name: Core Web Vitals
                  summary: 実利用時の表示・応答・安定性を測る主要な Web UX 指標群。
                  whyLearn: 性能議論を感覚ではなく共通の指標でレビューできるようになる。
                  promptHint: Core Web Vitals が何を測り、設計判断にどう影響するか説明して。
                  aliases:
                    - CWV
                    - Web Vitals

    - slug: backend-api-service-design
      name: バックエンド、API、サービス設計
      summary: クライアントや他サービスに提供するインターフェースとその契約を設計する知識領域。
      whyLearn: API を単なる入出力ではなく、長期運用される契約として設計できるようになる。
      topicClusters:
        - slug: http-and-contract-design
          name: HTTP と契約中心の API 設計
          summary: HTTP の意味論と API 記述仕様を使って、理解しやすく進化しやすい契約を作る。
          concepts:
            - slug: http-api-semantics
              name: HTTP API の意味論
              summary: リソース、メソッド、表現、交渉を用いて API を明快に設計する技法。
              whyLearn: URL や HTTP メソッドを見ただけで意図が伝わる API を作りやすくなる。
              terms:
                - slug: resource-oriented-design
                  name: リソース指向設計
                  summary: 操作対象をリソースとして表現し、HTTP の標準意味論に沿って API を設計する考え方。
                  whyLearn: 直感的で一貫した API を設計しやすくなる。
                  promptHint: リソース指向設計の利点と、RPC 風 API と比較した特徴を説明して。
                  aliases:
                    - resource-oriented API
                    - resource-oriented design
                  search:
                    keywords:
                      - resource-oriented design
                      - resource-oriented API
                      - リソース指向設計
                      - RESTful API
                      - REST API
                      - HTTP resource
                      - URI design
                      - HTTP methods
                      - representation
                    commonSignals:
                      - 名詞ベースの URI と HTTP メソッドの対応を設計している
                      - GET POST PUT PATCH DELETE の使い分けが出る
                      - resource representation や status code が話題になる
                      - RPC 風 endpoint との比較がある
                    antiSignals:
                      - 単なる JSON over HTTP を REST と呼んでいるだけ
                      - doSomething のような操作名中心 API が主題
                      - 社内リソース配分や人的リソースの話
                    relatedNames:
                      - name: HTTP Semantics
                        kind: standard
                        relevance: HTTP メソッド、ステータスコード、表現の意味論がリソース指向設計の前提になる。
                        officialUrl: https://www.rfc-editor.org/rfc/rfc9110.html
                      - name: OpenAPI
                        kind: standard
                        relevance: リソース指向で設計した HTTP API を契約として記述する際によく使われる。
                        officialUrl: https://www.openapis.org/
                      - name: JSON:API
                        kind: standard
                        relevance: JSON ベースのリソース表現や関連表現を規約化する仕様として比較対象になる。
                        officialUrl: https://jsonapi.org/

                - slug: content-negotiation

                  search:

                    keywords:

                      - content negotiation

                      - コンテントネゴシエーション

                      - 表現交渉

                      - Accept header

                      - Content-Type

                      - media type

                      - MIME type

                      - Vary header

                      - 406 Not Acceptable

                    commonSignals:

                      - Accept header に応じて JSON や XML を返し分ける

                      - Content-Type と media type の設計が出る

                      - Vary header によるキャッシュ分岐が話題になる

                      - API バージョンを media type で表す話がある

                    antiSignals:

                      - 契約交渉や価格交渉を negotiation と呼んでいる

                      - 単に JSON を返すだけで表現選択がない

                      - 言語切替だけが主題で HTTP 交渉の話ではない

                    relatedNames:

                      - name: HTTP Semantics

                        kind: standard

                        relevance: HTTP における表現、メディアタイプ、交渉の意味論を定義している。

                        officialUrl: https://www.rfc-editor.org/rfc/rfc9110.html

                      - name: IANA Media Types

                        kind: standard

                        relevance: Content-Type や Accept で使うメディアタイプの登録体系として関連する。

                        officialUrl: https://www.iana.org/assignments/media-types/media-types.xhtml
                  name: コンテントネゴシエーション
                  summary: クライアントとサーバが表現形式を合意してやり取りする仕組み。
                  whyLearn: 同じリソースを複数表現で提供する基本を理解できる。
                  promptHint: コンテントネゴシエーションが必要になる場面と設計上の注意点を説明して。
                  aliases:
                    - content negotiation
                    - 表現交渉
            - slug: api-contract-description
              name: API 契約記述
              summary: API の構造、型、例、互換性を人とツールが共有できる形で表現する技法。
              whyLearn: 実装前レビュー、クライアント生成、テスト自動化に接続できる。
              terms:
                - slug: openapi
                  name: OpenAPI
