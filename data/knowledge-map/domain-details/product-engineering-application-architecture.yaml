                      - tenant id を全データやリクエストで扱う
                      - silo pool bridge などの分離モデルが出る
                      - SaaS のコスト効率と分離性を比較している
                    antiSignals:
                      - 不動産の tenant 入居者の話
                      - 単一顧客向け専用環境だけを指している
                      - ユーザー権限管理だけでテナント境界がない
                    relatedNames:
                      - name: AWS SaaS Lens
                        kind: method
                        relevance: SaaS のテナント分離、運用、コスト、信頼性を考える参照体系として使われる。
                        officialUrl: https://docs.aws.amazon.com/wellarchitected/latest/saas-lens/
                      - name: PostgreSQL Row Level Security
                        kind: standard
                        relevance: 共有 DB でテナントごとの行アクセスを制御する実装候補として関連する。
                        officialUrl: https://www.postgresql.org/docs/current/ddl-rowsecurity.html
                      - name: Kubernetes Namespace
                        kind: platform
                        relevance: テナント別のリソース分離や運用境界の例として扱われる。
                        officialUrl: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/

                - slug: tenant-isolation

                  search:

                    keywords:

                      - tenant isolation

                      - テナント分離

                      - テナント隔離

                      - row-level security

                      - RLS

                      - schema per tenant

                      - database per tenant

                      - noisy neighbor

                      - data isolation

                      - tenant boundary

                    commonSignals:

                      - 他テナントのデータが見えないようにする

                      - tenant_id の漏れや cross-tenant access が問題になる

                      - database per tenant schema per tenant shared table を比較する

                      - noisy neighbor やリソース隔離が話題になる

                    antiSignals:

                      - 単なるユーザー role 権限の話

                      - テスト用 tenant データ作成だけ

                      - マルチテナントではなく単一組織内の部署分け

                    relatedNames:

                      - name: PostgreSQL Row Level Security

                        kind: standard

                        relevance: 共有テーブルでテナントごとの行アクセスを制御する代表的な仕組み。

                        officialUrl: https://www.postgresql.org/docs/current/ddl-rowsecurity.html

                      - name: AWS IAM

                        kind: service

                        relevance: クラウドリソースやサービスアクセスのテナント分離設計で関係する。

                        officialUrl: https://aws.amazon.com/iam/

                      - name: Kubernetes ResourceQuota

                        kind: platform

                        relevance: テナントごとのリソース利用上限や noisy neighbor 対策で使われる。

                        officialUrl: https://kubernetes.io/docs/concepts/policy/resource-quotas/
                  name: テナント分離
                  summary: 共有基盤上でもテナント間でデータや実行境界を分離するための考え方。
                  whyLearn: SaaS で最重要の信頼要件の一つを学べる。
                  promptHint: テナント分離をどの層で実現できるか、代表的な方法を説明して。
                  aliases:
                    - tenant isolation
                    - テナント隔離
            - slug: cloud-native-application-principles
              name: クラウドネイティブなアプリ原則
              summary: 変化しやすい実行環境で運びやすくするための基本原則。
              whyLearn: 実装をデプロイや環境差異に引きずられにくくする。
              terms:
                - slug: stateless-process
                  name: ステートレスプロセス
                  summary: プロセス内部に永続状態を持たず、再起動や水平分割に強い実行前提。
                  whyLearn: スケールアウトや失敗時再配置に耐える設計の基本になる。
                  promptHint: ステートレスプロセスがなぜクラウドで有利か説明して。
                  aliases:
                    - stateless process
                    - stateless app
                  search:
                    keywords:
                      - stateless process
                      - stateless app
                      - ステートレスプロセス
                      - stateless service
                      - horizontal scaling
                      - externalized session
                      - disposable process
                      - shared-nothing process
                      - sticky session
                    commonSignals:
                      - プロセス内メモリに永続状態を持たない
                      - セッションを外部ストアに置く
                      - 任意のインスタンスへリクエストを振り分けられる
                      - horizontal scaling や rolling restart がしやすい
                    antiSignals:
                      - HTTP が stateless であるという一般説明だけ
                      - 状態が全く不要な業務という意味で使っている
                      - DB や外部ストアまで含めて状態がないと誤解している
                    relatedNames:
                      - name: The Twelve-Factor App
                        kind: method
                        relevance: stateless process や disposable process の原則を説明する定番の参照先。
                        officialUrl: https://12factor.net/
                      - name: Kubernetes
                        kind: platform
                        relevance: stateless workload の水平スケールや再配置の実行基盤として関連する。
                        officialUrl: https://kubernetes.io/
                      - name: Redis
                        kind: service
                        relevance: セッションや一時状態をプロセス外へ逃がす保存先としてよく使われる。
                        officialUrl: https://redis.io/

                - slug: config-in-env

                  search:

                    keywords:

                      - config in env

                      - externalized config

                      - 設定の環境外部化

                      - environment variables

                      - env vars

                      - twelve-factor config

                      - runtime configuration

                      - secrets management

                      - config map

                    commonSignals:

                      - DB 接続先や API key をコードに埋め込まない

                      - 環境変数や secret manager から設定を注入する

                      - dev staging production で同じコードを使う

                      - build-time config と runtime config の違いが話題になる

                    antiSignals:

                      - フロントエンドの公開環境変数だけで秘密情報の話がない

                      - 設定ファイルを repo に直書きしているだけ

                      - OS 環境設定や開発者 PC の PATH 設定だけが主題

                    relatedNames:

                      - name: The Twelve-Factor App

                        kind: method

                        relevance: 設定をコードから分離し環境で与える原則の代表的な参照先。

                        officialUrl: https://12factor.net/config

                      - name: Kubernetes ConfigMap

                        kind: platform

                        relevance: Kubernetes 上で非機密設定を外部化して注入する代表的な仕組み。

                        officialUrl: https://kubernetes.io/docs/concepts/configuration/configmap/

                      - name: Kubernetes Secret

                        kind: platform

                        relevance: 機密値を環境や volume として渡す仕組みとして関連する。

                        officialUrl: https://kubernetes.io/docs/concepts/configuration/secret/

                      - name: HashiCorp Vault

                        kind: tool

                        relevance: secrets management と動的 secret 配布の実務ツールとしてよく使われる。

                        officialUrl: https://www.hashicorp.com/products/vault
                  name: 設定の環境外部化
                  summary: デプロイ差分となる設定値をコードから分離して環境側で与える原則。
                  whyLearn: 秘密情報漏えいと環境依存の混乱を減らすための基礎になる。
                  promptHint: 設定をコードに埋め込まない理由と、どんな値を外部化すべきか説明して。
                  aliases:
                    - config in env
                    - externalized config

    - slug: architecture-description-and-decision-making
      name: アーキテクチャ記述と設計判断
      summary: アーキテクチャを誰にどう説明し、どの判断をどの根拠で残すかを扱う知識領域。
      whyLearn: 良い設計を作るだけでなく、共有・レビュー・継続改善できる形にするために必要になる。
      topicClusters:
        - slug: architecture-description
          name: アーキテクチャ記述
          summary: 関係者の関心事に応じてアーキテクチャを表現するための概念と図法を扱う。
          concepts:
            - slug: views-and-viewpoints
              name: View と Viewpoint
              summary: 誰のどんな関心事に答える記述かを定義するための基本概念。
              whyLearn: 図や文書が誰にも刺さらない問題を避けやすくなる。
              terms:
                - slug: stakeholder-concern
                  name: ステークホルダー関心事
                  summary: アーキテクチャ記述が答えるべき関係者の重要な関心や懸念。
                  whyLearn: 何を説明すべきかを、図法や実装より先に定義できるようになる。
                  promptHint: ステークホルダー関心事がアーキテクチャ記述の出発点になる理由を説明して。
                  aliases:
                    - concern
                    - stakeholder concern
                - slug: architecture-viewpoint
                  name: アーキテクチャ Viewpoint
                  summary: 特定の関心事を扱うために、どの観点・規則で view を作るかを定める枠組み。
                  whyLearn: 同じシステムでも相手ごとに適切な説明粒度を選べるようになる。
                  promptHint: viewpoint と view の違いを、具体例つきで説明して。
                  aliases:
                    - viewpoint
                    - architecture viewpoint
            - slug: architecture-visualization
              name: アーキテクチャ可視化
              summary: 構造を理解しやすい図に落とすための代表的な表現法。
              whyLearn: 設計議論をコード断片ではなく共有図で進められるようになる。
              terms:
                - slug: c4-model
                  name: C4 model
                  summary: Context、Container、Component、Code のズームレベルで構造を説明する図法。
                  whyLearn: 相手に応じて説明の解像度を変える実践的な方法を学べる。
                  promptHint: C4 model の各レベルが何を伝えるか説明して。
                  aliases:
                    - C4
                    - context container component code
                  search:
                    keywords:
                      - C4 model
                      - C4
                      - Context Container Component Code
                      - C4 diagrams
                      - software architecture diagram
                      - system context diagram
                      - container diagram
                      - component diagram
                      - Structurizr
                    commonSignals:
                      - Context Container Component Code の4レベルで説明する
                      - システム境界や外部 actor を図にする
                      - architecture diagram を zoom level ごとに分ける
                      - Structurizr DSL や C4-PlantUML が出る
                    antiSignals:
                      - 爆薬 C4 の話
                      - 車種やモデル番号として C4 が出ている
                      - ただの箱線図で C4 のレベルや記法に触れていない
                    relatedNames:
                      - name: C4 model
                        kind: method
                        relevance: C4 model の公式説明と図法の参照先。
                        officialUrl: https://c4model.com/
                      - name: Structurizr
                        kind: tool
                        relevance: C4 model を DSL や diagram as code で記述する代表的なツール。
                        officialUrl: https://structurizr.com/
                      - name: PlantUML
                        kind: tool
                        relevance: C4-PlantUML などを通じて C4 図をテキストで管理する際に使われる。
                        officialUrl: https://plantuml.com/
                      - name: Mermaid
                        kind: tool
                        relevance: ドキュメント内でアーキテクチャ図を軽量に記述するツールとして併用される。
                        officialUrl: https://mermaid.js.org/

                - slug: container-diagram
                  name: コンテナ図
                  summary: システムを構成する主要なアプリケーション実行単位と相互関係を示す図。
                  whyLearn: 配備単位や責務境界を共有する最小限の図として有用になる。
                  promptHint: コンテナ図に何を描くべきで、何を描きすぎない方がよいか説明して。
                  aliases:
                    - container diagram
                    - コンテナダイアグラム
        - slug: decisions-and-review
          name: 設計判断とアーキテクチャレビュー
          summary: 重要な判断を残し、品質トレードオフをレビューするための技法を扱う。
          concepts:
            - slug: decision-recording
              name: 判断記録
              summary: なぜその構成を選んだかを後から追えるように残す技法。
              whyLearn: 人が替わっても判断理由を再利用し、設計の学習コストを下げられる。
              terms:
                - slug: architecture-decision-record
                  name: Architecture Decision Record
                  summary: 重要な設計判断、その背景、代替案、帰結を短く記録する文書。
                  whyLearn: 仕様書とコードのあいだにある判断履歴を残せる。
                  promptHint: ADR に最低限書くべき項目と、長文化しすぎないコツを説明して。
                  aliases:
                    - ADR
                    - architecture decision record
                  search:
                    keywords:
                      - ADR
                      - Architecture Decision Record
                      - アーキテクチャ決定記録
                      - decision record
                      - decision log
                      - context decision consequences
                      - status proposed accepted deprecated
                      - lightweight architecture documentation
                    commonSignals:
                      - context decision consequences を短く記録する
                      - accepted superseded deprecated などの状態が出る
                      - なぜその技術選定をしたかを後から追いたい
                      - docs/adr や decision log が出る
                    antiSignals:
                      - ADR が American Depositary Receipt の金融用語として使われている
                      - 議事録や仕様書全体を ADR と呼んでいるだけ
                      - 決定内容だけで背景や代替案や帰結がない
                    relatedNames:
                      - name: MADR
                        kind: method
                        relevance: ADR のテンプレート形式としてよく参照される Markdown Architecture Decision Records。
                        officialUrl: https://adr.github.io/madr/
                      - name: adr-tools
                        kind: tool
                        relevance: ADR ファイルの作成や採番を支援する軽量ツールとして使われる。
                        officialUrl: https://github.com/npryce/adr-tools
                      - name: arc42
                        kind: method
                        relevance: アーキテクチャ文書化の体系として ADR と併用・比較されることがある。
                        officialUrl: https://arc42.org/

                - slug: architecturally-significant-requirement
                  name: Architecturally Significant Requirement
                  summary: アーキテクチャに測定可能な影響を与える重要要求。
                  whyLearn: どの要求が設計を本当に決めるのかを見極めやすくなる。
                  promptHint: ASR をどう見つけ、通常要求とどう区別するか説明して。
                  aliases:
                    - ASR
                    - architecturally significant requirement
            - slug: review-and-evaluation
              name: レビューと評価
              summary: 品質要求を具体シナリオに落とし、トレードオフを検討する技法。
              whyLearn: 好みではなく品質属性と根拠でアーキテクチャを議論できるようになる。
              terms:
                - slug: quality-attribute-scenario
                  name: 品質属性シナリオ
                  summary: 品質要求を刺激、環境、対象、応答、応答測定で具体化したシナリオ。
                  whyLearn: 抽象的な性能や可用性要求をレビュー可能な形に変えられる。
                  promptHint: 品質属性シナリオの書き方と、レビューでの使い方を説明して。
                  aliases:
                    - quality attribute scenario
                    - QAS
                - slug: architecture-tradeoff-analysis-method
                  name: Architecture Tradeoff Analysis Method
                  summary: 品質属性のトレードオフを構造的に評価するアーキテクチャ評価法。
                  whyLearn: ある設計がなぜ妥当かを、品質観点から説明する方法を学べる。
                  promptHint: ATAM がどのように品質トレードオフを可視化するか説明して。
                  aliases:
                    - ATAM
                    - architecture tradeoff analysis method

edges:
  - from: csr
    to: ssr
    relationType: compare_with
    reason: どこで画面を描画するかという中核判断を比較する対になる概念だから。
  - from: service-worker
    to: progressive-web-app
    relationType: used_in
    reason: PWA の主要能力であるオフライン対応や再訪性能の実装で Service Worker がよく使われるから。
  - from: code-splitting
    to: core-web-vitals
    relationType: related
    reason: 初回読み込みの JavaScript 負荷を減らすことが CWV 改善に直結しやすいから。
  - from: resource-oriented-design
    to: openapi
    relationType: used_in
    reason: リソース指向で設計した HTTP API を OpenAPI で契約として表現できるから。
  - from: grpc
    to: graphql
    relationType: compare_with
    reason: どちらも型付き契約を持つが、操作モデルと利用シーンが大きく異なるから。
  - from: api-versioning
    to: openapi
    relationType: related
    reason: API の版と互換性方針は契約記述と一緒に管理されることが多いから。
  - from: bounded-context
    to: modular-monolith
    relationType: used_in
    reason: モジュラーモノリスでは業務境界に沿ってモジュールを切る判断が重要だから。
  - from: bounded-context
    to: microservices
    relationType: used_in
    reason: マイクロサービス境界を業務境界に寄せるときの主要な手がかりになるから。
  - from: anti-corruption-layer
    to: strangler-fig-pattern
    relationType: used_in
    reason: 段階移行の途中で旧モデルの影響を遮断する翻訳層として使われやすいから。
  - from: api-gateway
    to: backends-for-frontends
    relationType: compare_with
    reason: どちらも入口層だが、共通入口に寄せるかフロント専用入口に寄せるかで設計意図が異なるから。
  - from: gateway-aggregation
    to: api-composition
    relationType: compare_with
    reason: どちらも複数サービスの結果を合成するが、責務を置く場所が異なりうるから。
  - from: apache-kafka
    to: change-data-capture
    relationType: used_in
    reason: CDC で取り出した変化を下流へ流す基盤として Kafka がよく使われるから。
  - from: asyncapi
    to: cloudevents
    relationType: related
    reason: 非同期契約全体を AsyncAPI で記述し、イベント共通メタデータを CloudEvents で標準化できるから。
  - from: compensating-transaction
    to: saga
    relationType: used_in
    reason: Saga では失敗時に補償トランザクションで整合性を回復することが多いから。
  - from: transactional-outbox
    to: change-data-capture
    relationType: related
    reason: Outbox テーブルの配信手段として CDC を組み合わせる構成が実務でよく採られるから。
  - from: cqrs
    to: event-sourcing
    relationType: related
    reason: 別概念だが組み合わせて使われることが多く、混同も起きやすいから。
  - from: cache-control
    to: etag
    relationType: related
    reason: どちらも HTTP キャッシュの鮮度と再利用を制御する代表語彙だから。
  - from: monolith
    to: microservices
    relationType: compare_with
    reason: 配備単位と自律性のトレードオフを考える際の代表的な比較対象だから。
  - from: multitenancy
    to: tenant-isolation
    relationType: prerequisite
    reason: 共有基盤で複数テナントを扱うなら、まず分離戦略を設計する必要があるから。
  - from: stateless-process
    to: serverless
    relationType: prerequisite
    reason: サーバレスで安全に再配置・自動スケールするには状態を外に逃がす前提が重要だから。
  - from: config-in-env
    to: stateless-process
    relationType: used_in
    reason: プロセスを環境差分から独立させるために設定の外部化が必要になるから。
  - from: stakeholder-concern
    to: architecture-viewpoint
    relationType: prerequisite
    reason: どの viewpoint を作るかは、誰のどんな関心事に答えるかが先に定まっている必要があるから。
  - from: architecture-viewpoint
    to: container-diagram
    relationType: used_in
    reason: コンテナ図も、どの関心事を扱うかという viewpoint の選択に従って描かれるべきだから。
  - from: architecturally-significant-requirement
    to: architecture-decision-record
    relationType: prerequisite
    reason: 何が重要要求かが見えないと、何を ADR に残すべきか決めにくいから。
  - from: quality-attribute-scenario
    to: architecture-tradeoff-analysis-method
    relationType: used_in
    reason: ATAM では品質属性シナリオを使ってトレードオフを具体的に評価するから。
