domain:
  slug: ux-hci-service-design
  name: UX、HCI、サービスデザイン
  summary: "人、タスク、文脈、組織を含めて、相互作用やワークフロー、体験全体を設計する領域。"
  boundaryNotes: "ユーザー理解、設計、評価、アクセシビリティ、サービス全体の接続を扱う。ロードマップ判断は Product Management、詳細な実装技術は Product Engineering、法令やセキュリティ統治は Security / Privacy に寄せる。"
  knowledgeAreas:
    - slug: human-centered-design-foundations
      name: 人間中心設計の基礎
      summary: "UX と HCI の基本定義、設計の反復原則、問題設定、認知の前提を扱う。"
      whyLearn: "設計を見た目の改善ではなく、利用文脈に対する問題解決として捉えられるようになる。"
      topicClusters:
        - slug: standards-and-core-models
          name: 標準と基本モデル
          summary: "UX と HCI の基礎定義と、設計プロセスの標準的な見取り図を整理する。"
          concepts:
            - slug: usability-and-ux-definitions
              name: ユーザビリティとUXの定義
              summary: "使いやすさと体験品質を、利用文脈と目標達成の観点で捉える。"
              whyLearn: "議論を好みや雰囲気ではなく、評価可能な言葉に変換できる。"
              terms:
                - slug: usability
                  name: ユーザビリティ
                  summary: "特定のユーザーが特定の文脈で目標を達成しやすい度合い。"
                  whyLearn: "有効性、効率、満足度で体験を具体的に評価できる。"
                  promptHint: "有効性、効率、満足度を用いて具体例を説明させる。"
                  search:
                    keywords:
                      - ユーザビリティ
                      - usability
                      - 使いやすさ
                      - 有効性
                      - 効率
                      - 満足度
                      - effectiveness
                      - efficiency
                      - satisfaction
                      - usability metrics
                    commonSignals:
                      - 有効性・効率・満足度で評価している
                      - タスク完了率や操作時間を測っている
                      - 使いやすさの定量・定性評価に触れている
                      - usability testing や SUS と一緒に出てくる
                    antiSignals:
                      - 単に便利・快適という感想だけで評価軸がない
                      - アクセシビリティ適合だけを指している
                      - システム性能やレスポンスタイムだけを扱っている
                    relatedNames:
                      - name: ISO 9241-11
                        kind: standard
                        relevance: ユーザビリティを有効性・効率・満足度と利用文脈で定義する代表的標準。
                        officialUrl: https://www.iso.org/standard/63500.html
                      - name: System Usability Scale
                        kind: method
                        relevance: 知覚された使いやすさを測る代表的な質問紙尺度。
                      - name: Nielsen's Usability Heuristics
                        kind: method
                        relevance: UI のユーザビリティ問題を専門家レビューで発見する代表的原則群。
                  aliases: ["usability"]
                - slug: user-experience
                  name: ユーザー体験
                  summary: "利用前、利用中、利用後を通じた知覚や感情を含む総合的な体験。"
                  whyLearn: "操作性だけでなく期待、安心感、継続利用まで視野に入れられる。"
                  promptHint: "ユーザビリティと UX の違いを対比させる。"
                  search:
                    keywords:
                      - ユーザー体験
                      - UX
                      - user experience
                      - 体験設計
                      - experience design
                      - 利用前
                      - 利用中
                      - 利用後
                      - customer experience
                      - perceived experience
                    commonSignals:
                      - 利用前・利用中・利用後の期待や感情を扱っている
                      - 操作性だけでなく信頼感や継続利用を議論している
                      - プロダクト全体の体験品質を表現している
                      - CX、journey、touchpoint と一緒に出る
                    antiSignals:
                      - UI の見た目だけを UX と呼んでいる
                      - 単なる満足度アンケートだけで体験全体を扱っていない
                      - 開発者体験 DX を指している
                    relatedNames:
                      - name: ISO 9241-210
                        kind: standard
                        relevance: UX と人間中心設計を議論するときの基礎標準として参照される。
                        officialUrl: https://www.iso.org/standard/77520.html
                      - name: HEART Framework
                        kind: framework
                        relevance: プロダクト利用体験を継続指標として捉える代表的な UX 指標フレームワーク。
                      - name: Customer Journey Map
                        kind: method
                        relevance: 利用前後を含む体験全体を可視化する手法として一緒に扱われる。
                  aliases: ["UX", "user experience"]
                - slug: context-of-use
                  name: 利用文脈
                  summary: "誰が、何の目的で、どの環境や制約の中で使うかを表す枠組み。"
                  whyLearn: "同じUIでも文脈が違えば良し悪しが変わることを理解できる。"
                  promptHint: "ユーザー、タスク、環境、制約に分けて要約させる。"
                  search:
                    keywords:
                      - 利用文脈
                      - context of use
                      - use context
                      - usage context
                      - user task environment
                      - 利用環境
                      - 利用状況
                      - 制約条件
                      - user goals
                      - operational context
                    commonSignals:
                      - 誰が・何のために・どこで・どんな制約で使うかを整理している
                      - ユーザー、タスク、環境、機器、組織制約を分けている
                      - 現場観察や業務文脈を前提に設計している
                    antiSignals:
                      - 文脈という語が文章の前後関係だけを意味している
                      - ユーザー属性だけでタスクや環境がない
                      - 技術スタックの実行環境だけを指している
                    relatedNames:
                      - name: ISO 9241-11
                        kind: standard
                        relevance: ユーザビリティを利用文脈と結びつけて定義する標準。
                        officialUrl: https://www.iso.org/standard/63500.html
                      - name: Contextual Inquiry
                        kind: method
                        relevance: 実際の利用文脈を観察しながら理解する代表的調査手法。
                      - name: Field Study
                        kind: method
                        relevance: 現場環境で利用文脈を把握する調査手法として関連が強い。
                  aliases: ["use context", "context of use"]
            - slug: human-centered-design-process
              name: 人間中心設計プロセス
              summary: "ユーザー理解、設計、評価、反復を一連の流れとして扱う。"
              whyLearn: "設計を一発勝負ではなく学習ループとして進められる。"
              terms:
                - slug: iso-9241-210
                  name: ISO 9241-210
                  summary: "インタラクティブシステムの人間中心設計活動を定義する ISO 規格。"
                  whyLearn: "組織や案件をまたいで使える設計プロセスの共通基盤になる。"
                  promptHint: "規格が求める活動をプロジェクト工程に結びつけて説明させる。"
                  search:
                    keywords:
                      - ISO 9241-210
                      - human-centred design
                      - human-centered design
                      - HCD
                      - 人間中心設計
                      - インタラクティブシステム
                      - ergonomics of human-system interaction
                      - user-centred design process
                      - HCD process
                    commonSignals:
                      - 人間中心設計の活動や原則を標準として説明している
                      - 利用文脈の理解、要求事項、設計案、評価の反復が並ぶ
                      - HCD、UCD、human-centred design と併記される
                    antiSignals:
                      - ISO 9001 など品質マネジメント一般の話
                      - ISO 9241 の別パートだけを扱っている
                      - 単なるデザイン思考の紹介で規格に触れていない
                    relatedNames:
                      - name: ISO 9241-210
                        kind: standard
                        relevance: 人間中心設計プロセスそのものを定義する対象標準。
                        officialUrl: https://www.iso.org/standard/77520.html
                      - name: ISO 9241-11
                        kind: standard
                        relevance: ユーザビリティの定義とあわせて参照されやすい。
                        officialUrl: https://www.iso.org/standard/63500.html
                      - name: Human-Centered Design
                        kind: method
                        relevance: ISO 9241-210 の実務適用時に用いられる設計アプローチ。
                  aliases: ["ISO 9241-210", "human-centred design"]
                - slug: double-diamond
                  name: ダブルダイヤモンド
                  summary: "発散と収束を繰り返して問題発見と解決案形成を進める設計モデル。"
                  whyLearn: "探索不足なのか、収束不足なのかを会話できるようになる。"
                  promptHint: "Discover、Define、Develop、Deliver を例とともに説明させる。"
                  search:
                    keywords:
                      - ダブルダイヤモンド
                      - Double Diamond
                      - Discover Define Develop Deliver
                      - 発散と収束
                      - divergent thinking
                      - convergent thinking
                      - design process model
                      - problem space solution space
                      - Design Council
                    commonSignals:
                      - Discover、Define、Develop、Deliver の4段階が出る
                      - 発散してから収束するという説明がある
                      - 問題空間と解決空間を分けている
                    antiSignals:
                      - 菱形の図形一般を指している
                      - 宝石やダイヤモンド業界の話
                      - 開発工程のウォーターフォール図だけを指している
                    relatedNames:
                      - name: Design Council Double Diamond
                        kind: framework
                        relevance: ダブルダイヤモンドを広く普及させた公式フレームワーク。
                        officialUrl: https://www.designcouncil.org.uk/resources/the-double-diamond/
                      - name: Design Thinking
                        kind: framework
                        relevance: 問題発見と解決案形成の反復プロセスとして比較されやすい。
                      - name: Lean UX
                        kind: method
                        relevance: 仮説検証型の設計プロセスとして実務で一緒に語られやすい。
                  aliases: ["Double Diamond"]
                - slug: iterative-design
                  name: 反復設計
                  summary: "設計案を試し、学びを反映しながら段階的に改善していく進め方。"
                  whyLearn: "調査や評価結果を次の設計に必ず戻す習慣を作れる。"
                  promptHint: "なぜ反復が必要かを失敗コストの観点から説明させる。"
                  aliases: ["iteration", "iterative design"]
        - slug: framing-and-cognitive-bases
          name: 問題設定と認知の基礎
          summary: "設計対象の問題をどう定義し、人の理解や判断の限界をどう扱うかを整理する。"
          concepts:
            - slug: problem-and-principle-framing
              name: 問題設定と原則化
              summary: "何を解くのかを明確にし、一貫した設計判断の原則を置く。"
              whyLearn: "表層の要望をそのままUIに変換することを避けられる。"
              terms:
                - slug: problem-statement
                  name: 問題定義
                  summary: "誰のどんな困りごとを、どの状況で解くのかを簡潔に表した文。"
                  whyLearn: "議論を機能の話から問題の話へ戻せる。"
                  promptHint: "ユーザー、状況、障害、望ましい変化の形で書かせる。"
                  aliases: ["problem statement"]
                - slug: design-principle
                  name: 設計原則
                  summary: "繰り返し判断で使う価値基準やルールを短く表現したもの。"
                  whyLearn: "細部のUI判断を場当たりではなく一貫した方針で揃えられる。"
                  promptHint: "良い設計原則の条件を具体例付きで説明させる。"
                  aliases: ["principle", "design principles"]
                - slug: dark-pattern
                  name: ダークパターン
                  summary: "ユーザーの意図より事業側の都合を優先して誘導や操作を行う設計。"
                  whyLearn: "短期成果と長期信頼のトレードオフを見抜ける。"
                  promptHint: "便利な最適化とダークパターンの境界を説明させる。"
                  search:
                    keywords:
                      - ダークパターン
                      - dark pattern
                      - deceptive design
                      - deceptive pattern
                      - dark UX
                      - manipulation
                      - forced continuity
                      - confirmshaming
                      - hidden cost
                      - choice architecture
                    commonSignals:
                      - 解約しにくい、拒否しにくい、同意させられるという文脈
                      - ユーザーの自律性や選択を損ねる設計の話
                      - hidden cost、forced action、nagging などのパターン名が出る
                      - FTC、OECD、EDPB、deceptive design と一緒に出る
                    antiSignals:
                      - 単に暗い配色やダークモードを指している
                      - コンバージョン改善一般を指している
                      - セキュリティの攻撃パターンだけを扱っている
                    relatedNames:
                      - name: FTC Dark Patterns Report
                        kind: standard
                        relevance: ダークパターンを消費者保護の観点から整理した公的資料。
                        officialUrl: https://www.ftc.gov/reports/bringing-dark-patterns-light
                      - name: OECD Dark Commercial Patterns
                        kind: standard
                        relevance: デジタル選択アーキテクチャにおける操作的設計を国際的に整理している。
                        officialUrl: https://www.oecd.org/en/publications/dark-commercial-patterns_44f5e846-en.html
                      - name: Deceptive Design
                        kind: other
                        relevance: ダークパターンの分類や事例を学ぶときに参照される用語・サイト名。
                        officialUrl: https://www.deceptive.design/
                  aliases: ["dark pattern", "deceptive design"]
            - slug: cognition-and-mental-models
              name: 認知とメンタルモデル
              summary: "人がどう理解し、予測し、混乱するかを前提に設計する。"
              whyLearn: "分かりにくさの原因をUIの好き嫌いではなく認知負荷として捉えられる。"
              terms:
                - slug: mental-model
                  name: メンタルモデル
                  summary: "ユーザーがその仕組みをどう理解しているかという内的なモデル。"
                  whyLearn: "ラベルやレイアウトが期待とズレる理由を説明できる。"
                  promptHint: "既存プロダクトの期待が新しいUIにどう影響するか説明させる。"
                  search:
                    keywords:
                      - メンタルモデル
                      - mental model
                      - user expectation
                      - ユーザー期待
                      - conceptual understanding
                      - 予測可能性
                      - system image
                      - existing knowledge
                      - learnability
                    commonSignals:
                      - ユーザーがどう動くはずだと思っているかを扱っている
                      - 既存サービスでの経験が新UIの理解に影響する話
                      - ラベルや分類が期待とズレているという指摘
                    antiSignals:
                      - 機械学習モデルやLLMモデルの話
                      - データモデルやドメインモデルだけを扱っている
                      - 精神医学的な診断モデルを指している
                    relatedNames:
                      - name: Card Sorting
                        kind: method
                        relevance: ユーザーの情報分類に関するメンタルモデルを把握するために使われる。
                      - name: Conceptual Model
                        kind: method
                        relevance: 設計側が提示する理解モデルとしてメンタルモデルと比較される。
                      - name: Journey Map
                        kind: method
                        relevance: ユーザーが期待する体験の流れを可視化するときに関連する。
                  aliases: ["mental model"]
                - slug: conceptual-model
                  name: 概念モデル
                  summary: "システムが提供する仕組みを、ユーザーにどう理解させるかという設計側の表現。"
                  whyLearn: "機能があるだけではなく、理解可能な形で見せる必要が分かる。"
                  promptHint: "メンタルモデルとの違いを比較させる。"
                  aliases: ["conceptual model"]
                - slug: cognitive-load
                  name: 認知負荷
                  summary: "理解、記憶、判断に必要な心的負担の大きさ。"
                  whyLearn: "選択肢過多や複雑な文言がなぜ離脱を生むか説明できる。"
                  promptHint: "認知負荷を下げる具体的な設計手段を挙げさせる。"
                  search:
                    keywords:
                      - 認知負荷
                      - cognitive load
                      - mental effort
                      - working memory
                      - information overload
                      - 選択肢過多
                      - complexity
                      - attention
                      - comprehension burden
                    commonSignals:
                      - 選択肢が多すぎる、読む量が多すぎる、判断が難しい
                      - ワーキングメモリや注意資源に触れている
                      - 段階的開示や情報の整理で負担を下げる話
                    antiSignals:
                      - サーバー負荷やCPU負荷の話
                      - 単に情報量が多いだけでユーザー理解に触れていない
                      - 学習理論一般でUIやタスク設計に接続していない
                    relatedNames:
                      - name: Hick's Law
                        kind: method
                        relevance: 選択肢の数と意思決定時間を結びつける認知負荷関連の法則。
                      - name: Progressive Disclosure
                        kind: pattern
                        relevance: 複雑さを段階的に開示して認知負荷を下げる設計パターン。
                      - name: Recognition over Recall
                        kind: pattern
                        relevance: 記憶負荷を下げるための代表的なユーザビリティ原則。
                  aliases: ["cognitive load"]
    - slug: user-research-and-synthesis
      name: ユーザー調査と統合
      summary: "ユーザー理解を得るための調査手法と、得られた知見を構造化する方法を扱う。"
      whyLearn: "思い込みではなく、観察と対話にもとづいて設計判断できるようになる。"
      topicClusters:
        - slug: discovery-research-methods
          name: 発見のための調査手法
          summary: "ユーザーの行動、文脈、継続的な経験を捉えるための代表的手法を整理する。"
          concepts:
            - slug: interviewing-and-observation
              name: インタビューと観察
              summary: "本人の語りと実際の行動の両方からニーズを捉える。"
              whyLearn: "言ったことと実際にしたことのズレを含めて理解できる。"
              terms:
                - slug: user-interview
                  name: ユーザーインタビュー
                  summary: "ユーザーの目的、背景、困りごとを対話で深掘りする調査手法。"
                  whyLearn: "表面化していない制約や判断基準を引き出せる。"
                  promptHint: "良い質問と悪い誘導質問の違いを説明させる。"
                  search:
                    keywords:
                      - ユーザーインタビュー
                      - user interview
                      - UX interview
                      - semi-structured interview
                      - discovery interview
                      - research interview
                      - qualitative interview
                      - probing question
                      - non-leading question
                    commonSignals:
                      - 半構造化質問や深掘り質問を設計している
                      - 目的、背景、困りごと、意思決定理由を聞いている
                      - 誘導質問やバイアスに注意している
                    antiSignals:
                      - 採用面接や評価面談の話
                      - アンケートだけで対話がない
                      - ユーザーの発話ではなくログ分析のみを扱っている
                    relatedNames:
                      - name: Jobs To Be Done Interview
                        kind: method
                        relevance: ユーザーの目的や状況を深掘りする実務上よく使われるインタビュー手法。
                      - name: Dovetail
                        kind: tool
                        relevance: インタビュー記録や定性分析を管理するリサーチリポジトリ系ツール。
                        officialUrl: https://dovetail.com/
                      - name: User Interviews
                        kind: service
                        relevance: ユーザーリクルーティングや調査参加者募集で使われるサービス。
                        officialUrl: https://www.userinterviews.com/
                  aliases: ["interview", "user interview"]
                - slug: contextual-inquiry
                  name: コンテクスチュアルインクワイアリ
                  summary: "実際の利用環境で観察しながら質問する調査手法。"
                  whyLearn: "作業の流れや周辺道具、他者との連携まで含めて理解できる。"
                  promptHint: "通常のインタビューでは拾いにくい発見を説明させる。"
                  search:
                    keywords:
                      - コンテクスチュアルインクワイアリ
                      - contextual inquiry
                      - contextual interview
                      - in-context observation
                      - workplace observation
                      - 現場観察
                      - shadowing
                      - master apprentice model
                      - situated research
                    commonSignals:
                      - 実際の利用環境で作業を見ながら質問している
                      - 周辺道具、同僚、紙、Excel、業務制約まで観察している
                      - インタビューと観察を同時に行っている
                    antiSignals:
                      - 会議室での通常インタビューのみ
                      - 画面録画だけで利用環境を見ていない
                      - 文脈という語が文章解釈だけを指している
                    relatedNames:
                      - name: Contextual Design
                        kind: method
                        relevance: contextual inquiry を含む現場理解から設計へつなげる方法論。
                      - name: Field Study
                        kind: method
                        relevance: 実利用環境で観察する点で近い調査手法。
                      - name: Service Blueprint
                        kind: method
                        relevance: 現場で観察した前面・背面プロセスを可視化する際に使われる。
                  aliases: ["contextual inquiry"]
                - slug: field-study
                  name: フィールド調査
                  summary: "実際の現場や生活環境でユーザー行動を観察する調査活動。"
                  whyLearn: "利用文脈を机上の想像ではなく現場の事実で把握できる。"
