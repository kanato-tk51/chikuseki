services:
  postgres:
    image: postgres:16-alpine
    container_name: chikuseki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chikuseki
      POSTGRES_USER: chikuseki
      POSTGRES_PASSWORD: chikuseki
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chikuseki -d chikuseki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
